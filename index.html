<style>
:root{--bg:#0a0a0f;--s:#12121a;--s2:#1a1a26;--s3:#22223a;--bd:#2a2a40;--tx:#f0f0ff;--mu:#6b6b8a;--ac:#e8ff3c;--ac2:#ff6b35;--ac3:#3ce8ff;--ok:#44ff88;--er:#ff4444;--wa:#ffbb33}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--tx);display:flex;font-size:14px}
.sidebar{width:220px;flex-shrink:0;background:var(--s);border-right:1px solid var(--bd);display:flex;flex-direction:column;height:100vh}
.sb-logo{padding:22px 20px 14px;border-bottom:1px solid var(--bd)}
.sb-logo .n{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;letter-spacing:-0.5px}
.sb-logo .n span{color:var(--ac)}
.sb-logo .v{font-size:0.58rem;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-top:2px}
nav{flex:1;padding:10px 0;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:0.82rem;color:var(--mu);transition:all .15s;border-left:2px solid transparent}
.ni:hover{color:var(--tx);background:var(--s2)}
.ni.active{color:var(--ac);background:var(--s2);border-left-color:var(--ac)}
.ni .ic{font-size:1rem;width:20px;text-align:center}
.sb-foot{padding:14px 20px;border-top:1px solid var(--bd);font-size:0.62rem;color:var(--mu)}
.main{flex:1;overflow-y:auto;height:100vh}
.content-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;height:100vh}
.content-wrap .main{height:auto;flex:1;overflow-y:auto}
@keyframes bannerPulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes stepPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,40,40,.4)}50%{box-shadow:0 0 0 6px rgba(255,40,40,0)}}
.ph{display:flex;align-items:center;justify-content:space-between;padding:26px 30px 18px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--bg);z-index:10}
.pt{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;letter-spacing:-0.5px}
.cnt{padding:22px 30px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;font-family:'Instrument Sans',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--s2);color:var(--tx);transition:all .15s;border-radius:2px}
.btn:hover{border-color:var(--ac);color:var(--ac)}
.bp{background:var(--ac);color:#000;border-color:var(--ac)}
.bp:hover{background:#d4eb2a;border-color:#d4eb2a;color:#000}
.bd2{background:transparent;color:var(--er);border-color:var(--er)}
.bd2:hover{background:rgba(255,68,68,.1)}
.bg{background:transparent;border-color:transparent}
.bg:hover{border-color:var(--bd);color:var(--tx)}
.card{background:var(--s);border:1px solid var(--bd);padding:16px;transition:border-color .15s}
.st{font-family:'Syne',sans-serif;font-size:0.6rem;font-weight:700;color:var(--ac);letter-spacing:3px;text-transform:uppercase;margin:18px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--bd)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fgi{display:flex;flex-direction:column;gap:4px}
.fgf{grid-column:1/-1}
label{font-size:0.65rem;font-weight:600;color:var(--mu);letter-spacing:1px;text-transform:uppercase}
input,select,textarea{background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:8px 10px;font-family:'Instrument Sans',sans-serif;font-size:0.82rem;outline:none;border-radius:2px;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--ac)}
select option{background:var(--s2)}
textarea{resize:vertical}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.mw{background:var(--s);border:1px solid var(--bd);width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--bd);flex-shrink:0}
.mt{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800}
.mc2{background:none;border:none;color:var(--mu);cursor:pointer;font-size:1.2rem;padding:2px 8px}
.mc2:hover{color:var(--tx)}
.mb{padding:22px;overflow-y:auto;flex:1}
.mf{padding:14px 22px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;flex-shrink:0}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.chr{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cdn{text-align:center;font-size:0.58rem;font-weight:700;color:var(--mu);letter-spacing:1px;text-transform:uppercase;padding:4px}
.cc{aspect-ratio:1;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;background:var(--s);border:1px solid var(--bd);padding:4px 5px;overflow:hidden;transition:all .15s;cursor:default}
.cc.om{opacity:.2}
.cc.he{cursor:pointer}
.cc.he:hover{filter:brightness(1.2)}
.cdnum{font-size:0.68rem;font-weight:700;line-height:1;margin-bottom:2px}
.jj-secondary{transition:all .2s}
.jj-compact .jj-secondary{display:none!important}
.cep{font-size:0.5rem;font-weight:700;padding:1px 3px;line-height:1.4;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px}
.empty{text-align:center;padding:50px 20px;color:var(--mu)}
.ei{font-size:3rem;margin-bottom:10px;opacity:.4}
.et{font-size:0.82rem}
.badge{font-size:0.6rem;padding:2px 7px;font-weight:700;letter-spacing:.5px;display:inline-block;border-radius:1px}
.bco{background:rgba(68,255,136,.1);color:var(--ok);border:1px solid rgba(68,255,136,.3)}
.bpe{background:rgba(255,187,51,.1);color:var(--wa);border:1px solid rgba(255,187,51,.3)}
.bca{background:rgba(255,68,68,.1);color:var(--er);border:1px solid rgba(255,68,68,.3)}
.bpa{background:rgba(60,232,255,.1);color:var(--ac3);border:1px solid rgba(60,232,255,.3)}
.bup{background:rgba(255,68,68,.1);color:var(--er);border:1px solid rgba(255,68,68,.3)}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.sc{background:var(--s);border:1px solid var(--bd);padding:14px}
.sl{font-size:0.62rem;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.sv{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800}
.ss{font-size:0.66rem;color:var(--mu);margin-top:2px}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:18px}
.tab{padding:9px 18px;font-size:0.75rem;font-weight:600;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--tx)}
.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.ci{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd);font-size:0.8rem;cursor:pointer}
.ci:hover{color:var(--ac)}
.cb{width:15px;height:15px;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.cb.ok{background:var(--ok);border-color:var(--ok);color:#000;font-size:0.65rem}
.tlr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd);font-size:0.78rem}
.tll{color:var(--mu)}
.tlv{font-family:'Syne',sans-serif;font-weight:700;color:var(--ac)}
.star{font-size:1.6rem;cursor:pointer;color:var(--s3);transition:color .1s,transform .1s;user-select:none;display:inline-block}
.star.on{color:var(--ac)}
.addr-drop{position:absolute;top:100%;left:0;right:0;background:var(--s2);border:1px solid var(--ac);border-top:none;z-index:999;display:none;max-height:220px;overflow-y:auto}
.addr-drop .addr-item{padding:9px 12px;font-size:.8rem;cursor:pointer;border-bottom:1px solid var(--bd);line-height:1.3}
.addr-drop .addr-item:hover{background:var(--s3)}
</style>
</head>
<body>
<div id="app" style="display:none;width:100%;height:100%">
<aside class="sidebar">
  <div class="sb-logo"><div class="n">Gig<span>Planner</span></div><div class="v">DJ Manager v7</div></div>
  <nav id="nav">
    <div class="ni active" data-p="dash" onclick="go('dash')"><span class="ic">⚡</span>Dashboard</div>
    <div class="ni" data-p="events" onclick="go('events')"><span class="ic">🎵</span>Événements</div>
    <div class="ni" data-p="jourj" onclick="go('jourj')"><span class="ic">🎯</span>Jour J</div>
    <div class="ni" data-p="finances" onclick="go('finances')"><span class="ic">💰</span>Finances</div>
    <div class="ni" data-p="settings" onclick="go('settings')"><span class="ic">⚙️</span>Paramètres</div>
  </nav>
  <div class="sb-foot" id="sb-foot-mission" style="display:none"></div>
  <div class="sb-foot" id="sb-foot-user">GigPlanner v8.0</div>
</aside>
<div class="content-wrap">
<main class="main" id="main"></main>
<div id="mission-banner" style="display:none;align-items:center;padding:10px 16px;font-size:.82rem;gap:10px"></div>
</div>
<div class="mo" id="modal" style="display:none">
  <div class="mw" onclick="event.stopPropagation()">
    <div class="mh"><div class="mt" id="mtitle"></div><button class="mc2" onclick="closeMo()">✕</button></div>
    <div class="mb" id="mbody"></div>
    <div class="mf" id="mfoot"></div>
  </div>
</div>
</div> <!-- end #app -->
<script>
// EVENT TYPES
const ET={
  mariage:{l:'Mariage',e:'💍',c:'#ff6b35'},
  corpo:{l:'Soirée Corpo',e:'🏢',c:'#ff9f43'},
  private:{l:'Soirée Privée',e:'🎉',c:'#ff6b9d'},
  club:{l:'Club',e:'🎧',c:'#b96bff'}
};

// CONTRACT TYPES
const CT={
  mariage:{
    label:'Mariage',emoji:'💍',color:'#ff6b35',
    clauses:function(p,ev,cd){
      var dj=p.name||'Le Prestataire'; var djAddr=(p.address||'')+(p.zip?' '+p.zip:'')+(p.city?' '+p.city:'');
      var djSiret=p.siret||''; var djLegal=p.legalName||p.name||'';
      var client=ev.client||cd.maries||cd.name||'Le Client';
      var clientAddr=cd.address||ev.address||'';
      var date=ev.date?new Date(ev.date+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'__/__/____';
      var venue=ev.venue||ev.address||'Lieu à définir';
      var start=ev.start||'__:__'; var end=ev.end||'__:__';
      var amount=ev.amount?ev.amount.toLocaleString('fr-FR')+'€':'___€';
      var ac=ev.acompteAmount||(ev.amount&&ev.acomptePct?Math.round(ev.amount*ev.acomptePct/100):0);
      var acStr=ac?ac.toLocaleString('fr-FR')+'€':'___€';
      var solde=ev.amount&&ac?(ev.amount-ac).toLocaleString('fr-FR')+'€':'___€';
      var svcs=ev.serviceIds&&ev.serviceIds.length?ev.serviceIds.map(function(sid){var s=S&&S.serviceTypes&&S.serviceTypes.find(function(x){return x.id===sid;});return s?'• '+s.emoji+' '+s.name+(s.desc?' : '+s.desc:''):null;}).filter(Boolean).join('<br>'):'• Animation DJ set soirée<br>• Sonorisation professionnelle<br>• Jeux de lumières';
      var today=new Date().toLocaleDateString('fr-FR');
      return '<p style="text-align:center;font-size:.72rem;color:#666;margin-bottom:16px">Contrat établi le '+today+'</p>'
        +'<p><strong>ENTRE LES SOUSSIGNÉS :</strong></p>'
        +'<p><strong>Le Prestataire :</strong> '+dj+(djLegal&&djLegal!==dj?' ('+djLegal+')':'')+'<br>'
        +(djAddr?djAddr+'<br>':'')
        +(djSiret?'SIRET : '+djSiret+'<br>':'')
        +(p.tvaNumber?'N° TVA : '+p.tvaNumber+'<br>':'')
        +(p.assurance?'Assurance RC Pro : '+p.assurance+'<br>':'<span style="color:#dc2626">⚠ Indiquer votre assurance RC Pro dans Paramètres</span><br>')
        +'</p>'
        +'<p><strong>Le Client :</strong> '+client+'<br>'+(clientAddr?clientAddr+'<br>':'')+'</p>'
        +'<p>Ci-après dénommés ensemble "les Parties", il a été convenu ce qui suit :</p>'

        +'<h4>ARTICLE 1 — OBJET DU CONTRAT</h4>'
        +'<p>Le Prestataire s\'engage à réaliser une prestation d\'animation musicale DJ pour le mariage de <strong>'+client+'</strong>, le <strong>'+date+'</strong>, au lieu suivant : <strong>'+venue+'</strong>.<br>'
        +'Horaires de prestation : <strong>'+start+'</strong> à <strong>'+end+'</strong> (installation et démontage non compris).</p>'

        +'<h4>ARTICLE 2 — DÉTAIL DES PRESTATIONS</h4>'
        +'<p>Les prestations incluses au présent contrat sont les suivantes :<br>'+svcs+'</p>'
        +'<p>Toute prestation supplémentaire (heures additionnelles, matériel non prévu, animations spéciales) fera l\'objet d\'un avenant écrit et d\'une facturation complémentaire.</p>'

        +'<h4>ARTICLE 3 — CONDITIONS TECHNIQUES & EXIGENCES DU LIEU</h4>'
        +'<p>Le Prestataire s\'engage à :<br>'
        +'• Fournir l\'ensemble du matériel son, lumières et câblage nécessaire à la bonne exécution de la prestation.<br>'
        +'• Disposer d\'un matériel de secours en cas de panne (lecteur de remplacement, câbles de substitution).<br>'
        +'• Arriver sur site au minimum 1h30 avant le début de la prestation pour l\'installation et les tests son.</p>'
        +'<p>Le Client s\'engage à :<br>'
        +'• Fournir un espace minimum de <strong>4m x 2m</strong> pour l\'installation du matériel DJ.<br>'
        +'• Garantir une alimentation électrique d\'au moins <strong>2 prises 16A avec prise de terre</strong>.<br>'
        +'• Permettre l\'accès au site dès <strong>'+subMin(start,90)+'</strong> pour la mise en place.<br>'
        +'• Fournir un repas au Prestataire si la prestation dépasse 4 heures consécutives.<br>'
        +'• Informer le Prestataire de toute limitation sonore (limiteur de décibels, horaires de couvre-feu) <strong>au minimum 15 jours avant</strong> la date.</p>'

        +'<h4>ARTICLE 4 — PROGRAMME MUSICAL</h4>'
        +'<p>Une liste de souhaits musicaux peut être transmise au Prestataire <strong>au minimum 7 jours avant</strong> la date. Le Prestataire se réserve le droit d\'adapter le programme en fonction de l\'ambiance et de la sécurité sonore du lieu, tout en respectant l\'esprit de la demande. Les titres musicaux peuvent être modifiés par le Prestataire à sa discrétion artistique.</p>'

        +'<h4>ARTICLE 5 — RÉMUNÉRATION & MODALITÉS DE PAIEMENT</h4>'
        +'<p>Montant total de la prestation : <strong>'+amount+'</strong>.<br>'
        +'Acompte versé à la signature (valeur de réservation) : <strong>'+acStr+'</strong>.<br>'
        +'Solde restant dû : <strong>'+solde+'</strong>, à régler <strong>le jour de la prestation</strong>, avant le départ du Prestataire, par virement, espèces ou chèque.<br>'
        +(p.iban?'Coordonnées bancaires : '+p.iban+(p.bic?' — BIC : '+p.bic:'')+'<br>':'')
        +'<strong>Tout retard de paiement</strong> entraîne de plein droit, sans mise en demeure préalable, l\'application d\'une pénalité au taux légal majoré de 10 points (art. L441-10 C.com.), ainsi qu\'une indemnité forfaitaire de recouvrement de <strong>40€</strong>.</p>'

        +'<h4>ARTICLE 6 — CONDITIONS D\'ANNULATION</h4>'
        +'<p><strong>Annulation par le Client :</strong><br>'
        +'• Plus de 90 jours avant la date : remboursement de l\'acompte sous déduction de 30% de frais de gestion.<br>'
        +'• Entre 90 et 31 jours : l\'acompte reste intégralement acquis au Prestataire.<br>'
        +'• Moins de 30 jours : <strong>100% du montant total</strong> est dû, sauf accord exceptionnel écrit du Prestataire.<br>'
        +'• Droit de rétractation de 14 jours si le contrat a été signé hors établissement (art. L221-18 C.conso.).</p>'
        +'<p><strong>Annulation par le Prestataire :</strong><br>'
        +'En cas d\'empêchement (maladie, accident), le Prestataire s\'engage à informer le Client <strong>immédiatement</strong> et à lui proposer un prestataire de niveau équivalent. L\'acompte est intégralement remboursé si aucun remplaçant n\'est trouvé.</p>'

        +'<h4>ARTICLE 7 — ASSURANCE & RESPONSABILITÉ</h4>'
        +'<p>Le Prestataire déclare être titulaire d\'une assurance <strong>Responsabilité Civile Professionnelle</strong> couvrant les dommages matériels et corporels pouvant survenir dans le cadre de sa prestation.'
        +(p.assurance?' (Police : '+p.assurance+')':'')+'<br>'
        +'Le Client reste responsable de tout dommage causé à l\'équipement du Prestataire par des tiers lors de l\'événement. Le Prestataire ne saurait être tenu responsable de défaillances techniques dues à une installation électrique défectueuse du lieu.</p>'

        +'<h4>ARTICLE 8 — DROIT À L\'IMAGE</h4>'
        +'<p>Sauf refus explicite notifié par écrit avant la prestation, le Client autorise le Prestataire à photographier et/ou filmer son installation dans le cadre de la promotion de ses activités (réseaux sociaux, site web). En aucun cas les images des personnes présentes ne seront publiées sans leur consentement.</p>'

        +'<h4>ARTICLE 9 — DROITS D\'AUTEUR (SACEM / SPRE)</h4>'
        +'<p>Pour les manifestations <strong>privées familiales</strong> (mariage, anniversaire), la diffusion musicale est exonérée de déclaration SACEM sous conditions légales. Pour toute manifestation publique ou ouverte au public, le règlement des droits SACEM est à la charge exclusive de l\'organisateur de l\'événement.</p>'

        +'<h4>ARTICLE 10 — FORCE MAJEURE</h4>'
        +'<p>Ni l\'une ni l\'autre des Parties ne sera responsable de tout manquement ou retard dans l\'exécution du contrat dû à des circonstances indépendantes de sa volonté (catastrophe naturelle, pandémie officielle, interdiction préfectorale). Dans ce cas, les parties se rapprocheront de bonne foi pour convenir d\'une date de report ou d\'un remboursement partiel.</p>'

        +'<h4>ARTICLE 11 — LITIGES & TRIBUNAL COMPÉTENT</h4>'
        +'<p>En cas de litige, les Parties s\'engagent à privilégier une résolution amiable dans un délai de 30 jours. À défaut, le différend sera soumis à la juridiction compétente du tribunal du lieu de résidence du Prestataire. Loi applicable : droit français.</p>'

        +'<p style="margin-top:24px;padding-top:12px;border-top:1px solid #ddd;font-size:.72rem;color:#888">Fait en deux exemplaires originaux. Lu et approuvé — "Bon pour accord".<br>Chaque partie reconnaît avoir reçu un exemplaire signé du présent contrat.</p>';
    }
  },
  corpo:{
    label:'Corpo / Entreprise',emoji:'🏢',color:'#3ce8ff',
    clauses:function(p,ev,cd){
      var dj=p.name||'Le Prestataire'; var djAddr=(p.address||'')+(p.zip?' '+p.zip:'')+(p.city?' '+p.city:'');
      var djSiret=p.siret||''; var djLegal=p.legalName||p.name||'';
      var client=ev.client||cd.legalName||cd.name||'L\'Entreprise';
      var clientSiret=cd.siret||''; var clientAddr=cd.clientAddress||cd.address||ev.address||'';
      var date=ev.date?new Date(ev.date+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'__/__/____';
      var venue=ev.venue||ev.address||'Lieu à définir';

function sbHeaders(token){
  var h = {'apikey':SB_KEY,'Content-Type':'application/json'};
  if(token) h['Authorization']='Bearer '+token;
  return h;
}

async function sbSignIn(email,pwd){
  var r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'apikey':SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({email:email,password:pwd})});
  return r.json();
}

async function sbRefreshToken(refreshToken){
  var r=await fetch(SB_URL+'/auth/v1/token?grant_type=refresh_token',{method:'POST',headers:{'apikey':SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({refresh_token:refreshToken})});
  return r.json();
}

async function sbSignUp(email,pwd){

async function sbSignOut(){

    await fetch(SB_URL+'/auth/v1/logout',{method:'POST',headers:sbHeaders(currentUser.token)}).catch(function(){});
  }
  currentUser=null;
  localStorage.removeItem('gp7_sess');
  showAuthScreen();
}

function saveSession(id,token,email,expiresIn,refreshToken){
  localStorage.setItem('gp7_sess',JSON.stringify({
    id:id, token:token, email:email,
    exp: Date.now()+(expiresIn||3600)*1000,
    refresh: refreshToken||null
  }));
}

function loadSession(){
  try{
    var s=JSON.parse(localStorage.getItem('gp7_sess')||'null');
    if(!s) return null;
    // Still valid
    if(s.exp > Date.now()+60000) return s;
    // Expired but has refresh token — return it so caller can refresh
    if(s.refresh) return s;
  }catch(e){}
  return null;
}

// Auto-refresh: call before any cloud operation
async function ensureFreshToken(){
  if(!currentUser) return false;
  var s = JSON.parse(localStorage.getItem('gp7_sess')||'null');
  if(!s) return false;
  // Token still valid for >2min
  if(s.exp > Date.now()+120000) return true;
  // Try refresh
  if(!s.refresh) return false;
  try{
    var d = await sbRefreshToken(s.refresh);
    if(d.access_token){
      currentUser.token = d.access_token;
      saveSession(currentUser.id, d.access_token, currentUser.email, d.expires_in||3600, d.refresh_token||s.refresh);
      updateCloudStatus('☁️ Cloud actif');
      return true;
    }
  }catch(e){}
  return false;
}


async function cloudSave(){
  if(!currentUser)return;
  var fresh = await ensureFreshToken();
  if(!fresh){ updateCloudStatus('⚠️ Session expirée — reconnexion…'); showReconnectBanner(); return; }
  updateCloudStatus('🔄 Sync...');
  try{
    // Delete existing then insert fresh
    await fetch(SB_URL+'/rest/v1/dj_data?user_id=eq.'+currentUser.id,{
      method:'DELETE',
      headers:sbHeaders(currentUser.token)
    });
    var r=await fetch(SB_URL+'/rest/v1/dj_data',{
      method:'POST',
      headers:Object.assign(sbHeaders(currentUser.token),{'Prefer':'return=minimal'}),
      body:JSON.stringify({user_id:currentUser.id,data:getDataPayload(),updated_at:new Date().toISOString()})
    });
    if(r.ok){updateCloudStatus('✅ Sauvegardé');}
    else{var e=await r.json().catch(function(){return{};});updateCloudStatus('⚠️ '+(e.message||r.status));}
  }catch(e){updateCloudStatus('⚠️ '+e.message);}
}

async function cloudLoad(){
  if(!currentUser)return false;
  await ensureFreshToken();
  try{
    var r=await fetch(SB_URL+'/rest/v1/dj_data?user_id=eq.'+currentUser.id+'&select=data&limit=1',{headers:sbHeaders(currentUser.token)});
    var rows=await r.json();
    if(rows&&rows.length&&rows[0].data){applyData(rows[0].data);localStorage.setItem('gp7',JSON.stringify(rows[0].data));return true;}
  }catch(e){}
  return false;
}

async function doLogin(){
  var email=(document.getElementById('auth-email')||{}).value||'';
  var pwd=(document.getElementById('auth-pwd')||{}).value||'';
  var msg=document.getElementById('auth-msg');
  if(!email||!pwd){if(msg)msg.textContent='Remplis tous les champs';return;}
  var btn=document.querySelector('#auth-screen .bp');
  if(btn){btn.disabled=true;btn.textContent='⏳ Connexion...';}
  if(msg)msg.textContent='';
  try{
    var data=await sbSignIn(email,pwd);
    if(data.error||data.error_description){
      if(msg)msg.textContent=data.error_description||data.error||'Erreur';
      if(btn){btn.disabled=false;btn.textContent='→ Se connecter';}
      return;
    }
    var uid = (data.user && data.user.id) || data.id || (data.data && data.data.user && data.data.user.id);
    var uemail = (data.user && data.user.email) || data.email || (data.data && data.data.user && data.data.user.email);
    var token = data.access_token || (data.data && data.data.access_token);
    if(!uid){if(msg)msg.textContent='Erreur: user id manquant';if(btn){btn.disabled=false;btn.textContent='→ Se connecter';}return;}
    var refreshTok = data.refresh_token || (data.data && data.data.refresh_token) || null;
    currentUser={id:uid,token:token,email:uemail};
    saveSession(uid,token,uemail,data.expires_in,refreshTok);
    var hasCloud=await cloudLoad();
    if(!hasCloud){var local=localStorage.getItem('gp7');if(local){try{applyData(JSON.parse(local));}catch(e){}}await cloudSave();}
    enterApp();
  }catch(e){if(msg)msg.textContent='Erreur réseau';if(btn){btn.disabled=false;btn.textContent='→ Se connecter';}}
}

async function doSignup(){
  var email=(document.getElementById('auth-email')||{}).value||'';
  var pwd=(document.getElementById('auth-pwd')||{}).value||'';
  var pwd2=(document.getElementById('auth-pwd2')||{}).value||'';
  var msg=document.getElementById('auth-msg');
  if(!email||!pwd||!pwd2){if(msg)msg.textContent='Remplis tous les champs';return;}
  if(pwd!==pwd2){if(msg)msg.textContent='Mots de passe différents';return;}
  if(pwd.length<6){if(msg)msg.textContent='6 caractères minimum';return;}
  var btn=document.querySelector('#auth-screen .bp');
  if(btn){btn.disabled=true;btn.textContent='⏳ Création...';}
  try{
    var data=await sbSignUp(email,pwd);
    if(data.error){if(msg)msg.textContent=data.error_description||data.error;if(btn){btn.disabled=false;btn.textContent='→ Créer mon compte';}return;}
    var data2=await sbSignIn(email,pwd);
    if(data2.access_token&&data2.user){
      currentUser={id:data2.user.id,token:data2.access_token,email:data2.user.email};
      saveSession(data2.user.id,data2.access_token,data2.user.email,data2.expires_in,data2.refresh_token||null);
      var local=localStorage.getItem('gp7');if(local){try{applyData(JSON.parse(local));}catch(e){}}
      await cloudSave();
      enterApp();
    } else {
      if(msg){msg.style.color='var(--ok)';msg.textContent='✅ Compte créé ! Connecte-toi.';}
      if(btn){btn.disabled=false;btn.textContent='→ Créer mon compte';}
      switchAuthTab('login');
    }
  }catch(e){if(msg)msg.textContent='Erreur réseau';if(btn){btn.disabled=false;btn.textContent='→ Créer mon compte';}}
}

function enterApp(){
  var auth=document.getElementById('auth-screen');

}

async function initApp(){

  if(p.get('client')||p.get('contract')||p.get('review')){
    document.getElementById('app').style.display='flex';
    if(checkContractMode())return;
    if(checkReviewMode())return;
    if(checkClientMode())return;
    document.getElementById('app').style.display='none';
  }
  var sess=loadSession();
  if(sess){

    if(hasCloud)render();
    enterApp();

}

function invAddLine(){
  const n = window._invLines||0; window._invLines=n+1;
  const wrap = document.getElementById('ied-lines');
  if(!wrap) return;
  const d = document.createElement('div');
  d.innerHTML = `<div id="iline-${n}" style="display:grid;grid-template-columns:1fr 44px 84px 20px;gap:4px;margin-bottom:5px;align-items:center">
    <input id="ied-d${n}" value="" placeholder="Description" oninput="invPreviewUpdate()" style="background:var(--s3);border:1px solid var(--bd);color:var(--tx);padding:6px 8px;font-size:.75rem;outline:none;width:100%;box-sizing:border-box">
    <input id="ied-q${n}" type="number" value="1" min="1" oninput="invPreviewUpdate()" style="background:var(--s3);border:1px solid var(--bd);color:var(--tx);padding:6px;font-size:.75rem;outline:none;text-align:center;width:100%;box-sizing:border-box">
    <input id="ied-u${n}" type="number" value="0" min="0" oninput="invPreviewUpdate()" style="background:var(--s3);border:1px solid var(--bd);color:var(--tx);padding:6px;font-size:.75rem;outline:none;text-align:right;width:100%;box-sizing:border-box">
    <button onclick="document.getElementById('iline-${n}').remove();invPreviewUpdate()" style="background:none;border:none;color:var(--er);cursor:pointer;font-size:.85rem;padding:0;line-height:1">✕</button>
  </div>`;
  wrap.appendChild(d.firstElementChild);
  invPreviewUpdate();
}

function invCollectLines(){
  const ls=[];
  for(let i=0;i<60;i++){
    const dd=document.getElementById('ied-d'+i);
    const qq=document.getElementById('ied-q'+i);
    const uu=document.getElementById('ied-u'+i);
    if(dd&&dd.closest('#ied-lines')&&dd.value.trim()) ls.push({desc:dd.value.trim(),qty:parseInt(qq&&qq.value)||1,unit:parseFloat(uu&&uu.value)||0});
  }
  return ls;
}

function invPreviewUpdate(){
  const wrap = document.getElementById('inv-preview-wrap'); if(!wrap) return;
  const p=S.profile;
  const lines=invCollectLines();
  const ht=lines.reduce((s,l)=>s+l.qty*l.unit,0);
  const tvr=p.tvaActive?0.20:0;
  const tva=ht*tvr;
  const ttc=ht+tva;
  const ac=parseFloat(document.getElementById('ied-ac')&&document.getElementById('ied-ac').value)||0;
  const solde=ttc-ac;
  const num=document.getElementById('ied-num')&&document.getElementById('ied-num').value||'';
  const date=document.getElementById('ied-date')&&document.getElementById('ied-date').value||'';
  const cl=document.getElementById('ied-cl')&&document.getElementById('ied-cl').value||'';
  const ad=document.getElementById('ied-ad')&&document.getElementById('ied-ad').value||'';

  const themes={

    violet:{hdr:'#3d1f6e',acc:'#7c3aed',row:'#f5f0ff',hi:'#7c3aed'},

  const th=themes[window._invTheme]||themes.noir;

  Object.keys(themes).forEach(k=>{

    <td style="padding:9px 12px;border-bottom:1px solid #e5e5e5;text-align:right;font-size:12px">${l.unit.toLocaleString('fr-FR')}€</td>
    <td style="padding:9px 12px;border-bottom:1px solid #e5e5e5;text-align:right;font-weight:700;font-size:12px">${(l.qty*l.unit).toLocaleString('fr-FR')}€</td>
  </tr>`).join('');

  const tvaLine=tvr>0
    ?`<tr><td colspan="3" style="padding:5px 12px;text-align:right;color:#666;font-size:11px">TVA (${Math.round(tvr*100)}%)</td><td style="padding:5px 12px;text-align:right;font-size:11px">${tva.toLocaleString('fr-FR')}€</td></tr>`

  const soldeRow=ac>0?`

  const iban=p.iban?`<div style="background:#f5f5f5;border-left:3px solid ${th.acc};padding:10px 14px;margin-top:16px;font-size:10px;line-height:1.7"><strong style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#999">Coordonnées bancaires</strong><br>${p.bankName?p.bankName+' — ':''}IBAN : ${p.iban}${p.bic?' · BIC : '+p.bic:''}</div>`:'';

  const statusBadge=paid
    ?`<span style="background:#16a34a;color:#fff;font-size:10px;font-weight:700;padding:3px 10px;letter-spacing:1px;text-transform:uppercase">✓ PAYÉE</span>`

  wrap.innerHTML=`<div style="background:#fff;box-shadow:0 4px 24px rgba(0,0,0,.18);font-family:'Helvetica Neue',Arial,sans-serif;color:#1a1a1a;min-height:1122px;display:flex;flex-direction:column;position:relative">
    <!-- HEADER -->
    <div style="background:${th.hdr};padding:28px 32px;display:flex;justify-content:space-between;align-items:center">
      <div style="color:#fff">${logo.replace('color:'+th.hdr,'color:#fff')}</div>
      <div style="text-align:right">
        <div style="font-size:26px;font-weight:900;color:#fff;letter-spacing:-1px">FACTURE</div>
        <div style="font-size:13px;color:rgba(255,255,255,.7);margin-top:2px">${num}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:1px">${fmtDate(date)}</div>
      </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:2px solid ${th.hdr}">
      <div style="padding:20px 28px;border-right:1px solid #e5e5e5">
        <div style="font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#aaa;margin-bottom:6px">ÉMETTEUR</div>
        <div style="font-weight:700;font-size:13px;margin-bottom:3px">${p.name||'—'}</div>
        <div style="font-size:11px;color:#666;line-height:1.7">${p.legalName?p.legalName+'<br>':''}${p.address||''}<br>${p.zip||''} ${p.city||''}${p.siret?'<br>SIRET : '+p.siret:''}</div>

      <div style="padding:20px 28px">
        <div style="font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#aaa;margin-bottom:6px">CLIENT</div>

        ${tvaLine}
        <tr style="background:${th.hi};color:${th.hi==='#e8ff3c'?'#000':'#fff'}"><td colspan="3" style="padding:11px 12px;text-align:right;font-size:14px;font-weight:900">TOTAL TTC</td><td style="padding:11px 12px;text-align:right;font-size:14px;font-weight:900">${ttc.toLocaleString('fr-FR')}€</td></tr>

function invSaveEditor(print){
  const lines=invCollectLines();
  const p=S.profile;
  const ht=lines.reduce((s,l)=>s+l.qty*l.unit,0);
  const tvr=p.tvaActive?0.20:0;
  const tva=ht*tvr; const ttc=ht+tva;
  const ac=parseFloat(document.getElementById('ied-ac')&&document.getElementById('ied-ac').value)||0;
  const inv={
    id: window._invEditorId||('inv'+uid()),
    number:document.getElementById('ied-num').value||'',
    date:document.getElementById('ied-date').value||new Date().toISOString().split('T')[0],
    clientName:document.getElementById('ied-cl').value||'',
    clientAddress:document.getElementById('ied-ad').value||'',
    clientSiret:(()=>{ const ev=window._invEditorEvId?S.events.find(e=>e.id==window._invEditorEvId):null; const cd=ev&&ev.clientData||{}; return cd.siret||''; })(),
    eventName:window._invEditorEvId?(S.events.find(e=>e.id==window._invEditorEvId)||{}).name||'':'',
    evId:window._invEditorEvId,
    lines, ht, tva, tvaRate:tvr, ttc, acompte:ac, solde:ttc-ac, totalTTC:ttc,
    notes:document.getElementById('ied-no').value||'',
    paid:document.getElementById('ied-pa').value==='1',
    theme:window._invTheme||'noir'
  };
  if(window._invEditorId){
    const idx=S.invoices.findIndex(i=>i.id===window._invEditorId);
    if(idx>=0) S.invoices[idx]=inv; else S.invoices.push(inv);
  } else {
    S.invoices.push(inv);
    S.profile.invoiceCounter=(S.profile.invoiceCounter||1)+1;
  }
  save();
  if(print) printInvThemed(inv);
  else { showToast('✅ Facture enregistrée'); go('billing'); }
}

function printInvThemed(inv){

    noir:  {hdr:'#1a1a1a',acc:'#1a1a1a',hi:'#e8ff3c',hiTxt:'#000'},

    bleu:  {hdr:'#1a3a5c',acc:'#1a3a5c',hi:'#3b82f6',hiTxt:'#fff'},
    violet:{hdr:'#3d1f6e',acc:'#7c3aed',hi:'#7c3aed',hiTxt:'#fff'},

  const th=themes[inv.theme]||themes.noir;
  const rows=inv.lines.map(l=>`<tr><td style="padding:9px 12px;border-bottom:1px solid #eee;font-size:12px">${l.desc}</td><td style="padding:9px 12px;border-bottom:1px solid #eee;text-align:center;font-size:12px">${l.qty}</td><td style="padding:9px 12px;border-bottom:1px solid #eee;text-align:right;font-size:12px">${l.unit.toLocaleString('fr-FR')}€</td><td style="padding:9px 12px;border-bottom:1px solid #eee;text-align:right;font-weight:700;font-size:12px">${(l.qty*l.unit).toLocaleString('fr-FR')}€</td></tr>`).join('');
  const tvaLine=inv.tvaRate>0?`<tr><td colspan="3" style="padding:5px 12px;text-align:right;color:#666;font-size:11px">TVA (${Math.round(inv.tvaRate*100)}%)</td><td style="padding:5px 12px;text-align:right;font-size:11px">${inv.tva.toLocaleString('fr-FR')}€</td></tr>`:`<tr><td colspan="3" style="padding:5px 12px;text-align:right;color:#aaa;font-size:10px">TVA non applicable</td><td style="padding:5px 12px;text-align:right;font-size:10px;color:#aaa">—</td></tr>`;
  const soldeRow=inv.acompte>0?`<tr><td colspan="3" style="padding:5px 12px;text-align:right;color:#888;font-size:11px">Acompte versé</td><td style="padding:5px 12px;text-align:right;font-size:11px;color:#888">-${inv.acompte.toLocaleString('fr-FR')}€</td></tr><tr style="background:${th.hdr};color:#fff"><td colspan="3" style="padding:10px 12px;text-align:right;font-size:13px;font-weight:800">SOLDE À RÉGLER</td><td style="padding:10px 12px;text-align:right;font-size:13px;font-weight:800">${inv.solde.toLocaleString('fr-FR')}€</td></tr>`:'';

function ctMetaSync(){
  const cl=document.getElementById('cted-client');
  const meta=document.getElementById('ct-meta-client');
  if(cl&&meta) meta.textContent=cl.value;
}

function ctEditorRefreshFromEv(evId){
  const ev=evId?S.events.find(e=>e.id==evId):null;
  const type=window._ctEditorType||'mariage';
  const t=CT[type];
  const cd=ev?(ev.clientData||{}):{};
  if(ev){
    const titleEl=document.getElementById('cted-title');
    const clientEl=document.getElementById('cted-client');
    if(titleEl) titleEl.value='Contrat '+t.label+' — '+ev.name;
    if(clientEl) clientEl.value=ev.client||'';
    const body=document.getElementById('ct-body-editable');
    if(body) body.innerHTML=t.clauses(S.profile, ev, cd);
    ctMetaSync();
  }
}

function ctEditorPreviewUpdate(){
  ctMetaSync();
}

function ctEditorSave(){
  const type=window._ctEditorType||'mariage';
  const t=CT[type];
  const body=document.getElementById('ct-body-editable');
  const contract={
    id: window._ctEditorId||('ct'+uid()),
    type,
    title: document.getElementById('cted-title').value||('Contrat '+t.label),
    clientName: document.getElementById('cted-client').value||'',
    eventName: (()=>{ const sel=document.getElementById('cted-ev'); const evId=sel&&sel.value; const ev=evId?S.events.find(e=>e.id==evId):null; return ev?ev.name:''; })(),
    evId: (()=>{ const sel=document.getElementById('cted-ev'); return sel&&sel.value||null; })(),
    date: document.getElementById('cted-date').value||new Date().toISOString().split('T')[0],
    createdAt: window._ctEditorId?(S.contracts.find(c=>c.id===window._ctEditorId)||{}).createdAt||new Date().toISOString():new Date().toISOString(),
    htmlContent: body?body.innerHTML:t.clauses(S.profile,{}),
    djSig: window._ctEditorId?(S.contracts.find(c=>c.id===window._ctEditorId)||{}).djSig||null:null,
    clientSig: window._ctEditorId?(S.contracts.find(c=>c.id===window._ctEditorId)||{}).clientSig||null:null,
    djSigDate: window._ctEditorId?(S.contracts.find(c=>c.id===window._ctEditorId)||{}).djSigDate||null:null,
    clientSigDate: window._ctEditorId?(S.contracts.find(c=>c.id===window._ctEditorId)||{}).clientSigDate||null:null,
    clientToken: window._ctEditorId?(S.contracts.find(c=>c.id===window._ctEditorId)||{}).clientToken||btoa('ct:'+uid()).replace(/=/g,''):btoa('ct:'+uid()).replace(/=/g,''),
    imported: false
  };
  if(window._ctEditorId){
    const idx=S.contracts.findIndex(c=>c.id===window._ctEditorId);
    if(idx>=0) S.contracts[idx]=contract; else S.contracts.push(contract);
  } else {
    S.contracts.push(contract);
    window._ctEditorId=contract.id;
  }
  save(); showToast('✅ Contrat enregistré');
  // Reinit signature canvases if present
  setTimeout(()=>{['ct-sig-dj','ct-sig-cl'].forEach(cid=>{const c=document.getElementById(cid);if(c)initSigCanvas(c);});},100);
}

function ctEditorPrint(){
  ctEditorSave();
  const id=window._ctEditorId; if(!id) return;
  printContract(id);
}

function ctSaveSig(contractId, party){
  if(!contractId){ ctEditorSave(); contractId=window._ctEditorId; }
  const cid=party==='dj'?'ct-sig-dj':'ct-sig-cl';
  const canvas=document.getElementById(cid);
  if(!canvas||isCanvasBlank(canvas)){alert('Merci de signer avant de valider');return;}
  const c=S.contracts.find(x=>x.id===contractId);
  if(!c) return;
  const dataUrl=canvas.toDataURL('image/png');
  if(party==='dj'){c.djSig=dataUrl;c.djSigDate=new Date().toISOString();}
  else{c.clientSig=dataUrl;c.clientSigDate=new Date().toISOString();}
  save();
  window._ctEditorId=contractId;
  go('contract-editor');
}

function getMissionAlert(){
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const tomorrowStr = new Date(now.getTime()+86400000).toISOString().split('T')[0];
  const in7d = new Date(now.getTime()+7*86400000).toISOString().split('T')[0];
  const nowMins = now.getHours()*60+now.getMinutes();

  const next = S.events.filter(e=>e.status!=='cancelled'&&e.date>=todayStr)
    .sort((a,b)=>a.date.localeCompare(b.date))[0];
  if(!next) return null;

  const t = ET[next.type]||ET.mariage;
  const cd = next.clientData||{};
  const tl = getTL(next);
  const days = Math.ceil((new Date(next.date+'T00:00:00')-new Date(todayStr+'T00:00:00'))/86400000);
  const isToday = next.date===todayStr;
  const isTomorrow = next.date===tomorrowStr;
  const isNight = isToday && nowMins >= 18*60; // after 18h on day of event

  // Next step in timeline for "imminente" detection
  var nextStepLabel='', nextStepMins=9999, nextStepDiff=9999;
  if(isToday){
    var allSteps=[];
    function normTa(v){if(!v)return'';return v.replace(/h/i,':').replace(/[^0-9:]/g,'');}
    function toMa(v){var p=(normTa(v)||'').split(':');return parseInt(p[0]||0)*60+parseInt(p[1]||0);}
    if(tl.depart&&tl.depart!=='—') allSteps.push({label:'Départ',mins:toMa(tl.depart)});
    if(next.type==='club'&&cd.legs){
      cd.legs.forEach(function(l){
        if(l.dep) allSteps.push({label:(l.type==='hotel'?'Check-in':'Départ '+l.type),mins:toMa(l.dep)});
      });
    }
    if(cd.soundcheck) allSteps.push({label:'Soundcheck',mins:toMa(cd.soundcheck)});
    var setT = normTa(cd.heureBal||next.start);
    if(setT) allSteps.push({label:'Début set',mins:toMa(setT)});
  // Find next future step with overnight awareness
    function toSortMa(v){ var m=toMa(v); return m<8*60?m+24*60:m; }
    var nowSortMa = nowMins<8*60?nowMins+24*60:nowMins;
    allSteps.sort((a,b)=>a.mins-b.mins);
    var ns = allSteps.find(s=>toSortMa(''+(Math.floor(s.mins/60)+':'+String(s.mins%60).padStart(2,'0')))>nowSortMa);
    if(ns){ nextStepLabel=ns.label; nextStepMins=ns.mins; nextStepDiff=toSortMa(''+(Math.floor(ns.mins/60)+':'+String(ns.mins%60).padStart(2,'0')))-nowSortMa; }
  }

  // Determine alert level
  if(isToday){
    const isNightMode = nowMins >= 20*60 || nowMins < 6*60;
    if(nextStepDiff<=0 && nextStepMins<9999){
      return {level:'now', days:0, ev:next, t, tl, nextStepLabel, nextStepDiff:0, isNightMode};
    }
    if(nextStepDiff<=30 && nextStepDiff>0){
      return {level:'pulse', days:0, ev:next, t, tl, nextStepLabel, nextStepDiff, isNightMode};
    }
    if(nextStepDiff<=120 && nextStepDiff>0){
      return {level:'soon', days:0, ev:next, t, tl, nextStepLabel, nextStepDiff, isNightMode};
    }
    return {level:'today', days:0, ev:next, t, tl, nextStepLabel, nextStepDiff, isNightMode};
  }
  if(isTomorrow) return {level:'tomorrow', days:1, ev:next, t, tl};
  if(next.date<=in7d) return {level:'week', days, ev:next, t, tl};
  return null;
}

// UTILS
function fd(d){if(!d)return'—';return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})}
function subMin(time,mins){if(!time)return'—';const[h,m]=time.split(':').map(Number);const t=h*60+m-mins;const hh=Math.floor(((t%1440)+1440)%1440/60);const mm=((t%60)+60)%60;return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0')}
function getTL(ev){
  var ids = ev.serviceIds||[];
  var r = calcDeduped(ids);
  var l = ids.length > 0 ? r.load    : (ev.loadMin||0);
  var i = ids.length > 0 ? r.install : (ev.installMin||0);
  var margin = S.profile.safetyMargin !== undefined ? S.profile.safetyMargin : 30;
  var effectiveLoad = l;
  // Chargement = moment où on commence à charger le matos chez soi
  // Départ     = moment où on quitte la maison (après avoir chargé)
  // Formule correcte :
  //   chargement = start - drive - install - load - margin
  //   depart     = start - drive - install - margin  (= chargement + load)
  var depart     = subMin(ev.start, (ev.driveMin||0) + i + margin);
  var chargement = effectiveLoad > 0 ? subMin(depart, effectiveLoad) : depart;
  return{load:effectiveLoad,install:i,margin:margin,depart:depart,chargement:chargement};
}

function stBadge(s){const m={confirmed:'bco',pending:'bpe',cancelled:'bca'};const l={confirmed:'Confirmé',pending:'En attente',cancelled:'Annulé'};return `<span class="badge ${m[s]||'bpe'}">${l[s]||s}</span>`}
function uid(){return Date.now()+''+Math.random().toString(36).slice(2,6)}
function escH(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

// ===== DASHBOARD COCKPIT =====
function pgDash(){
  const now=new Date();now.setHours(0,0,0,0);
  const todayStr=new Date().toISOString().split('T')[0];
  const in48=new Date(now.getTime()+172800000).toISOString().split('T')[0];
  const thisMonth=now.getMonth(),thisYear=now.getFullYear();

  const upcoming=S.events.filter(e=>new Date(e.date)>=now&&e.status!=='cancelled').sort((a,b)=>new Date(a.date)-new Date(b.date));
  const moEvs=S.events.filter(e=>{const d=new Date(e.date);return d.getMonth()===thisMonth&&d.getFullYear()===thisYear&&e.status!=='cancelled'});

  // Helper: calcule les montants d'un événement
  function evAmounts(e){
    const total = e.amount||0;
    const noAcompte = e.acompteStatus==='none'||(e.acomptePct===0&&!e.acompteAmount);
    const ac = noAcompte ? 0 : (e.acompteAmount||Math.round(total*(e.acomptePct||30)/100));
    const solde = total - ac;
    return {total, ac, solde, noAcompte};
  }

  // ENCAISSÉ = tout ce qui est marqué "reçu" (acomptes + soldes)
  // Calcul global (tous événements non annulés)
  const totalEncaisse = S.events.filter(e=>e.status!=='cancelled').reduce((s,e)=>{
    const {total,ac,solde,noAcompte}=evAmounts(e);
    let enc=0;
    if(e.soldeStatus==='received') enc=total; // tout encaissé
    else if(!noAcompte && e.acompteStatus==='received') enc=ac; // acompte reçu
    return s+enc;
  },0);

  // Encaissé ce mois
  const caEncaissedM = S.events.filter(e=>e.status!=='cancelled').reduce((s,e)=>{
    const {total,ac,noAcompte}=evAmounts(e);
    if(e.soldeStatus==='received') return s+total;
    if(!noAcompte && e.acompteStatus==='received') return s+ac;
    return s;
  },0);

  // À VENIR = soldes restants des événements futurs confirmés
  const aVenirEvs = S.events.filter(e=>e.status==='confirmed'&&new Date(e.date)>=now&&e.soldeStatus!=='received');
  const caAVenir = aVenirEvs.reduce((s,e)=>{
    const {total,ac,noAcompte}=evAmounts(e);
    const soldeRestant = noAcompte ? total : (e.acompteStatus==='received' ? (total-ac) : total);
    return s+soldeRestant;
  },0);

  // EN ATTENTE = acomptes dus non reçus (contrats signés ou événements confirmés proches)
  const enAttenteEvs = S.events.filter(e=>e.status==='confirmed'&&e.acompteStatus!=='none'&&e.acompteStatus!=='received'&&e.acomptePct>0);
  const caEnAttente = enAttenteEvs.reduce((s,e)=>{
    const {ac}=evAmounts(e);
    return s+ac;
  },0);

  // Monthly objective
  const obj=S.profile.monthlyGoal||0;
  const objPct=obj>0?Math.min(100,Math.round(caEncaissedM/obj*100)):0;

  // Alerts
  const relAlerts=getRelancesAlerts();
  const urgentAlerts=relAlerts.filter(a=>a.urgent);
  const warnAlerts=relAlerts.filter(a=>!a.urgent);

  // Global status indicator
  let statusColor,statusIcon,statusText;
  if(urgentAlerts.length>0){statusColor='var(--er)';statusIcon='🔴';statusText=urgentAlerts.length+' action'+(urgentAlerts.length>1?'s urgentes':' urgente')+' requise'+(urgentAlerts.length>1?'s':'')}
  else if(warnAlerts.length>0||caEnAttente>0){statusColor='#ffaa00';statusIcon='🟠';statusText='Quelques éléments à suivre'}
  else if(upcoming.length===0){statusColor='var(--mu)';statusIcon='😴';statusText='Aucune prestation à venir'}
  else{statusColor='var(--ok)';statusIcon='🟢';statusText='Tout est sous contrôle'}

  // Next mission block
  const nextMission=upcoming[0];
  const nextIn48=nextMission&&nextMission.date<=in48;
  let missionBlock='';
  if(nextMission){
    const t=ET[nextMission.type]||ET.mariage;
    const tl=getTL(nextMission);
    const days=Math.ceil((new Date(nextMission.date)-now)/86400000);
    const isToday=nextMission.date===todayStr;
    const isTomorrow=days===1;
    const urgLabel=isToday?'AUJOURD\'HUI':isTomorrow?'DEMAIN':'Dans '+days+'j';

    // Today = banner using same urgency palette as bottom bar

      const ma = getMissionAlert();
      const LVLS = {
        now:   { bg:'#cc0000',             txt:'#fff',                   pulse:true,  icon:'🔴', label:"C'EST MAINTENANT" },
        pulse: { bg:'#ff2020',             txt:'#fff',                   pulse:true,  icon:'⚠️', label:null },
        soon:  { bg:'#c47000',             txt:'#fff',                   pulse:false, icon:'🟠', label:null },
        today: { bg:'rgba(40,80,30,.9)',   txt:'rgba(200,255,160,.95)',   pulse:false, icon:'🎯', label:"AUJOURD'HUI" }
      };
      const lv2 = ma ? (LVLS[ma.level]||LVLS.today) : LVLS.today;
      function fmtD(d){ return d>=60?Math.floor(d/60)+'h'+(d%60?String(d%60).padStart(2,'0'):''):d+'min'; }
      var stepTxt = (ma&&ma.nextStepDiff>0&&ma.nextStepDiff<9999) ? ma.nextStepLabel+' dans '+fmtD(ma.nextStepDiff) : (tl.depart&&tl.depart!=='—'?'Départ '+tl.depart:'');
      var cardBorder = lv2.bg.startsWith('rgba') ? t.c : lv2.bg;
      missionBlock=`
        <div id="dash-mission-banner" style="background:${lv2.bg};padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;${lv2.pulse?'animation:bannerPulse 2s ease-in-out infinite':''}" onclick="go('jourj')">

          <button class="btn bg" style="font-size:.65rem;padding:3px 8px" onclick="relanceByMail(${i})">✉️</button>
          <button class="btn bg" style="font-size:.65rem;padding:3px 8px" onclick="markPayment('${a.evId}','${a.type==='acompte'?'acompte':'solde'}','received');render()">✅</button>

    relancesBlock=`<div class="st" style="display:flex;align-items:center;gap:8px">💰 Paiements à suivre <span style="background:${urgentAlerts.length>0?'var(--er)':'#ffaa00'};color:#000;font-size:.6rem;padding:1px 7px;border-radius:99px">${relAlerts.length}</span></div>

    ${relAlerts.length>3?`<div style="text-align:right;margin-top:6px"><button class="btn bg" style="font-size:.7rem" onclick="go('finances');S._finTab='relances'">Voir tout (${relAlerts.length}) →</button></div>`:''}`;
  } else if(totalPending===0 && S.events.filter(e=>e.status!=='cancelled').length>0){
    relancesBlock=`<div class="st">💰 Paiements</div><div style="background:var(--s2);border:1px solid rgba(68,255,136,.2);padding:12px 16px;display:flex;align-items:center;gap:10px"><span style="font-size:1.4rem">✅</span><div style="font-size:.8rem;color:var(--ok);font-weight:600">Tout est encaissé — aucune relance nécessaire</div></div>`;
  }

  return `<div class="ph">
    <div>
      <div class="pt">Dashboard ⚡</div>
      <div style="font-size:.72rem;margin-top:3px"><span style="color:${statusColor}">${statusIcon}</span> <span style="color:var(--mu)">${statusText}</span></div>
    </div>

  </div>

    <div class="sc" style="cursor:pointer" onclick="go('finances')">
      <div class="sl">Encaissé ce mois</div>

      <div class="ss">${moEvs.length} prestation${moEvs.length>1?'s':''}</div>
      ${obj>0?`<div style="margin-top:7px;height:3px;background:var(--s3)"><div style="height:100%;background:${objPct>=100?'var(--ok)':'var(--ac)'};width:${objPct}%"></div></div><div style="font-size:.62rem;color:var(--mu);margin-top:3px">${objPct}% objectif</div>`:''}
    </div>
    <div class="sc" style="cursor:pointer" onclick="go('finances')">
      <div class="sl">À venir</div>
      <div class="sv" style="color:var(--ac2)">${caAVenir>0?caAVenir.toLocaleString('fr-FR')+'€':'—'}</div>
      <div class="ss">${aVenirEvs.length} solde${aVenirEvs.length>1?'s':''} à encaisser</div>
    </div>
    <div class="sc" style="cursor:pointer;${caEnAttente>0?'border-color:rgba(255,170,0,.4)':''}" onclick="go('finances');S._finTab='relances'">
      <div class="sl">Acomptes dus</div>
      <div class="sv" style="color:${caEnAttente>0?'#ffaa00':'var(--mu)'}">${caEnAttente>0?caEnAttente.toLocaleString('fr-FR')+'€':'—'}</div>
      <div class="ss">${caEnAttente>0?enAttenteEvs.length+' en attente':'aucun en attente'}</div>
    </div>
  </div>`
  +`<div class="st">Prochaine mission</div>
  ${nextMission?missionBlock:'<div class="empty"><div class="ei">😴</div><div class="et">Aucune prestation à venir</div></div>'}
  ${upcoming.length>1?`<div style="display:grid;gap:6px;margin-top:8px">${upcoming.slice(1,4).map(ev=>{
    const t=ET[ev.type]||ET.mariage;
    const days=Math.ceil((new Date(ev.date)-now)/86400000);
    const isToday2=ev.date===todayStr;
    const isTomorrow2=days===1;
    const dayLabel=isToday2?'AUJOURD\'HUI':isTomorrow2?'DEMAIN':'J-'+days;
    const dayCol=isToday2?'#ff2020':isTomorrow2?t.c:t.c;
    return `<div class="card" style="cursor:pointer;border-left:3px solid ${t.c};padding:10px 14px" onclick="openEv('${ev.id}')">

        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;color:${dayCol}">${dayLabel}</span>
          ${payBadge(ev)}
        </div>
      </div>
    </div>`;
  }).join('')}</div>`:''}
  ${relancesBlock}
  </div>`;
  // Start live ticker if mission is today
  if(nextMission && nextMission.date===todayStr){
    const _tl=getTL(nextMission);
    setTimeout(()=>startJourJTicker(nextMission,_tl),200);
  }
}

// ===== EVENTS =====
function pgEvents(){
  const now=new Date();now.setHours(0,0,0,0);
  const todayStr=new Date().toISOString().split('T')[0];
  const in48=new Date(now.getTime()+172800000).toISOString().split('T')[0];

  // Check if upcoming event < 48h → auto show mission
  const nextMission=S.events.filter(e=>e.status!=='cancelled'&&e.date>=todayStr&&e.date<=in48).sort((a,b)=>a.date.localeCompare(b.date))[0];

  const evs=[...S.events].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const upcoming=evs.filter(e=>new Date(e.date+'T00:00:00')>=now&&e.status!=='cancelled');
  const past=evs.filter(e=>new Date(e.date+'T00:00:00')<now||e.status==='cancelled');

  const evCard=(ev,highlight)=>{
    const t=ET[ev.type]||ET.mariage;
    const tl=getTL(ev);
    const days=Math.ceil((new Date(ev.date+'T00:00:00')-now)/86400000);
    const isToday=ev.date===todayStr;
    const svcs=(ev.serviceIds||[]).map(sid=>S.serviceTypes.find(s=>s.id===sid)).filter(Boolean);
    const prests=svcs.filter(s=>s.svcType!=='option');
    const opts=svcs.filter(s=>s.svcType==='option');
    const svcPills=prests.map(s=>`<span style="font-size:.62rem;font-weight:700;background:${s.color}18;border:1px solid ${s.color}66;color:${s.color};padding:1px 7px">${s.emoji} ${s.name}</span>`).join('');
    const optPills=opts.map(s=>`<span style="font-size:.62rem;font-weight:700;background:rgba(255,170,0,.1);border:1px solid rgba(255,170,0,.4);color:#ffaa00;padding:1px 7px">${s.emoji} ${s.name}</span>`).join('');
    // Days badge — always shown
    const daysBadge = isToday
      ? `<span style="font-size:.6rem;font-weight:800;color:#000;background:#ff2020;padding:1px 7px;letter-spacing:1px">AUJOURD'HUI</span>`
      : days===1 ? `<span style="font-size:.6rem;font-weight:800;color:#000;background:${t.c};padding:1px 7px">DEMAIN</span>`
      : '';
    // J-X always shown in right column
    const daysRight = isToday||days===1 ? '' : `<div style="font-family:'Syne',sans-serif;font-weight:800;color:${t.c};font-size:.88rem">J-${days}</div>`;
    return `<div class="card" style="cursor:pointer;border-left:3px solid ${t.c};margin-bottom:8px${highlight?';border:2px solid '+t.c:''};" onclick="openEv('${ev.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
        <div style="flex:1;min-width:0">
          <div style="font-size:.58rem;font-weight:800;color:${t.c};letter-spacing:2px;text-transform:uppercase;margin-bottom:2px">${t.l}</div>
          <div style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:3px">${ev.name}</div>
          <div style="font-size:.7rem;color:var(--mu);margin-bottom:7px">${fd(ev.date)}${ev.venue?' · '+ev.venue:''}</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:${(svcPills||optPills)?'5px':'0'}">
            ${daysBadge}${stBadge(ev.status)}${payBadge(ev)}${ev.clientData?'<span class="badge bco">✅ Fiche</span>':''}
          </div>
          ${svcPills||optPills?`<div style="display:flex;gap:4px;flex-wrap:wrap">${svcPills}${optPills}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0;min-width:80px">
          ${daysRight}
          <div style="font-family:'Syne',sans-serif;font-weight:800;color:var(--ac2);${daysRight?'font-size:.82rem;margin-top:2px':''}">${(ev.amount||0).toLocaleString('fr-FR')}€</div>
          <div style="font-size:.68rem;color:var(--mu);margin-top:2px">${ev.start||'—'} → ${ev.end||'—'}</div>
          ${tl.depart!=='—'&&days>=0&&days<=2?`<div style="font-size:.65rem;color:var(--mu);margin-top:3px">🚗 ${tl.depart}</div>`:''}
        </div>
      </div>
    </div>`;
  };

  // Mission section removed — Jour J has its own dedicated tab
  const missionSection = '';

  const tabs=`<div class="tabs">
    <div class="tab ${S._evTab==='upcoming'||!S._evTab?'active':''}" onclick="S._evTab='upcoming';render()">À venir (${upcoming.length})</div>
    <div class="tab ${S._evTab==='past'?'active':''}" onclick="S._evTab='past';render()">Passés (${past.length})</div>
    <div class="tab ${S._evTab==='cal'?'active':''}" onclick="S._evTab='cal';render()">📅 Calendrier</div>
    <div class="tab" onclick="go('clients')">👤 Clients</div>
  </div>`;

  const list=(S._evTab==='past'?past:upcoming);
  const calInline = S._evTab==='cal' ? pgCal() : '';

  return `<div class="ph"><div class="pt">Événements 🎵</div><button class="btn bp" onclick="openNewEv()">+ Nouvelle date</button></div>
  <div class="cnt">
  ${tabs}
  ${S._evTab==='cal'?calInline:(list.length===0?'<div class="empty"><div class="ei">🎵</div><div class="et">Aucun événement</div></div>':list.map(ev=>evCard(ev,false)).join(''))}
  </div>`;
}

  const ev=S.events.find(e=>e.id==id);if(!ev)return;
  const t=ET[ev.type]||ET.mariage;
  const tl=getTL(ev);
  const svcs=(ev.serviceIds||[]).map(sid=>S.serviceTypes.find(s=>s.id===sid)).filter(Boolean);
  const prests=svcs.filter(s=>s.svcType!=='option');
  const opts=svcs.filter(s=>s.svcType==='option');
  const cd=ev.clientData||{};
  const playlists=ev.playlists||[];
  const isClub = ev.type==='club';

  // Build prestations/options block
  const svcBlock=(()=>{
    const prestHtml=prests.length?`

          ${opts.map(s=>`<span style="font-size:.75rem;font-weight:700;background:rgba(255,170,0,.12);border:2px solid rgba(255,170,0,.5);color:#ffaa00;padding:3px 10px;border-radius:2px">${s.emoji} ${s.name}${s.price?` +${s.price}€`:''}</span>`).join('')}

    return `<div class="st" style="display:flex;align-items:center;justify-content:space-between">

  // Playlists block
  const playlistBlock=playlists.length?`

      ${playlists.map((pl,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--s2);border:1px solid var(--bd)">

        <button onclick="delEvPlaylist('${id}',${i})" style="background:none;border:none;color:var(--er);cursor:pointer;font-size:.8rem;padding:0 2px">✕</button>
      </div>`).join('')}
    </div>`
  :`<div class="st" style="display:flex;align-items:center;justify-content:space-between"><span>🎵 Playlists client</span><button class="btn bg" style="font-size:.68rem;padding:3px 9px" onclick="openEvPlaylists('${id}')">+ Ajouter</button></div>
    <div style="font-size:.76rem;color:var(--mu);margin-bottom:10px;padding:8px 0">Aucune playlist — ajoute les liens partagés par ton client</div>`;

  // Club: logistique mission (déplacements + soirée)

      <div id="ev-tl-${id}">
      <div class="tlr"><span class="tll">⏰ Chargement</span><span class="tlv">${tl.chargement}</span></div>

  }
}

function recalcEvLogistique(evId){
  var ev = S.events.find(function(e){return e.id==evId;});
  if(!ev) return;

  var svcs = (ev.serviceIds||[]).map(function(sid){return S.serviceTypes.find(function(s){return s.id===sid;});}).filter(Boolean);
  if(!svcs.length){
    alert('Aucune prestation cochée sur cet événement.\nModifie l\'événement pour cocher tes prestations d\'abord.');
    return;
  }

  var result = calcDeduped(ev.serviceIds||[]);
  var newLoad    = result.load;
  var newInstall = result.install;
  var oldLoad    = ev.loadMin;
  var oldInstall = ev.installMin;

  // Find shared gear for info message
  var allGear = []; var dupes = [];
  svcs.forEach(function(s){
    (s.gearIds||[]).forEach(function(gid){
      if(allGear.indexOf(gid)!==-1 && dupes.indexOf(gid)===-1) dupes.push(gid);
      else allGear.push(gid);
    });
  });
  var dupeMsg = '';
  if(dupes.length){
    var names = dupes.map(function(gid){ var g=S.gear.find(function(x){return x.id===gid;}); return g?g.name:gid; }).join(', ');
    dupeMsg = '\n♻️ Matos partagé dédupliqué : ' + names;
  }

  var detail = svcs.map(function(s){
    var gearNames = (s.gearIds||[]).map(function(gid){ var g=S.gear.find(function(x){return x.id===gid;}); return g?g.name:null; }).filter(Boolean);
    return (s.emoji||'') + ' ' + s.name + ' : charg. ' + (s.loadMin||0) + 'min · install. ' + (s.installMin||0) + 'min' + (gearNames.length?' ('+gearNames.join(', ')+')':'');
  }).join('\n');

  var msg = '♻️ Recalculer depuis ton matos actuel ?\n\n'
    + detail + dupeMsg
    + '\n\nTotal chargement : ' + oldLoad + 'min → ' + newLoad + 'min'
    + '\nTotal installation : ' + oldInstall + 'min → ' + newInstall + 'min'
    + '\n\n⚠️ L\'heure du set (' + (ev.start||'—') + ') ne change pas.';

  if(!confirm(msg)) return;

  ev.loadMin    = newLoad;
  ev.installMin = newInstall;
  save();

  var tl   = getTL(ev);
  var tlEl = document.getElementById('ev-tl-'+evId);
  if(tlEl){
    tlEl.innerHTML =
      '<div class="tlr"><span class="tll">⏰ Chargement</span><span class="tlv">' + tl.chargement + '</span></div>'
      + '<div class="tlr"><span class="tll">🚗 Départ</span><span class="tlv">' + tl.depart + '</span></div>'
      + '<div class="tlr"><span class="tll">📍 Arrivée site</span><span class="tlv">' + subMin(ev.start,tl.install) + '</span></div>'
      + '<div class="tlr"><span class="tll">🎵 Début set</span><span class="tlv" style="color:var(--ac2);font-weight:700">' + (ev.start||'—') + '</span></div>'
      + '<div class="tlr"><span class="tll">🏁 Fin</span><span class="tlv">' + (ev.end||'—') + '</span></div>'
      + '<div style="font-size:.68rem;color:var(--ok);margin-top:6px;font-weight:600">✅ Mis à jour' + (dupeMsg ? ' · ' + dupes.length + ' matos dédupliqué(s)' : '') + '</div>';
  }
  var btn = document.querySelector('[onclick="recalcEvLogistique(\'' + evId + '\')"]');
  if(btn){
    btn.textContent='✅ Mis à jour !';
    btn.style.borderColor='var(--ok)';btn.style.color='var(--ok)';
    setTimeout(function(){btn.textContent='♻️ Recalculer chargement & départ';btn.style.borderColor='';btn.style.color='';},3000);
  }
}

function selectDocType(type){
  window._uploadDocType = type;
  ['contrat','facture'].forEach(function(t){
    var btn = document.getElementById('doc-type-' + t);
    if(!btn) return;
    if(t===type){ btn.style.border='2px solid var(--ac)'; btn.style.background='rgba(232,255,60,.1)'; btn.style.color='var(--tx)'; btn.style.fontWeight='600'; }
    else { btn.style.border='1px solid var(--bd)'; btn.style.background='var(--s2)'; btn.style.color='var(--mu)'; btn.style.fontWeight='normal'; }
  });
}

function uploadDoc(){
  var evId = window._uploadDocEvId;
  var type = window._uploadDocType || 'contrat';
  var fileInput = document.getElementById('doc-file');
  var msg = document.getElementById('doc-upload-msg');
  if(!fileInput||!fileInput.files||!fileInput.files[0]){ msg.textContent='⚠️ Sélectionne un fichier'; msg.style.color='var(--wa)'; return; }
  var file = fileInput.files[0];
  if(file.size > 5*1024*1024){ msg.textContent='⚠️ Fichier trop lourd (max 5MB)'; msg.style.color='var(--wa)'; return; }
  msg.textContent='⏳ Upload en cours...'; msg.style.color='var(--mu)';
  var btn = document.querySelector('[onclick="uploadDoc()"]');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Upload...'; }
  var fileName = evId + '_' + type + '_' + Date.now() + '.pdf';
  fetch(SB_URL + '/storage/v1/object/documents/' + fileName, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/pdf', 'x-upsert': 'true' },
    body: file
  }).then(function(r){
    if(!r.ok) throw new Error('Upload failed: ' + r.status);
    var publicUrl = SB_URL + '/storage/v1/object/public/documents/' + fileName;
    var ev = S.events.find(function(e){ return e.id==evId; });
    if(!ev) throw new Error('Événement introuvable');
    if(!ev.docs) ev.docs = [];
    ev.docs.push({ type:type, name:file.name, url:publicUrl, uploadedAt:new Date().toISOString() });
    save();
    msg.textContent='✅ Document uploadé !'; msg.style.color='var(--ok)';
    setTimeout(function(){ closeMo(); openEv(evId); }, 800);
  }).catch(function(err){
    msg.textContent='❌ Erreur : ' + err.message; msg.style.color='var(--er)';
    if(btn){ btn.disabled=false; btn.textContent='📤 Uploader'; }
  });
}

function delEvDoc(evId, idx){
  var ev = S.events.find(function(e){ return e.id==evId; });
  if(!ev||!ev.docs) return;
  var doc = ev.docs[idx];
  if(!doc||!confirm('Supprimer "' + doc.name + '" ?')) return;
  var fileName = doc.url.split('/documents/')[1];
  if(fileName){ fetch(SB_URL+'/storage/v1/object/documents/'+fileName,{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}); }
  ev.docs.splice(idx,1);
  save();
  openEv(evId);
}

function openEvPrestations(evId){
  var ev = S.events.find(function(e){return e.id==evId;});
  if(!ev) return;
  var currentIds = ev.serviceIds||[];

  function buildBody(){
    var prests = S.serviceTypes.filter(function(s){return s.svcType!=='option';});
    var opts   = S.serviceTypes.filter(function(s){return s.svcType==='option';});
    var autoTotal = 0;
    currentIds.forEach(function(sid){
      var s=S.serviceTypes.find(function(x){return x.id===sid;});
      if(s&&s.price) autoTotal += parseFloat(s.price)||0;
    });

    function svcRow(s){
      var checked = currentIds.indexOf(s.id)!==-1;
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)20;cursor:pointer" onclick="toggleEvSvc(\''+evId+'\',\''+s.id+'\')">'
        + '<div style="width:22px;height:22px;border:2px solid '+(checked?s.color:'var(--bd)')+';background:'+(checked?s.color:'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.75rem;color:#000">'+(checked?'✓':'')+'</div>'
        + '<div style="flex:1"><span style="font-size:.86rem;font-weight:600">'+s.emoji+' '+s.name+'</span>'
        + (s.price ? '<span style="font-size:.72rem;color:var(--mu);margin-left:8px">'+s.price+'€</span>' : '')
        + '</div>'
        + '</div>';
    }

    var body = '<div style="font-size:.72rem;color:var(--mu);margin-bottom:12px">Coche les prestations et options incluses dans cet événement.</div>';
    if(prests.length){
      body += '<div style="font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">🎵 Prestations</div>';
      body += prests.map(svcRow).join('');
    }
    if(opts.length){
      body += '<div style="font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin:12px 0 6px">✨ Options</div>';
      body += opts.map(svcRow).join('');
    }
    if(autoTotal > 0){
      body += '<div style="margin-top:14px;padding:10px;background:rgba(232,255,60,.06);border:1px solid rgba(232,255,60,.2)">'
        + '<div style="font-size:.62rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Total calculé auto</div>'
        + '<div style="font-family:Syne,sans-serif;font-size:1.3rem;font-weight:800;color:var(--ac)">'+autoTotal.toLocaleString('fr-FR')+'€</div>'
        + '<div style="font-size:.72rem;color:var(--mu);margin-top:4px">Montant de l\'événement : <strong style="color:var(--tx)">'+(ev.amount||0)+'€</strong></div>'
        + '<button class="btn bp" style="margin-top:8px;font-size:.75rem" onclick="applyAutoTotal(\''+evId+'\','+autoTotal+')">Appliquer ce montant →</button>'
        + '</div>';
    }
    return body;
  }

  document.getElementById('mtitle').textContent = '🎵 Prestations & Options';
  document.getElementById('mbody').innerHTML = buildBody();
  document.getElementById('mfoot').innerHTML = '<button class="btn bp" onclick="closeMo();openEv(\''+evId+'\')">✓ Fermer</button>';
  showMo();

  // Store refresh fn globally so toggleEvSvc can call it
  window._prestModalEvId = evId;
  window._prestModalRefresh = function(){
    var bEl = document.getElementById('mbody');
    if(bEl) bEl.innerHTML = buildBody();
  };
}

function toggleEvSvc(evId, svcId){
  var ev = S.events.find(function(e){return e.id==evId;});
  if(!ev) return;
  if(!ev.serviceIds) ev.serviceIds=[];
  var idx = ev.serviceIds.indexOf(svcId);
  if(idx===-1) ev.serviceIds.push(svcId);
  else ev.serviceIds.splice(idx,1);
  save();
  if(window._prestModalEvId==evId && window._prestModalRefresh) window._prestModalRefresh();

function applyAutoTotal(evId, total){

// ===== WIZARD CRÉATION ÉVÉNEMENT =====
function wizardNew(prefillClient){
  window._wiz = { step:1, type:null, data:{}, prefillClient: prefillClient||null };
  window._clubLegs = []; // Always reset for new event
  _wizRender();
}

function _wizRender(){
  var w = window._wiz;
  var steps = ['Type', 'Client', 'Lieu', 'Prestations', 'Paiement'];
  if(w.type==='club') steps = ['Type', 'Infos mission', 'Déplacements', 'Soirée & Contacts', 'Paiement'];

  var progressHTML = '<div style="display:flex;align-items:center;gap:0;margin-bottom:24px">';
  steps.forEach(function(s,i){
    var n = i+1;
    var active = n===w.step;
    var done = n<w.step;
    progressHTML += '<div style="display:flex;align-items:center;flex:1">';
    progressHTML += '<div style="display:flex;flex-direction:column;align-items:center;flex:1">';
    progressHTML += '<div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;flex-shrink:0;'
      +(done?'background:var(--ok);color:#000':active?'background:var(--ac);color:#000':'background:var(--s3);color:var(--mu)')+';">'
      +(done?'✓':n)+'</div>';
    progressHTML += '<div style="font-size:.58rem;color:'+(active?'var(--ac)':done?'var(--ok)':'var(--mu)')+';margin-top:4px;text-align:center;white-space:nowrap">'+s+'</div>';
    progressHTML += '</div>';
    if(i<steps.length-1) progressHTML += '<div style="height:2px;flex:1;background:'+(done?'var(--ok)':'var(--bd)')+';margin-bottom:14px;min-width:8px"></div>';
    progressHTML += '</div>';
  });
  progressHTML += '</div>';

  var body = progressHTML + _wizStepHTML(w.step, w.type, w.data);
  var foot = _wizFootHTML(w.step, w.type, steps.length);

  document.getElementById('mtitle').innerHTML = '✨ Nouvelle date <span style="font-size:.7rem;color:var(--mu);font-weight:400">étape '+w.step+'/'+steps.length+'</span>';
  document.getElementById('mbody').innerHTML = body;
  document.getElementById('mfoot').innerHTML = foot;
  showMo();

  // Auto-calc price from services when reaching payment step
  if(w.step === steps.length && w.type !== 'club'){
    setTimeout(function(){
      var svcs = (w.data.serviceIds||[]).map(function(sid){
        return (S.serviceTypes||[]).find(function(s){ return s.id===sid; });
      }).filter(Boolean);
      var autoTotal = svcs.reduce(function(s,svc){ return s+(svc.price||0); }, 0);
      if(autoTotal > 0){
        var amEl = document.getElementById('eam');
        if(amEl){ amEl.value = autoTotal; updateAcompteCalc(); }
      }
    }, 50);
  }

  // Init legs for club
  if(w.type==='club' && !window._clubLegs) window._clubLegs = w.data.legs||[];
}

function _wizPayBlock(titleLine, subLine, svcs, autoTotal, suggested, data, notesPlaceholder, extraHTML){

  return '<div style="background:var(--s2);border:1px solid var(--bd);padding:12px;margin-bottom:14px;font-size:.82rem">'
    +'<div style="font-family:Syne,sans-serif;font-weight:800;font-size:1rem;margin-bottom:3px">'+titleLine+'</div>'
    +'<div style="color:var(--mu)">'+subLine+'</div>'

// Calculate route for voiture leg
function calcTrajetLeg(idx){
  var fromEl=document.getElementById('leg-'+idx+'-from');
  var toEl=document.getElementById('leg-'+idx+'-to');
  var resultEl=document.getElementById('leg-'+idx+'-trajet');
  if(!fromEl||!toEl||!resultEl) return;
  var from=fromEl.value.trim()||S.profile.departureAddress||'';
  var to=toEl.value.trim();
  if(!from||!to){ alert('Saisis les adresses de départ et d\'arrivée'); return; }
  calcTrajetLegAuto(idx, from, to);
}

async function calcTrajetLegAuto(idx, fromOverride, toOverride){
  var fromEl=document.getElementById('leg-'+idx+'-from');
  var toEl=document.getElementById('leg-'+idx+'-to');
  var resultEl=document.getElementById('leg-'+idx+'-trajet');
  var from = fromOverride || (fromEl&&fromEl.value.trim()) || S.profile.departureAddress||'';
  var to   = toOverride   || (toEl&&toEl.value.trim()) || '';
  if(!from||!to) return;
  if(resultEl) resultEl.textContent='⏳ Calcul...';
  try{
    const [dep, arr] = await Promise.all([geocodeNominatim(from), geocodeNominatim(to)]);
    if(!dep||!arr){ if(resultEl) resultEl.textContent='❌ Adresse non trouvée'; return; }
    var hereKey = S.profile.hereApiKey||'';
    var rate = S.profile.kmRate!==undefined ? parseFloat(S.profile.kmRate) : 0.40;
    var km, mins;
    if(hereKey){
      var hRes = await fetch('https://router.hereapi.com/v8/routes?transportMode=car&origin='+dep.lat+','+dep.lon+'&destination='+arr.lat+','+arr.lon+'&return=travelSummary&apikey='+encodeURIComponent(hereKey));
      if(!hRes.ok) throw new Error('HERE '+hRes.status);
      var hData = await hRes.json();
      var sum = hData.routes[0].sections[0].travelSummary;
      km = Math.round(sum.length/1000*10)/10;
      mins = Math.round(sum.duration/60);
    } else {
      var crow = haversineKm(dep.lat,dep.lon,arr.lat,arr.lon);
      km = Math.round(crow*1.35*10)/10;
      mins = Math.round(km/55*60);
    }
    // Store on leg
    if(window._clubLegs&&window._clubLegs[idx]){
      window._clubLegs[idx].km=km;
      window._clubLegs[idx].driveMin=mins;
    }
    if(resultEl) resultEl.textContent='🚗 '+km+' km · '+mins+' min · '+(km*rate).toFixed(2)+'€';
    // Auto-fill departure time: start - drive - install - margin
    var wd = window._wiz && window._wiz.data;
    var eventStart = wd && wd.start;
    if(eventStart){
      var margin = S.profile.safetyMargin!==undefined ? S.profile.safetyMargin : 30;
      // Include install time: use wizard serviceIds or fallback to 45min for club
      var installMins = 45; // default
      if(wd.serviceIds&&wd.serviceIds.length){
        var res = calcDeduped(wd.serviceIds);
        installMins = res.install||45;
      }
      var depTime = subMin(eventStart, mins + installMins + margin);
      var arrTime = subMin(eventStart, installMins + margin); // arrive with time to install
      var depEl = document.getElementById('leg-'+idx+'-dep');
      var arrEl = document.getElementById('leg-'+idx+'-arr');
      // Always update after a fresh route calculation
      if(depEl) depEl.value = depTime;
      if(arrEl) arrEl.value = arrTime;
      if(window._clubLegs&&window._clubLegs[idx]){
        window._clubLegs[idx].dep = depTime;
        window._clubLegs[idx].arr = arrTime;
      }
    }
  } catch(e){
    if(resultEl) resultEl.textContent='❌ Erreur réseau';
  }
}

function _wizSaveStep(step){
  var w = window._wiz;
  var d = w.data;
  var g = function(id){ var el=document.getElementById(id); return el?el.value.trim():''; };

  if(step===1){ /* type saved via wizSelectType */ }

  if(w.type==='club'){
    if(step===2){
      d.name=g('wn'); d.date=g('wd'); d.start=g('wstart'); d.end=g('wend'); d.address=g('ea');
      var siretEl=document.getElementById('ec-siret');
      if(siretEl && siretEl.value.trim()){
        if(!d.clientData) d.clientData={};
        d.clientData.siret=siretEl.value.trim();
      }
    }
    if(step===3){ d.legs = window._clubLegs ? JSON.parse(JSON.stringify(window._clubLegs)) : []; }
    if(step===4){
      if(!d.clientData) d.clientData={};
      d.clientData.soundcheck=g('cf-soundcheck'); d.clientData.openingTime=g('cf-opening');
      d.clientData.limiteur=g('cf-lm'); d.clientData.afterNote=g('cf-afternote');
      d.clientData.booker=g('cf-booker'); d.clientData.bookerTel=g('cf-bookertel');
      d.clientData.manager=g('cf-manager'); d.clientData.managerTel=g('cf-managertel');
      d.clientData.clubContact=g('cf-clubcontact'); d.clientData.clubTel=g('cf-clubtel');
      d.clientData.rider=g('cf-rider'); d.clientData.apport=g('cf-apport');
    }
    if(step===5){ d.amount=parseFloat(g('eam'))||0; d.soldeStatus=g('esds'); d.status=g('es'); d.notes=g('eno');
      if(!d.clientData)d.clientData={};
      d.clientData.paymode=g('cf-paymode');
      d.paymentTerms = window._wiz._payTerm||'jourj';
    }
  } else {
    if(step===2){
      d.client=g('ec'); d.date=g('wd'); d.start=g('wstart'); d.end=g('wend'); d.status=g('es');
      d.clientTel=g('ec-tel');
      if(w.type==='mariage'){
        if(!d.clientData)d.clientData={};
        d.clientData.heureCeremonie=g('w-ceremonie');
        d.clientData.heureVH=g('w-vh');
      }
      if(w.type==='corpo'){
        d.contact=g('ec2'); d.clientEmail=g('ec-mail');
        d.eventFormat=g('w-format'); d.guestCount=g('w-guests');
        if(!d.clientData) d.clientData={};
        d.clientData.siret=g('ec-siret')||'';
        d.clientData.clientAddress=g('ec-addr')||'';
        d.clientData.legalName=g('ec')||''; // same as d.client but kept in clientData for invoice
      }
      if(w.type==='private'){
        d.partyType=g('w-partytype'); d.theme=g('w-theme'); d.guestCount=g('w-guests');
      }
    }
    if(step===3){
      d.venue=g('ev2'); d.address=g('ea');
      var depo=g('edep'); if(depo)d.departureOverride=depo;
      var tr=document.getElementById('trajet-result');
      if(tr&&tr.dataset.km){d.driveKm=parseFloat(tr.dataset.km);d.driveMin=parseInt(tr.dataset.min);}
    }
    if(step===4){
      var cbs = document.querySelectorAll('[id^="svc-"]:checked');
      d.serviceIds = Array.from(cbs).map(function(c){ return c.id.replace('svc-',''); });
    }
    if(step===5){
      d.amount=parseFloat(g('eam'))||0;
      d.acomptePct=parseInt(g('eacp'))||0;
      d.acompteAmount=parseFloat(g('eacm'))||null;
      d.acompteStatus=g('eaps');
      d.paymentTerms=g('epayterms');
      d.notes=g('eno');
      if(!d.clientData)d.clientData={};
      d.clientData.ambiance=g('w-ambiance');
      d.clientData.interdits=g('w-interdits');
      d.clientData.limiteur=g('w-lm');
      if(w.type==='mariage'){
        d.clientData.premiereDanse=g('w-1dance');
      }
      if(w.type==='corpo'){
        d.clientData.discours=g('w-discours');
        d.clientData.bonCommande=g('w-bc');
        d.clientData.facturationAddr=g('w-factaddr');
      }
      if(w.type==='private'){
        d.clientData.finImposee=g('w-fin');
        d.clientData.materielDispoSite=g('w-materiel');
        d.clientData.acces=g('w-acces');
      }
    }
  }
}

function wizSave(){
  var w = window._wiz;
  _wizSaveStep(w.step);
  var d = w.data;

  if(!d.date){ alert('La date est obligatoire'); return; }
  if(!d.client && !d.name){ alert('Le nom est obligatoire'); return; }

  var newEv = {
    id: uid(),
    type: w.type,
    name: d.name || d.client || '',
    client: d.client || d.name || '',
    date: d.date,
    start: d.start||'',
    end: d.end||'',
    venue: d.venue||'',
    address: d.address||'',
    amount: d.amount||0,
    status: d.status||'confirmed',
    acomptePct: d.acomptePct||0,
    acompteAmount: d.acompteAmount||null,
    acompteStatus: d.acompteStatus||'pending',
    soldeStatus: d.soldeStatus||'pending',
    paymentTerms: d.paymentTerms||'',
    driveKm: d.driveKm||null,
    driveMin: d.driveMin||null,
    departureOverride: d.departureOverride||'',
    notes: d.notes||'',
    serviceIds: d.serviceIds||[],
    links: [],
    checklist: [{t:'Contrat signé',d:false},{t:'Acompte reçu',d:false},{t:'Matériel vérifié',d:false},{t:'Solde reçu',d:false}]
  };

  // Club specific
  if(w.type==='club'){
    var cd = d.clientData||{};
    cd.legs = d.legs||window._clubLegs||[];
    cd.heureBal = d.start;
    cd.heureFin = d.end;
    newEv.clientData = cd;
    newEv.client = d.name||'';
    newEv.acompteStatus = 'none';
  }

  S.events.push(newEv);
  save(); render();

  // Show post-creation popup
  _wizShowFichePopup(newEv);
}

function _depChk(id, icon, label, checked){
  return '<label id="lbl-'+id+'" onclick="_refreshDepFields()" style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:8px 12px;border:1px solid '+(checked?'var(--ac3)':'var(--bd)')+';background:'+(checked?'rgba(185,107,255,.1)':'var(--s2)')+';font-size:.8rem;user-select:none">'
