        + '<div style="font-size:.62rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Sur place</div>'
        + '<div style="font-size:.88rem;font-weight:600;margin-bottom:6px">' + contactSurPlace + '</div>'
        + (contactSurPlaceTel
          ? '<a href="tel:' + contactSurPlaceTel + '" style="display:inline-flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--bd);padding:10px 16px;color:var(--tx);text-decoration:none;font-size:.88rem;font-weight:600">📞 ' + contactSurPlaceTel + '</a>'
          : '')
        + '</div>'
      : '')
    + '</div>';

  // Address + maps
  const address = [ev.venue, ev.address].filter(Boolean).join(', ');
  const mapsUrl = 'https://maps.google.com/?q=' + encodeURIComponent(address);
  const addressHTML = address
    ? '<div style="padding:14px 16px;border-bottom:1px solid var(--bd)">'
      + '<div style="font-size:.66nm;font-weight:700;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-size:.66rem">📍 Lieu</div>'
      + '<div style="font-size:.9rem;font-weight:600;margin-bottom:4px">' + (ev.venue || '') + '</div>'
      + '<div style="font-size:.76rem;color:var(--mu);margin-bottom:10px">' + (ev.address || '') + '</div>'
      + '<a href="' + mapsUrl + '" target="_blank" style="display:inline-flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--bd);padding:10px 16px;color:var(--tx);text-decoration:none;font-size:.84rem;font-weight:600">🗺️ Ouvrir dans Maps</a>'
      + '</div>'
    : '';

  // Travel info
  const travelHTML = ev.driveKm
    ? '<div style="padding:14px 16px;border-bottom:1px solid var(--bd)">'
      + '<div style="font-size:.66rem;font-weight:700;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">🚗 Trajet</div>'
      + '<div style="display:flex;gap:20px;flex-wrap:wrap">'
      + '<div><div style="font-size:.68rem;color:var(--mu)">Distance</div><div style="font-family:\'Syne\',sans-serif;font-size:1.2rem;font-weight:800">' + ev.driveKm + ' km</div></div>'
      + '<div><div style="font-size:.68rem;color:var(--mu)">Durée</div><div style="font-family:\'Syne\',sans-serif;font-size:1.2rem;font-weight:800">' + (ev.driveMin||'—') + ' min</div></div>'
      + (ev.tollCost > 0 ? '<div><div style="font-size:.68rem;color:var(--mu)">Péages</div><div style="font-family:\'Syne\',sans-serif;font-size:1.2rem;font-weight:800;color:var(--er)">' + ev.tollCost.toFixed(2) + '€</div></div>' : '')
      + '</div></div>'
    : '';

  // Payment status — hide entirely if solde already received
  const noAcompteJJ2 = ev.acompteStatus==='none' || (ev.acomptePct===0 && !ev.acompteAmount);
  const payHTML = (ev.soldeStatus==='received' && noAcompteJJ2) ? '' :
    '<div style="padding:14px 16px;border-bottom:1px solid var(--bd)">'
    + '<div style="font-size:.66rem;font-weight:700;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">💰 Paiement</div>'
    + payStatusRow(ev)
    + '</div>';

  // Filter checklist — remove "Acompte reçu" for no-acompte events
  const visibleChecks = noAcompteJJ2
    ? checks.filter(function(c){ return c.t !== 'Acompte reçu'; })
    : checks;
  const checksDoneVisible = visibleChecks.filter(c => c.d).length;
  const checkHTML = visibleChecks.length
    ? '<div style="padding:14px 16px;border-bottom:1px solid var(--bd)">'
      + '<div style="font-size:.66rem;font-weight:700;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">'
      + '✅ Checklist <span style="color:' + (checksDoneVisible===visibleChecks.length?'var(--ok)':'var(--mu)') + '">' + checksDoneVisible + '/' + visibleChecks.length + '</span></div>'
      + visibleChecks.map((c,i) =>
          '<div style="display:flex;align-items:center;gap:10px;padding:7px 0;cursor:pointer" onclick="jourjToggleCk(' + ev.id + ',' + i + ')">'  
          + '<div style="width:20px;height:20px;border:2px solid ' + (c.d?'var(--ok)':'var(--bd)') + ';background:' + (c.d?'var(--ok)':'transparent') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.7rem;color:#000">' + (c.d?'✓':'') + '</div>'
          + '<span style="font-size:.84rem;' + (c.d?'text-decoration:line-through;color:var(--mu)':'') + '">' + c.t + '</span>'
          + '</div>'
        ).join('')
      + (gearFromServices.length > 0
        ? '<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)"><div style="font-size:.62rem;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">📦 Matos à charger</div>'
          + gearFromServices.map(g=>`<div style="font-size:.8rem;padding:3px 0;color:var(--mu)">· ${g.name}</div>`).join('')
          + '</div>'
        : '')
      + '</div>'
    : '';

  // Client links (playlists etc.)
  const evLinks = ev.links || [];
  const linksHTML = evLinks.length > 0
    ? '<div style="padding:14px 16px;border-bottom:1px solid var(--bd)">'
      + '<div style="font-size:.66rem;font-weight:700;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">🔗 Liens client</div>'
      + evLinks.map(l=>`<a href="${l.url}" target="_blank" style="display:flex;align-items:center;gap:8px;padding:6px 0;color:var(--tx);text-decoration:none;border-bottom:1px solid var(--bd)20;font-size:.82rem"><span style="color:var(--ac3)">↗</span><span>${l.label||l.url}</span></a>`).join('')
      + '</div>'
    : '';

  // Notes
  const notesHTML = (ev.notes || cd.notes)
    ? '<div style="padding:14px 16px;border-bottom:1px solid var(--bd)">'
      + '<div style="font-size:.66rem;font-weight:700;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">📝 Notes</div>'
      + '<div style="font-size:.84rem;color:var(--mu);line-height:1.7">' + (ev.notes||cd.notes||'') + '</div>'
      + '</div>'
    : '';

  // Other upcoming
  const othersHTML = upcoming.length > 1
    ? '<div style="padding:14px 16px">'
      + '<div style="font-size:.66rem;font-weight:700;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">📅 Prochaines dates</div>'
      + upcoming.slice(1,4).map(e => {
          const et = ET[e.type]||ET.mariage;
          const etl = getTL(e);
          const eDays = Math.ceil((new Date(e.date+'T00:00:00') - new Date(todayStr+'T00:00:00')) / 86400000);
          return '<div style="display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd)22;cursor:pointer" onclick="openEv(' + e.id + ')">'
            + '<div style="font-size:1.1rem">' + et.e + '</div>'
            + '<div style="flex:1"><div style="font-size:.8rem;font-weight:700">' + e.name + '</div>'
            + '<div style="font-size:.7rem;color:var(--mu)">' + fd(e.date) + (e.start?' · '+e.start:'') + '</div></div>'
            + '<div style="font-size:.7rem;font-weight:700;color:'+et.c+'">J-'+eDays+'</div>'
            + '</div>';
        }).join('')
      + '</div>'
    : '';

  // Start countdown ticker
  setTimeout(() => startJourJTicker(ev, tl), 100);

  return '<div style="max-width:560px;margin:0 auto">'
    // Mission status bar
    + '<div style="padding:10px 16px;background:'+missionStatusBg+';border-bottom:2px solid '+t.c+';display:flex;align-items:center;justify-content:space-between">'
    + '<div style="font-size:.75rem;font-weight:700;color:'+missionStatusColor+'">'+missionStatus+'</div>'
    + '<div style="display:flex;gap:6px">'
    + '<button class="btn bg" style="font-size:.68rem;padding:3px 8px" data-evid="'+ev.id+'" onclick="jjFiche(this)">✏️ Fiche client</button>'
    + '<button class="btn bg" style="font-size:.68rem;padding:3px 8px" data-evid="'+ev.id+'" onclick="jjEdit(this)">⚙️ Event</button>'
    + '</div>'
    + '</div>'
    // Header
    + '<div style="padding:16px 16px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px">'
    + '<div style="flex:1">'
    + '<div style="font-size:.6rem;font-weight:700;letter-spacing:3px;color:' + t.c + ';text-transform:uppercase">' + dayLabel + '</div>'
    + '<div style="font-family:\'Syne\',sans-serif;font-size:1.2rem;font-weight:800;margin-top:2px">' + t.e + ' ' + ev.name + '</div>'
    + '<div style="font-size:.76rem;color:var(--mu);margin-top:2px">' + (ev.venue||'') + (ev.start?' · '+ev.start+(ev.end?' → '+ev.end:''):'') + '</div>'
    + '</div>'
    + '<div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">'
    + stBadge(ev.status)
    + '<span style="font-family:\'Syne\',sans-serif;font-weight:800;color:var(--ac2);font-size:.9rem">'+(ev.amount||0).toLocaleString('fr-FR')+'€</span>'
    + '</div>'
    + '</div>'
    // Countdown
    + countdownHTML
    // Timeline
    + '<div style="border-bottom:1px solid var(--bd)">'
    + '<div style="padding:12px 16px 4px;font-size:.66rem;font-weight:700;color:var(--mu);letter-spacing:2px;text-transform:uppercase">⏱️ Timeline</div>'
    + timelineHTML
    + '</div>'
    // Club-specific: booker, rider, cachet — replaces generic contact/sens/travel
    + (isClub
      ? clubInfoHTML
      : (sensHTML + contactHTML + addressHTML + travelHTML)
    )
    // Playlists
    + playlistsJJHTML
    // Checklist
    + checkHTML
    // Notes
    + notesHTML
    // Payment (non-club only — club has its own cachet block)
    + (isClub ? '' : payHTML)
    + '</div>';
}

function jourjToggleCk(evId, idx) {
  const ev = S.events.find(e => e.id === evId);
  if (!ev || !ev.checklist) return;
  ev.checklist[idx].d = !ev.checklist[idx].d;
  save();
  go('jourj');
}

// ═══════════════════════════════════════════════════
// 🎧 MODE MISSION – DJ CLUB
// ═══════════════════════════════════════════════════
function pgJourJClub(ev, upcoming, now, todayStr, tomorrowStr) {
  const cd = ev.clientData || {};
  const t  = ET.club;
  const isToday    = ev.date === todayStr;
  const isTomorrow = ev.date === tomorrowStr;
  const days = Math.ceil((new Date(ev.date+'T00:00:00') - new Date(todayStr+'T00:00:00')) / 86400000);

  function esc(s){ return escH(s||''); }
  function normT(v){ if(!v)return ''; return v.replace(/h/i,':').replace(/[^0-9:]/g,''); }
  function toMins(v){ var p=(normT(v)||'00:00').split(':'); return parseInt(p[0]||0)*60+parseInt(p[1]||0); }
  function minsToStr(m){ m=((m%1440)+1440)%1440; return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
  function fmtT(v){ return normT(v)||'—'; }

  const nowMins = now.getHours()*60+now.getMinutes();
  const tl = getTL(ev);
  const margin = S.profile.safetyMargin !== undefined ? parseInt(S.profile.safetyMargin) : 30;
  // Mission margin = 2× local margin (min 60)
  const missionMargin = Math.max(margin*2, 60);

  // Use new legs array, fallback to old fields
  var legs = (cd.legs && cd.legs.length) ? cd.legs : _migrateLegsFromOldFields(cd, ev);

  // ── 1. HERO ────────────────────────────────────────
  const dayLabel = isToday ? 'AUJOURD\'HUI' : isTomorrow ? 'DEMAIN' : fd(ev.date).toUpperCase();
  const missionLabel = isToday ? 'Mission en cours' : days===1 ? 'Mission dans 1 jour' : 'Mission dans '+days+' jours';
  const heroHTML = '<div style="background:linear-gradient(135deg,#1a0a2e 0%,#0d0d1a 100%);padding:24px 20px 18px;border-bottom:2px solid '+t.c+'">'
    + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">'
    + '<div>'
    + '<div style="font-size:.6rem;font-weight:700;letter-spacing:3px;color:'+t.c+';text-transform:uppercase;margin-bottom:6px">🎧 Mission Club</div>'
    + '<div style="font-family:\'Syne\',sans-serif;font-size:1.5rem;font-weight:800;line-height:1.1;margin-bottom:4px">'+esc(ev.name)+'</div>'
    + (ev.venue||ev.address ? '<div style="font-size:.84rem;color:var(--mu)">📍 '+esc(ev.venue||ev.address)+'</div>' : '')
    + '</div>'
    + '<div style="text-align:right;flex-shrink:0">'
    + '<div style="font-size:.62rem;color:var(--mu);text-transform:uppercase;letter-spacing:2px">'+dayLabel+'</div>'
    + '<div style="font-family:\'Syne\',sans-serif;font-size:1rem;font-weight:800;color:'+t.c+';margin-top:2px">'+missionLabel+'</div>'
    + '</div>'
    + '</div>'
    + (upcoming.filter(e=>e.type==='club'&&e.id!==ev.id).length > 0
      ? '<div style="margin-top:14px;display:flex;gap:6px;flex-wrap:wrap">'
        + upcoming.filter(e=>e.type==='club'&&e.id!==ev.id).slice(0,3).map(e=>
          '<button class="btn bg" style="font-size:.68rem;padding:3px 9px" onclick="S._jourjEvId=\''+e.id+'\';go(\'jourj\')">🎧 '+esc(e.name)+'</button>'
        ).join('') + '</div>'
      : '')
    + '</div>';

  // ── 2. TIMELINE UNIFIÉE ────────────────────────────
  // Build all steps in chronological order
  var steps = [];

  function addStep(icon, label, time, type, extra){
    if(!time) return;
    steps.push({icon:icon, label:label, time:normT(time), type:type||'normal', extra:extra||''});
  }

  // Maison → départ
  var firstTransportLeg = legs.find(function(l){ return l.type==='train'||l.type==='vol'; });
  if(firstTransportLeg && firstTransportLeg.dep){
    // Calcul heure départ maison: heure train - driveMin maison→gare - missionMargin
    var driveToStation = ev.driveMinToStation || 0;
    var departMaisonMins = toMins(firstTransportLeg.dep) - driveToStation - missionMargin;
    if(tl.load>0) addStep('📦','Chargement', minsToStr(departMaisonMins - tl.load), 'prep');
    addStep('🏠','Départ maison', minsToStr(departMaisonMins), 'depart');
  } else if(!legs.length || legs.every(function(l){return l.type==='voiture';})) {
    // Voiture seule — calcul classique
    if(tl.load>0) addStep('📦','Chargement', tl.chargement, 'prep');
    addStep('🚗','Départ', tl.depart, 'depart');
    if(ev.driveMin) addStep('📍','Arrivée au club', minsToStr(toMins(tl.depart)+(ev.driveMin||0)), 'arrive');
  }

  // Legs dans l'ordre
  legs.forEach(function(leg){
    if(!leg||leg.type==='voiture') return;
    var isHotel = leg.type==='hotel';
    var isRetour = leg.type.startsWith('retour_');
    var icon = leg.type==='vol'||leg.type==='retour_vol'?'✈️':leg.type==='train'||leg.type==='retour_train'?'🚄':leg.type==='transfer'||leg.type==='retour_transfer'?'🚕':leg.type==='hotel'?'🏨':'🚗';
    var lblMap = {train:'Train aller',vol:'Vol aller',transfer:'Taxi / Transfer',hotel:'Hôtel',retour_train:'Train retour',retour_vol:'Vol retour',retour_transfer:'Transfer retour'};
    var lbl = lblMap[leg.type]||leg.type;
    var routeStr = (leg.from||'')+((leg.from&&leg.to)?' → ':'')+esc(leg.to||'');
    var extra = '';
    if(leg.ref) extra += '<span style="font-family:monospace;font-size:.72rem;color:var(--ac3)">'+esc(leg.ref)+'</span>';
    if(leg.link && leg.link.startsWith('http'))
      extra += ' <a href="'+esc(leg.link)+'" target="_blank" style="font-size:.7rem;background:var(--s2);border:1px solid var(--bd);color:var(--ac3);padding:3px 8px;text-decoration:none;margin-left:4px">'+(isHotel?'🗺️ Maps':'🎫 Billet')+' ↗</a>';
    else if(leg.link)
      extra += ' <a href="https://maps.google.com/?q='+encodeURIComponent(leg.link)+'" target="_blank" style="font-size:.7rem;background:var(--s2);border:1px solid var(--bd);color:var(--ac3);padding:3px 8px;text-decoration:none;margin-left:4px">🗺️ Maps ↗</a>';
    else if(leg.type==='hotel'||leg.type==='retour_hotel')
      if(leg.from) extra += ' <a href="https://maps.google.com/?q='+encodeURIComponent(leg.from)+'" target="_blank" style="font-size:.7rem;background:var(--s2);border:1px solid var(--bd);color:var(--ac3);padding:3px 8px;text-decoration:none;margin-left:4px">🗺️ Maps ↗</a>';
    // Taxi: show phone button
    if((leg.type==='transfer'||leg.type==='retour_transfer') && leg.ref)
      extra += ' <a href="tel:'+leg.ref.replace(/[^0-9+]/g,'')+'" style="font-size:.7rem;background:var(--s2);border:1px solid var(--bd);color:var(--ac3);padding:3px 8px;text-decoration:none;margin-left:4px">📞 Appeler</a>';

    if(isHotel){
      if(leg.dep) addStep(icon, lbl+' — '+esc(leg.from||'')+(leg.dep?' (check-in '+fmtT(leg.dep)+')':''), leg.dep, 'hotel', extra);
      if(leg.arr) addStep(icon, 'Check-out '+(leg.from?esc(leg.from):''), leg.arr, 'hotel', extra);
    } else {
      if(leg.dep) addStep(icon, lbl+(routeStr?' — '+routeStr:''), leg.dep, isRetour?'retour':'transit', extra);
      if(leg.arr) addStep('📍', 'Arrivée — '+(leg.to||leg.from||''), leg.arr, 'arrive', '');
    }
  });

  // Hôtel → Club (calculé si on a driveMinHotelClub)
  var hotelLeg = legs.find(function(l){ return l.type==='hotel'; });
  if(hotelLeg && ev.driveMinHotelClub){
    var transferT = cd.transferDep||'';
    if(transferT) addStep('🚕','Départ hôtel → Club', normT(transferT), 'transit', '');
  }

  // Soundcheck
  var soundcheckT = normT(cd.soundcheck)||'';
  if(soundcheckT) addStep('🎛️','Soundcheck', soundcheckT, 'soiree', '');

  // Ouverture
  var openingT = normT(cd.openingTime)||'';
  if(openingT) addStep('🚪','Ouverture portes', openingT, 'soiree', '');

  // Set
  var setStart = normT(cd.heureBal)||normT(ev.start)||'';
  var setEnd   = normT(cd.heureFin)||normT(ev.end)||'';
  if(setStart) addStep('🎧','Début set', setStart, 'set', '');
  if(setEnd)   addStep('🏁','Fin set', setEnd, 'soiree', '');
  if(cd.afterNote) addStep('🌙','After', '', 'info', esc(cd.afterNote));

  // Sort chronologically with overnight handling
  // Anchor: first transport dep or noon if no transport
  var firstDepMins = firstTransportLeg && firstTransportLeg.dep ? toMins(firstTransportLeg.dep) : 12*60;
  steps.sort(function(a,b){
    var am = a.time ? toMins(a.time) : 9999;
    var bm = b.time ? toMins(b.time) : 9999;
    // Anything before firstDepMins that is return/hotel-checkout/fin is "next day" (+1440)
    var isNextDayType = function(s,m){
      return (s.type==='retour'||s.type==='arrive'&&s.label.indexOf('retour')!==-1||(s.type==='hotel'&&s.label.indexOf('Check-out')!==-1)||(s.type==='soiree'&&s.label.indexOf('Fin')!==-1))
             && m < firstDepMins;
    };
    // Set and events after 20:00 that are before noon = next day
    var isNightStep = function(s,m){ return (s.type==='set'||s.type==='soiree'||s.type==='transit'&&m>20*60) && m < 12*60; };
    if(isNextDayType(a,am)) am += 1440;
    if(isNextDayType(b,bm)) bm += 1440;
    if(isNightStep(a,am)) am += 1440;
    if(isNightStep(b,bm)) bm += 1440;
    return am - bm;
  });

  // Render timeline
  // Night mode detection
  var isNightMode = isToday && (nowMins >= 20*60 || nowMins < 6*60);

  function timelineStep(step){
    if(!step.time && !step.extra) return '';
    var mins = step.time ? toMins(step.time) : -1;
    var isPast = isToday && mins > 0 && mins < nowMins;
    var isNow  = isToday && mins > 0 && Math.abs(mins - nowMins) < 20;
    // Imminente : prochaine étape future dans les 30 min
    var nextFutureMins = steps.filter(s=>s.time&&toMins(s.time)>nowMins).map(s=>toMins(s.time)).sort((a,b)=>a-b)[0]||9999;
    var isImminent = isToday && !isPast && !isNow && mins===nextFutureMins && (mins-nowMins)<=30;

    var typeColors = {set:'var(--ac)',depart:'var(--ac3)',retour:'rgba(185,107,255,.7)',hotel:'var(--ac2)',soiree:'var(--ok)',transit:'var(--mu)',arrive:'var(--mu)',prep:'var(--mu)',info:'var(--mu)',normal:'var(--tx)'};
    var col = isPast ? 'var(--mu)' : isNow ? 'var(--ac)' : isImminent ? 'var(--er)' : typeColors[step.type]||'var(--tx)';
    var dotCol = isPast ? 'var(--bd)' : isImminent ? 'var(--er)' : isNow ? 'var(--ac)' : typeColors[step.type]||t.c;
    var isHighlight = step.type==='set'||step.type==='depart';
    var rowBg = isNow ? 'background:rgba(232,255,60,.06);margin:0 -16px;padding:8px 16px;'
              : isImminent ? 'background:rgba(255,40,40,.06);margin:0 -16px;padding:8px 16px;border-left:3px solid var(--er);'
              : '';
    var dotStyle = 'width:10px;height:10px;border-radius:50%;background:'+dotCol+';margin-top:4px;flex-shrink:0;'
                 + (isImminent ? 'animation:stepPulse 1.2s ease-in-out infinite;' : '')
                 + (isPast ? 'opacity:.35;' : '');
    var diff = isImminent ? (mins-nowMins) : 0;
    return '<div style="display:flex;gap:12px;padding:8px 0;'+rowBg+'">'
      + '<div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:20px">'
      +   '<div style="'+dotStyle+'"></div>'
      +   '<div style="width:1px;flex:1;background:var(--bd);margin-top:3px;min-height:20px"></div>'
      + '</div>'
      + '<div style="flex:1;padding-bottom:10px">'
      +   '<div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">'
      +     (step.time ? '<span style="font-family:\'Syne\',sans-serif;font-size:'+(isHighlight?'1.3rem':'.95rem')+';font-weight:800;color:'+col+';opacity:'+(isPast?.4:1)+'">'+fmtT(step.time)+'</span>' : '')
      +     '<span style="font-size:'+(isHighlight?'.82rem':'.75rem')+';color:'+(isPast?'var(--mu)':isHighlight?'var(--tx)':'var(--mu)')+';font-weight:'+(isHighlight?'600':'400')+'">'+step.icon+' '+step.label+'</span>'
      +     (isNow     ? '<span style="font-size:.55rem;font-weight:700;color:var(--ac);background:rgba(232,255,60,.15);padding:2px 7px">MAINTENANT</span>' : '')
      +     (isImminent? '<span style="font-size:.55rem;font-weight:700;color:var(--er);background:rgba(255,40,40,.15);padding:2px 7px">DANS '+diff+' MIN ⚠️</span>' : '')
      +     (isPast    ? '<span style="color:var(--ok);font-size:.8rem">✓</span>' : '')
      +   '</div>'
      +   (step.extra ? '<div style="margin-top:3px">'+step.extra+'</div>' : '')
      + '</div>'
      + '</div>';
  }

  var timelineHTML = steps.map(timelineStep).join('');

  // Calcul auto hôtel→club disponible ?
  var calcBtn = (hotelLeg && hotelLeg.from && ev.address)
    ? '<button class="btn bg" style="font-size:.72rem;margin-top:8px" onclick="calcHotelClub(\''+ev.id+'\')">📍 Calculer hôtel → club</button>'
    : '';
  var calcBtnStation = (firstTransportLeg && firstTransportLeg.from && S.profile.departureAddress)
    ? '<button class="btn bg" style="font-size:.72rem;margin-top:4px;margin-left:6px" onclick="calcMaisonGare(\''+ev.id+'\')">🚉 Calculer maison → gare</button>'
    : '';

  const timelineBlock = '<div style="padding:16px;border-bottom:1px solid var(--bd)">'
    + '<div style="font-size:.62rem;font-weight:700;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px">📅 Timeline Mission</div>'
    + (timelineHTML || '<div style="font-size:.8rem;color:var(--mu)">Aucune étape renseignée — clique "Modifier logistique"</div>')
    + (calcBtn||calcBtnStation ? '<div style="margin-top:4px">'+calcBtn+calcBtnStation+'</div>' : '')
    + '</div>';

  // ── 3. CONTACTS ───────────────────────────────────
  function contactCard(role, name, phone) {
    if(!name && !phone) return '';
    return '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)20">'
      + '<div>'
      + '<div style="font-size:.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px">'+role+'</div>'
      + '<div style="font-size:.9rem;font-weight:700">'+esc(name||'—')+'</div>'
      + '</div>'
      + (phone ? '<div style="display:flex;gap:6px">'
        + '<a href="tel:'+esc(phone)+'" style="display:flex;align-items:center;justify-content:center;width:40px;height:40px;background:var(--s2);border:1px solid var(--bd);text-decoration:none;font-size:1.1rem">📞</a>'
        + '<a href="https://wa.me/'+phone.replace(/[^0-9]/g,'')+'" target="_blank" style="display:flex;align-items:center;justify-content:center;width:40px;height:40px;background:var(--s2);border:1px solid var(--bd);text-decoration:none;font-size:1.1rem">💬</a>'
        + '</div>' : '')
      + '</div>';
  }
  var contactsBody = '';
  contactsBody += contactCard('Booker / Promoteur', cd.booker||ev.client, cd.bookerTel||ev.clientPhone||'');
  contactsBody += contactCard('Manager', cd.manager||'', cd.managerTel||'');
  contactsBody += contactCard('Chauffeur / Transfer', cd.chauffeur||'', cd.chauffeurTel||'');
  contactsBody += contactCard('Club (accueil)', cd.clubContact||'', cd.clubTel||'');
  const contactsBlock = contactsBody.trim()
    ? '<div style="padding:16px 16px 4px;border-bottom:1px solid var(--bd)">'
      + '<div style="font-size:.62rem;font-weight:700;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px">📞 Contacts</div>'
      + contactsBody + '</div>'
    : '';

  // ── 4. RIDER ─────────────────────────────────────
  var billetLinks = legs.filter(function(l){ return l.link && l.link.startsWith('http') && l.type!=='hotel'; });
  const riderBlock = (cd.rider||cd.apport||billetLinks.length) ? '<div style="padding:16px;border-bottom:1px solid var(--bd)">'
    + '<div style="font-size:.62rem;font-weight:700;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px">🎛️ Rider</div>'
    + (billetLinks.length ? '<div style="margin-bottom:10px"><div style="font-size:.62rem;color:var(--ac3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">🎫 Billets</div><div style="display:flex;flex-wrap:wrap;gap:6px">'
      + billetLinks.map(function(l){ return '<a href="'+esc(l.link)+'" target="_blank" style="font-size:.78rem;background:var(--s2);border:1px solid var(--bd);color:var(--ac3);padding:5px 12px;text-decoration:none">'+(l.from?esc(l.from):'Billet')+' ↗</a>'; }).join('')
      + '</div></div>' : '')
    + (cd.rider  ? '<div style="margin-bottom:8px"><div style="font-size:.62rem;color:var(--ok);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">✅ Club fournit</div><div style="font-size:.84rem;line-height:1.5">'+esc(cd.rider)+'</div></div>' : '')
    + (cd.apport ? '<div><div style="font-size:.62rem;color:var(--ac2);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">🎒 Tu apportes</div><div style="font-size:.84rem;line-height:1.5">'+esc(cd.apport)+'</div></div>' : '')
    + '</div>' : '';

  // ── 5. PAIEMENT ──────────────────────────────────
  const cachet = cd.cachet || ev.amount || 0;
  const soldeRecu = ev.soldeStatus === 'received';
  const payBlock = '<div style="padding:16px;border-bottom:1px solid var(--bd)">'
    + '<div style="font-size:.62rem;font-weight:700;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px">💵 Cachet</div>'
    + '<div style="display:flex;align-items:center;gap:20px">'
    + '<div><div style="font-family:\'Syne\',sans-serif;font-size:2rem;font-weight:800;color:var(--ac)">'+(cachet?cachet+'€':'—')+'</div>'
    + (cd.paymode ? '<div style="font-size:.78rem;color:var(--mu)">'+esc(cd.paymode)+'</div>' : '')
    + '</div>'
    + (soldeRecu
      ? '<div style="font-size:.82rem;color:var(--ok);font-weight:700">✅ Reçu</div>'
      : '<button class="btn bp" style="font-size:.8rem" onclick="markPayment(\''+ev.id+'\',\'solde\',\'received\');go(\'jourj\')">✅ Marquer reçu</button>'
    )
    + '</div>'
    + (cd.limiteur ? '<div style="font-size:.78rem;color:var(--wa);margin-top:8px">⚡ Limiteur : '+esc(cd.limiteur)+'</div>' : '')
    + '</div>';

  // ── ACTIONS BAR ──────────────────────────────────
  const evIdStr = String(ev.id);
  const actionsBar = '<div style="padding:12px 16px;background:var(--s2);border-bottom:1px solid var(--bd);display:flex;gap:8px;flex-wrap:wrap">'
    + '<button class="btn bg" style="font-size:.72rem" data-evid="'+evIdStr+'" onclick="jjEdit(this)">✏️ Modifier la mission</button>'
    + '<button class="btn bp" style="font-size:.72rem" data-evid="'+evIdStr+'" onclick="jjFacture(this)">📧 Facture</button>'
    + '</div>';

  return '<div class="ph"><div class="pt">🎧 Mode Mission</div></div>'
    + '<div style="max-width:600px;margin:0 auto">'
    + heroHTML
    + actionsBar
    + timelineBlock
    + contactsBlock
    + riderBlock
    + payBlock
    + '</div>';
}

// ═══════════════════════════════════════════════════
// 🚗 MODE DATE LOCALE – Corpo / Private
// ═══════════════════════════════════════════════════
function pgJourJLocal(ev, upcoming, now, todayStr, tomorrowStr) {
  const cd  = ev.clientData || {};
  const t   = ET[ev.type] || ET.mariage;
  const tl  = getTL(ev);
  const isToday    = ev.date === todayStr;
  const isTomorrow = ev.date === tomorrowStr;
  const days = Math.ceil((new Date(ev.date+'T00:00:00') - new Date(todayStr+'T00:00:00')) / 86400000);

  function esc(s){ return escH(s||''); }
  function fmtT(v){ if(!v||v==='—')return '—'; return v.replace(/h/i,':').replace(/[^0-9:]/g,''); }
  const nowMins = now.getHours()*60+now.getMinutes();
  function toMins(v){ var p=(fmtT(v)||'').split(':'); return parseInt(p[0]||0)*60+parseInt(p[1]||0); }

  const dayLabel = isToday ? 'AUJOURD\'HUI' : isTomorrow ? 'DEMAIN' : fd(ev.date).toUpperCase();
  const missionLabel = isToday ? 'En cours' : days===1 ? 'Demain' : 'Dans '+days+' jours';

  // ── HERO ─────────────────────────────────────────
  const heroHTML = '<div style="background:linear-gradient(135deg,#0d1a0d 0%,#0d0d1a 100%);padding:22px 20px 16px;border-bottom:2px solid '+t.c+'">'
    + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">'
    + '<div>'
    + '<div style="font-size:.6rem;font-weight:700;letter-spacing:3px;color:'+t.c+';text-transform:uppercase;margin-bottom:5px">'+t.e+' '+(ev.type==='corpo'?'Corpo':'Privé')+'</div>'
    + '<div style="font-family:\'Syne\',sans-serif;font-size:1.4rem;font-weight:800;line-height:1.1;margin-bottom:4px">'+esc(ev.name)+'</div>'
    + (ev.client ? '<div style="font-size:.82rem;color:var(--mu)">👤 '+esc(ev.client)+'</div>' : '')
    + (ev.venue  ? '<div style="font-size:.82rem;color:var(--mu);margin-top:2px">📍 '+esc(ev.venue)+'</div>' : '')
    + '</div>'
    + '<div style="text-align:right;flex-shrink:0">'
    + '<div style="font-size:.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:2px">'+dayLabel+'</div>'
    + '<div style="font-family:\'Syne\',sans-serif;font-size:.95rem;font-weight:800;color:'+t.c+';margin-top:3px">'+missionLabel+'</div>'
    + '</div>'
    + '</div>'
    + '</div>';

  // ── TIMELINE VOITURE ────────────────────────────
  function timeRow(icon, label, time, big) {
    if(!time || time==='—') return '';
    var mins = toMins(time);
    var isPast = isToday && mins < nowMins;
    var isNow  = isToday && Math.abs(mins - nowMins) < 15;
    var col = isPast ? 'var(--mu)' : isNow ? 'var(--ac)' : 'var(--tx)';
    var bg  = isNow  ? 'background:rgba(232,255,60,.06);' : '';
    return '<div style="display:flex;align-items:center;gap:14px;padding:11px 16px;border-bottom:1px solid var(--bd);'+bg+'">'
      + '<div style="font-size:1.2rem;width:28px;text-align:center;flex-shrink:0">'+icon+'</div>'
      + '<div style="flex:1">'
      + '<div style="font-size:.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px">'+label+'</div>'
      + '<div style="font-family:\'Syne\',sans-serif;font-size:'+(big?'1.8':'1.3')+'rem;font-weight:800;color:'+col+';line-height:1.1">'+fmtT(time)+'</div>'
      + '</div>'
      + (isPast ? '<span style="color:var(--ok)">✓</span>' : '')
      + (isNow  ? '<span style="font-size:.6rem;font-weight:700;color:var(--ac);background:rgba(232,255,60,.15);padding:2px 7px">MAINTENANT</span>' : '')
      + '</div>';
  }

  const timelineHTML = '<div style="border-bottom:1px solid var(--bd)">'
    + '<div style="padding:10px 16px 2px;font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:3px;text-transform:uppercase">🚗 Itinéraire</div>'
    + timeRow('📦', 'Chargement', tl.chargement, false)
    + timeRow('🚗', 'Départ', tl.depart, true)
    + timeRow('📍', 'Arrivée estimée', (function(){
        // depart + driveMin
        var dep = tl.depart;
        if(!dep||dep==='—') return '';
        var d = dep.split(':'); var depM = parseInt(d[0])*60+parseInt(d[1]);
        var arrM = depM + (ev.driveMin||0);
        return String(Math.floor(arrM/60)).padStart(2,'0')+':'+String(arrM%60).padStart(2,'0');
      })(), false)
    + timeRow('🎵', 'Début', ev.start, true)
    + timeRow('🏁', 'Fin', ev.end, false)
    + '</div>';

  // ── ADRESSE + MAPS ───────────────────────────────
  const address = [ev.venue, ev.address].filter(Boolean).join(', ');
  const mapsURL = 'https://maps.google.com/?q=' + encodeURIComponent(address);
  const addrHTML = address ? '<div style="padding:14px 16px;border-bottom:1px solid var(--bd)">'
    + '<div style="font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px">📍 Lieu</div>'
    + '<div style="font-size:.9rem;font-weight:700;margin-bottom:2px">'+esc(ev.venue||'')+'</div>'
    + '<div style="font-size:.78rem;color:var(--mu);margin-bottom:10px">'+esc(ev.address||'')+'</div>'
    + '<div style="display:flex;gap:8px;flex-wrap:wrap">'
    + '<a href="'+mapsURL+'" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--bd);color:var(--tx);text-decoration:none;font-size:.8rem;padding:9px 14px;font-weight:600">🗺️ Maps</a>'
    + (ev.driveKm ? '<div style="display:inline-flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--bd);font-size:.8rem;padding:9px 14px">🚗 '+(ev.driveKm)+' km · '+(ev.driveMin||'?')+' min</div>' : '')
    + '</div>'
    + '</div>' : '';

  // ── CONTACT ──────────────────────────────────────
  const phone = cd.contactPrincipal || cd.phone || ev.clientPhone || '';
  const name  = cd.maries || cd.client || ev.client || '';
  const contact2 = cd.contactSurPlace || '';
  const phone2   = cd.contactSurPlaceTel || '';
  const contactHTML = (name||phone) ? '<div style="padding:14px 16px;border-bottom:1px solid var(--bd)">'
    + '<div style="font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px">📞 Contact</div>'
    + '<div style="font-size:.95rem;font-weight:700;margin-bottom:8px">'+esc(name||'—')+'</div>'
    + (phone ? '<div style="display:flex;gap:8px">'
      + '<a href="tel:'+esc(phone)+'" style="display:flex;align-items:center;justify-content:center;width:44px;height:44px;background:var(--s2);border:1px solid var(--bd);text-decoration:none;font-size:1.2rem">📞</a>'
      + '<a href="https://wa.me/'+phone.replace(/[^0-9]/g,'')+'" target="_blank" style="display:flex;align-items:center;justify-content:center;width:44px;height:44px;background:var(--s2);border:1px solid var(--bd);text-decoration:none;font-size:1.2rem">💬</a>'
      + '</div>' : '')
    + (contact2 ? '<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--bd)20">'
      + '<div style="font-size:.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Sur place</div>'
      + '<div style="font-size:.88rem;font-weight:600;margin-bottom:6px">'+esc(contact2)+'</div>'
      + (phone2 ? '<a href="tel:'+esc(phone2)+'" style="display:flex;align-items:center;justify-content:center;width:44px;height:44px;background:var(--s2);border:1px solid var(--bd);text-decoration:none;font-size:1.2rem">📞</a>' : '')
      + '</div>' : '')
    + '</div>' : '';

  // ── MATOS ────────────────────────────────────────
  const checks = ev.checklist || [];
  const visibleChecks = checks.filter(c => c.t !== 'Acompte reçu');
  const done = visibleChecks.filter(c=>c.d).length;
  const checkHTML = visibleChecks.length ? '<div style="padding:14px 16px;border-bottom:1px solid var(--bd)">'
    + '<div style="font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px">'
    + '✅ Checklist <span style="color:'+(done===visibleChecks.length?'var(--ok)':'var(--mu)')+'">'+done+'/'+visibleChecks.length+'</span></div>'
    + visibleChecks.map((c,i)=>
        '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer" onclick="jourjToggleCk('+ev.id+','+i+')">'
        + '<div style="width:20px;height:20px;border:2px solid '+(c.d?'var(--ok)':'var(--bd)')+';background:'+(c.d?'var(--ok)':'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.7rem;color:#000">'+(c.d?'✓':'')+'</div>'
        + '<span style="font-size:.84rem;'+(c.d?'text-decoration:line-through;color:var(--mu)':'')+'">' + c.t + '</span>'
        + '</div>'
      ).join('')
    + '</div>' : '';

  // ── PAIEMENT ─────────────────────────────────────
  const noAcompte = ev.acompteStatus==='none' || (ev.acomptePct===0 && !ev.acompteAmount);
  const payHTML = (ev.soldeStatus==='received' && noAcompte) ? '' :
    '<div style="padding:14px 16px;border-bottom:1px solid var(--bd)">'
    + '<div style="font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px">💰 Paiement</div>'
    + payStatusRow(ev)
    + '</div>';

  // ── ACTIONS ──────────────────────────────────────
  const actionsBar = '<div style="padding:10px 16px;background:var(--s2);border-bottom:1px solid var(--bd);display:flex;gap:8px;flex-wrap:wrap">'
    + '<button class="btn bg" style="font-size:.72rem" data-evid="'+ev.id+'" onclick="jjEdit(this)">✏️ Modifier</button>'
    + '<button class="btn bg" style="font-size:.72rem" data-evid="'+ev.id+'" onclick="jjFiche(this)">📋 Fiche client</button>'
    + '<button class="btn bp" style="font-size:.72rem" onclick="openSendFactureAvis(\''+ev.id+'\')">📧 Facture & Avis</button>'
    + '</div>';

  return '<div class="ph"><div class="pt">🚗 Date locale</div></div>'
    + '<div style="max-width:600px;margin:0 auto">'
    + heroHTML
    + actionsBar
    + timelineHTML
    + addrHTML
    + contactHTML
    + checkHTML
    + payHTML
    + '</div>';
}

// ═══════════════════════════════════════════════════
// 🏢 MODE MISSION – CORPO
// ═══════════════════════════════════════════════════
function pgJourJCorpo(ev, upcoming, now, todayStr, tomorrowStr) {
  const cd  = ev.clientData || {};
  const t   = ET.corpo;
  const tl  = getTL(ev);
  const isToday    = ev.date === todayStr;
  const isTomorrow = ev.date === tomorrowStr;
  const days = Math.ceil((new Date(ev.date+'T00:00:00') - new Date(todayStr+'T00:00:00')) / 86400000);

  function esc(s){ return escH(s||''); }
  function fmtT(v){ if(!v||v==='—')return null; return v.replace(/h/i,':').replace(/[^0-9:]/g,''); }
  const nowMins = now.getHours()*60+now.getMinutes();
  function toMins(v){ var p=(fmtT(v)||'').split(':'); return parseInt(p[0]||0)*60+parseInt(p[1]||0); }

  const dayLabel      = isToday ? 'AUJOURD\'HUI' : isTomorrow ? 'DEMAIN' : fd(ev.date).toUpperCase();
  const missionLabel  = isToday ? 'Mission en cours' : days===1 ? 'Demain' : 'Dans '+days+' jours';

  // ── 1. HERO ──────────────────────────────────────
  const heroHTML = '<div style="background:linear-gradient(135deg,#1a1200 0%,#0d0d1a 100%);padding:22px 20px 16px;border-bottom:2px solid '+t.c+'">'
    + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">'
    + '<div>'
    + '<div style="font-size:.6rem;font-weight:700;letter-spacing:3px;color:'+t.c+';text-transform:uppercase;margin-bottom:5px">'+t.e+' Mission Corpo</div>'
    + '<div style="font-family:\'Syne\',sans-serif;font-size:1.4rem;font-weight:800;line-height:1.1;margin-bottom:3px">'+esc(cd.societe||ev.name)+'</div>'
    + (ev.venue ? '<div style="font-size:.82rem;color:var(--mu)">📍 '+esc(ev.venue)+'</div>' : '')
    + (cd.bonCommande ? '<div style="font-size:.7rem;color:var(--mu);font-family:monospace;margin-top:2px">Réf. '+esc(cd.bonCommande)+'</div>' : '')
    + '</div>'
    + '<div style="text-align:right;flex-shrink:0">'
    + '<div style="font-size:.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:2px">'+dayLabel+'</div>'
    + '<div style="font-family:\'Syne\',sans-serif;font-size:.95rem;font-weight:800;color:'+t.c+';margin-top:3px">'+missionLabel+'</div>'
    + '</div>'
    + '</div>'
    + '</div>';

  // ── 2. PLANNING PROTOCOLE ────────────────────────
  const planSteps = [
    { label:'Arrivée DJ / install.',  time: tl.chargement!=='—'?tl.chargement:null, icon:'📦' },
    { label:'Départ',                 time: tl.depart!=='—'?tl.depart:null,         icon:'🚗' },
    { label:'Accueil invités',        time: fmtT(cd.hAccueil),                       icon:'🚪' },
    { label:'Cocktail',               time: fmtT(cd.hCocktail),                      icon:'🥂' },
    { label:'Discours',               time: fmtT(cd.hDiscours),                      icon:'🎤' },
    { label:'Dîner',                  time: fmtT(cd.hDiner),                         icon:'🍽️' },
    { label:'Dancefloor',             time: fmtT(cd.hDance)||ev.start||null,         icon:'🎧' },
    { label:'Fin',                    time: fmtT(cd.hFin)||ev.end||null,             icon:'🏁' },
  ].filter(s=>s.time);

  function toSortM(v){ var p=(v||'').split(':'); var h=parseInt(p[0]||0); var m=parseInt(p[1]||0); return(h<8?h+24:h)*60+m; }
  planSteps.sort((a,b)=>toSortM(a.time)-toSortM(b.time));

  const planRows = planSteps.map(s=>{
    var mins = toMins(s.time);
    var isPast = isToday && mins < nowMins;
    var isNow  = isToday && Math.abs(mins-nowMins) < 15;
    var isBig  = s.label==='Dancefloor'||s.label==='Discours';
    var col    = isPast?'var(--mu)':isNow?'var(--ac)':'var(--tx)';
    var bg     = isNow?'background:rgba(255,159,67,.06);':isPast?'opacity:.6;':'';
    return '<div style="display:flex;align-items:center;gap:14px;padding:10px 16px;border-bottom:1px solid var(--bd);'+bg+'">'
      + '<div style="font-size:1.1rem;width:26px;text-align:center;flex-shrink:0">'+s.icon+'</div>'
      + '<div style="flex:1">'
      + '<div style="font-size:.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px">'+s.label+'</div>'

      + '</div>'
      + (isPast?'<span style="color:var(--ok)">✓</span>':'')

  }).join('');

  const planningBlock = '<div style="border-bottom:1px solid var(--bd)">'

  // ── 3. CONTACTS ──────────────────────────────────

  // ── 4. CONTRAINTES TECHNIQUES ────────────────────
  const hasContraintes = cd.limiteur||cd.coupureTotale||cd.micro||cd.video||cd.backline||cd.contraintesNotes;

      + '<div style="font-size:.9rem;font-weight:700;color:var(--er)">'+esc(cd.coupureTotale)+'</div></div></div>' : '')
    + (cd.micro ? '<div style="display:flex;align-items:center;gap:10px;padding:6px 8px;background:var(--s2);border:1px solid var(--bd)">'
      + '<span>🎤</span><div><div style="font-size:.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px">Micros discours</div>'
      + '<div style="font-size:.84rem">'+esc(cd.micro)+'</div></div></div>' : '')
    + (cd.video ? '<div style="display:flex;align-items:center;gap:10px;padding:6px 8px;background:var(--s2);border:1px solid var(--bd)">'
      + '<span>📽️</span><div><div style="font-size:.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px">Projection vidéo</div>'
      + '<div style="font-size:.84rem">'+esc(cd.video)+'</div></div></div>' : '')
    + (cd.backline ? '<div style="display:flex;align-items:center;gap:10px;padding:6px 8px;background:var(--s2);border:1px solid var(--bd)">'
      + '<span>🎛️</span><div><div style="font-size:.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px">Backline</div>'
      + '<div style="font-size:.84rem">'+esc(cd.backline)+'</div></div></div>' : '')
    + (cd.contraintesNotes ? '<div style="font-size:.78rem;color:var(--mu);padding:6px 0;line-height:1.5">'+esc(cd.contraintesNotes)+'</div>' : '')
    + '</div></div>' : '';

  // ── 5. MATÉRIEL ──────────────────────────────────
  const checks = ev.checklist || [];
  const visibleChecks = checks.filter(c=>c.t!=='Acompte reçu');

  const matolBlock = visibleChecks.length ? '<div style="padding:14px 16px;border-bottom:1px solid var(--bd)">'
    + '<div style="font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px">'
    + '📦 Matériel <span style="color:'+(done===visibleChecks.length?'var(--ok)':'var(--mu)')+'">'+done+'/'+visibleChecks.length+'</span></div>'
    + visibleChecks.map((c,i)=>
        '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer" onclick="jourjToggleCk('+ev.id+','+i+')">'

        + '<span style="font-size:.84rem;'+(c.d?'text-decoration:line-through;color:var(--mu)':'')+'">'+c.t+'</span>'

  const noAcompte = ev.acompteStatus==='none'||(ev.acomptePct===0&&!ev.acompteAmount);
  const payBlock = (ev.soldeStatus==='received'&&noAcompte)?'' :

    + '<div style="font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px">💰 Paiement</div>'

    + '</div>';

  // ── ACTIONS BAR ──────────────────────────────────
  const actionsBar = '<div style="padding:10px 16px;background:var(--s2);border-bottom:1px solid var(--bd);display:flex;gap:8px;flex-wrap:wrap">'

    + '<button class="btn bg" style="font-size:.72rem" data-evid="'+ev.id+'" onclick="jjFiche(this)">📋 Fiche client</button>'
    + '<button class="btn bp" style="font-size:.72rem" onclick="openSendFactureAvis(\''+ev.id+'\')">📧 Facture & Avis</button>'

    + '</div>';

  var html = '<div class="ph"><div class="pt">🏢 Mode Mission</div></div>'
    + '<div id="jj-wrap" style="max-width:600px;margin:0 auto">'
    + heroHTML
    + actionsBar
    + planningBlock
    + contactsBlock
    + contraintesBlock.replace('<div style="padding:14px 16px;border-bottom', '<div class="jj-secondary" style="padding:14px 16px;border-bottom')
    + matolBlock.replace('<div style="padding:14px 16px;border-bottom', '<div class="jj-secondary" style="padding:14px 16px;border-bottom')
    + lieuBlock
    + payBlock
    + '</div>';
  setTimeout(initJJView, 0);
  return html;
}

// 🎉 MODE MISSION – SOIRÉE PRIVÉE
// ═══════════════════════════════════════════════════
function pgJourJPrivate(ev, upcoming, now, todayStr, tomorrowStr) {
  const cd  = ev.clientData || {};
  const t   = ET.private;
  const tl  = getTL(ev);
  const isToday    = ev.date === todayStr;
  const isTomorrow = ev.date === tomorrowStr;
  const days = Math.ceil((new Date(ev.date+'T00:00:00') - new Date(todayStr+'T00:00:00')) / 86400000);

  function esc(s){ return escH(s||''); }
  function fmtT(v){ if(!v||v==='—')return null; return v.replace(/h/i,':').replace(/[^0-9:]/g,''); }
  const nowMins = now.getHours()*60+now.getMinutes();
  function toMins(v){ var p=(fmtT(v)||'').split(':'); return parseInt(p[0]||0)*60+parseInt(p[1]||0); }
  function toSortM(v){ var p=(fmtT(v)||'').split(':'); var h=parseInt(p[0]||0); var m=parseInt(p[1]||0); return(h<8?h+24:h)*60+m; }

  const dayLabel     = isToday ? 'AUJOURD\'HUI' : isTomorrow ? 'DEMAIN' : fd(ev.date).toUpperCase();
  const missionLabel = isToday ? 'Ce soir 🎉' : days===1 ? 'Demain' : 'Dans '+days+' jours';

  // ── 1. HERO ──────────────────────────────────────
  const heroHTML = '<div style="background:linear-gradient(135deg,#1a0a12 0%,#0d0d1a 100%);padding:22px 20px 16px;border-bottom:2px solid '+t.c+'">'
    + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">'
    + '<div>'
    + '<div style="font-size:.6rem;font-weight:700;letter-spacing:3px;color:'+t.c+';text-transform:uppercase;margin-bottom:5px">'+t.e+' Soirée Privée</div>'
    + '<div style="font-family:\'Syne\',sans-serif;font-size:1.4rem;font-weight:800;line-height:1.1;margin-bottom:3px">'+esc(cd.client||ev.client||ev.name)+'</div>'
    + (ev.name && (cd.client||ev.client) && ev.name!==(cd.client||ev.client) ? '<div style="font-size:.82rem;color:var(--mu)">'+esc(ev.name)+'</div>' : '')
    + (cd.ageNote ? '<div style="font-size:.78rem;color:'+t.c+';margin-top:2px">🎂 '+esc(cd.ageNote)+'</div>' : '')
    + '</div>'
    + '<div style="text-align:right;flex-shrink:0">'
    + '<div style="font-size:.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:2px">'+dayLabel+'</div>'
    + '<div style="font-family:\'Syne\',sans-serif;font-size:.95rem;font-weight:800;color:'+t.c+';margin-top:3px">'+missionLabel+'</div>'
    + '</div>'
    + '</div>'
    + '</div>';

  // ── 2. ACCÈS ─────────────────────────────────────
  const adresse = cd.lieu || ev.address || ev.venue || '';
  const mapsURL = adresse ? 'https://maps.google.com/?q='+encodeURIComponent(adresse) : '';
  const accesBlock = adresse ? '<div style="padding:14px 16px;border-bottom:1px solid var(--bd)">'
    + '<div style="font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px">📍 Accès</div>'
    + '<div style="font-size:.95rem;font-weight:700;margin-bottom:8px">'+esc(adresse)+'</div>'
    + (cd.parking ? '<div style="display:flex;align-items:flex-start;gap:8px;padding:7px 10px;background:var(--s2);border:1px solid var(--bd);margin-bottom:6px;font-size:.82rem">'
      + '<span>🚗</span><span>'+esc(cd.parking)+'</span></div>' : '')
    + (cd.acces ? '<div style="display:flex;align-items:flex-start;gap:8px;padding:7px 10px;background:var(--s2);border:1px solid var(--bd);margin-bottom:10px;font-size:.82rem">'
      + '<span>🔑</span><span>'+esc(cd.acces)+'</span></div>' : '')
    + '<div style="display:flex;gap:8px;flex-wrap:wrap">'
    + '<a href="'+mapsURL+'" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--bd);color:var(--tx);text-decoration:none;font-size:.8rem;padding:9px 14px;font-weight:600">🗺️ Ouvrir Maps</a>'
    + (ev.driveKm ? '<div style="display:inline-flex;align-items:center;background:var(--s2);border:1px solid var(--bd);font-size:.8rem;padding:9px 14px">🚗 '+ev.driveKm+' km · '+(ev.driveMin||'?')+' min</div>' : '')
    + '</div>'
    + '</div>' : '';

  // ── 3. TIMING ────────────────────────────────────
  const timingSteps = [
    { label:'Chargement',    time: tl.chargement!=='—'?tl.chargement:null, icon:'📦' },
    { label:'Départ',        time: tl.depart!=='—'?tl.depart:null,         icon:'🚗' },
    { label:'Installation',  time: fmtT(cd.hInstall),                       icon:'🎛️' },
    { label:'Début soirée',  time: fmtT(cd.heureBal)||ev.start||null,       icon:'🎉', big:true },
    { label:'🎂 Gâteau',     time: fmtT(cd.hGateau),                        icon:'🎂' },
    { label:'Fin estimée',   time: fmtT(cd.hFin)||ev.end||null,             icon:'🏁' },
  ].filter(s=>s.time);
  timingSteps.sort((a,b)=>toSortM(a.time)-toSortM(b.time));

  const timingRows = timingSteps.map(s=>{
    var mins   = toMins(s.time);
    var isPast = isToday && mins < nowMins;
    var isNow  = isToday && Math.abs(mins-nowMins) < 15;
    var col    = isPast?'var(--mu)':isNow?'var(--ac)':'var(--tx)';
    var bg     = isNow?'background:rgba(255,107,157,.06);':isPast?'opacity:.55;':'';

      + '<div style="font-size:1.1rem;width:26px;text-align:center;flex-shrink:0">'+s.icon+'</div>'
      + '<div style="flex:1"><div style="font-size:.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px">'+s.label+'</div>'
      + '<div style="font-family:\'Syne\',sans-serif;font-size:'+(s.big?'1.7':'1.2')+'rem;font-weight:800;color:'+col+'">'+s.time+'</div></div>'
      + (isPast?'<span style="color:var(--ok)">✓</span>':'')
      + (isNow?'<span style="font-size:.6rem;font-weight:700;color:'+t.c+';background:rgba(255,107,157,.2);padding:2px 8px">MAINTENANT</span>':'')
      + '</div>';
  }).join('');

  const timingBlock = '<div style="border-bottom:1px solid var(--bd)">'
    + '<div style="padding:10px 16px 2px;font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:3px;text-transform:uppercase">⏰ Timing</div>'
    + timingRows
    + (cd.momentSpecial ? '<div style="padding:10px 16px;font-size:.82rem;color:'+t.c+';border-top:1px solid var(--bd)20">✨ '+esc(cd.momentSpecial)+'</div>' : '')
    + '</div>';

  // ── 4. AMBIANCE ──────────────────────────────────
  const hasAmbiance = cd.style||cd.mustHave||cd.interdits;
  const ambianceBlock = hasAmbiance ? '<div style="padding:14px 16px;border-bottom:1px solid var(--bd)">'
    + '<div style="font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px">🎵 Ambiance</div>'
    + (cd.style ? '<div style="margin-bottom:8px"><div style="font-size:.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">Style</div>'

    + (cd.mustHave ? '<div style="margin-bottom:8px;padding:8px 10px;background:rgba(68,255,136,.06);border-left:2px solid var(--ok)">'
      + '<div style="font-size:.6rem;color:var(--ok);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">✅ Must-have</div>'
      + '<div style="font-size:.84rem;line-height:1.5">'+esc(cd.mustHave)+'</div></div>' : '')
    + (cd.interdits ? '<div style="padding:8px 10px;background:rgba(255,68,68,.06);border-left:2px solid var(--er)">'
      + '<div style="font-size:.6rem;color:var(--er);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">🚫 À éviter</div>'
      + '<div style="font-size:.84rem;line-height:1.5">'+esc(cd.interdits)+'</div></div>' : '')
    + '</div>' : '';

  // ── 5. CONTACT ───────────────────────────────────
  const phone  = cd.contactPrincipal || ev.clientPhone || '';
  const name   = cd.client || ev.client || '';
  const phone2 = cd.surPlaceTel || '';
  const name2  = cd.surPlace || '';
  const contactBlock = (name||phone||name2) ? '<div style="padding:14px 16px;border-bottom:1px solid var(--bd)">'
    + '<div style="font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px">📞 Contact</div>'
    + (name||phone ? '<div style="margin-bottom:10px">'
      + '<div style="font-size:.95rem;font-weight:700;margin-bottom:8px">'+esc(name||'Hôte')+'</div>'
      + (phone ? '<div style="display:flex;gap:8px">'
        + '<a href="tel:'+esc(phone)+'" style="display:flex;align-items:center;justify-content:center;width:44px;height:44px;background:var(--s2);border:1px solid var(--bd);text-decoration:none;font-size:1.2rem">📞</a>'
        + '<a href="https://wa.me/'+phone.replace(/[^0-9]/g,'')+'" target="_blank" style="display:flex;align-items:center;justify-content:center;width:44px;height:44px;background:var(--s2);border:1px solid var(--bd);text-decoration:none;font-size:1.2rem">💬</a>'
        + '</div>' : '')
      + '</div>' : '')
    + (name2||phone2 ? '<div style="padding-top:10px;border-top:1px solid var(--bd)20">'
      + '<div style="font-size:.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Sur place</div>'
      + '<div style="font-size:.88rem;font-weight:600;margin-bottom:6px">'+esc(name2)+'</div>'
      + (phone2 ? '<div style="display:flex;gap:8px">'
        + '<a href="tel:'+esc(phone2)+'" style="display:flex;align-items:center;justify-content:center;width:44px;height:44px;background:var(--s2);border:1px solid var(--bd);text-decoration:none;font-size:1.2rem">📞</a>'
        + '<a href="https://wa.me/'+phone2.replace(/[^0-9]/g,'')+'" target="_blank" style="display:flex;align-items:center;justify-content:center;width:44px;height:44px;background:var(--s2);border:1px solid var(--bd);text-decoration:none;font-size:1.2rem">💬</a>'
        + '</div>' : '')
      + '</div>' : '')
    + '</div>' : '';

  // ── 6. MATÉRIEL ──────────────────────────────────
  const checks = ev.checklist || [];
  const visibleChecks = checks.filter(c=>c.t!=='Acompte reçu');
  const done = visibleChecks.filter(c=>c.d).length;

    + visibleChecks.map((c,i)=>
        '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer" onclick="jourjToggleCk('+ev.id+','+i+')">'
        + '<div style="width:20px;height:20px;border:2px solid '+(c.d?'var(--ok)':'var(--bd)')+';background:'+(c.d?'var(--ok)':'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.7rem;color:#000">'+(c.d?'✓':'')+'</div>'
        + '<span style="font-size:.84rem;'+(c.d?'text-decoration:line-through;color:var(--mu)':'')+'">'+c.t+'</span>'

  // ── PAIEMENT ─────────────────────────────────────
  const noAcompte = ev.acompteStatus==='none'||(ev.acomptePct===0&&!ev.acompteAmount);

    + '<div style="font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px">💰 Paiement</div>'

  // ── ACTIONS ──────────────────────────────────────

    + '<button class="btn bg" style="font-size:.72rem" data-evid="'+ev.id+'" onclick="jjEdit(this)">✏️ Modifier</button>'
    + '<button class="btn bg" style="font-size:.72rem" data-evid="'+ev.id+'" onclick="jjFiche(this)">📋 Fiche</button>'
    + '<button class="btn bp" style="font-size:.72rem" onclick="openSendFactureAvis(\''+ev.id+'\')">📧 Facture & Avis</button>'
    + '<button id="jj-toggle-btn" class="btn bg" style="font-size:.72rem;margin-left:auto" onclick="toggleJJView()">⚡ Vue rapide</button>'
    + '</div>';

  // Mark secondary blocks
  const ambianceBlockFinal  = ambianceBlock.replace('<div style="padding:14px 16px;border-bottom:1px solid var(--bd)">'+'\n    + \'<div style="font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px">🎵 Ambiance</div>\'', '');
  const contrBlockFinal = contrBlock ? contrBlock.replace('<div style="padding:14px', '<div class="jj-secondary" style="padding:14px') : '';
  const matolBlockFinal = matolBlock ? matolBlock.replace('<div style="padding:14px 16px;border-bottom:1px solid var(--bd)">'+"\n    + '<div style=\"font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px\">'", '') : '';

  var html = '<div class="ph"><div class="pt">🎉 Soirée Privée</div></div>'
    + '<div id="jj-wrap" style="max-width:600px;margin:0 auto">'
    + heroHTML
    + actionsBar
    + accesBlock
    + timingBlock
    + ambianceBlock.replace('<div style="padding:14px 16px;border-bottom', '<div class="jj-secondary" style="padding:14px 16px;border-bottom')
    + contactBlock
    + matolBlock.replace('<div style="padding:14px 16px;border-bottom:1px solid var(--bd)">'+'\n    + \'<div style="font-size:.6rem', '<div class="jj-secondary" style="padding:14px 16px;border-bottom:1px solid var(--bd)">'+'\n    + \'<div style="font-size:.6rem')
    + contrBlock.replace('<div style="padding:14px 16px;border-bottom', '<div class="jj-secondary" style="padding:14px 16px;border-bottom')

function toggleJJView(){
  var c=document.getElementById('jj-wrap');
  if(!c)return;
  c.classList.toggle('jj-compact');
  var btn=document.getElementById('jj-toggle-btn');
  if(btn) btn.textContent=c.classList.contains('jj-compact')?'👁 Vue complète':'⚡ Vue rapide';
  localStorage.setItem('gp7_jjcompact',c.classList.contains('jj-compact')?'1':'0');
}
function initJJView(){
  var c=document.getElementById('jj-wrap');
  if(!c)return;
  if(localStorage.getItem('gp7_jjcompact')==='1') c.classList.add('jj-compact');
  var btn=document.getElementById('jj-toggle-btn');
  if(btn) btn.textContent=c.classList.contains('jj-compact')?'👁 Vue complète':'⚡ Vue rapide';

function jjEdit(btn){ var id=btn.getAttribute('data-evid'); if(id) editEv(id); }

let _jourjTimer = null;
function startJourJTicker(ev, tl) {
  if (_jourjTimer) clearInterval(_jourjTimer);
  if (S.page !== 'jourj') return;
  const el = document.getElementById('jourj-countdown');
  if (!el) return;
  const todayStr = new Date().toISOString().split('T')[0];
  if (ev.date !== todayStr || tl.depart === '—') return;

  _jourjTimer = setInterval(() => {
    if (S.page !== 'jourj') { clearInterval(_jourjTimer); return; }
    const now = new Date();
    const [dh, dm] = tl.depart.split(':').map(Number);
    const diff = (dh * 60 + dm) - (now.getHours() * 60 + now.getMinutes());
    if (diff <= 0) { clearInterval(_jourjTimer); go('jourj'); return; }
    const h = Math.floor(diff / 60), m = diff % 60;
    const urgent = diff < 60;
    el.style.color = urgent ? 'var(--er)' : diff < 120 ? '#ffaa00' : 'var(--ok)';
    el.innerHTML = (h > 0 ? h + '<span style="font-size:1.4rem">h</span>' : '')
      + String(m).padStart(2,'0') + '<span style="font-size:1.4rem">min</span>';
  }, 30000); // update every 30s
}

async function obLookupSiret() {
  const s = document.getElementById('ob-siret').value.replace(/\s/g,'');
  const m = document.getElementById('ob-siret-msg');
  if (!m) return;
  if (s.length !== 14 || !/^\d+$/.test(s)) { m.textContent='⚠️ SIRET invalide (14 chiffres)'; m.style.color='var(--wa)'; return; }
  m.textContent='⏳ Recherche...'; m.style.color='var(--mu)';
  try {
    const res = await fetch('https://recherche-entreprises.api.gouv.fr/search?q=' + s + '&page=1&per_page=1');
    const d = await res.json();
    const r = d.results && d.results[0];
    if (r) {
      if (!document.getElementById('ob-name').value) document.getElementById('ob-name').value = r.nom_raison_sociale || r.nom_complet || '';
      if (r.siege) {
        document.getElementById('ob-city').value = r.siege.libelle_commune || '';
        if (document.getElementById('ob-dep')) document.getElementById('ob-dep').value = (r.siege.adresse || '') + ', ' + (r.siege.code_postal||'') + ' ' + (r.siege.libelle_commune||'');
      }
      m.textContent = '✅ Auto-rempli !'; m.style.color = 'var(--ok)';
    } else { m.textContent = '❌ Non trouvé — saisis manuellement'; m.style.color = 'var(--er)'; }
  } catch(e) { m.textContent = '❌ Erreur réseau'; m.style.color = 'var(--er)'; }
}

function obSaveStep1() {
  const name = document.getElementById('ob-name') && document.getElementById('ob-name').value.trim();
  if (!name) { alert('Ton nom DJ est requis'); return; }
  S.profile.siret = (document.getElementById('ob-siret') && document.getElementById('ob-siret').value.replace(/\s/g,'')) || '';
  S.profile.name = name;
  S.profile.city = document.getElementById('ob-city') && document.getElementById('ob-city').value.trim() || '';
  S.profile.phone = document.getElementById('ob-phone') && document.getElementById('ob-phone').value.trim() || '';
  S.profile.email = document.getElementById('ob-email') && document.getElementById('ob-email').value.trim() || '';
  S.profile.departureAddress = document.getElementById('ob-dep') && document.getElementById('ob-dep').value.trim() || '';
  S.profile.kmRate = parseFloat(document.getElementById('ob-km') && document.getElementById('ob-km').value) || 0.40;
  save();
  obShowStep(2);
}

function obAddGear() {
  const n = document.getElementById('ob-g-name') && document.getElementById('ob-g-name').value.trim();
  if (!n) return;
  S.gear.push({id:'g'+Date.now().toString(36),name:n,cat:document.getElementById('ob-g-cat').value.trim()||'',loadMin:parseInt(document.getElementById('ob-g-min').value)||10});
  save();
  obShowStep(2);
}

function obSaveStep2() {
  if (S.gear.length === 0) { alert('Ajoute au moins un élément de matériel'); return; }
  obShowStep(3);
}

function obAddSvc() {
  const n = document.getElementById('ob-s-name') && document.getElementById('ob-s-name').value.trim();
  if (!n) return;
  S.serviceTypes.push({id:'s'+Date.now().toString(36),name:n,emoji:document.getElementById('ob-s-em').value||'🎵',color:'#e8ff3c',desc:document.getElementById('ob-s-desc').value.trim()||'',loadMin:30,installMin:45,gearIds:[]});
  save();
  obShowStep(3);
}

function obFinish() {
  if (S.serviceTypes.length === 0) { alert('Ajoute au moins une prestation'); return; }
  S.profile.onboardingDone = true;
  save();
  document.querySelector('.sidebar').style.opacity = '1';
  document.querySelector('.sidebar').style.pointerEvents = 'auto';
  // Show welcome toast
  const toast = document.createElement('div');
  toast.innerHTML = '🎉 GigPlanner configuré ! Bienvenue.';
  toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:var(--ok);color:#000;padding:12px 20px;font-family:Syne,sans-serif;font-weight:800;font-size:.88rem;z-index:9999;border-radius:2px;animation:fadeIn .3s';
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(), 3000);
  go('dash');
}

  if(checkContractMode())return;
  if(checkReviewMode())return;
  if(checkClientMode())return;
  updateMissionSidebar();
  if(checkOnboarding())return;
  render();
}
initApp();
