function parseFicheText(evId){
  var txt = (document.getElementById('fiche-import-txt')||{}).value || '';
  if(!txt.trim()){ document.getElementById('fiche-import-msg').textContent = "⚠️ Colle le texte d'abord"; return; }
  var ev = S.events.find(function(e){ return e.id==evId; });
  if(!ev) return;

  var cd = ev.clientData || {};
  var get = function(label){
    var re = new RegExp(label.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*:\\s*(.+)', 'i');
    var m = txt.match(re);
    return m ? m[1].trim() : '';
  };

  var imported = {
    maries:           get('Mariés') || get('Maries'),
    contactPrincipal: get('Contact'),
    contactSurPlace:  get('Sur place'),
    lieu:             get('Lieu'),
    address:          get('Adresse'),
    heureMatReady:    get('Matériel prêt') || get('Materiel pret'),
    heureArrivee:     get('Arrivée site') || get('Arrivee site'),
    heureCeremonie:   get('Cérémonie') || get('Ceremonie'),
    heureVin:         get("Vin d'honneur"),
    heureBal:         get('Ouverture bal'),
    heureGateau:      get('Gâteau') || get('Gateau'),
    heureFin:         get('Fin'),
    particularites:   get('Particularités') || get('Particularites'),
    entreeMaries:     get('Entrée mariés') || get('Entree maries'),
    musiqueCeremonie: get('Cérémonie') || get('Ceremonie'),
    sortieCeremonie:  get('Sortie cérémonie') || get('Sortie ceremonie'),
    premiereDanse:    get('1ère danse') || get('Première danse') || get('1ere danse'),
    musiqueGateau:    get('Gâteau') || get('Gateau'),
    interdits:        get('Interdits'),
    annonces:         get('Annonces'),
    limiteur:         get('Limiteur'),
    coupureBasses:    get('Couper basses'),
    coupureTotale:    get('Coupure totale'),
    notes:            get('Notes'),
    submittedAt:      new Date().toISOString()
  };

  var count = Object.keys(imported).filter(function(k){ return k!=='submittedAt' && imported[k]; }).length;
  ev.clientData = Object.assign({}, cd, imported);
  if(ev.clientData.lieu)      ev.venue   = ev.clientData.lieu;
  if(ev.clientData.address)   ev.address = ev.clientData.address;
  if(ev.clientData.maries)    ev.client  = ev.clientData.maries;
  save();

  var msg = document.getElementById('fiche-import-msg');
  if(msg){ msg.textContent = '✅ ' + count + ' champs importés !'; msg.style.color = 'var(--ok)'; }
  setTimeout(function(){ closeMo(); render(); }, 1200);
}

async function lookupSiret(){
  var raw = document.getElementById('pp-siret').value.replace(/\s/g,'');
  var m = document.getElementById('sm');
  if(raw.length!==14||!/^\d+$/.test(raw)){
    m.textContent='⚠️ SIRET invalide (14 chiffres requis)';m.style.color='var(--wa)';return;
  }
  m.textContent='⏳ Recherche en cours...';m.style.color='var(--mu)';
  try{
    var res = await fetch('https://recherche-entreprises.api.gouv.fr/search?q='+raw+'&page=1&per_page=1');
    if(!res.ok) throw new Error('HTTP '+res.status);
    var d = await res.json();
    var r = d.results && d.results[0];

    if(r){
      var siege = r.siege || {};
      var nom = r.nom_raison_sociale || r.nom_complet || r.nom || '';

      // Cas non-diffusible : l'INSEE masque les données sur demande du dirigeant
      if(!nom || nom === '[NON-DIFFUSIBLE]' || (siege && siege.adresse === '[NON-DIFFUSIBLE]')){
        m.innerHTML = '⚠️ Entreprise trouvée mais <strong>non-diffusible</strong> — l\'INSEE masque tes données.<br>'
          + '<span style="font-size:.68rem;color:var(--mu)">Remplis les champs manuellement. '
          + 'Pour activer la diffusion publique : insee.fr → "Demande de diffusion au répertoire SIRENE".</span>';
        m.style.color = 'var(--wa)';
        return;
      }

      var set = function(id, val){ var el=document.getElementById(id); if(el && val && val !== '[NON-DIFFUSIBLE]') el.value=val; };
      set('pp-ln', nom);
      var ppn = document.getElementById('pp-n');
      if(ppn && !ppn.value) ppn.value = nom;

      var adresse = siege.adresse ||
        [(siege.numero_voie||''), (siege.type_voie||''), (siege.libelle_voie||'')].filter(Boolean).join(' ') || '';
      set('pp-a', adresse);
      set('pp-z', siege.code_postal || '');
      set('pp-ci', siege.libelle_commune || '');

      m.innerHTML = '✅ Trouvé : <strong>' + escH(nom) + '</strong>';
      m.style.color = 'var(--ok)';

    } else {
      m.textContent = '❌ SIRET non trouvé — remplis manuellement';
      m.style.color = 'var(--er)';
    }
  } catch(e){
    m.textContent = '❌ Erreur réseau — remplis manuellement';
    m.style.color = 'var(--er)';
  }
}

function prefillInvFromEv(evId){
  var ev = evId ? S.events.find(function(e){return e.id==evId;}) : null;
  window._iEvId = evId||null;
  if(!ev) return;
  var cd = ev.clientData||{};
  var cl = document.getElementById('in-cl');
  var ad = document.getElementById('in-ad');
  var no = document.getElementById('in-no');
  var ac = document.getElementById('in-ac');
  if(cl) cl.value = cd.maries||cd.client||ev.client||'';
  if(ad) ad.value = cd.address||ev.address||'';
  if(no) no.value = ev.notes||'';
  // Prefill lines from event services
  var svcs=(ev.serviceIds||[]).map(function(sid){return S.serviceTypes.find(function(s){return s.id===sid;});}).filter(Boolean);
  var lines = svcs.length>0
    ? svcs.map(function(s){return {d:s.emoji+' '+s.name+(s.desc?' — '+s.desc:''),q:1,u:Math.round((ev.amount||0)/svcs.length)};})
    : [{d:'Prestation DJ — '+ev.name,q:1,u:ev.amount||0}];
  window._iLines = lines.length;
  var ilw = document.getElementById('ilw');
  if(ilw) ilw.innerHTML = lines.map(function(l,i){return iLH(i,l.d,l.q,l.u);}).join('');
  // Acompte déjà versé
  if(ac && ev.acompteStatus==='received'){
    var acompteVal = ev.acompteAmount||(ev.amount&&ev.acomptePct?Math.round(ev.amount*(ev.acomptePct/100)):0);
    ac.value = acompteVal||0;
  }
}

function uploadContractForEv(){
  var evId = window._uploadCtrEvId;
  var fileInput = document.getElementById('ctr-file');
  var msg = document.getElementById('ctr-upload-msg');
  if(!fileInput||!fileInput.files||!fileInput.files[0]){ msg.textContent='⚠️ Sélectionne un fichier PDF'; msg.style.color='var(--wa)'; return; }
  var file = fileInput.files[0];
  if(file.size > 5*1024*1024){ msg.textContent='⚠️ Fichier trop lourd (max 5MB)'; msg.style.color='var(--wa)'; return; }
  msg.textContent='⏳ Upload en cours...'; msg.style.color='var(--mu)';
  var btn = document.querySelector('[onclick="uploadContractForEv()"]');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Upload...'; }
  var fileName = evId + '_contrat_' + Date.now() + '.pdf';
  fetch(SB_URL + '/storage/v1/object/documents/' + fileName, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/pdf', 'x-upsert': 'true' },
    body: file
  }).then(function(r){
    if(!r.ok) throw new Error('Upload failed: ' + r.status);
    var publicUrl = SB_URL + '/storage/v1/object/public/documents/' + fileName;
    var ev = S.events.find(function(e){ return e.id==evId; });
    if(ev){ if(!ev.docs) ev.docs=[]; ev.docs.push({ type:'contrat', name:file.name, url:publicUrl, uploadedAt:new Date().toISOString() }); }
    save();
    msg.textContent='✅ Contrat importé !'; msg.style.color='var(--ok)';
    setTimeout(function(){ closeMo(); openEv(evId); }, 800);
  }).catch(function(err){
    msg.textContent='❌ Erreur : ' + err.message; msg.style.color='var(--er)';
    if(btn){ btn.disabled=false; btn.textContent='📤 Uploader'; }
  });
}

    <div class="fgi"><label>Client</label><input id="in-cl" value="${escH(cd.maries||cd.client||ev&&ev.client||'')}"></div>
    <div class="fgi" style="position:relative"><label>Adresse client</label>
      <input id="in-ad" value="${escH(cd.address||ev&&ev.address||'')}" placeholder="Commence à taper..." autocomplete="off" oninput="addrAuto(this,'in-ad-drop',addrSelectInAd)">
      <div id="in-ad-drop" class="addr-drop"></div>
    </div>
    <div class="fgi"><label>Acompte versé (€)</label><input id="in-ac" type="number" value="0" min="0"></div>
    <div class="fgi"><label>Statut</label><select id="in-pa"><option value="0">En attente</option><option value="1" ${ev&&ev.paid?'selected':''}>Payée</option></select></div>
  </div>
  <div class="st">Lignes de prestation</div>
  <div style="font-size:.66rem;color:var(--mu);margin-bottom:5px">Description · Qté · Prix unitaire HT (€)</div>
  <div id="ilw">${lines.map((l,i)=>iLH(i,l.d,l.q,l.u)).join('')}</div>
  <button class="btn bg" style="font-size:.74rem;margin-top:5px" onclick="addIL()">+ Ligne</button>
  <div class="fgi" style="margin-top:12px"><label>Notes</label><textarea id="in-no" rows="2">${ev&&ev.notes||''}</textarea></div>`;
  document.getElementById('mfoot').innerHTML=`
  <button class="btn bg" onclick="closeMo()">Annuler</button>
  <button class="btn bg" onclick="saveInv(true)">🖨️ Enreg. & Imprimer</button>
  <button class="btn bp" onclick="saveInv(false)">💾 Enregistrer</button>`;
  showMo();
}

function iLH(i,d,q,u){
  return `<div id="il-${i}" style="display:grid;grid-template-columns:1fr 50px 90px 26px;gap:5px;margin-bottom:5px;align-items:center">
  <input id="id-${i}" value="${escH(d||'')}" placeholder="Description" style="background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px 9px;font-size:.78rem;outline:none;width:100%">
  <input id="iq-${i}" type="number" value="${q||1}" min="1" style="background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px;font-size:.78rem;outline:none;text-align:center;width:100%">
  <input id="iu-${i}" type="number" value="${u||0}" min="0" style="background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px;font-size:.78rem;outline:none;text-align:right;width:100%">
  <button onclick="document.getElementById('il-${i}').remove()" style="background:none;border:none;color:var(--er);cursor:pointer;font-size:1rem;padding:0">✕</button>
  </div>`;
}

function addIL(){
  const n=window._iLines||0;window._iLines=n+1;
  const w=document.getElementById('ilw');if(!w)return;
  const d=document.createElement('div');d.innerHTML=iLH(n,'',1,0);
  w.appendChild(d.firstElementChild);
}

function collectLines(){
  const ls=[];
  for(let i=0;i<50;i++){
    const dd=document.getElementById('id-'+i);
    const qq=document.getElementById('iq-'+i);
    const uu=document.getElementById('iu-'+i);
    if(dd&&dd.closest('#ilw')&&dd.value.trim())ls.push({desc:dd.value.trim(),qty:parseInt(qq&&qq.value)||1,unit:parseFloat(uu&&uu.value)||0});
  }
  return ls;
}

function saveInv(print){
  const lines=collectLines();
  const p=S.profile;
  const ht=lines.reduce((s,l)=>s+l.qty*l.unit,0);
  const tvr=p.tvaActive?0.20:0;
  const tva=ht*tvr;
  const ttc=ht+tva;
  const ac=parseFloat(document.getElementById('in-ac')&&document.getElementById('in-ac').value)||0;
  const ev=window._iEvId?S.events.find(e=>e.id===window._iEvId):null;
  const inv={id:'inv'+uid(),number:document.getElementById('in-num').value||'',date:document.getElementById('in-date').value||new Date().toISOString().split('T')[0],clientName:document.getElementById('in-cl').value||'',clientAddress:document.getElementById('in-ad').value||'',eventName:ev&&ev.name||'',evId:window._iEvId,lines,ht,tva,tvaRate:tvr,ttc,acompte:ac,solde:ttc-ac,totalTTC:ttc,notes:document.getElementById('in-no')&&document.getElementById('in-no').value||'',paid:document.getElementById('in-pa')&&document.getElementById('in-pa').value==='1'};
  S.invoices.push(inv);
  S.profile.invoiceCounter=(S.profile.invoiceCounter||1)+1;
  save();closeMo();
  if(print)printInv(inv.id);
  else{go('billing')}
}

  document.getElementById('mbody').innerHTML=`
  <div style="background:var(--s2);border:1px solid var(--bd);padding:16px">

    ${inv.acompte>0?`<div style="font-size:.76rem;color:var(--mu);margin-top:7px">Acompte : -${inv.acompte.toLocaleString('fr-FR')}€</div><div style="font-weight:700;margin-top:3px">Solde : ${inv.solde.toLocaleString('fr-FR')}€</div>`:''}

function mailInv(id){
  const inv=S.invoices.find(i=>i.id===id);
  const p=S.profile;
  const subj=encodeURIComponent('Facture '+inv.number+(p.name?' — '+p.name:''));
  const body=encodeURIComponent('Bonjour,\n\nVeuillez trouver la facture '+inv.number+" d'un montant de "+inv.totalTTC.toLocaleString('fr-FR')+'€.\n\n'+(p.paymentConditions||'')+'\n\nCordialement,\n'+(p.name||''));
  window.open('mailto:?subject='+subj+'&body='+body);
}

  var p = S.profile;

    + '<textarea id="sfa-body" rows="10" style="width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:10px;font-size:.8rem;box-sizing:border-box;resize:vertical">' + escH(body) + '</textarea>'

  const avg=revs.length?(revs.reduce((s,r)=>s+r.rating,0)/revs.length).toFixed(1):null;
  const stars=n=>('★'.repeat(Math.round(n))+'☆'.repeat(5-Math.round(n)));
  return `<div class="ph"><div class="pt">Avis clients ⭐</div>
  <div style="display:flex;gap:8px">
    <button class="btn bg" onclick="openExtLinks()">🔗 Plateformes</button>
    <button class="btn bg" onclick="genShowcase()">🌐 Vitrine</button>
  </div></div>
  <div class="cnt">
  ${avg?`<div class="card" style="display:flex;align-items:center;gap:20px;margin-bottom:18px">
    <div style="text-align:center">
      <div style="font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800;color:var(--ac)">${avg}</div>
      <div style="color:var(--ac);font-size:1.1rem">${stars(parseFloat(avg))}</div>
      <div style="font-size:.68rem;color:var(--mu);margin-top:2px">${revs.length} avis</div>
    </div>
    <div style="flex:1">${[5,4,3,2,1].map(n=>{const c=revs.filter(r=>r.rating===n).length;const pct=revs.length?Math.round(c/revs.length*100):0;return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px"><div style="font-size:.7rem;color:var(--mu);width:14px">${n}</div><div style="flex:1;height:7px;background:var(--s3)"><div style="height:100%;background:var(--ac);width:${pct}%"></div></div><div style="font-size:.7rem;color:var(--mu);width:20px">${c}</div></div>`}).join('')}</div>
  </div>`:''}
  <div class="st">Tous les avis</div>
  ${revs.length===0?'<div class="empty"><div class="ei">⭐</div><div class="et">Aucun avis — envoie le lien depuis un événement</div></div>':
  revs.slice().reverse().map(r=>`<div class="card" style="margin-bottom:8px;${r.highlight?'border-color:var(--ac)':''}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
      <div>
        <span style="color:var(--ac)">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
        <span style="font-size:.72rem;color:var(--mu);margin-left:8px">${r.clientName} · ${r.eventName}</span>
      </div>
      <div style="display:flex;gap:5px;flex-shrink:0">
        <button class="btn bg" style="font-size:.65rem;padding:3px 7px;color:${r.highlight?'var(--ac)':'var(--mu)'}" onclick="togHL('${r.id}')">${r.highlight?'✨ Vedette':'☆ Mettre en avant'}</button>
        <button class="btn bd2" style="font-size:.65rem;padding:3px 7px" onclick="delRev('${r.id}')">✕</button>
      </div>
    </div>
    ${r.comment?`<div style="font-size:.8rem;color:var(--mu);line-height:1.6;font-style:italic">"${r.comment}"</div>`:''}
  </div>`).join('')}
  </div>`;
}

function togHL(id){const r=S.reviews.find(x=>x.id===id);if(r){r.highlight=!r.highlight;save();render()}}
function delRev(id){if(!confirm('Supprimer cet avis ?'))return;S.reviews=S.reviews.filter(r=>r.id!==id);save();render()}

    <div id="rv-url" style="flex:1;font-size:.72rem;color:var(--ac3);word-break:break-all">${url}</div>

function checkReviewMode(){
  const p=new URLSearchParams(window.location.search);
  const token=p.get('review');if(!token)return false;
  const ev=S.events.find(e=>e.reviewToken===token);
  document.querySelector('.sidebar').style.display='none';
  if(!ev){document.getElementById('main').innerHTML='<div style="text-align:center;padding:80px 20px"><div style="font-size:3rem;margin-bottom:12px">😕</div><div style="font-family:Syne,sans-serif;font-size:1.1rem;font-weight:800">Lien invalide</div></div>';return true}
  renderRevForm(ev);return true;
}

function hvStar(n){for(let i=1;i<=5;i++)document.getElementById('rvs-'+i).className='star'+(i<=n?' on':'');const lbls=['','Décevant 😕','Passable 😐','Bien 🙂','Super 😊','Exceptionnel 🤩'];const el=document.getElementById('rv-lbl');if(el)el.textContent=lbls[n]||''}
function outStar(){const r=window._rvRating||0;for(let i=1;i<=5;i++)document.getElementById('rvs-'+i).className='star'+(i<=r?' on':'');const el=document.getElementById('rv-lbl');if(el)el.textContent=''}
function setStar(n){window._rvRating=n;hvStar(n)}

async function submitRev(evId){
  const rating=window._rvRating||0;
  if(!rating){alert('Merci de choisir une note !');return}
  const ev=S.events.find(e=>e.id==evId);
  const comment=document.getElementById('rv-comment').value.trim();
  const name=document.getElementById('rv-name').value.trim()||ev.client.split(' ')[0];
  const rev={id:'rv'+uid(),evId,eventName:ev.name,clientName:name,rating,comment,date:new Date().toISOString(),highlight:rating>=4};
  S.reviews.push(rev);
  window._lastRevComment=comment;
  save();
  if(comment){try{await navigator.clipboard.writeText(comment)}catch(e){}}

  const linkBtns=S.externalLinks.map(l=>`<a href="${l.url}" target="_blank" style="display:flex;align-items:center;justify-content:space-between;background:var(--s2);border:1px solid var(--bd);padding:11px 14px;color:var(--tx);text-decoration:none;margin-bottom:7px" onmouseover="this.style.borderColor='var(--ac)'" onmouseout="this.style.borderColor='var(--bd)'"><span style="font-weight:600;font-size:.84rem">${l.emoji} ${l.label}</span><span style="font-size:.7rem;color:var(--ac)">Coller mon avis ↗</span></a>`).join('');

  document.getElementById('main').innerHTML=`<div style="max-width:520px;margin:60px auto;padding:20px">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:3.5rem;margin-bottom:10px">${rating>=4?'🎉':'🙏'}</div>
      <div style="font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--ok)">Merci pour votre avis !</div>
      <div style="font-size:.82rem;color:var(--mu);margin-top:6px">Votre retour a bien été enregistré.</div>
    </div>
    ${comment&&S.externalLinks.length?`<div style="background:var(--s);border:1px solid var(--ac);padding:20px;margin-bottom:14px">
      <div style="font-size:.66rem;font-weight:700;color:var(--ac);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px">⚡ Partagez en 30 secondes</div>
      <div style="font-size:.8rem;color:var(--mu);margin-bottom:12px;line-height:1.6">Votre commentaire a été <strong style="color:var(--ok)">copié automatiquement</strong>. Cliquez sur une plateforme et collez-le !</div>
      <div style="background:var(--s2);border:1px solid var(--bd);padding:10px;margin-bottom:12px;font-size:.78rem;color:var(--tx);font-style:italic;line-height:1.6;position:relative">
        <span id="rv-ct"></span>
        <button id="rv-cpbtn" onclick="recopyRev()" style="position:absolute;top:6px;right:6px;background:var(--s3);border:1px solid var(--bd);color:var(--mu);cursor:pointer;font-size:.62rem;padding:2px 7px">📋 Recopier</button>
      </div>
      ${linkBtns}
    </div>`:''}
    <div style="text-align:center;font-size:.68rem;color:var(--mu)">Vous pouvez fermer cette page.</div>
  </div>`;
  const ct=document.getElementById('rv-ct');
  if(ct)ct.textContent='"'+comment+'"';
}

function recopyRev(){
  const c=window._lastRevComment||'';
  navigator.clipboard.writeText(c).then(()=>{const b=document.getElementById('rv-cpbtn');if(b){b.textContent='✅ Copié!';setTimeout(()=>b.textContent='📋 Recopier',2000)}}).catch(()=>{});
}

function elRow(i,label,emoji,url){
  return `<div id="elr-${i}" style="display:grid;grid-template-columns:36px 120px 1fr 28px;gap:6px;margin-bottom:6px;align-items:center">

function addElRow(){const n=window._elCount||0;window._elCount=n+1;const w=document.getElementById('elw');if(!w)return;const d=document.createElement('div');d.innerHTML=elRow(n,'','🔗','');w.appendChild(d.firstElementChild)}

function saveExtLinks(){
  const links=[];
  for(let i=0;i<50;i++){
    const le=document.getElementById('ele-'+i);
    const ll=document.getElementById('ell-'+i);
    const lu=document.getElementById('elu-'+i);

}

async function sendPasswordReset(){
  var email = currentUser ? currentUser.email : '';
  if(!email) return;
  var btn = document.querySelector('#tab-content .bp');
  if(btn){btn.disabled=true;btn.textContent='⏳ Envoi...';}
  try{
    var r = await fetch(SB_URL+'/auth/v1/recover',{
      method:'POST',
      headers:{'apikey':SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email:email})
    });
    var msg = document.getElementById('pwd-msg');
    if(r.ok){
      if(msg){msg.style.color='var(--ok)';msg.textContent='✅ Email envoyé à '+email;}
    } else {
      if(msg){msg.style.color='var(--er)';msg.textContent='Erreur lors de l\'envoi';}
    }
  }catch(e){
    var msg=document.getElementById('pwd-msg');
    if(msg){msg.style.color='var(--er)';msg.textContent='Erreur réseau';}
  }
  if(btn){btn.disabled=false;btn.textContent='📧 Envoyer le lien de réinitialisation';}
}

    phone:             (document.getElementById('pp-ph')||{}).value||'',
    email:             (document.getElementById('pp-em')||{}).value||'',
    website:           (document.getElementById('pp-w')||{}).value||'',
    tvaActive:         document.getElementById('pp-tv').value==='1',
    tvaNumber:         (document.getElementById('pp-tvn')||{}).value||'',
    bankName:          (document.getElementById('pp-bk')||{}).value||'',
    iban:              (document.getElementById('pp-ib')||{}).value||'',
    bic:               (document.getElementById('pp-bi')||{}).value||'',
    departureAddress:  (document.getElementById('pp-dep')||{}).value||'',
    depSameAsProfile:  !!(document.getElementById('pp-dep-same')||{}).checked,
    kmRate:            parseFloat((document.getElementById('pp-km')||{}).value)||0.40,
    safetyMargin:      parseInt((document.getElementById('pp-margin')||{}).value)||30,
    hereApiKey:        (document.getElementById('pp-here')||{}).value||'',
    invoicePrefix:     (document.getElementById('pp-px')||{}).value||'FAC',
    invoiceCounter:    parseInt((document.getElementById('pp-ct')||{}).value)||1,
    paymentConditions: (document.getElementById('pp-pc')||{}).value||'',
    legalMention:      (document.getElementById('pp-ml')||{}).value||'',
    logo:              window._pl !== undefined ? window._pl : S.profile.logo
  });
  window._pl = undefined;
  // Save options fields (IDs can be opt- or pp- depending on context)
  var marginEl = document.getElementById('pp-margin')||document.getElementById('opt-margin');
  var margin = marginEl ? parseInt(marginEl.value) : NaN;
  var paytermsEl = document.getElementById('pp-payterms')||document.getElementById('opt-payterms');
  var payterms = paytermsEl ? paytermsEl.value||'' : '';
  var acpEl = document.getElementById('pp-acp')||document.getElementById('opt-acp');
  var acp = acpEl ? parseInt(acpEl.value) : NaN;
  if(!isNaN(margin)) S.profile.safetyMargin = margin;
  S.profile.defaultPaymentTerms = payterms;
  if(!isNaN(acp)) S.profile.defaultAcomptePct = acp;
  save();
  var btn = document.querySelector('[onclick="saveProfileTabFull()"]');
  if(btn){
    btn.textContent='✅ Enregistré !';
    btn.style.background='var(--ok)';
    setTimeout(function(){btn.textContent='💾 Enregistrer';btn.style.background='';},2000);
  }
}

function renderSvc(){
  var svcs = S.serviceTypes||[];
  var evTypeLabels = {mariage:'💍 Mariage',corpo:'🏢 Corpo',club:'🎧 Club',private:'🎉 Private',all:'Tous'};

  // Group by evTypes
  var groups = {};
  svcs.forEach(function(s){
    var types = (s.evTypes&&s.evTypes.length) ? s.evTypes : ['all'];
    types.forEach(function(t){
      if(!groups[t]) groups[t]=[];
      if(groups[t].indexOf(s)===-1) groups[t].push(s);
    });
  });

  var html = '<div style="margin-top:4px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
    +'<div style="font-size:.62rem;font-weight:700;color:var(--mu);letter-spacing:2px;text-transform:uppercase">'+svcs.length+' prestation(s)</div>'
    +'<button class="btn bp" style="font-size:.74rem" onclick="openAddSvc()">+ Ajouter</button>'
    +'</div>';

  // Show by event type
  var order = ['mariage','club','corpo','private','all'];
  order.forEach(function(t){
    if(!groups[t]||!groups[t].length) return;
    html += '<div style="font-size:.62rem;font-weight:700;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin:10px 0 5px">'+(evTypeLabels[t]||t)+'</div>';
    groups[t].forEach(function(s){
      html += '<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--s2);border:1px solid var(--bd);border-left:3px solid '+s.color+';margin-bottom:5px">'
        +'<span style="font-size:1.1rem">'+escH(s.emoji||'🎵')+'</span>'
        +'<div style="flex:1"><div style="font-weight:600;font-size:.84rem">'+escH(s.name||'')+'</div>'
        +'<div style="font-size:.7rem;color:var(--mu)">'+escH(s.desc||'')+(s.price?' · +'+s.price+'€':'')+'</div></div>'
        +'<span style="font-size:.68rem;color:var(--mu);margin-right:6px">'+( s.svcType==='option'?'✨ Option':'🎵 Prestation')+'</span>'
        +'<button class="btn bd2" style="font-size:.66rem;padding:3px 7px" onclick="delSvc(\''+s.id+'\')">✕</button>'
        +'</div>';
    });
  });

  if(!svcs.length) html += '<div style="font-size:.8rem;color:var(--mu);padding:12px 0">Aucune prestation configurée.</div>';
  html += '</div>';
  return html;
}

function exportData(){
  var data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    events:       S.events,
    gear:         S.gear,
    serviceTypes: S.serviceTypes,
    invoices:     S.invoices,
    contracts:    S.contracts,
    reviews:      S.reviews,
    globalLinks:  S.globalLinks,
    externalLinks:S.externalLinks,
    profile:      S.profile
  };
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], {type:'application/json'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  var date = new Date().toISOString().slice(0,10);
  a.href     = url;
  a.download = 'gigplanner-sauvegarde-' + date + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(input){
  var file = input.files[0];
  if(!file) return;
  var status = document.getElementById('import-status');
  if(status) status.innerHTML = '<span style="color:var(--mu)">Lecture en cours...</span>';

  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var data = JSON.parse(e.target.result);
      // Validate it's a GigPlanner file
      if(!data.events && !data.gear){
        throw new Error('Fichier non reconnu');
      }
      if(!confirm('Importer ces données ?\n\n'
        + (data.events||[]).length + ' événement(s)\n'
        + (data.gear||[]).length + ' matériel(s)\n'
        + (data.serviceTypes||[]).length + ' prestation(s)\n'
        + (data.invoices||[]).length + ' facture(s)\n\n'
        + '⚠️ Tes données actuelles seront remplacées.'
      )) return;

      // Restore all fields
      if(data.events)        S.events        = data.events;
      if(data.gear)          S.gear          = data.gear;
      if(data.serviceTypes)  S.serviceTypes  = data.serviceTypes;
      if(data.invoices)      S.invoices      = data.invoices;
      if(data.contracts)     S.contracts     = data.contracts;
      if(data.reviews)       S.reviews       = data.reviews;
      if(data.globalLinks)   S.globalLinks   = data.globalLinks;
      if(data.externalLinks) S.externalLinks = data.externalLinks;
      if(data.profile)       S.profile       = Object.assign({}, S.profile, data.profile);

      save();
      render();
      // Go back to settings > data tab
      setTimeout(function(){
        switchTab('data');
        var el = document.getElementById('import-status');
        if(el) el.innerHTML = '<span style="color:var(--ok)">✅ Importé avec succès !</span>';
      }, 100);

    } catch(err) {
      if(status) status.innerHTML = '<span style="color:var(--er)">❌ Erreur : ' + escH(err.message) + '</span>';
    }
  };
  reader.readAsText(file);
}

function initSigCanvas(canvas) {
  const ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  let drawing = false, lx = 0, ly = 0;

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) * (canvas.width / r.width), y: (src.clientY - r.top) * (canvas.height / r.height) };
  }

  function start(e) { e.preventDefault(); drawing = true; const p = getPos(e); lx = p.x; ly = p.y; }
  function move(e) {
    e.preventDefault();
    if (!drawing) return;
    const p = getPos(e);
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(p.x, p.y); ctx.stroke();
    lx = p.x; ly = p.y;
  }
  function stop(e) { e.preventDefault(); drawing = false; }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', stop);
  canvas.addEventListener('mouseleave', stop);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', stop, { passive: false });
}

function clearSig(cid) {
  const canvas = document.getElementById(cid);
  if (!canvas) return;
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

function isCanvasBlank(canvas) {
  return !canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data.some(ch => ch !== 0);
}

function saveSig(contractId, party) {
  const cid = party === 'dj' ? 'sig-dj' : 'sig-cl';
  const canvas = document.getElementById(cid);
  if (!canvas || isCanvasBlank(canvas)) { alert('Merci de signer avant de valider'); return; }
  const c = S.contracts.find(x => x.id === contractId);
  if (!c) return;
  const dataUrl = canvas.toDataURL('image/png');
  if (party === 'dj') { c.djSig = dataUrl; c.djSigDate = new Date().toISOString(); }
  else { c.clientSig = dataUrl; c.clientSigDate = new Date().toISOString(); }
  save();
  openContract(contractId);
}

  S.contracts = S.contracts.filter(c => c.id !== id);

function genOTP(contractId) {
  const c = S.contracts.find(x => x.id === contractId);
  if (!c) return;
  c.otpCode = String(Math.floor(100000 + Math.random() * 900000));
  c.otpCreated = new Date().toISOString();
  c.otpUsed = false;
  save();
  sendContractLink(contractId);
}

function cpOTP(contractId) {
  const c = S.contracts.find(x => x.id === contractId);
  if (!c || !c.otpCode) return;
  navigator.clipboard.writeText(c.otpCode)
    .then(() => { const b = event.target; b.textContent = '✅'; setTimeout(() => { b.textContent = '📲 Copier le code seul'; }, 1500); })
    .catch(() => prompt('Code OTP :', c.otpCode));
}

function sendByMailto(contractId, method) {
  const c = S.contracts.find(x => x.id === contractId);
  if (!c) return;
  const p = S.profile;
  const baseUrl = window.location.href.split('?')[0];
  const url = baseUrl + '?contract=' + c.clientToken + (method === 'otp' ? '&otp=1' : '');
  let body = 'Bonjour ' + (c.clientName || '') + ',\n\n';
  body += 'Merci de lire attentivement le contrat suivant, puis de le signer :\n' + url + '\n\n';
  if (method === 'otp' && c.otpCode) {
    body += '─────────────────────────\n';
    body += 'Votre code de vérification : ' + c.otpCode + '\n';
    body += '(à saisir sur la page avant de pouvoir signer)\n';
    body += '─────────────────────────\n\n';
  }
  body += 'Cordialement,\n' + (p.name || 'Votre DJ');
  const subject = encodeURIComponent('Contrat à signer — ' + c.title + (p.name ? ' · ' + p.name : ''));
  window.open('mailto:?subject=' + subject + '&body=' + encodeURIComponent(body));
}

function sendBySMS(contractId, method) {
  const c = S.contracts.find(x => x.id === contractId);
  if (!c) return;
  const baseUrl = window.location.href.split('?')[0];
  const url = baseUrl + '?contract=' + c.clientToken;
  let txt = 'Bonjour, voici votre contrat à signer : ' + url;
  if (method === 'otp' && c.otpCode) txt += ' — Code : ' + c.otpCode;
  navigator.clipboard.writeText(txt)
    .then(() => alert('Texte SMS copié !\n\nColle-le dans ton appli SMS.'))
    .catch(() => prompt('Texte SMS :', txt));
}

function launchYouSign(contractId) {
  const c = S.contracts.find(x => x.id === contractId);
  const p = S.profile;
  if (!p.yousignApiKey) { alert('Clé API YouSign manquante'); return; }
  if (!c.htmlContent && !c.pdfData) { alert('Contrat sans contenu'); return; }
  const env = p.yousignSandbox !== false ? 'sandbox' : 'production';
  alert(
    'YouSign — ' + env + '\n\n'
    + 'Dans une version avec serveur, le contrat serait envoyé à l\'API YouSign pour signature certifiée eIDAS.\n\n'
    + 'Clé : ' + p.yousignApiKey.slice(0, 8) + '...\n'
    + 'Destinataire : ' + (c.clientName || '(non renseigné)') + '\n\n'
    + 'Intégration complète disponible avec un backend Node.js/PHP.'
  );
}

function checkContractMode() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('contract');
  if (!token) return false;
  const c = S.contracts.find(x => x.clientToken === token);
  document.querySelector('.sidebar').style.display = 'none';
  if (!c) {
    document.getElementById('main').innerHTML =
      '<div style="text-align:center;padding:80px 20px">'
      + '<div style="font-size:3rem;margin-bottom:12px">😕</div>'
      + '<div style="font-family:Syne,sans-serif;font-size:1.1rem;font-weight:800">Lien invalide ou expiré</div>'
      + '</div>';
    return true;
  }
  const needsOTP = params.get('otp') === '1';
  if (needsOTP && !window._otpPassed && !c.clientSig) {
    renderOTPGate(c);

    renderContractClientView(c);

}

function verifyOTP(contractId) {
  const c = S.contracts.find(x => x.id === contractId);
  const inp = document.getElementById('otp-input');
  const errEl = document.getElementById('otp-error');
  if (!c || !inp) return;
  const entered = inp.value.trim();
  if (!c.otpCode) { if (errEl) errEl.textContent = 'Erreur : aucun code configuré par le DJ'; return; }
  if (entered !== c.otpCode) {
    if (errEl) errEl.textContent = '❌ Code incorrect — vérifiez le SMS ou email reçu';
    inp.style.borderColor = 'var(--er)';
    setTimeout(function() { inp.style.borderColor = 'var(--bd)'; }, 2000);
    return;
  }
  window._otpPassed = true;
  renderContractClientView(c);
}

function submitClientContractSig(contractId, method) {
  var canvas = document.getElementById('ct-sig-canvas');
  if (!canvas || isCanvasBlank(canvas)) { alert('Merci de tracer votre signature avant de valider'); return; }
  var c = S.contracts.find(x => x.id === contractId);
  if (!c) return;
  c.clientSig = canvas.toDataURL('image/png');
  c.clientSigDate = new Date().toISOString();
  c.sigMethod = method || 'draw';
  c.sigUserAgent = navigator.userAgent.substring(0, 120);
  c.sigTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
  if (method === 'otp') c.otpUsed = true;
  save();
  document.getElementById('main').innerHTML =
    '<div style="text-align:center;padding:80px 20px">'
    + '<div style="font-size:4rem;margin-bottom:14px">🎉</div>'
    + '<div style="font-family:\'Syne\',sans-serif;font-size:1.3rem;font-weight:800;color:var(--ok)">Contrat signé !</div>'
    + '<div style="font-size:.84rem;color:var(--mu);margin-top:8px;line-height:1.7">Votre signature a bien été enregistrée.</div>'
    + '<div style="font-size:.7rem;color:var(--mu);margin-top:5px">' + new Date().toLocaleDateString('fr-FR') + ' à ' + new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}) + '</div>'
    + (method === 'otp' ? '<div style="margin-top:12px"><span style="background:rgba(232,255,60,.15);color:var(--ac);font-size:.72rem;padding:3px 10px;border:1px solid var(--ac)">🔐 Signature vérifiée par OTP</span></div>' : '')
    + '<div style="font-size:.68rem;color:var(--mu);margin-top:18px">Vous pouvez fermer cette page.</div>'

}

function dlDocx(type) {
  // Generate a minimal .docx template as plain text download
  // Builds a simple text-based template with [CHAMPS] placeholders
  const t = CT[type];
  if(!t) return;
  const p = S.profile || {};
  const fields = {
    '[NOM_DJ]': p.name || 'Votre Nom',
    '[SIRET]': p.siret || 'XX XXX XXX XXXXX',
    '[ADRESSE_DJ]': p.address || 'Votre adresse',
    '[TEL_DJ]': p.phone || 'XX XX XX XX XX',
    '[EMAIL_DJ]': p.email || 'votre@email.com',
    '[NOM_CLIENT]': '[NOM CLIENT]',
    '[ADRESSE_CLIENT]': '[ADRESSE CLIENT]',
    '[DATE_PRESTATION]': '[DATE]',
    '[LIEU_PRESTATION]': '[LIEU]',
    '[MONTANT_HT]': '[MONTANT HT]',
    '[MONTANT_TTC]': '[MONTANT TTC]',
    '[ACOMPTE]': '[ACOMPTE]',
    '[DATE_SIGNATURE]': new Date().toLocaleDateString('fr-FR'),
  };
  // CT clauses expect (profile, ev, cd) — pass profile + empty objects for template
  var clauseLines = t.clauses ? t.clauses(S.profile||{}, {
    client:'[NOM CLIENT]', date:'[DATE]', venue:'[LIEU]',
    start:'[HEURE DÉBUT]', end:'[HEURE FIN]', amount:'[MONTANT]',
    acompteAmount:'[ACOMPTE]'
  }, {name:'[NOM CLIENT]'}) : [];
  var content = Array.isArray(clauseLines) ? clauseLines.join('\n\n') : String(clauseLines);
  var header = t.label.toUpperCase() + '\n' + '═'.repeat(50) + '\n\n';
  var footer = '\n\n' + '─'.repeat(50) + '\nFait le ' + fields['[DATE_SIGNATURE]'] + '\n\nSignature DJ :\n\nSignature Client :\n';
  var full = header + content + footer;
  var blob = new Blob([full], {type:'text/plain;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'template-' + type + '.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

function getRelancesAlerts() {
  const now = new Date(); now.setHours(0,0,0,0);
  const alerts = [];

  S.events.forEach(ev => {
    if (ev.status === 'cancelled') return;
    const evDate = new Date(ev.date + 'T00:00:00');
    const daysToEvent = Math.ceil((evDate - now) / 86400000);
    const total  = ev.amount || 0;
    const noAcompte = ev.acompteStatus === 'none' || (ev.acomptePct === 0 && !ev.acompteAmount);
    const pct    = noAcompte ? 0 : (ev.acomptePct || 30);
    const ac     = noAcompte ? 0 : (ev.acompteAmount || Math.round(total * pct / 100));
    const solde  = noAcompte ? total : (total - ac);
    const as     = noAcompte ? 'none' : (ev.acompteStatus || 'pending');
    const ss     = ev.soldeStatus || 'pending';

    // Acompte en attente après signature
    if (!noAcompte && as !== 'received' && ev.signDate) {
      const signed = new Date(ev.signDate + 'T00:00:00');
      const daysSigned = Math.ceil((now - signed) / 86400000);
      if (daysSigned >= 3) {
        const urgent = daysSigned >= 7;
        alerts.push({
          evId: ev.id, evName: ev.name, evDate: ev.date,
          type: 'acompte', amount: ac,
          msg: 'Acompte ' + ac.toLocaleString('fr-FR') + '€ — ' + (urgent ? '🔴 ' + daysSigned + 'j sans paiement' : '⚠️ J+' + daysSigned + ' depuis signature'),
          urgent, daysToEvent,
          mailSubject: 'Acompte contrat ' + ev.name,
          mailBody: 'Bonjour,\n\nJe vous contacte concernant le contrat pour ' + ev.name + ' prévu le ' + new Date(ev.date+'T00:00:00').toLocaleDateString('fr-FR') + '.\n\nSauf erreur de ma part, l\'acompte de ' + ac.toLocaleString('fr-FR') + '€ (' + pct + '% du montant total) reste en attente.\n\nMerci de régulariser dès que possible.\n\nCordialement,\n' + (S.profile.name||'Votre DJ')
        });
      }
    }

    // Solde en attente — seuil d'alerte adapté au délai de paiement
    if (ss !== 'received' && (noAcompte || as === 'received') && daysToEvent > 0 && daysToEvent <= 7) {
      // Si paiement sous 30j après prestation : pas d'alerte avant la prestation
      const payTerms = ev.paymentTerms || S.profile.defaultPaymentTerms || '';
      const isPostEvent = payTerms === 'j30' || payTerms === 'j15';
      if (!isPostEvent) {
        const urgent = daysToEvent <= 3;
        alerts.push({
          evId: ev.id, evName: ev.name, evDate: ev.date,
          type: 'solde', amount: solde,
          msg: (noAcompte ? 'Paiement ' : 'Solde ') + solde.toLocaleString('fr-FR') + '€ — ' + (urgent ? '🔴 J-' + daysToEvent + ' !' : '⚠️ J-' + daysToEvent),
          urgent, daysToEvent,
          mailSubject: 'Règlement ' + ev.name,
          mailBody: 'Bonjour,\n\nLa prestation pour ' + ev.name + ' approche (le ' + new Date(ev.date+'T00:00:00').toLocaleDateString('fr-FR') + ').\n\nJe vous rappelle que le ' + (noAcompte ? 'paiement' : 'solde') + ' de ' + solde.toLocaleString('fr-FR') + '€ est à régler avant la prestation.\n\nMerci,\n' + (S.profile.name||'Votre DJ')
        });
      }
    }

    // Paiement impayé après la prestation
    if (ss !== 'received' && daysToEvent < 0 && total > 0) {
      const daysLate = Math.abs(daysToEvent);
      const payTerms = ev.paymentTerms || S.profile.defaultPaymentTerms || '';
      const graceDays = payTerms === 'j30' ? 30 : payTerms === 'j15' ? 15 : 0;
      // Ne pas alerter avant la fin du délai de grâce
      if (daysLate > graceDays) {
        const daysOverdue = daysLate - graceDays;
        alerts.push({
          evId: ev.id, evName: ev.name, evDate: ev.date,
          type: 'solde_late', amount: solde,
          msg: '🔴 ' + (noAcompte ? 'Paiement' : 'Solde') + ' ' + solde.toLocaleString('fr-FR') + '€ — ' + (graceDays > 0 ? daysOverdue + 'j de retard (délai '+graceDays+'j dépassé)' : daysLate + 'j après la prestation'),
          urgent: true, daysToEvent,
          mailSubject: 'Règlement en attente — ' + ev.name,
          mailBody: 'Bonjour,\n\nMalgré la prestation réalisée pour ' + ev.name + ' le ' + new Date(ev.date+'T00:00:00').toLocaleDateString('fr-FR') + ', le ' + (noAcompte ? 'paiement' : 'solde') + ' de ' + solde.toLocaleString('fr-FR') + '€ n\'a pas été reçu.\n\nMerci de procéder au règlement dans les meilleurs délais.\n\nCordialement,\n' + (S.profile.name||'Votre DJ')
        });
      }
    }
  });

  alerts.sort((a,b) => (b.urgent?1:0)-(a.urgent?1:0) || a.daysToEvent-b.daysToEvent);
  return alerts;
}

// ===== TRAVEL CALCULATION (HERE Routing v8 + Nominatim geocoding) =====
// HERE Routing v8 : trajet réel, trafic temps réel, péages EUR
// Nominatim : géocodage gratuit sans clé
// Fallback : haversine ×1.35 si pas de clé HERE

async function calcTrajet() {
  const btn = document.querySelector('[onclick="calcTrajet()"]');
  const resEl = document.getElementById('trajet-result');
  if (!resEl) return;

  const depInp = document.getElementById('edep');
  const departureAddr = (depInp && depInp.value.trim()) || S.profile.departureAddress || '';
  if (!departureAddr) {
    resEl.innerHTML = '<span style="color:var(--er)">⚠️ Configure ton adresse Domicile / Dépôt dans le Profil</span>';
    return;
  }
  const venue = document.getElementById('ev2') ? document.getElementById('ev2').value.trim() : '';
  const addr  = document.getElementById('ea')  ? document.getElementById('ea').value.trim()  : '';
  const arrivalAddr = [venue, addr].filter(Boolean).join(', ');
  if (!arrivalAddr) {
    resEl.innerHTML = '<span style="color:var(--er)">⚠️ Remplis le lieu et l\'adresse de la prestation d\'abord</span>';
    return;
  }

  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
  resEl.innerHTML = '⏳ Géolocalisation…';

  try {
    // Geocode both addresses via Nominatim (no key needed)
    const [dep, arr] = await Promise.all([
      geocodeNominatim(departureAddr),
      geocodeNominatim(arrivalAddr)
    ]);
    if (!dep) throw new Error('Adresse de départ introuvable. Essaie une adresse plus précise (ex: "12 rue de la Paix, Lyon")');
    if (!arr) throw new Error('Adresse d\'arrivée introuvable. Essaie "Lieu, Ville" ou l\'adresse complète');

    const hereKey = S.profile.hereApiKey || '';
    const rate    = S.profile.kmRate !== undefined ? parseFloat(S.profile.kmRate) : 0.40;

    let km, mins, tollCost = null, source;

    if (hereKey) {
      // ── HERE Routing v8 : route réelle + trafic + péages ──────────────────
      resEl.innerHTML = '⏳ Calcul HERE (trajet réel + péages)…';
      const hereUrl =
        'https://router.hereapi.com/v8/routes'
        + '?transportMode=car'
        + '&origin='      + dep.lat + ',' + dep.lon
        + '&destination=' + arr.lat + ',' + arr.lon
        + '&return=travelSummary,tolls'
        + '&currency=EUR'
        + '&tolls[summaries]=total'
        + '&departureTime=now'
        + '&apikey=' + encodeURIComponent(hereKey);

      const hRes = await fetch(hereUrl);
      if (!hRes.ok) {
        const errTxt = await hRes.text();
        throw new Error('HERE API erreur ' + hRes.status + ' — vérifiez la clé dans Profil');
      }
      const hData = await hRes.json();
      if (!hData.routes || !hData.routes.length) throw new Error('HERE : aucun itinéraire trouvé');

      const summary = hData.routes[0].sections[0].travelSummary;
      km      = Math.round(summary.length / 1000 * 10) / 10;
      mins    = Math.round(summary.duration / 60);

      // Péages HERE
      if (summary.tolls && summary.tolls.total && summary.tolls.total.value > 0) {
        tollCost = Math.round(summary.tolls.total.value * 100) / 100;
      } else {
        tollCost = 0;
      }
      source = 'HERE (trajet réel · trafic temps réel)';

    } else {
      // ── Fallback haversine ×1.35 ───────────────────────────────────────────
      resEl.innerHTML = '⏳ Estimation…';
      const crow = haversineKm(dep.lat, dep.lon, arr.lat, arr.lon);
      km   = Math.round(crow * 1.35 * 10) / 10;
      mins = Math.round(km / 55 * 60);
      source = 'estimation (configurez une clé HERE pour trajet réel + péages)';
    }

    const kmCost   = Math.round(km * rate * 100) / 100;
    const totalCost = tollCost !== null ? Math.round((kmCost + tollCost) * 100) / 100 : kmCost;

    // Update driveMin field
    const drInp = document.getElementById('edr');
    if (drInp) drInp.value = mins;

    // Store for saveEv
    window._calcDriveKm   = km;
    window._calcTollCost  = tollCost;
    window._calcTotalCost = totalCost;

    // Build result HTML
    let html = '<span style="color:var(--ok)">✅ </span>'
      + '<strong>' + km + ' km</strong>'
      + ' · <strong>' + mins + ' min</strong>';

    if (tollCost !== null) {
      html += ' · km : <strong style="color:var(--ac2)">' + kmCost.toFixed(2) + '€</strong>';
      if (tollCost > 0) {
        html += ' · péages : <strong style="color:var(--er)">' + tollCost.toFixed(2) + '€</strong>';
        html += ' · total : <strong style="color:var(--ac)">' + totalCost.toFixed(2) + '€</strong>';
      } else {
        html += ' · <span style="color:var(--ok)">sans péages</span>';
        html += ' · total : <strong style="color:var(--ac2)">' + kmCost.toFixed(2) + '€</strong>';
      }
    } else {
      html += ' · <strong style="color:var(--ac2)">' + kmCost.toFixed(2) + '€</strong>';
    }
    html += ' <span style="font-size:.62rem;color:var(--mu)"> · ' + source + ' · Trajet mis à jour</span>';
    resEl.innerHTML = html;

  } catch(e) {
    resEl.innerHTML = '<span style="color:var(--er)">❌ ' + e.message + '</span>';
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '📍 Calculer'; }
  }
}

async function geocodeNominatim(address) {
  try {
    // Try Nominatim first
    const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=3&countrycodes=fr&q='
      + encodeURIComponent(address);
    const res = await fetch(url, { headers: { 'Accept-Language': 'fr', 'User-Agent': 'GigPlanner/1.0' } });
    if (!res.ok) return null;
    const data = await res.json();
    if (!data.length) return null;
    return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), display: data[0].display_name };
  } catch(e) {
    // Network blocked or unavailable — try Photon API as fallback
    try {
      const url2 = 'https://photon.komoot.io/api/?q=' + encodeURIComponent(address) + '&lang=fr&limit=1';
      const res2 = await fetch(url2);
      if (!res2.ok) return null;
      const d2 = await res2.json();
      if (!d2.features||!d2.features.length) return null;
      const [lon,lat] = d2.features[0].geometry.coordinates;
      return { lat, lon, display: d2.features[0].properties.name||address };
    } catch(e2) { return null; }
  }
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2
    + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── Calcul trajet Hôtel → Club ─────────────────────
async function calcHotelClub(evId){
  var ev = S.events.find(function(e){return e.id==evId;});
  if(!ev) return;
  var cd = ev.clientData||{};
  var legs = cd.legs||[];
  var hotelLeg = legs.find(function(l){return l.type==='hotel';});
  if(!hotelLeg||!hotelLeg.from) return alert('Renseigne le nom de l\'hôtel d\'abord');
  if(!ev.address&&!ev.venue) return alert('Renseigne l\'adresse du club dans l\'event d\'abord');
  var btn = document.querySelector('[onclick="calcHotelClub(\''+evId+'\')"]');
  if(btn){btn.textContent='⏳';btn.disabled=true;}
  try {
    var dep = await geocodeNominatim(hotelLeg.from);
    var arr = await geocodeNominatim(ev.address||ev.venue);
    if(!dep||!arr) throw new Error('Adresse introuvable');
    var km = haversineKm(dep.lat,dep.lon,arr.lat,arr.lon)*1.3;
    var mins = Math.round(km/30*60); // urban speed
    ev.driveMinHotelClub = mins;
    save();
    if(btn){btn.textContent='✅ '+mins+' min — Recalculer';btn.disabled=false;}
    go('jourj');
  } catch(e) {
    if(btn){btn.textContent='📍 Calculer hôtel → club';btn.disabled=false;}
    alert('Erreur : '+e.message);
  }
}

// ── Calcul trajet Maison → Gare ─────────────────────
async function calcMaisonGare(evId){
  var ev = S.events.find(function(e){return e.id==evId;});
  if(!ev) return;
  var cd = ev.clientData||{};
  var legs = cd.legs||[];
  var trainLeg = legs.find(function(l){return l.type==='train'||l.type==='vol';});
  if(!trainLeg||!trainLeg.from) return alert('Renseigne la gare/aéroport de départ dans le leg train/vol');

  }
}

// ===== MODE JOUR J / MISSION =====
function pgJourJ() {
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const tomorrowStr = new Date(now.getTime()+86400000).toISOString().split('T')[0];
  const in7dStr = new Date(now.getTime()+604800000).toISOString().split('T')[0];

  const upcoming = S.events
    .filter(e => e.status !== 'cancelled' && e.date >= todayStr)
    .sort((a,b) => a.date.localeCompare(b.date) || (a.start||'').localeCompare(b.start||''));

  const ev = upcoming[0] || null;

  if (!ev) {
    return '<div style="max-width:480px;margin:60px auto;text-align:center;padding:20px">'
      + '<div style="font-size:4rem;margin-bottom:16px">😴</div>'
      + '<div style="font-family:\'Syne\',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:8px">Pas de mission imminente</div>'
      + '<div style="font-size:.86rem;color:var(--mu);margin-bottom:24px">Profite du calme !</div>'
      + '<button class="btn bp" onclick="openNewEv()">+ Créer une date</button>'
      + '</div>';
  }

  // ── Dispatch by event type ──
  if(ev.type === 'club')   return pgJourJClub(ev, upcoming, now, todayStr, tomorrowStr);
  if(ev.type === 'corpo')   return pgJourJCorpo(ev, upcoming, now, todayStr, tomorrowStr);
  if(ev.type === 'private') return pgJourJPrivate(ev, upcoming, now, todayStr, tomorrowStr);

  const t = ET[ev.type] || ET.mariage;
  const tl = getTL(ev);
  const isToday = ev.date === todayStr;
  const isTomorrow = ev.date === tomorrowStr;
  const days = Math.ceil((new Date(ev.date+'T00:00:00') - new Date(now.toISOString().split('T')[0]+'T00:00:00')) / 86400000);
  const dayLabel = isToday ? 'AUJOURD\'HUI' : isTomorrow ? 'DEMAIN' : fd(ev.date).toUpperCase();

  // Mission status indicator
  const checks = ev.checklist || [];
  const checksDone = checks.filter(c => c.d).length;
  const noAcompteJJ = ev.acompteStatus==='none' || (ev.acomptePct===0 && !ev.acompteAmount);
  const acompteOk = noAcompteJJ || ev.acompteStatus === 'received';
  const soldeOk = ev.soldeStatus === 'received';
  const payOk = acompteOk && soldeOk;
  const addrOk = !!(ev.address || ev.venue);
  const issueCount = (checks.length - checksDone) + (!payOk ? 1 : 0);
  let missionStatus, missionStatusColor, missionStatusBg;
  if (issueCount === 0) {
    missionStatus = '🟢 Mission prête'; missionStatusColor = 'var(--ok)'; missionStatusBg = 'rgba(68,255,136,.08)';
  } else if (issueCount <= 2) {
    missionStatus = '🟠 ' + issueCount + ' élément'+(issueCount>1?'s':'')+' à vérifier'; missionStatusColor = '#ffaa00'; missionStatusBg = 'rgba(255,170,0,.08)';
  } else {
    missionStatus = '🔴 ' + issueCount + ' points en attente'; missionStatusColor = 'var(--er)'; missionStatusBg = 'rgba(255,68,68,.08)';
  }

  // Countdown to departure
  let countdownHTML = '';
  if (isToday && tl.depart !== '—') {
    const [dh, dm] = tl.depart.split(':').map(Number);
    const nowMins = now.getHours() * 60 + now.getMinutes();
    const departMins = dh * 60 + dm;
    const diff = departMins - nowMins;
    if (diff > 0) {
      const h = Math.floor(diff / 60), m = diff % 60;
      const urgent = diff < 60, warning = diff < 120;
