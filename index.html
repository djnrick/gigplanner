<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22GigPlanner%22%2C%22short_name%22%3A%22GigPlanner%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a0a0f%22%2C%22theme_color%22%3A%22%230a0a0f%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Crect%20width%3D'100'%20height%3D'100'%20fill%3D'%230a0a0f'%2F%3E%3Ctext%20y%3D'55'%20x%3D'50'%20text-anchor%3D'middle'%20font-size%3D'28'%20font-family%3D'sans-serif'%20font-weight%3D'bold'%20fill%3D'%23e8ff3c'%3EGP%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--s:#12121a;--s2:#1a1a26;--s3:#22223a;--bd:#2a2a40;--tx:#f0f0ff;--mu:#6b6b8a;--ac:#e8ff3c;--ac2:#ff6b35;--ac3:#3ce8ff;--ok:#44ff88;--er:#ff4444;--wa:#ffbb33}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--tx);display:flex;font-size:14px}
.sidebar{width:220px;flex-shrink:0;background:var(--s);border-right:1px solid var(--bd);display:flex;flex-direction:column;height:100vh}
.sb-logo{padding:22px 20px 14px;border-bottom:1px solid var(--bd)}
.sb-logo .n{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;letter-spacing:-0.5px}
.sb-logo .n span{color:var(--ac)}
.sb-logo .v{font-size:0.58rem;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-top:2px}
nav{flex:1;padding:10px 0;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:0.82rem;color:var(--mu);transition:all .15s;border-left:2px solid transparent}
.ni:hover{color:var(--tx);background:var(--s2)}
.ni.active{color:var(--ac);background:var(--s2);border-left-color:var(--ac)}
.ni .ic{font-size:1rem;width:20px;text-align:center}
.sb-foot{padding:14px 20px;border-top:1px solid var(--bd);font-size:0.62rem;color:var(--mu)}
.main{flex:1;overflow-y:auto;height:100vh}
.content-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;height:100vh}
.content-wrap .main{height:auto;flex:1;overflow-y:auto}
@keyframes bannerPulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes stepPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,40,40,.4)}50%{box-shadow:0 0 0 6px rgba(255,40,40,0)}}
.ph{display:flex;align-items:center;justify-content:space-between;padding:26px 30px 18px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--bg);z-index:10}
.pt{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;letter-spacing:-0.5px}
.cnt{padding:22px 30px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;font-family:'Instrument Sans',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--s2);color:var(--tx);transition:all .15s;border-radius:2px}
.btn:hover{border-color:var(--ac);color:var(--ac)}
.bp{background:var(--ac);color:#000;border-color:var(--ac)}
.bp:hover{background:#d4eb2a;border-color:#d4eb2a;color:#000}
.bd2{background:transparent;color:var(--er);border-color:var(--er)}
.bd2:hover{background:rgba(255,68,68,.1)}
.bg{background:transparent;border-color:transparent}
.bg:hover{border-color:var(--bd);color:var(--tx)}
.card{background:var(--s);border:1px solid var(--bd);padding:16px;transition:border-color .15s}
.st{font-family:'Syne',sans-serif;font-size:0.6rem;font-weight:700;color:var(--ac);letter-spacing:3px;text-transform:uppercase;margin:18px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--bd)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fgi{display:flex;flex-direction:column;gap:4px}
.fgf{grid-column:1/-1}
label{font-size:0.65rem;font-weight:600;color:var(--mu);letter-spacing:1px;text-transform:uppercase}
input,select,textarea{background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:8px 10px;font-family:'Instrument Sans',sans-serif;font-size:0.82rem;outline:none;border-radius:2px;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--ac)}
select option{background:var(--s2)}
textarea{resize:vertical}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.mw{background:var(--s);border:1px solid var(--bd);width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--bd);flex-shrink:0}
.mt{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800}
.mc2{background:none;border:none;color:var(--mu);cursor:pointer;font-size:1.2rem;padding:2px 8px}
.mc2:hover{color:var(--tx)}
.mb{padding:22px;overflow-y:auto;flex:1}
.mf{padding:14px 22px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;flex-shrink:0}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.chr{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cdn{text-align:center;font-size:0.58rem;font-weight:700;color:var(--mu);letter-spacing:1px;text-transform:uppercase;padding:4px}
.cc{aspect-ratio:1;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;background:var(--s);border:1px solid var(--bd);padding:4px 5px;overflow:hidden;transition:all .15s;cursor:default}
.cc.om{opacity:.2}
.cc.he{cursor:pointer}
.cc.he:hover{filter:brightness(1.2)}
.cdnum{font-size:0.68rem;font-weight:700;line-height:1;margin-bottom:2px}
.jj-secondary{transition:all .2s}
.jj-compact .jj-secondary{display:none!important}
.cep{font-size:0.5rem;font-weight:700;padding:1px 3px;line-height:1.4;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px}
.empty{text-align:center;padding:50px 20px;color:var(--mu)}
.ei{font-size:3rem;margin-bottom:10px;opacity:.4}
.et{font-size:0.82rem}
.badge{font-size:0.6rem;padding:2px 7px;font-weight:700;letter-spacing:.5px;display:inline-block;border-radius:1px}
.bco{background:rgba(68,255,136,.1);color:var(--ok);border:1px solid rgba(68,255,136,.3)}
.bpe{background:rgba(255,187,51,.1);color:var(--wa);border:1px solid rgba(255,187,51,.3)}
.bca{background:rgba(255,68,68,.1);color:var(--er);border:1px solid rgba(255,68,68,.3)}
.bpa{background:rgba(60,232,255,.1);color:var(--ac3);border:1px solid rgba(60,232,255,.3)}
.bup{background:rgba(255,68,68,.1);color:var(--er);border:1px solid rgba(255,68,68,.3)}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.sc{background:var(--s);border:1px solid var(--bd);padding:14px}
.sl{font-size:0.62rem;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.sv{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800}
.ss{font-size:0.66rem;color:var(--mu);margin-top:2px}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:18px}
.tab{padding:9px 18px;font-size:0.75rem;font-weight:600;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--tx)}
.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.ci{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd);font-size:0.8rem;cursor:pointer}
.ci:hover{color:var(--ac)}
.cb{width:15px;height:15px;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.cb.ok{background:var(--ok);border-color:var(--ok);color:#000;font-size:0.65rem}
.tlr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd);font-size:0.78rem}
.tll{color:var(--mu)}
.tlv{font-family:'Syne',sans-serif;font-weight:700;color:var(--ac)}
.star{font-size:1.6rem;cursor:pointer;color:var(--s3);transition:color .1s,transform .1s;user-select:none;display:inline-block}
.star.on{color:var(--ac)}
.addr-drop{position:absolute;top:100%;left:0;right:0;background:var(--s2);border:1px solid var(--ac);border-top:none;z-index:999;display:none;max-height:220px;overflow-y:auto}
.addr-drop .addr-item{padding:9px 12px;font-size:.8rem;cursor:pointer;border-bottom:1px solid var(--bd);line-height:1.3}
.addr-drop .addr-item:hover{background:var(--s3)}
</style>
</head>
<body>
<div id="app" style="display:none;width:100%;height:100%">
<aside class="sidebar">
  <div class="sb-logo"><div class="n">Gig<span>Planner</span></div><div class="v">DJ Manager v7</div></div>
  <nav id="nav">
    <div class="ni active" data-p="dash" onclick="go('dash')"><span class="ic">⚡</span>Dashboard</div>
    <div class="ni" data-p="events" onclick="go('events')"><span class="ic">🎵</span>Événements</div>
    <div class="ni" data-p="jourj" onclick="go('jourj')"><span class="ic">🎯</span>Jour J</div>
    <div class="ni" data-p="finances" onclick="go('finances')"><span class="ic">💰</span>Finances</div>
    <div class="ni" data-p="settings" onclick="go('settings')"><span class="ic">⚙️</span>Paramètres</div>
  </nav>
  <div class="sb-foot" id="sb-foot-mission" style="display:none"></div>
  <div class="sb-foot" id="sb-foot-user">GigPlanner v8.0</div>
</aside>
<div class="content-wrap">
<div id="mission-banner" style="display:none;align-items:center;padding:8px 16px;font-size:.82rem;gap:10px;position:sticky;top:0;z-index:50"></div>
<main class="main" id="main"></main>
</div>
<div class="mo" id="modal" style="display:none">
  <div class="mw" onclick="event.stopPropagation()">
    <div class="mh"><div class="mt" id="mtitle"></div><button class="mc2" onclick="closeMo()">✕</button></div>
    <div class="mb" id="mbody"></div>
    <div class="mf" id="mfoot"></div>
  </div>
</div>
</div> <!-- end #app -->
<script>
// EVENT TYPES
const ET={
  mariage:{l:'Mariage',e:'💍',c:'#ff6b35'},
  corpo:{l:'Soirée Corpo',e:'🏢',c:'#ff9f43'},
  private:{l:'Soirée Privée',e:'🎉',c:'#ff6b9d'},
  club:{l:'Club',e:'🎧',c:'#b96bff'}
};

// CONTRACT TYPES
const CT={
  mariage:{
    label:'Mariage',emoji:'💍',color:'#ff6b35',
    clauses:function(p,ev,cd){
      var dj=p.name||'Le Prestataire';var client=ev.client||cd.name||'Le Client';
      var date=ev.date?new Date(ev.date+'T00:00:00').toLocaleDateString('fr-FR'):'__/__/____';
      var venue=ev.venue||ev.address||'Lieu à définir';
      var start=ev.start||'__:__';var end=ev.end||'__:__';
      var amount=ev.amount?ev.amount.toLocaleString('fr-FR')+'€':'___€';
      var ac=ev.acompteAmount||(ev.amount&&ev.acomptePct?Math.round(ev.amount*ev.acomptePct/100):0);
      var acStr=ac?ac.toLocaleString('fr-FR')+'€':'___€';
      return '<h4>CONTRAT DE PRESTATION DJ — MARIAGE</h4>'
        +'<p>Entre <strong>'+dj+'</strong> (ci-après "le Prestataire") et <strong>'+client+'</strong> (ci-après "le Client").</p>'
        +'<h4>1. OBJET</h4><p>Animation musicale et sonorisation du mariage le <strong>'+date+'</strong> au lieu : <strong>'+venue+'</strong>, de <strong>'+start+'</strong> à <strong>'+end+'</strong>.</p>'
        +'<h4>2. PRESTATIONS INCLUSES</h4><p>'+(ev.serviceIds&&ev.serviceIds.length?'Prestations selon devis joint.':'Animation DJ, sono, lumières selon accord verbal.')+'</p>'
        +'<h4>3. RÉMUNÉRATION</h4><p>Montant total : <strong>'+amount+'</strong>.<br>Acompte à la signature : <strong>'+acStr+'</strong>.<br>Solde à régler avant la prestation.</p>'
        +'<h4>4. ANNULATION</h4><p>En cas d\'annulation par le Client moins de 30 jours avant la date, l\'acompte reste acquis au Prestataire. En cas d\'annulation par le Prestataire, l\'acompte est intégralement remboursé.</p>'
        +'<h4>5. RESPONSABILITÉS</h4><p>Le Prestataire s\'engage à fournir le matériel nécessaire en bon état de fonctionnement. Le Client s\'engage à fournir un espace adapté (électricité, accès).</p>'
        +'<h4>6. DROIT À L\'IMAGE</h4><p>Le Client autorise le Prestataire à utiliser des photos/vidéos de la prestation à des fins promotionnelles, sauf refus explicite écrit.</p>'
        +'<p style="margin-top:18px;font-size:.75rem;color:#888">Fait en deux exemplaires. Lu et approuvé.</p>';
    }
  },
  corpo:{
    label:'Corpo / Entreprise',emoji:'🏢',color:'#3ce8ff',
    clauses:function(p,ev,cd){
      var dj=p.name||'Le Prestataire';var client=ev.client||cd.name||'L\'Entreprise';
      var date=ev.date?new Date(ev.date+'T00:00:00').toLocaleDateString('fr-FR'):'__/__/____';
      var venue=ev.venue||ev.address||'Lieu à définir';
      var start=ev.start||'__:__';var end=ev.end||'__:__';
      var amount=ev.amount?ev.amount.toLocaleString('fr-FR')+'€':'___€';
      var ac=ev.acompteAmount||(ev.amount&&ev.acomptePct?Math.round(ev.amount*ev.acomptePct/100):0);
      var acStr=ac?ac.toLocaleString('fr-FR')+'€':'___€';
      return '<h4>CONTRAT DE PRESTATION DJ — ÉVÉNEMENT ENTREPRISE</h4>'
        +'<p>Entre <strong>'+dj+'</strong> (ci-après "le Prestataire") et <strong>'+client+'</strong> (ci-après "le Client").</p>'
        +'<h4>1. OBJET</h4><p>Animation musicale lors de l\'événement d\'entreprise le <strong>'+date+'</strong> au <strong>'+venue+'</strong>, de <strong>'+start+'</strong> à <strong>'+end+'</strong>.</p>'
        +'<h4>2. PRESTATIONS</h4><p>Animation DJ, gestion sonore et lumineuse selon les directives du Client. Briefing musical à réaliser minimum 7 jours avant.</p>'
        +'<h4>3. RÉMUNÉRATION</h4><p>Montant HT : <strong>'+amount+'</strong>'+(p.tvaActive?' + TVA en vigueur.':'.')+'<br>Acompte : <strong>'+acStr+'</strong> à la signature. Solde sur facture après prestation sous 30 jours.</p>'
        +'<h4>4. MATÉRIEL</h4><p>Le Prestataire fournit son propre matériel. Le Client s\'engage à fournir l\'accès au lieu, le stationnement et l\'alimentation électrique nécessaire.</p>'
        +'<h4>5. ANNULATION</h4><p>Annulation avant 15 jours : acompte remboursable. Annulation moins de 15 jours : l\'acompte reste dû. Annulation le jour J : 100% du montant est dû.</p>'
        +'<p style="margin-top:18px;font-size:.75rem;color:#888">Fait en deux exemplaires. Lu et approuvé.</p>';
    }
  },
  club:{
    label:'Club / Bar',emoji:'🎧',color:'#b96bff',
    clauses:function(p,ev,cd){
      var dj=p.name||'Le Prestataire';var client=ev.client||cd.name||'L\'Établissement';
      var date=ev.date?new Date(ev.date+'T00:00:00').toLocaleDateString('fr-FR'):'__/__/____';
      var venue=ev.venue||ev.address||'L\'établissement';
      var start=ev.start||'__:__';var end=ev.end||'__:__';
      var amount=ev.amount?ev.amount.toLocaleString('fr-FR')+'€':'___€';
      return '<h4>CONTRAT DE RÉSIDENCE / CACHET DJ — CLUB / BAR</h4>'
        +'<p>Entre <strong>'+dj+'</strong> (ci-après "l\'Artiste") et <strong>'+client+'</strong> (ci-après "l\'Établissement").</p>'
        +'<h4>1. OBJET</h4><p>Prestation DJ le <strong>'+date+'</strong> à <strong>'+venue+'</strong>, de <strong>'+start+'</strong> à <strong>'+end+'</strong>.</p>'
        +'<h4>2. CACHET</h4><p>Cachet brut : <strong>'+amount+'</strong>. Paiement en espèces ou virement le soir de la prestation ou sous 48h.</p>'
        +'<h4>3. MATÉRIEL</h4><p>L\'Établissement met à disposition : booth DJ, table de mixage, platines en état de fonctionnement, système son et lumières. L\'Artiste apporte ses accessoires personnels (USB, casque).</p>'
        +'<h4>4. CONDITIONS</h4><p>L\'Artiste s\'engage à respecter le style musical de l\'établissement. L\'Établissement s\'engage à ne pas demander de musique incompatible avec le style convenu.</p>'
        +'<h4>5. ANNULATION</h4><p>Annulation moins de 48h par l\'Établissement : 50% du cachet est dû. Annulation par l\'Artiste : obligation de fournir un remplaçant de niveau équivalent.</p>'
        +'<p style="margin-top:18px;font-size:.75rem;color:#888">Fait en deux exemplaires. Lu et approuvé.</p>';
    }
  },
  private:{
    label:'Soirée Privée',emoji:'🎉',color:'#e8ff3c',
    clauses:function(p,ev,cd){
      var dj=p.name||'Le Prestataire';var client=ev.client||cd.name||'Le Client';
      var date=ev.date?new Date(ev.date+'T00:00:00').toLocaleDateString('fr-FR'):'__/__/____';
      var venue=ev.venue||ev.address||'Lieu à définir';
      var start=ev.start||'__:__';var end=ev.end||'__:__';
      var amount=ev.amount?ev.amount.toLocaleString('fr-FR')+'€':'___€';
      var ac=ev.acompteAmount||(ev.amount&&ev.acomptePct?Math.round(ev.amount*ev.acomptePct/100):0);
      var acStr=ac?ac.toLocaleString('fr-FR')+'€':'___€';
      return '<h4>CONTRAT DE PRESTATION DJ — SOIRÉE PRIVÉE</h4>'
        +'<p>Entre <strong>'+dj+'</strong> (ci-après "le Prestataire") et <strong>'+client+'</strong> (ci-après "le Client").</p>'
        +'<h4>1. OBJET</h4><p>Animation musicale d\'une soirée privée le <strong>'+date+'</strong> au <strong>'+venue+'</strong>, de <strong>'+start+'</strong> à <strong>'+end+'</strong>.</p>'
        +'<h4>2. PROGRAMME MUSICAL</h4><p>Le style musical sera défini d\'un commun accord avant la prestation. Une liste de souhaits peut être transmise au minimum 7 jours avant.</p>'
        +'<h4>3. RÉMUNÉRATION</h4><p>Montant total : <strong>'+amount+'</strong>.<br>Acompte à la signature : <strong>'+acStr+'</strong>. Solde le jour de la prestation.</p>'
        +'<h4>4. MATÉRIEL</h4><p>Le Prestataire fournit l\'intégralité du matériel son et lumière. Le Client s\'engage à fournir l\'accès et l\'alimentation électrique (minimum 2x16A).</p>'
        +'<h4>5. ANNULATION</h4><p>Annulation avant 30 jours : acompte remboursé sous déduction des frais engagés. Annulation moins de 30 jours : l\'acompte reste acquis.</p>'
        +'<p style="margin-top:18px;font-size:.75rem;color:#888">Fait en deux exemplaires. Lu et approuvé.</p>';
    }
  }
};

// STATE
let S={
  events:[

function loadSession(){
  try{
    var s=JSON.parse(localStorage.getItem('gp7_sess')||'null');
    if(!s) return null;
    // Still valid
    if(s.exp > Date.now()+60000) return s;
    // Expired but has refresh token — return it so caller can refresh
    if(s.refresh) return s;
  }catch(e){}
  return null;
}

// Auto-refresh: call before any cloud operation
async function ensureFreshToken(){
  if(!currentUser) return false;
  var s = JSON.parse(localStorage.getItem('gp7_sess')||'null');
  if(!s) return false;
  // Token still valid for >2min
  if(s.exp > Date.now()+120000) return true;
  // Try refresh
  if(!s.refresh) return false;
  try{
    var d = await sbRefreshToken(s.refresh);
    if(d.access_token){
      currentUser.token = d.access_token;
      saveSession(currentUser.id, d.access_token, currentUser.email, d.expires_in||3600, d.refresh_token||s.refresh);
      updateCloudStatus('☁️ Cloud actif');
      return true;
    }
  }catch(e){}
  return false;
}

async function doLogin(){
  var email=(document.getElementById('auth-email')||{}).value||'';
  var pwd=(document.getElementById('auth-pwd')||{}).value||'';
  var msg=document.getElementById('auth-msg');
  if(!email||!pwd){if(msg)msg.textContent='Remplis tous les champs';return;}
  var btn=document.querySelector('#auth-screen .bp');
  if(btn){btn.disabled=true;btn.textContent='⏳ Connexion...';}
  if(msg)msg.textContent='';
  try{
    var data=await sbSignIn(email,pwd);
    if(data.error||data.error_description){
      if(msg)msg.textContent=data.error_description||data.error||'Erreur';
      if(btn){btn.disabled=false;btn.textContent='→ Se connecter';}
      return;
    }
    var uid = (data.user && data.user.id) || data.id || (data.data && data.data.user && data.data.user.id);
    var uemail = (data.user && data.user.email) || data.email || (data.data && data.data.user && data.data.user.email);
    var token = data.access_token || (data.data && data.data.access_token);
    if(!uid){if(msg)msg.textContent='Erreur: user id manquant';if(btn){btn.disabled=false;btn.textContent='→ Se connecter';}return;}
    var refreshTok = data.refresh_token || (data.data && data.data.refresh_token) || null;
    currentUser={id:uid,token:token,email:uemail};
    saveSession(uid,token,uemail,data.expires_in,refreshTok);
    var hasCloud=await cloudLoad();
    if(!hasCloud){var local=localStorage.getItem('gp7');if(local){try{applyData(JSON.parse(local));}catch(e){}}await cloudSave();}
    enterApp();
  }catch(e){if(msg)msg.textContent='Erreur réseau';if(btn){btn.disabled=false;btn.textContent='→ Se connecter';}}
}

    function normTa(v){if(!v)return'';return v.replace(/h/i,':').replace(/[^0-9:]/g,'');}
    function toMa(v){var p=(normTa(v)||'').split(':');return parseInt(p[0]||0)*60+parseInt(p[1]||0);}
    if(tl.depart&&tl.depart!=='—') allSteps.push({label:'Départ',mins:toMa(tl.depart)});
    if(next.type==='club'&&cd.legs){
      cd.legs.forEach(function(l){
        if(l.dep) allSteps.push({label:(l.type==='hotel'?'Check-in':'Départ '+l.type),mins:toMa(l.dep)});
      });
    }
    if(cd.soundcheck) allSteps.push({label:'Soundcheck',mins:toMa(cd.soundcheck)});
    var setT = normTa(cd.heureBal||next.start);
    if(setT) allSteps.push({label:'Début set',mins:toMa(setT)});
    // find next future step
    allSteps.sort((a,b)=>a.mins-b.mins);
    var ns = allSteps.find(s=>s.mins>nowMins);
    if(ns){ nextStepLabel=ns.label; nextStepMins=ns.mins; nextStepDiff=ns.mins-nowMins; }
  }

  // Determine alert level
  if(isToday){
    const isNightMode = nowMins >= 20*60 || nowMins < 6*60;
    if(nextStepDiff<=30 && nextStepDiff>0){
      return {level:'pulse', days:0, ev:next, t, tl, nextStepLabel, nextStepDiff, isNightMode};
    }
    if(nextStepDiff<=0 && nextStepMins<9999){
      return {level:'now', days:0, ev:next, t, tl, nextStepLabel, nextStepDiff:0, isNightMode};
    }
    return {level:'today', days:0, ev:next, t, tl, nextStepLabel, nextStepDiff, isNightMode};
  }
  if(isTomorrow) return {level:'tomorrow', days:1, ev:next, t, tl};
  if(next.date<=in7d) return {level:'week', days, ev:next, t, tl};
  return null;
}

function fd(d){if(!d)return'—';return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})}
function subMin(time,mins){if(!time)return'—';const[h,m]=time.split(':').map(Number);const t=h*60+m-mins;const hh=Math.floor(((t%1440)+1440)%1440/60);const mm=((t%60)+60)%60;return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0')}
function getTL(ev){
  var ids = ev.serviceIds||[];
  var r = calcDeduped(ids);
  var l = ids.length > 0 ? r.load    : (ev.loadMin||0);
  var i = ids.length > 0 ? r.install : (ev.installMin||0);
  var margin = S.profile.safetyMargin !== undefined ? S.profile.safetyMargin : 30;
  // VHR : si véhicule de location aller-retour ou sur place, pas de chargement depuis chez soi
  var vhr = '';
  var effectiveLoad = l;
  var depart = subMin(ev.start,(ev.driveMin||0)+i+margin);
  var chargement = effectiveLoad > 0 ? subMin(ev.start,(ev.driveMin||0)+i+effectiveLoad+margin) : depart;
  return{load:effectiveLoad,install:i,margin:margin,depart:depart,chargement:chargement};
}

var _addrTimer = null;
function addrAuto(input, dropId, onSelect){
  clearTimeout(_addrTimer);
  var q = input.value.trim();
  var drop = document.getElementById(dropId);
  if(!drop) return;
  if(q.length < 3){ drop.style.display='none'; return; }
  _addrTimer = setTimeout(function(){
    fetch('https://api-adresse.data.gouv.fr/search/?q=' + encodeURIComponent(q) + '&limit=5&autocomplete=1')
      .then(function(r){ return r.json(); })
      .then(function(d){
        var features = d.features || [];
        if(!features.length){ drop.style.display='none'; return; }
        drop.innerHTML = features.map(function(f){
          return '<div class="addr-item" data-label="' + escH(f.properties.label) + '">'
            + escH(f.properties.label)
            + '</div>';
        }).join('');
        drop.style.display = 'block';

        drop.querySelectorAll('.addr-item').forEach(function(el, i){

            e.preventDefault(); // empêche le blur de l'input avant la sélection
            onSelect(features[i]);
            drop.style.display = 'none';
          });
        });
      })
      .catch(function(){ drop.style.display='none'; });
  }, 220);
}

// ===== DASHBOARD COCKPIT =====
function pgDash(){
  const now=new Date();now.setHours(0,0,0,0);
  const todayStr=new Date().toISOString().split('T')[0];
  const in48=new Date(now.getTime()+172800000).toISOString().split('T')[0];
  const thisMonth=now.getMonth(),thisYear=now.getFullYear();

  const upcoming=S.events.filter(e=>new Date(e.date)>=now&&e.status!=='cancelled').sort((a,b)=>new Date(a.date)-new Date(b.date));
  const moEvs=S.events.filter(e=>{const d=new Date(e.date);return d.getMonth()===thisMonth&&d.getFullYear()===thisYear&&e.status!=='cancelled'});

  // Helper: calcule les montants d'un événement
  function evAmounts(e){
    const total = e.amount||0;
    const noAcompte = e.acompteStatus==='none'||(e.acomptePct===0&&!e.acompteAmount);
    const ac = noAcompte ? 0 : (e.acompteAmount||Math.round(total*(e.acomptePct||30)/100));
    const solde = total - ac;
    return {total, ac, solde, noAcompte};
  }

  // ENCAISSÉ = tout ce qui est marqué "reçu" (acomptes + soldes)
  // Calcul global (tous événements non annulés)
  const totalEncaisse = S.events.filter(e=>e.status!=='cancelled').reduce((s,e)=>{
    const {total,ac,solde,noAcompte}=evAmounts(e);
    let enc=0;
    if(e.soldeStatus==='received') enc=total; // tout encaissé
    else if(!noAcompte && e.acompteStatus==='received') enc=ac; // acompte reçu
    return s+enc;
  },0);

  // Encaissé ce mois
  const caEncaissedM = S.events.filter(e=>e.status!=='cancelled').reduce((s,e)=>{
    const {total,ac,noAcompte}=evAmounts(e);
    if(e.soldeStatus==='received') return s+total;
    if(!noAcompte && e.acompteStatus==='received') return s+ac;
    return s;
  },0);

  // À VENIR = soldes restants des événements futurs confirmés
  const aVenirEvs = S.events.filter(e=>e.status==='confirmed'&&new Date(e.date)>=now&&e.soldeStatus!=='received');
  const caAVenir = aVenirEvs.reduce((s,e)=>{
    const {total,ac,noAcompte}=evAmounts(e);
    const soldeRestant = noAcompte ? total : (e.acompteStatus==='received' ? (total-ac) : total);
    return s+soldeRestant;
  },0);

  // EN ATTENTE = acomptes dus non reçus (contrats signés ou événements confirmés proches)
  const enAttenteEvs = S.events.filter(e=>e.status==='confirmed'&&e.acompteStatus!=='none'&&e.acompteStatus!=='received'&&e.acomptePct>0);
  const caEnAttente = enAttenteEvs.reduce((s,e)=>{
    const {ac}=evAmounts(e);
    return s+ac;
  },0);

  // Monthly objective
  const obj=S.profile.monthlyGoal||0;
  const objPct=obj>0?Math.min(100,Math.round(caEncaissedM/obj*100)):0;

  // Alerts
  const relAlerts=getRelancesAlerts();
  const urgentAlerts=relAlerts.filter(a=>a.urgent);
  const warnAlerts=relAlerts.filter(a=>!a.urgent);

  // Global status indicator
  let statusColor,statusIcon,statusText;
  if(urgentAlerts.length>0){statusColor='var(--er)';statusIcon='🔴';statusText=urgentAlerts.length+' action'+(urgentAlerts.length>1?'s urgentes':' urgente')+' requise'+(urgentAlerts.length>1?'s':'')}
  else if(warnAlerts.length>0||caEnAttente>0){statusColor='#ffaa00';statusIcon='🟠';statusText='Quelques éléments à suivre'}
  else if(upcoming.length===0){statusColor='var(--mu)';statusIcon='😴';statusText='Aucune prestation à venir'}
  else{statusColor='var(--ok)';statusIcon='🟢';statusText='Tout est sous contrôle'}

  // Next mission block
  const nextMission=upcoming[0];
  const nextIn48=nextMission&&nextMission.date<=in48;
  let missionBlock='';
  if(nextMission){
    const t=ET[nextMission.type]||ET.mariage;
    const tl=getTL(nextMission);
    const days=Math.ceil((new Date(nextMission.date)-now)/86400000);
    const isToday=nextMission.date===todayStr;
    const isTomorrow=days===1;
    const urgLabel=isToday?'AUJOURD\'HUI':isTomorrow?'DEMAIN':'Dans '+days+'j';
    missionBlock=`<div class="card" style="border:2px solid ${nextIn48?t.c:'var(--bd)'};cursor:pointer;margin-bottom:10px" onclick="go('events')">
      <div style="display:flex;align-items:flex-start;gap:12px">
        <div style="background:${t.c}22;border:1px solid ${t.c}44;padding:8px 10px;text-align:center;flex-shrink:0">
          <div style="font-size:1.4rem">${t.e}</div>
          <div style="font-size:.58rem;font-weight:700;color:${t.c};letter-spacing:1px;margin-top:2px">${urgLabel}</div>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;margin-bottom:3px">${nextMission.name}</div>
          <div style="font-size:.72rem;color:var(--mu);margin-bottom:6px">${nextMission.venue||'—'} · ${nextMission.start||'—'} → ${nextMission.end||'—'}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;font-size:.7rem">
            ${tl.chargement!=='—'?`<span style="color:var(--mu)">📦 ${tl.chargement}</span>`:''}
            ${tl.depart!=='—'?`<span style="color:var(--mu)">🚗 ${tl.depart}</span>`:''}
            ${payBadge(nextMission)}
          </div>
        </div>
        ${nextIn48?`<div style="flex-shrink:0"><span style="background:${t.c};color:#000;font-size:.62rem;font-weight:800;padding:3px 8px">MISSION →</span></div>`:''}
      </div>
    </div>`;
  }

  // Relances block (compact)
  let relancesBlock='';
  const totalPending = S.events.filter(e=>e.status!=='cancelled'&&e.soldeStatus!=='received'&&(e.amount||0)>0).length;
  if(relAlerts.length>0){
    window._relanceAlerts=relAlerts;
    const rows=relAlerts.slice(0,3).map((a,i)=>{
      const col=a.urgent?'var(--er)':'#ffaa00';
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--bd);flex-wrap:wrap">
        <div style="flex:1;min-width:160px">
          <div style="font-size:.75rem;font-weight:600;color:${col}">${a.msg}</div>
          <div style="font-size:.68rem;color:var(--mu);cursor:pointer" onclick="openEv('${a.evId}')">${a.evName} →</div>
        </div>
        <div style="display:flex;gap:5px">
          <button class="btn bg" style="font-size:.65rem;padding:3px 8px" onclick="relanceByMail(${i})">✉️</button>
          <button class="btn bg" style="font-size:.65rem;padding:3px 8px" onclick="markPayment('${a.evId}','${a.type==='acompte'?'acompte':'solde'}','received');render()">✅</button>
        </div>
      </div>`;
    }).join('');
    relancesBlock=`<div class="st" style="display:flex;align-items:center;gap:8px">💰 Paiements à suivre <span style="background:${urgentAlerts.length>0?'var(--er)':'#ffaa00'};color:#000;font-size:.6rem;padding:1px 7px;border-radius:99px">${relAlerts.length}</span></div>
    <div style="background:var(--s);border:1px solid rgba(255,100,100,.25)">${rows}</div>
    ${relAlerts.length>3?`<div style="text-align:right;margin-top:6px"><button class="btn bg" style="font-size:.7rem" onclick="go('finances');S._finTab='relances'">Voir tout (${relAlerts.length}) →</button></div>`:''}`;
  } else if(totalPending===0 && S.events.filter(e=>e.status!=='cancelled').length>0){
    relancesBlock=`<div class="st">💰 Paiements</div><div style="background:var(--s2);border:1px solid rgba(68,255,136,.2);padding:12px 16px;display:flex;align-items:center;gap:10px"><span style="font-size:1.4rem">✅</span><div style="font-size:.8rem;color:var(--ok);font-weight:600">Tout est encaissé — aucune relance nécessaire</div></div>`;
  }

  return `<div class="ph">

// ===== EVENTS =====
function pgEvents(){
  const now=new Date();now.setHours(0,0,0,0);
  const todayStr=new Date().toISOString().split('T')[0];
  const in48=new Date(now.getTime()+172800000).toISOString().split('T')[0];

  // Check if upcoming event < 48h → auto show mission
  const nextMission=S.events.filter(e=>e.status!=='cancelled'&&e.date>=todayStr&&e.date<=in48).sort((a,b)=>a.date.localeCompare(b.date))[0];

  const evs=[...S.events].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const upcoming=evs.filter(e=>new Date(e.date+'T00:00:00')>=now&&e.status!=='cancelled');
  const past=evs.filter(e=>new Date(e.date+'T00:00:00')<now||e.status==='cancelled');

  const evCard=(ev,highlight)=>{
    const t=ET[ev.type]||ET.mariage;
    const tl=getTL(ev);
    const days=Math.ceil((new Date(ev.date+'T00:00:00')-now)/86400000);
    const svcs=(ev.serviceIds||[]).map(sid=>S.serviceTypes.find(s=>s.id===sid)).filter(Boolean);
    const prests=svcs.filter(s=>s.svcType!=='option');
    const opts=svcs.filter(s=>s.svcType==='option');
    const svcPills=prests.map(s=>`<span style="font-size:.62rem;font-weight:700;background:${s.color}18;border:1px solid ${s.color}66;color:${s.color};padding:1px 7px">${s.emoji} ${s.name}</span>`).join('');
    const optPills=opts.map(s=>`<span style="font-size:.62rem;font-weight:700;background:rgba(255,170,0,.1);border:1px solid rgba(255,170,0,.4);color:#ffaa00;padding:1px 7px">${s.emoji} ${s.name}</span>`).join('');
    return `<div class="card" style="cursor:pointer;border-left:3px solid ${t.c};margin-bottom:8px${highlight?';border:2px solid '+t.c:''};" onclick="openEv('${ev.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:3px">${ev.name}</div>
          <div style="font-size:.7rem;color:var(--mu);margin-bottom:7px">${fd(ev.date)} · ${ev.client}</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:${(svcPills||optPills)?'5px':'0'}">${etBadge(ev.type)}${stBadge(ev.status)}${payBadge(ev)}${ev.clientData?'<span class="badge bco">✅ Fiche</span>':''}</div>
          ${svcPills||optPills?`<div style="display:flex;gap:4px;flex-wrap:wrap">${svcPills}${optPills}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:14px">
          <div style="font-family:'Syne',sans-serif;font-weight:800;color:var(--ac2)">${(ev.amount||0).toLocaleString('fr-FR')}€</div>
          <div style="font-size:.68rem;color:var(--mu)">${ev.start||'—'} → ${ev.end||'—'}</div>
          ${days>0&&days<=7?`<div style="font-size:.65rem;color:${t.c};font-weight:700;margin-top:2px">J-${days}</div>`:''}
          ${tl.depart!=='—'&&days>=0&&days<=1?`<div style="font-size:.65rem;color:var(--mu)">🚗 ${tl.depart}</div>`:''}
        </div>
      </div>
    </div>`;
  };

  // Mission section removed — Jour J has its own dedicated tab
  const missionSection = '';

  const tabs=`<div class="tabs">
    <div class="tab ${S._evTab==='upcoming'||!S._evTab?'active':''}" onclick="S._evTab='upcoming';render()">À venir (${upcoming.length})</div>
    <div class="tab ${S._evTab==='past'?'active':''}" onclick="S._evTab='past';render()">Passés (${past.length})</div>
    <div class="tab ${S._evTab==='cal'?'active':''}" onclick="S._evTab='cal';render()">📅 Calendrier</div>
    <div class="tab" onclick="go('clients')">👤 Clients</div>
  </div>`;

  const list=(S._evTab==='past'?past:upcoming);
  const calInline = S._evTab==='cal' ? pgCal() : '';

  return `<div class="ph"><div class="pt">Événements 🎵</div><button class="btn bp" onclick="openNewEv()">+ Nouvelle date</button></div>
  <div class="cnt">
  ${tabs}
  ${S._evTab==='cal'?calInline:(list.length===0?'<div class="empty"><div class="ei">🎵</div><div class="et">Aucun événement</div></div>':list.map(ev=>evCard(ev,false)).join(''))}
  </div>`;
}

function togCk(evId,idx){
  const ev=S.events.find(e=>e.id==evId);
  if(ev&&ev.checklist&&ev.checklist[idx]){
    ev.checklist[idx].d=!ev.checklist[idx].d;save();
    const el=document.getElementById('ecl');
    if(el)el.innerHTML=(ev.checklist||[]).map((c,i)=>`<div class="ci" onclick="togCk('${evId}',${i})"><div class="cb ${c.d?'ok':''}">${c.d?'✓':''}</div><span style="text-decoration:${c.d?'line-through':''};color:${c.d?'var(--mu)':'var(--tx)'}">${c.t}</span></div>`).join('');
  }
}

function recalcEvLogistique(evId){
  var ev = S.events.find(function(e){return e.id==evId;});
  if(!ev) return;

  var svcs = (ev.serviceIds||[]).map(function(sid){return S.serviceTypes.find(function(s){return s.id===sid;});}).filter(Boolean);
  if(!svcs.length){
    alert('Aucune prestation cochée sur cet événement.\nModifie l\'événement pour cocher tes prestations d\'abord.');
    return;
  }

  var result = calcDeduped(ev.serviceIds||[]);
  var newLoad    = result.load;
  var newInstall = result.install;
  var oldLoad    = ev.loadMin;
  var oldInstall = ev.installMin;

  // Find shared gear for info message
  var allGear = []; var dupes = [];
  svcs.forEach(function(s){
    (s.gearIds||[]).forEach(function(gid){
      if(allGear.indexOf(gid)!==-1 && dupes.indexOf(gid)===-1) dupes.push(gid);
      else allGear.push(gid);
    });
  });
  var dupeMsg = '';
  if(dupes.length){
    var names = dupes.map(function(gid){ var g=S.gear.find(function(x){return x.id===gid;}); return g?g.name:gid; }).join(', ');
    dupeMsg = '\n♻️ Matos partagé dédupliqué : ' + names;
  }

  var detail = svcs.map(function(s){
    var gearNames = (s.gearIds||[]).map(function(gid){ var g=S.gear.find(function(x){return x.id===gid;}); return g?g.name:null; }).filter(Boolean);
    return (s.emoji||'') + ' ' + s.name + ' : charg. ' + (s.loadMin||0) + 'min · install. ' + (s.installMin||0) + 'min' + (gearNames.length?' ('+gearNames.join(', ')+')':'');
  }).join('\n');

  var msg = '♻️ Recalculer depuis ton matos actuel ?\n\n'
    + detail + dupeMsg
    + '\n\nTotal chargement : ' + oldLoad + 'min → ' + newLoad + 'min'
    + '\nTotal installation : ' + oldInstall + 'min → ' + newInstall + 'min'
    + '\n\n⚠️ L\'heure du set (' + (ev.start||'—') + ') ne change pas.';

  if(!confirm(msg)) return;

  ev.loadMin    = newLoad;
  ev.installMin = newInstall;
  save();

  var tl   = getTL(ev);

function selectDocType(type){
  window._uploadDocType = type;
  ['contrat','facture'].forEach(function(t){
    var btn = document.getElementById('doc-type-' + t);
    if(!btn) return;
    if(t===type){ btn.style.border='2px solid var(--ac)'; btn.style.background='rgba(232,255,60,.1)'; btn.style.color='var(--tx)'; btn.style.fontWeight='600'; }
    else { btn.style.border='1px solid var(--bd)'; btn.style.background='var(--s2)'; btn.style.color='var(--mu)'; btn.style.fontWeight='normal'; }
  });
}

function uploadDoc(){
  var evId = window._uploadDocEvId;
  var type = window._uploadDocType || 'contrat';
  var fileInput = document.getElementById('doc-file');
  var msg = document.getElementById('doc-upload-msg');
  if(!fileInput||!fileInput.files||!fileInput.files[0]){ msg.textContent='⚠️ Sélectionne un fichier'; msg.style.color='var(--wa)'; return; }
  var file = fileInput.files[0];
  if(file.size > 5*1024*1024){ msg.textContent='⚠️ Fichier trop lourd (max 5MB)'; msg.style.color='var(--wa)'; return; }
  msg.textContent='⏳ Upload en cours...'; msg.style.color='var(--mu)';
  var btn = document.querySelector('[onclick="uploadDoc()"]');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Upload...'; }
  var fileName = evId + '_' + type + '_' + Date.now() + '.pdf';
  fetch(SB_URL + '/storage/v1/object/documents/' + fileName, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/pdf', 'x-upsert': 'true' },
    body: file
  }).then(function(r){
    if(!r.ok) throw new Error('Upload failed: ' + r.status);
    var publicUrl = SB_URL + '/storage/v1/object/public/documents/' + fileName;
    var ev = S.events.find(function(e){ return e.id==evId; });
    if(!ev) throw new Error('Événement introuvable');
    if(!ev.docs) ev.docs = [];
    ev.docs.push({ type:type, name:file.name, url:publicUrl, uploadedAt:new Date().toISOString() });
    save();
    msg.textContent='✅ Document uploadé !'; msg.style.color='var(--ok)';
    setTimeout(function(){ closeMo(); openEv(evId); }, 800);
  }).catch(function(err){
    msg.textContent='❌ Erreur : ' + err.message; msg.style.color='var(--er)';
    if(btn){ btn.disabled=false; btn.textContent='📤 Uploader'; }
  });
}

function delEvDoc(evId, idx){
  var ev = S.events.find(function(e){ return e.id==evId; });
  if(!ev||!ev.docs) return;
  var doc = ev.docs[idx];
  if(!doc||!confirm('Supprimer "' + doc.name + '" ?')) return;
  var fileName = doc.url.split('/documents/')[1];
  if(fileName){ fetch(SB_URL+'/storage/v1/object/documents/'+fileName,{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}); }
  ev.docs.splice(idx,1);
  save();
  openEv(evId);
}

function openEvPrestations(evId){
  var ev = S.events.find(function(e){return e.id==evId;});
  if(!ev) return;
  var currentIds = ev.serviceIds||[];

  function buildBody(){
    var prests = S.serviceTypes.filter(function(s){return s.svcType!=='option';});
    var opts   = S.serviceTypes.filter(function(s){return s.svcType==='option';});
    var autoTotal = 0;
    currentIds.forEach(function(sid){
      var s=S.serviceTypes.find(function(x){return x.id===sid;});
      if(s&&s.price) autoTotal += parseFloat(s.price)||0;
    });

    function svcRow(s){
      var checked = currentIds.indexOf(s.id)!==-1;
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)20;cursor:pointer" onclick="toggleEvSvc(\''+evId+'\',\''+s.id+'\')">'
        + '<div style="width:22px;height:22px;border:2px solid '+(checked?s.color:'var(--bd)')+';background:'+(checked?s.color:'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.75rem;color:#000">'+(checked?'✓':'')+'</div>'
        + '<div style="flex:1"><span style="font-size:.86rem;font-weight:600">'+s.emoji+' '+s.name+'</span>'
        + (s.price ? '<span style="font-size:.72rem;color:var(--mu);margin-left:8px">'+s.price+'€</span>' : '')
        + '</div>'
        + '</div>';
    }

    var body = '<div style="font-size:.72rem;color:var(--mu);margin-bottom:12px">Coche les prestations et options incluses dans cet événement.</div>';
    if(prests.length){
      body += '<div style="font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">🎵 Prestations</div>';
      body += prests.map(svcRow).join('');
    }
    if(opts.length){
      body += '<div style="font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin:12px 0 6px">✨ Options</div>';
      body += opts.map(svcRow).join('');
    }
    if(autoTotal > 0){
      body += '<div style="margin-top:14px;padding:10px;background:rgba(232,255,60,.06);border:1px solid rgba(232,255,60,.2)">'
        + '<div style="font-size:.62rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Total calculé auto</div>'
        + '<div style="font-family:Syne,sans-serif;font-size:1.3rem;font-weight:800;color:var(--ac)">'+autoTotal.toLocaleString('fr-FR')+'€</div>'
        + '<div style="font-size:.72rem;color:var(--mu);margin-top:4px">Montant de l\'événement : <strong style="color:var(--tx)">'+(ev.amount||0)+'€</strong></div>'
        + '<button class="btn bp" style="margin-top:8px;font-size:.75rem" onclick="applyAutoTotal(\''+evId+'\','+autoTotal+')">Appliquer ce montant →</button>'
        + '</div>';
    }
    return body;
  }

  document.getElementById('mtitle').textContent = '🎵 Prestations & Options';
  document.getElementById('mbody').innerHTML = buildBody();
  document.getElementById('mfoot').innerHTML = '<button class="btn bp" onclick="closeMo();openEv(\''+evId+'\')">✓ Fermer</button>';
  showMo();

  // Store refresh fn globally so toggleEvSvc can call it
  window._prestModalEvId = evId;
  window._prestModalRefresh = function(){
    var bEl = document.getElementById('mbody');
    if(bEl) bEl.innerHTML = buildBody();
  };
}

function toggleEvSvc(evId, svcId){
  var ev = S.events.find(function(e){return e.id==evId;});
  if(!ev) return;
  if(!ev.serviceIds) ev.serviceIds=[];
  var idx = ev.serviceIds.indexOf(svcId);
  if(idx===-1) ev.serviceIds.push(svcId);
  else ev.serviceIds.splice(idx,1);
  save();
  if(window._prestModalEvId==evId && window._prestModalRefresh) window._prestModalRefresh();
}

function applyAutoTotal(evId, total){
  var ev = S.events.find(function(e){return e.id==evId;});
  if(!ev) return;
  ev.amount = total;
  save();
  if(window._prestModalEvId==evId && window._prestModalRefresh) window._prestModalRefresh();
}

function buildSvcCheckboxes(ev, evType){
  var checkedIds = ev && ev.serviceIds ? ev.serviceIds : [];
  var type = evType || (ev && ev.type) || '';
  var allSvcs = S.serviceTypes;

  // Prestations sans evTypes = on regarde le nom pour deviner le type
  // Les noms typiques mariage : Cérémonie, Vin d'honneur, Soirée principale
  var mariageKeywords = ['cérémon','vin d','honneur','soirée principale','premier','entrée','bal','repas'];
  function isMariageSvc(s){
    var n = (s.name||'').toLowerCase();
    return mariageKeywords.some(function(k){ return n.indexOf(k) !== -1; });
  }

  var filtered = allSvcs.filter(function(s){
    if(s.svcType === 'option') return false; // options handled separately
    if(s.evTypes && s.evTypes.length) return s.evTypes.indexOf(type) !== -1;
    // No evTypes tag: fallback — if name looks like mariage, only show for mariage
    if(isMariageSvc(s)) return type === 'mariage';
    return true; // generic prestation = show everywhere
  });
  var prests = filtered;
  // Options are universal — always show regardless of event type
  var opts = allSvcs.filter(function(s){return s.svcType==='option';});

  if(!prests.length && !opts.length){
    return '<div style="font-size:.78rem;color:var(--mu);padding:8px">Aucune prestation configurée pour ce type d\'événement — '
      + '<button class="btn bg" style="font-size:.72rem;padding:3px 8px" onclick="closeMo();go(\'settings\')">Configurer →</button></div>';
  }

  function mkRow(s){
    var isChecked = checkedIds.indexOf(s.id) !== -1;
    var priceTag = s.price ? '<span style="font-size:.7rem;color:var(--ac2);font-weight:700">+' + s.price + '€</span>' : '';
    return '<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--s2);margin-bottom:3px;cursor:pointer;border:1px solid var(--bd);border-left:2px solid ' + s.color + '"'
      + ' onclick="document.getElementById(\'svc-' + s.id + '\').click()">'
      + '<input type="checkbox" id="svc-' + s.id + '"' + (isChecked ? ' checked' : '') + ''
      + ' onclick="event.stopPropagation();evRecalcTimes()" style="cursor:pointer;accent-color:var(--ac);width:14px;height:14px;flex-shrink:0">'
      + '<span style="flex:1;font-size:.78rem;font-weight:600">' + escH(s.emoji||'') + ' ' + escH(s.name) + '</span>'
      + priceTag
      + '<span style="font-size:.62rem;color:var(--mu)">⏱' + (s.loadMin||0) + '+' + (s.installMin||0) + 'm</span>'
      + '</div>';
  }

  var html = '';
  if(prests.length){
    html += '<div style="font-size:.62rem;font-weight:700;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px">🎵 PRESTATIONS</div>';
    html += prests.map(mkRow).join('');
  }
  if(opts.length){
    var anyOptChecked = opts.some(function(s){ return checkedIds.indexOf(s.id) !== -1; });
    if(anyOptChecked){
      // Show options expanded if any are checked
      html += '<div style="font-size:.62rem;font-weight:700;color:#ffaa00;letter-spacing:2px;text-transform:uppercase;margin:10px 0 5px">✨ OPTIONS</div>';
      html += opts.map(mkRow).join('');
    } else {
      // Collapsed — just a toggle link
      html += '<div id="opts-toggle" onclick="document.getElementById(\'opts-body\').style.display=\'block\';this.style.display=\'none\'" style="cursor:pointer;font-size:.72rem;color:var(--mu);margin-top:10px;padding:6px 10px;border:1px dashed var(--bd);text-align:center">✨ Ajouter des options →</div>';
      html += '<div id="opts-body" style="display:none"><div style="display:flex;align-items:center;justify-content:space-between;margin:10px 0 5px"><span style="font-size:.62rem;font-weight:700;color:#ffaa00;letter-spacing:2px;text-transform:uppercase">✨ OPTIONS</span><span onclick="document.getElementById(\'opts-body\').style.display=\'none\';document.getElementById(\'opts-toggle\').style.display=\'\'" style="cursor:pointer;font-size:.7rem;color:var(--mu);padding:2px 8px;border:1px solid var(--bd)">✕ Réduire</span></div>' + opts.map(mkRow).join('') + '</div>';
    }
  }
  return html;
}

function calcDeduped(serviceIds){
  // Collect all unique gearIds across all checked/selected services
  // A gear item is counted only ONCE even if present in multiple services
  var seenGear = {};
  var totalLoad = 0;
  var totalInstall = 0;

  serviceIds.forEach(function(sid){
    var s = S.serviceTypes.find(function(x){return x.id===sid;});
    if(!s) return;

    // For load: sum only gear not yet seen
    var svcGearLoad = 0;
    (s.gearIds||[]).forEach(function(gid){
      if(!seenGear[gid]){
        seenGear[gid] = true;
        var gi = S.gear.find(function(x){return x.id===gid;});
        if(gi) svcGearLoad += (gi.loadMin||0);
      }
    });
    // If service has no gear linked, use its own loadMin directly
    if(!(s.gearIds&&s.gearIds.length)){
      totalLoad += (s.loadMin||0);
    } else {
      totalLoad += svcGearLoad;
    }
    // Install always summed (physical install of each presta is independent)
    totalInstall += (s.installMin||0);
  });

  return {load: totalLoad, install: totalInstall};
}

function evRecalcTimes(){
  var checkedIds = S.serviceTypes
    .filter(function(s){ return document.getElementById('svc-'+s.id) && document.getElementById('svc-'+s.id).checked; })
    .map(function(s){ return s.id; });

  var result = calcDeduped(checkedIds);
  var loEl = document.getElementById('elo');
  var inEl = document.getElementById('ein');
  if(loEl && result.load > 0)    loEl.value = result.load;
  if(inEl && result.install > 0) inEl.value = result.install;

  // Auto-calc montant si les prestations ont des prix renseignés
  var autoTotal = 0;
  var hasPrices = false;
  checkedIds.forEach(function(sid){
    var s = S.serviceTypes.find(function(x){return x.id===sid;});
    if(s && s.price){ autoTotal += parseFloat(s.price)||0; hasPrices = true; }
  });
  var amEl = document.getElementById('eam');
  var priceHint = document.getElementById('svc-price-hint');
  if(hasPrices && amEl){
    var current = parseInt(amEl.value) || 0;
    // Auto-fill if field is blank or zero
    if(!amEl.value.trim() || current === 0){
      amEl.value = autoTotal;
      updateAcompteCalc();
    }
    if(priceHint){
      priceHint.style.display = 'block';
      priceHint.innerHTML = '💰 Total auto : <strong style="color:var(--ac)">' + autoTotal.toLocaleString('fr-FR') + '€</strong>'
        + (current > 0 && current !== autoTotal ? ' · <span style="color:var(--mu)">Actuel : '+current.toLocaleString('fr-FR')+'€</span>' : '')
        + ' <button type="button" onclick="document.getElementById(\'eam\').value='+autoTotal+';updateAcompteCalc()" style="background:var(--ac);border:none;color:#000;font-size:.65rem;padding:2px 8px;cursor:pointer;font-weight:700;margin-left:6px;border-radius:2px">Appliquer</button>';
      if(!amEl.value.trim() || current === 0) updateAcompteCalc();
    }
  } else if(priceHint){
    priceHint.style.display = checkedIds.length > 0 ? 'none' : 'none';
  }

  // Show a small dedupe hint if gear was shared
  var allGear = [];
  var dupes = [];
  checkedIds.forEach(function(sid){
    var s = S.serviceTypes.find(function(x){return x.id===sid;});
    if(s)(s.gearIds||[]).forEach(function(gid){
      if(allGear.indexOf(gid)!==-1 && dupes.indexOf(gid)===-1) dupes.push(gid);
      else allGear.push(gid);
    });
  });
  var hint = document.getElementById('svc-dedupe-hint');
  if(hint){
    if(dupes.length){
      var names = dupes.map(function(gid){ var g=S.gear.find(function(x){return x.id===gid;}); return g?g.name:gid; }).join(', ');
      hint.innerHTML = '♻️ Matos partagé dédupliqué : <strong>' + escH(names) + '</strong>';
      hint.style.display = 'block';
    } else {
      hint.style.display = 'none';
    }
  }
}

    var _gOrKeep = function(id, fallback){ var v=_g(id); return v!==null ? v : (fallback||''); };
    var legsFromDOM = document.getElementById('legs-container') ? _readLegsFromDOM() : null;
    data.clientData = Object.assign({}, _existCd, {
      legs:        legsFromDOM !== null ? legsFromDOM : (_existCd.legs||[]),
      booker:      _gOrKeep('cf-booker',      _existCd.booker),
      bookerTel:   _gOrKeep('cf-bookertel',   _existCd.bookerTel),
      manager:     _gOrKeep('cf-manager',     _existCd.manager),
      managerTel:  _gOrKeep('cf-managertel',  _existCd.managerTel),
      chauffeur:   _gOrKeep('cf-chauffeur',   _existCd.chauffeur),
      chauffeurTel:_gOrKeep('cf-chauffeurtel',_existCd.chauffeurTel),
      clubContact: _gOrKeep('cf-clubcontact', _existCd.clubContact),
      clubTel:     _gOrKeep('cf-clubtel',     _existCd.clubTel),
      soundcheck:  _gOrKeep('cf-soundcheck',  _existCd.soundcheck),
      openingTime: _gOrKeep('cf-opening',     _existCd.openingTime),
      heureBal:    _gOrKeep('cf-hb',          _existCd.heureBal),
      heureFin:    _gOrKeep('cf-hf',          _existCd.heureFin),
      afterNote:   _gOrKeep('cf-afternote',   _existCd.afterNote),
      limiteur:    _gOrKeep('cf-lm',          _existCd.limiteur),
      rider:       _gOrKeep('cf-rider',       _existCd.rider),
      apport:      _gOrKeep('cf-apport',      _existCd.apport),
      cachet:      _gOrKeep('cf-cachet',      _existCd.cachet),
      paymode:     _gOrKeep('cf-paymode',     _existCd.paymode),
    });
  }
  if(id&&id!=='null'){const ev=S.events.find(e=>e.id==id);Object.assign(ev,data)}
  else S.events.push({...data,id:uid(),links:[],checklist:[{t:'Contrat signé',d:false},{t:'Acompte reçu',d:false},{t:'Matériel vérifié',d:false},{t:'Solde reçu',d:false}]});
  window._calcDriveKm=undefined;window._calcTollCost=undefined;window._calcTotalCost=undefined;
  save();closeMo();render();
}

// ===== CALENDAR =====
function pgCal(){
  const y=S.calYear,m=S.calMonth;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const off=first===0?6:first-1;
  const today=new Date();today.setHours(0,0,0,0);
  const evByDay={};
  S.events.forEach(ev=>{const d=new Date(ev.date);if(d.getMonth()===m&&d.getFullYear()===y){const dd=d.getDate();if(!evByDay[dd])evByDay[dd]=[];evByDay[dd].push(ev)}});
  let cells='';
  for(let i=0;i<off;i++)cells+='<div class="cc om"></div>';
  for(let d=1;d<=days;d++){
    const isT=new Date(y,m,d).getTime()===today.getTime();
    const evs=evByDay[d]||[];
    const ev=evs[0];
    const t=ev?(ET[ev.type]||ET.mariage):null;
    const bg=ev?t.c+'22':'var(--s)';
    const bc=ev?t.c:isT?'var(--ac)':'var(--bd)';
    const dateStr=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    // Always open day menu — allows opening existing events AND creating new ones on same day
    const oc=`onclick="openCalDay('${dateStr}')"`;
    cells+=`<div class="cc he" ${oc} style="background:${bg};border-color:${bc};cursor:pointer">
      <div class="cdnum" style="${isT?'color:var(--ac)':''}">${d}</div>
      ${evs.map(e=>{const et=ET[e.type]||ET.mariage;return `<div class="cep" style="background:${et.c}33;color:${et.c}">${et.e} ${e.name}</div>`}).join('')}
    </div>`;
  }
  const mn=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const mEvs=Object.values(evByDay).flat().sort((a,b)=>new Date(a.date)-new Date(b.date));
  return `<div class="card" style="margin-bottom:18px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <button class="btn bg" onclick="chgMo(-1)">← Préc.</button>
      <div style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800">${mn[m]} ${y}</div>
      <button class="btn bg" onclick="chgMo(1)">Suiv. →</button>
    </div>
    <div class="chr">${['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].map(d=>`<div class="cdn">${d}</div>`).join('')}</div>
    <div class="cg">${cells}</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px">${Object.values(ET).map(t=>`<span style="font-size:.68rem;color:${t.c}">${t.e} ${t.l}</span>`).join('')}</div>
  </div>
  ${mEvs.length?`<div class="st">Ce mois</div><div style="display:grid;gap:7px">${mEvs.map(ev=>{const t=ET[ev.type]||ET.mariage;return `<div class="card" style="cursor:pointer;border-left:3px solid ${t.c};padding:10px 14px;display:flex;justify-content:space-between;align-items:center" onclick="openEv('${ev.id}')"><div><div style="font-weight:600;font-size:.86rem">${ev.name}</div><div style="font-size:.7rem;color:var(--mu)">${ev.start||'—'} → ${ev.end||'—'} · ${ev.venue||'—'}</div></div><div style="font-family:'Syne',sans-serif;font-weight:800;color:var(--ac2)">${(ev.amount||0).toLocaleString('fr-FR')}€</div></div>`}).join('')}</div>`:''}
  `;
}
function chgMo(d){S.calMonth+=d;if(S.calMonth>11){S.calMonth=0;S.calYear++}if(S.calMonth<0){S.calMonth=11;S.calYear--}render()}
function openNewEvOnDate(dateStr){
  openNewEv();
  setTimeout(function(){
    var dateInput = document.getElementById('ed');
    if(dateInput) dateInput.value = dateStr;
  }, 50);
}

function openCalDay(dateStr){
  var evs = S.events.filter(function(e){ return e.date === dateStr && e.status !== 'cancelled'; });
  var fd_label = fd(dateStr);

  // If no events, go directly to new event form
  if(!evs.length){ openNewEvOnDate(dateStr); return; }

  // Build day menu
  var evRows = evs.map(function(e){
    var et = ET[e.type] || ET.mariage;
    return '<div onclick="closeMo();openEv(\''+e.id+'\')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s2);border:1px solid var(--bd);border-left:3px solid '+et.c+';cursor:pointer;margin-bottom:6px">'
      + '<span style="font-size:1.1rem">'+et.e+'</span>'
      + '<div style="flex:1"><div style="font-size:.84rem;font-weight:600">'+escH(e.name)+'</div>'
      + '<div style="font-size:.7rem;color:var(--mu)">'+(e.start||'')+(e.end?' → '+e.end:'')+(e.client?' · '+escH(e.client):'')+'</div></div>'
      + '<span style="font-size:.7rem;color:var(--mu)">→</span>'
      + '</div>';
  }).join('');

  mo(fd_label,
    evRows
    + '<div onclick="closeMo();openNewEvOnDate(\''+dateStr+'\')" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;border:1px dashed var(--bd);cursor:pointer;margin-top:4px;font-size:.84rem;color:var(--ac)">'
    + '＋ Ajouter un événement ce jour'
    + '</div>',
    '<button class="btn bg" onclick="closeMo()">Fermer</button>'
  );
}

// ===== CLIENTS =====
function pgClients(){
  // Build client database from events + S.clients
  if(!S.clients) S.clients = [];
  
  // Merge events into client records
  var clientMap = {};
  S.clients.forEach(function(c){ clientMap[c.id] = c; });
  
  // Also build from events for clients not in S.clients
  S.events.forEach(function(ev){
    if(!ev.client) return;
    var existing = S.clients.find(function(c){ return c.name===ev.client; });
    if(!existing){
      var autoId = 'cl_'+ev.client.replace(/\s+/g,'_').toLowerCase();
      if(!clientMap[autoId]){
        clientMap[autoId] = {id:autoId, name:ev.client, type:'particulier', phone:'', email:'', address:'', defaultAmount:0, notes:'', createdAt:ev.date};
      }
    }
  });

  var clients = Object.values(clientMap);
  
  // Enrich with event stats
  clients = clients.map(function(c){
    var evs = S.events.filter(function(ev){ return ev.client===c.name; });
    var total = evs.reduce(function(s,e){ return s+(e.amount||0); },0);
    var last = evs.sort(function(a,b){ return new Date(b.date)-new Date(a.date); })[0];
    var contracts = S.contracts.filter(function(ct){ return ct.clientName===c.name; });
    var invoices = S.invoices.filter(function(inv){ return inv.clientName===c.name; });
    return Object.assign({},c,{evs:evs,total:total,last:last,contracts:contracts,invoices:invoices});
  }).sort(function(a,b){ return (b.last?new Date(b.last.date):0)-(a.last?new Date(a.last.date):0); });

  var typeColors = {particulier:'var(--ac2)',club:'var(--ac3)',entreprise:'var(--ok)',prestataire:'var(--ac)',mariage:'#ff6b35'};
  var typeLabels = {particulier:'Particulier',club:'Club',entreprise:'Entreprise',prestataire:'Prestataire',mariage:'Mariage'};

  return `<div class="ph"><div class="pt">Clients 👤</div>
  <button class="btn bp" onclick="openNewClient()">+ Nouveau client</button></div>
  <div class="cnt">
  ${clients.length===0?'<div class="empty"><div class="ei">👤</div><div class="et">Aucun client — ils apparaissent automatiquement depuis tes événements</div></div>':
  clients.map(function(c){
    var typeColor = typeColors[c.type]||'var(--mu)';
    var typeLabel = typeLabels[c.type]||c.type||'';
    return '<div class="card" style="cursor:pointer;display:flex;align-items:center;gap:14px;margin-bottom:8px" onclick="openClientDetail(\''+c.id+'\',\''+c.name+'\')">'+
      '<div style="width:40px;height:40px;background:'+typeColor+'22;border:1px solid '+typeColor+'44;display:flex;align-items:center;justify-content:center;font-family:Syne,sans-serif;font-weight:800;font-size:1rem;flex-shrink:0;color:'+typeColor+'">'+(c.name[0]||'?').toUpperCase()+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-weight:600;font-size:.88rem">'+(c.name||'')+'</div>'+
        '<div style="font-size:.68rem;color:var(--mu);margin-top:2px">'+
          '<span style="color:'+typeColor+';font-weight:600">'+typeLabel+'</span>'+
          (c.evs.length?' · '+c.evs.length+' prestation'+(c.evs.length>1?'s':''):'')+
          (c.last?' · dernier '+fd(c.last.date):'')+
        '</div>'+
      '</div>'+
      '<div style="text-align:right;flex-shrink:0">'+
        '<div style="font-family:Syne,sans-serif;font-weight:800;color:var(--ac2)">'+(c.total>0?c.total.toLocaleString('fr-FR')+'€':'—')+'</div>'+
        '<div style="font-size:.65rem;color:var(--mu);margin-top:2px">'+c.contracts.length+' contrat'+(c.contracts.length>1?'s':'')+(c.invoices.length?' · '+c.invoices.length+' facture'+(c.invoices.length>1?'s':''):'')+'</div>'+
      '</div>'+
    '</div>';
  }).join('')}
  </div>`;
}

function saveEditClient(clientId){
  var c=(S.clients||[]).find(function(cl){return cl.id===clientId;});
  if(!c)return;
  var oldName=c.name;
  c.name=(g('cl-name')||'').trim()||c.name;
  c.type=g('cl-type')||c.type;
  c.phone=g('cl-phone')||'';
  c.email=g('cl-email')||'';
  c.address=g('cl-addr')||'';
  c.defaultAmount=parseFloat(g('cl-amount')||0)||0;
  c.notes=g('cl-notes')||'';
  // Update events if name changed
  if(c.name!==oldName){
    S.events.forEach(function(ev){if(ev.client===oldName)ev.client=c.name;});
    S.invoices.forEach(function(inv){if(inv.clientName===oldName)inv.clientName=c.name;});
    S.contracts.forEach(function(ct){if(ct.clientName===oldName)ct.clientName=c.name;});
  }
  save();closeMo();render();
}

function deleteClient(clientId){
  if(!confirm('Supprimer ce client ? Les événements associés ne seront pas supprimés.'))return;
  S.clients=(S.clients||[]).filter(function(c){return c.id!==clientId;});
  save();closeMo();render();
}

// ===== ICS =====
function exportICS(id){
  const ev=S.events.find(e=>e.id==id);if(!ev)return;
  const d=ev.date.replace(/-/g,'');
  const ts=ev.start?ev.start.replace(':','')+'00':'000000';
  const te=ev.end?ev.end.replace(':','')+'00':'000000';

function exportAllICS(){

  S.events.filter(function(ev){ return ev.status !== 'cancelled'; }).forEach(function(ev){
    var d  = ev.date.replace(/-/g,'');
    var ts = ev.start ? ev.start.replace(':','')+'00' : '080000';
    var te = ev.end   ? ev.end.replace(':','')+'00'   : '200000';
    var et = ET[ev.type] || ET.mariage;
    lines.push('BEGIN:VEVENT');
    lines.push('UID:gp-'+ev.id+'@gigplanner');
    lines.push('DTSTART:'+d+'T'+ts);

  });

function importICSFile(input){
  var file = input.files[0];
  if(!file) return;
  var statusEl = document.getElementById('ics-import-status');
  var reader = new FileReader();
  reader.onload = function(e){
    var text = e.target.result;
    var events = parseICS(text);
    if(!events.length){
      if(statusEl) statusEl.innerHTML = '<span style="color:var(--er)">⚠️ Aucun événement trouvé dans ce fichier.</span>';
      return;
    }
    var added = 0;
    events.forEach(function(ev){
      // Check for duplicate by date+name
      var exists = S.events.find(function(e){ return e.date===ev.date && e.name===ev.name; });
      if(!exists){ S.events.push(ev); added++; }
    });
    save(); render();
    if(statusEl) statusEl.innerHTML = '<span style="color:var(--ok)">✅ '+added+' événement(s) importé(s) sur '+events.length+' trouvé(s).</span>';
  };
  reader.readAsText(file);
}

function parseICS(text){
  var events = [];
  var blocks = text.split('BEGIN:VEVENT');
  blocks.shift(); // remove header
  blocks.forEach(function(block){
    var get = function(key){
      var m = block.match(new RegExp(key+'[^:]*:([^\\r\\n]+)'));
      return m ? m[1].trim() : '';
    };
    var dtstart = get('DTSTART');
    var summary = get('SUMMARY');
    if(!dtstart || !summary) return;
    // Parse date YYYYMMDD or YYYYMMDDTHHmmss
    var dateStr = dtstart.replace(/T.*$/,'');
    var date = dateStr.slice(0,4)+'-'+dateStr.slice(4,6)+'-'+dateStr.slice(6,8);
    var startH = dtstart.includes('T') ? dtstart.slice(9,11)+':'+dtstart.slice(11,13) : '';
    var dtend = get('DTEND');
    var endH = dtend && dtend.includes('T') ? dtend.slice(9,11)+':'+dtend.slice(11,13) : '';
    var location = get('LOCATION');
    events.push({
      id: uid(),
      type: 'private',
      name: summary,
      client: '',
      date: date,
      start: startH,
      end: endH,
      venue: location,
      address: location,
      status: 'pending',
      amount: 0,
      acompteStatus: 'none',
      acomptePct: 0,
      serviceIds: [],
      checklist: [{t:'Contrat signé',d:false},{t:'Matériel vérifié',d:false},{t:'Solde reçu',d:false}],
      notes: 'Importé depuis .ics',
      links: []
    });
  });
  return events;
}

function syncFicheFromSB(evId, btn){
  var ev = S.events.find(function(e){ return e.id==evId; });
  if(!ev || !ev.clientToken){ alert('Pas de token pour cet événement'); return; }
  if(btn){ btn.textContent = '⏳ Syncing...'; btn.disabled = true; }
  sbGetFiche(ev.clientToken).then(function(rows){
    if(!rows || !rows.length){
      if(btn){ btn.textContent = '🔄 Sync fiche'; btn.disabled = false; }
      alert('Aucune fiche reçue pour cet événement.');
      return;
    }
    var cd = rows[0].data;
    ev.clientData = cd;
    if(cd.lieu)       ev.venue   = cd.lieu;
    if(cd.address)    ev.address = cd.address;
    if(cd.maries)     ev.client  = cd.maries;
    save();
    if(btn){ btn.textContent = '✅ Reçu !'; btn.style.background='var(--ok)'; }
    setTimeout(function(){ closeMo(); render(); }, 1000);
  }).catch(function(){
    if(btn){ btn.textContent = '🔄 Sync fiche'; btn.disabled = false; }
    alert('Erreur de connexion Supabase.');
  });
}

function cpTxt(elId,btn){
  const el=document.getElementById(elId);if(!el)return;
  navigator.clipboard.writeText(el.textContent||el.value||'').then(()=>{const o=btn.textContent;btn.textContent='✅ Copié!';setTimeout(()=>btn.textContent=o,2000)}).catch(()=>prompt('Copie ce lien :',el.textContent));
}

// ===== SUPABASE CONFIG =====
function sbUpsertFiche(token, data){
  return fetch(SB_URL + '/rest/v1/fiches_clients', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Prefer': 'resolution=merge-duplicates'
    },
    body: JSON.stringify({ event_token: token, data: data, updated_at: new Date().toISOString() })
  });
}

function sbGetFiche(token){
  return fetch(SB_URL + '/rest/v1/fiches_clients?event_token=eq.' + encodeURIComponent(token) + '&order=updated_at.desc&limit=1', {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  }).then(function(r){ return r.json(); });
}

function checkClientMode(){

  document.getElementById('main').innerHTML='<div style="text-align:center;padding:80px 20px"><div style="font-size:2rem;margin-bottom:12px">⏳</div><div style="font-size:.9rem;color:var(--mu)">Chargement...</div></div>';

  const evLocal=S.events.find(e=>e.clientToken===token);

  // Charge depuis Supabase pour avoir les dernières données
  sbGetFiche(token).then(function(rows){
    var cd = (rows && rows.length) ? rows[0].data : (evLocal ? evLocal.clientData||{} : {});
    // Crée un objet événement minimal pour le rendu
    var ev = evLocal || {
      id: 'client-'+token,
      clientToken: token,
      type: 'mariage',
      name: cd.maries || 'Votre événement',
      date: cd.date || '',
      clientData: cd
    };
    ev.clientData = cd;
    window._clientToken = token; // Stocke le token pour submitCF
    renderClientForm(ev);
  }).catch(function(){
    // Si Supabase échoue, utilise les données locales ou vide
    var ev = evLocal || { id:'client-'+token, clientToken:token, type:'mariage', name:'Votre événement', date:'', clientData:{} };
    window._clientToken = token;
    renderClientForm(ev);
  });
  return true;
}

// Migrate old transport1/transport2 fields to legs array (backward compat)
function _migrateLegsFromOldFields(cd, ev){
  var legs = [];
  if(cd.transport1Type||cd.transport1Dep||cd.transport1Arr){
    legs.push({type: (cd.transport1Type||'').toLowerCase().includes('avion')||cd.transport1Type==='vol'?'vol':'train', from:'', to:'', dep:cd.transport1Dep||'', arr:cd.transport1Arr||'', ref:cd.transport1Ref||'', link:cd.transport1Link||''});
  }
  if(cd.hotel){
    legs.push({type:'hotel', from:cd.hotel, to:'', dep:cd.checkin||'', arr:cd.checkout||'', ref:cd.hotelRef||'', link:cd.hotel});
  }
  if(cd.transferDep||ev.venue){
    legs.push({type:'transfer', from:'', to:ev.venue||'', dep:cd.transferDep||'', arr:'', ref:'', link:ev.address||ev.venue||''});
  }
  if(cd.transport2Type||cd.transport2Dep||cd.transport2Arr){
    legs.push({type: (cd.transport2Type||'').toLowerCase().includes('avion')?'retour_vol':'retour_train', from:'', to:'', dep:cd.transport2Dep||'', arr:cd.transport2Arr||'', ref:cd.transport2Ref||'', link:cd.transport2Link||''});
  }
  return legs;
}

function renderClientFiche(cd){
  var r = '';

  r += '<div class="st" style="display:flex;align-items:center;justify-content:space-between"><span>📋 Fiche client</span><span style="font-size:.62rem;color:var(--ok)">✅ Reçue</span></div>';
  r += '<div style="background:rgba(68,255,136,.04);border:1px solid rgba(68,255,136,.2);padding:14px;margin-bottom:10px;font-size:.78rem;display:grid;gap:5px">';

  // Identité
  r += row('💍 Mariés', cd.maries||cd.client, 'var(--tx)');
  r += row('📞 Contact principal', cd.contactPrincipal);
  r += row('📍 Contact sur place', cd.contactSurPlace);

  // Horaires
  var hasH = cd.heureMatReady||cd.heureArrivee||cd.heureCeremonie||cd.heureVin||cd.heureEntreeMaries||cd.heureRepas||cd.heureBal||cd.heureGateau||cd.heureFin;
  if(hasH){
    r += sep('⏰','Horaires');
    r += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">';
    r += row('Matériel prêt', cd.heureMatReady);
    r += row('Arrivée site', cd.heureArrivee);
    r += row('Cérémonie', cd.heureCeremonie);
    r += row("Vin d'honneur", cd.heureVin);
    r += row('Entrée des mariés', cd.heureEntreeMaries);
    r += row('Repas', cd.heureRepas);
    r += cd.heureBal ? '<div><span style="color:var(--ac2);font-weight:700">🎵 Ouverture bal : '+cd.heureBal+'</span></div>' : '';
    r += row('🎂 Gâteau', cd.heureGateau);
    r += row('🏁 Fin estimée', cd.heureFin);
    r += '</div>';
  }

  // Points sensibles
  if(cd.limiteSonore||cd.heureLimiteMu||cd.particularites){
    r += sep('⚠️','Points sensibles');
    r += row('Limite sonore', cd.limiteSonore, 'var(--wa)');
    r += row('Heure limite musique', cd.heureLimiteMu, 'var(--wa)');
    r += row('Particularités', cd.particularites);
  }

  // Moments clés
  if(cd.entreeMaries||cd.musiqueCeremonie||cd.sortieCeremonie||cd.premiereDanse||cd.musiqueGateau||cd.musiqueOuverture){
    r += sep('🎵','Moments clés');
    r += row('Entrée mariés', cd.entreeMaries);
    r += row('Musique cérémonie', cd.musiqueCeremonie);
    r += row('Sortie cérémonie', cd.sortieCeremonie);
    r += cd.premiereDanse ? '<div><span style="color:var(--ac2);font-weight:700">💃 1ère danse : '+escH(cd.premiereDanse)+'</span></div>' : '';
    r += row('🎂 Musique gâteau', cd.musiqueGateau);
    r += row('Ouverture bal', cd.musiqueOuverture);
  }

  // Interdits
  if(cd.interdits){
    r += sep('🚫','Morceaux interdits');
    r += '<div style="color:var(--er)">'+escH(cd.interdits)+'</div>';
  }

  // Annonces
  if(cd.annonces){ r += row('📢 Annonces', cd.annonces); }

  // Restrictions
  if(cd.limiteur||cd.coupureBasses||cd.coupureTotale){
    r += sep('🏛️','Restrictions lieu');
    r += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">';
    r += row('Limiteur', cd.limiteur, 'var(--wa)');
    r += row('Couper basses', cd.coupureBasses, 'var(--wa)');
    r += cd.coupureTotale ? '<div style="grid-column:1/-1"><span style="color:var(--er);font-weight:700">🔇 Coupure totale : '+cd.coupureTotale+'</span></div>' : '';
    r += '</div>';
  }

  if(cd.notes){ r += row('📝 Notes', cd.notes); }
  r += '</div>';
  return r;
}



function doSubmitCF(){
  var token = (new URLSearchParams(window.location.search)).get('client') || window._clientToken || '';
  submitCF(token, '');
}

// Helper global pour lire les champs du formulaire client
function g(id){ var el=document.getElementById(id); return el ? (el.value||'').trim() : ''; }

function submitCF(token, evId){
  var clientToken = token || window._clientToken || '';
  var ev = S.events.find(function(e){ return e.id==evId || (clientToken && e.clientToken===clientToken); });
  if(!clientToken){ var p=new URLSearchParams(window.location.search); clientToken=p.get('client')||''; }
  if(!ev && clientToken){ ev={id:evId||('c-'+clientToken),clientToken:clientToken,type:'mariage',name:'',clientData:{}}; }

  var cd = {
    maries:g('cf-ma'), contactPrincipal:g('cf-cp'), contactSurPlace:g('cf-cs'), contactSurPlaceTel:g('cf-cst'),
    lieu:g('cf-li'), address:g('cf-ad'),
    heureMatReady:g('cf-hmat'), heureArrivee:g('cf-harr'),
    heureCeremonie:g('cf-hc'), heureVin:g('cf-hv'),
    heureEntreeMaries:g('cf-hem'), heureRepas:g('cf-hrep'),
    heureBal:g('cf-hb'), heureGateau:g('cf-hg'), heureFin:g('cf-hf'),
    particularites:g('cf-part'),
    entreeMaries:g('cf-em'), musiqueCeremonie:g('cf-mc'), sortieCeremonie:g('cf-sc'),
    premiereDanse:g('cf-1d'), musiqueGateau:g('cf-mg'),
    interdits:g('cf-in'), annonces:g('cf-an'),
    limiteur:g('cf-lm'), coupureBasses:g('cf-bss'), coupureTotale:g('cf-ct'),
    notes:g('cf-no'), submittedAt:new Date().toISOString()
  };

  if(ev){
    ev.clientData = cd;
    if(cd.lieu && !ev.venue)    ev.venue   = cd.lieu;
    if(cd.address && !ev.address) ev.address = cd.address;
    if(cd.maries && !ev.client)  ev.client  = cd.maries;
    if(cd.notes)     ev.notes   = cd.notes;
    save();
    clientToken = ev.clientToken || clientToken;
  }

  var btn = document.querySelector('button[onclick="doSubmitCF()"]');
  if(btn){ btn.textContent = '⏳ Envoi...'; btn.disabled = true; }

  function finish(ok){
    // Reste sur le formulaire — juste une confirmation visuelle
    var b = document.querySelector('button[onclick="doSubmitCF()"]');
    if(b){
      b.textContent = '✅ Fiche envoyée ! Modifier et renvoyer à tout moment';
      b.disabled = false;
      b.style.background = 'var(--ok)';
      b.style.color = '#000';
    }
    // Met à jour le bandeau en haut
    var banner = document.querySelector('#cf-status-banner');
    if(banner){ banner.innerHTML = '✅ Fiche envoyée avec succès — vous pouvez modifier et renvoyer.'; banner.style.color='var(--ok)'; }
  }

  if(clientToken){
    sbUpsertFiche(clientToken, cd).then(function(r){
      finish();
    }).catch(function(){ finish(); });
  } else {
    finish();
  }
}

    if(cd.coupureTotale)  lines.push('  Coupure totale : ' + cd.coupureTotale);
  }
  if(cd.notes){           lines.push(''); lines.push('📝 Notes : ' + cd.notes); }
  lines.push('━━━━━━━━━━━━━━━━━━━━');
  var summary = lines.filter(function(l){ return l !== undefined; }).join('\n');

  document.getElementById('main').innerHTML =
    '<div style="max-width:640px;margin:0 auto;padding:40px 20px 60px;text-align:center">'
    + '<div style="font-size:3.5rem;margin-bottom:12px">🎉</div>'
    + '<div style="font-family:Syne,sans-serif;font-size:1.3rem;font-weight:800;color:var(--ok)">Merci !</div>'
    + '<div style="font-size:.86rem;color:var(--mu);margin-top:8px;line-height:1.7;margin-bottom:24px">Votre fiche est prête.<br>Copiez-la et envoyez-la à votre DJ par WhatsApp.</div>'

    + '<button onclick="copyCFSummary()" style="width:100%;padding:13px;background:var(--ac);color:#000;border:none;font-family:Syne,sans-serif;font-size:.95rem;font-weight:800;cursor:pointer">📋 Copier et envoyer par WhatsApp</button>'
    + '</div>';
}

function copyCFSummary(){
  var el = document.getElementById('cf-summary');
  if(!el) return;
  var txt = el.textContent;
  navigator.clipboard.writeText(txt).then(function(){
    var btn = document.querySelector('[onclick="copyCFSummary()"]');
    if(btn){ btn.textContent = '✅ Copié ! Collez dans WhatsApp'; btn.style.background='var(--ok)'; }
  }).catch(function(){
    prompt('Copiez ce texte et envoyez-le à votre DJ :', txt);
  });
}
