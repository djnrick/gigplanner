function _refreshDepFields(){
  ['voiture','train','vol','taxi','hotel'].forEach(function(k){
    var chk = document.getElementById('dep-chk-'+k);
    var lbl = document.getElementById('lbl-dep-chk-'+k);
    if(!chk||!lbl) return;
    lbl.style.borderColor = chk.checked ? 'var(--ac3)' : 'var(--bd)';
    lbl.style.background  = chk.checked ? 'rgba(185,107,255,.1)' : 'var(--s2)';
  });
  var container = document.getElementById('dep-fields');
  if(!container) return;
  var existLegs = window._clubLegs||[];
  function getLeg(type){ return existLegs.find(function(l){return l.type===type;})||{}; }
  function chk(id){ var el=document.getElementById('dep-chk-'+id); return el&&el.checked; }
  var html = '';

  if(chk('voiture')){
    html += '<div style="background:var(--s2);border:1px solid var(--bd);padding:12px;margin-bottom:8px;font-size:.82rem;color:var(--mu)">🚗 Déplacement en voiture — les champs km/trajet dans Logistique sont suffisants.</div>';
  }
  if(chk('train')){
    html += _depBlock('🚄','Train aller','train', getLeg('train'))
          + _depBlock('🚄','Train retour','retour_train', getLeg('retour_train'));
  }
  if(chk('vol')){
    html += _depBlock('✈️','Vol aller','vol', getLeg('vol'))
          + _depBlock('✈️','Vol retour','retour_vol', getLeg('retour_vol'));
  }
  if(chk('taxi')){

      html += '<div id="opts-body" style="display:none"><div style="display:flex;align-items:center;justify-content:space-between;margin:10px 0 5px"><span style="font-size:.62rem;font-weight:700;color:#ffaa00;letter-spacing:2px;text-transform:uppercase">✨ OPTIONS</span><span onclick="document.getElementById(\'opts-body\').style.display=\'none\';document.getElementById(\'opts-toggle\').style.display=\'\'" style="cursor:pointer;font-size:.7rem;color:var(--mu);padding:2px 8px;border:1px solid var(--bd)">✕ Réduire</span></div>' + opts.map(mkRow).join('') + '</div>';

function calcDeduped(serviceIds){
  // Collect all unique gearIds across all checked/selected services
  // A gear item is counted only ONCE even if present in multiple services
  var seenGear = {};
  var totalLoad = 0;
  var maxInstall = 0; // Install = max of all services (on installe tout en même temps sur site)
  var extraInstall = 0; // Options séparées (arche LED, photobooth, etc.) : on ajoute leur install

  serviceIds.forEach(function(sid){
    var s = S.serviceTypes.find(function(x){return x.id===sid;});
    if(!s) return;

    // For load: sum only gear not yet seen
    var svcGearLoad = 0;
    (s.gearIds||[]).forEach(function(gid){
      if(!seenGear[gid]){
        seenGear[gid] = true;
        var gi = S.gear.find(function(x){return x.id===gid;});
        if(gi) svcGearLoad += (gi.loadMin||0);
      }
    });
    // If service has no gear linked, use its own loadMin directly
    if(!(s.gearIds&&s.gearIds.length)){
      totalLoad += (s.loadMin||0);
    } else {
      totalLoad += svcGearLoad;
    }

    // Install logic: prestations principales = max (on installe simultanément)
    // Options sans gearIds (arche LED, photobooth...) = s'ajoutent en extra
    if(s.svcType==='option'){
      extraInstall += (s.installMin||0);
    } else {
      maxInstall = Math.max(maxInstall, (s.installMin||0));
    }
  });

  return {load: totalLoad, install: maxInstall + extraInstall};
}

function evRecalcTimes(){
  var checkedIds = S.serviceTypes
    .filter(function(s){ return document.getElementById('svc-'+s.id) && document.getElementById('svc-'+s.id).checked; })
    .map(function(s){ return s.id; });

  var result = calcDeduped(checkedIds);
  var loEl = document.getElementById('elo');
  var inEl = document.getElementById('ein');
  if(loEl && result.load > 0)    loEl.value = result.load;
  if(inEl && result.install > 0) inEl.value = result.install;

  // Auto-calc montant si les prestations ont des prix renseignés
  var autoTotal = 0;
  var hasPrices = false;
  checkedIds.forEach(function(sid){
    var s = S.serviceTypes.find(function(x){return x.id===sid;});
    if(s && s.price){ autoTotal += parseFloat(s.price)||0; hasPrices = true; }
  });
  var amEl = document.getElementById('eam');
  var priceHint = document.getElementById('svc-price-hint');
  if(hasPrices && amEl){
    var current = parseInt(amEl.value) || 0;
    // Auto-fill if field is blank or zero
    if(!amEl.value.trim() || current === 0){
      amEl.value = autoTotal;
      updateAcompteCalc();
    }
    if(priceHint){
      priceHint.style.display = 'block';
      priceHint.innerHTML = '💰 Total auto : <strong style="color:var(--ac)">' + autoTotal.toLocaleString('fr-FR') + '€</strong>'
        + (current > 0 && current !== autoTotal ? ' · <span style="color:var(--mu)">Actuel : '+current.toLocaleString('fr-FR')+'€</span>' : '')
        + ' <button type="button" onclick="document.getElementById(\'eam\').value='+autoTotal+';updateAcompteCalc()" style="background:var(--ac);border:none;color:#000;font-size:.65rem;padding:2px 8px;cursor:pointer;font-weight:700;margin-left:6px;border-radius:2px">Appliquer</button>';
      if(!amEl.value.trim() || current === 0) updateAcompteCalc();
    }
  } else if(priceHint){
    priceHint.style.display = checkedIds.length > 0 ? 'none' : 'none';
  }

  // Show a small dedupe hint if gear was shared
  var allGear = [];
  var dupes = [];
  checkedIds.forEach(function(sid){
    var s = S.serviceTypes.find(function(x){return x.id===sid;});
    if(s)(s.gearIds||[]).forEach(function(gid){
      if(allGear.indexOf(gid)!==-1 && dupes.indexOf(gid)===-1) dupes.push(gid);
      else allGear.push(gid);
    });
  });
  var hint = document.getElementById('svc-dedupe-hint');
  if(hint){
    if(dupes.length){
      var names = dupes.map(function(gid){ var g=S.gear.find(function(x){return x.id===gid;}); return g?g.name:gid; }).join(', ');
      hint.innerHTML = '♻️ Matos partagé dédupliqué : <strong>' + escH(names) + '</strong>';
      hint.style.display = 'block';
    } else {
      hint.style.display = 'none';
    }
  }
}

function pgClients(){
  // Build client database from events + S.clients
  if(!S.clients) S.clients = [];
  
  // Merge events into client records
  var clientMap = {};
  S.clients.forEach(function(c){ clientMap[c.id] = c; });
  
  // Also build from events for clients not in S.clients
  S.events.forEach(function(ev){
    if(!ev.client) return;
    var existing = S.clients.find(function(c){ return c.name===ev.client; });
    if(!existing){
      var autoId = 'cl_'+ev.client.replace(/\s+/g,'_').toLowerCase();
      if(!clientMap[autoId]){
        clientMap[autoId] = {id:autoId, name:ev.client, type:'particulier', phone:'', email:'', address:'', defaultAmount:0, notes:'', createdAt:ev.date};
      }
    }
  });

  var clients = Object.values(clientMap);
  
  // Enrich with event stats
  clients = clients.map(function(c){
    var evs = S.events.filter(function(ev){ return ev.client===c.name; });
    var total = evs.reduce(function(s,e){ return s+(e.amount||0); },0);
    var last = evs.sort(function(a,b){ return new Date(b.date)-new Date(a.date); })[0];
    var contracts = S.contracts.filter(function(ct){ return ct.clientName===c.name; });
    var invoices = S.invoices.filter(function(inv){ return inv.clientName===c.name; });
    return Object.assign({},c,{evs:evs,total:total,last:last,contracts:contracts,invoices:invoices});
  }).sort(function(a,b){ return (b.last?new Date(b.last.date):0)-(a.last?new Date(a.last.date):0); });

  var typeColors = {particulier:'var(--ac2)',club:'var(--ac3)',entreprise:'var(--ok)',prestataire:'var(--ac)',mariage:'#ff6b35'};
  var typeLabels = {particulier:'Particulier',club:'Club',entreprise:'Entreprise',prestataire:'Prestataire',mariage:'Mariage'};

  return `<div class="ph"><div class="pt">Clients 👤</div>
  <button class="btn bp" onclick="openNewClient()">+ Nouveau client</button></div>
  <div class="cnt">
  ${clients.length===0?'<div class="empty"><div class="ei">👤</div><div class="et">Aucun client — ils apparaissent automatiquement depuis tes événements</div></div>':
  clients.map(function(c){
    var typeColor = typeColors[c.type]||'var(--mu)';
    var typeLabel = typeLabels[c.type]||c.type||'';
    return '<div class="card" style="cursor:pointer;display:flex;align-items:center;gap:14px;margin-bottom:8px" onclick="openClientDetail(\''+c.id+'\',\''+c.name+'\')">'+
      '<div style="width:40px;height:40px;background:'+typeColor+'22;border:1px solid '+typeColor+'44;display:flex;align-items:center;justify-content:center;font-family:Syne,sans-serif;font-weight:800;font-size:1rem;flex-shrink:0;color:'+typeColor+'">'+(c.name[0]||'?').toUpperCase()+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-weight:600;font-size:.88rem">'+(c.name||'')+'</div>'+
        '<div style="font-size:.68rem;color:var(--mu);margin-top:2px">'+
          '<span style="color:'+typeColor+';font-weight:600">'+typeLabel+'</span>'+
          (c.evs.length?' · '+c.evs.length+' prestation'+(c.evs.length>1?'s':''):'')+
          (c.last?' · dernier '+fd(c.last.date):'')+
        '</div>'+
      '</div>'+
      '<div style="text-align:right;flex-shrink:0">'+
        '<div style="font-family:Syne,sans-serif;font-weight:800;color:var(--ac2)">'+(c.total>0?c.total.toLocaleString('fr-FR')+'€':'—')+'</div>'+
        '<div style="font-size:.65rem;color:var(--mu);margin-top:2px">'+c.contracts.length+' contrat'+(c.contracts.length>1?'s':'')+(c.invoices.length?' · '+c.invoices.length+' facture'+(c.invoices.length>1?'s':''):'')+'</div>'+
      '</div>'+
    '</div>';
  }).join('')}
  </div>`;
}

function saveNewClient(){
  var name=(g('cl-name')||'').trim();
  if(!name){alert('Le nom est obligatoire');return;}
  if(!S.clients) S.clients=[];
  var cat=(g('cl-cat')||'particulier');
  var id='cl_'+Date.now();
  S.clients.push({
    id:id,name:name,
    cat:cat,
    type:g('cl-type')||'particulier',
    freq:cat==='pro'?(g('cl-freq')||'ponctuel'):'oneshot',
    phone:g('cl-phone')||'',email:g('cl-email')||'',
    address:g('cl-addr')||'',
    defaultAmount:parseFloat(g('cl-amount')||0)||0,
    notes:g('cl-notes')||'',
    createdAt:new Date().toISOString()
  });
  save();closeMo();render();
}

function saveEditClient(clientId){
  var c=(S.clients||[]).find(function(cl){return cl.id===clientId;});
  if(!c)return;
  var oldName=c.name;
  c.name=(g('cl-name')||'').trim()||c.name;
  c.type=g('cl-type')||c.type;
  c.phone=g('cl-phone')||'';
  c.email=g('cl-email')||'';
  c.address=g('cl-addr')||'';
  c.defaultAmount=parseFloat(g('cl-amount')||0)||0;
  c.notes=g('cl-notes')||'';
  // Update events if name changed
  if(c.name!==oldName){
    S.events.forEach(function(ev){if(ev.client===oldName)ev.client=c.name;});
    S.invoices.forEach(function(inv){if(inv.clientName===oldName)inv.clientName=c.name;});
    S.contracts.forEach(function(ct){if(ct.clientName===oldName)ct.clientName=c.name;});
  }
  save();closeMo();render();
}

function deleteClient(clientId){
  if(!confirm('Supprimer ce client ? Les événements associés ne seront pas supprimés.'))return;
  S.clients=(S.clients||[]).filter(function(c){return c.id!==clientId;});
  save();closeMo();render();
}

// ===== ICS =====
function exportICS(id){
  const ev=S.events.find(e=>e.id==id);if(!ev)return;
  const d=ev.date.replace(/-/g,'');
  const ts=ev.start?ev.start.replace(':','')+'00':'000000';
  const te=ev.end?ev.end.replace(':','')+'00':'000000';
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','CALSCALE:GREGORIAN','BEGIN:VEVENT','UID:gp-'+ev.id+'@gigplanner','DTSTART:'+d+'T'+ts,'DTEND:'+d+'T'+te,'SUMMARY:'+ev.name,'LOCATION:'+(ev.address||ev.venue||''),'DESCRIPTION:Client : '+ev.client,'END:VEVENT','END:VCALENDAR'];
  const a=document.createElement('a');a.href='data:text/calendar;charset=utf-8,'+encodeURIComponent(lines.join('\r\n'));a.download='event.ics';a.click();
}

function exportAllICS(){
  var lines = ['BEGIN:VCALENDAR','VERSION:2.0','CALSCALE:GREGORIAN','PRODID:-//GigPlanner//FR'];
  S.events.filter(function(ev){ return ev.status !== 'cancelled'; }).forEach(function(ev){
    var d  = ev.date.replace(/-/g,'');
    var ts = ev.start ? ev.start.replace(':','')+'00' : '080000';
    var te = ev.end   ? ev.end.replace(':','')+'00'   : '200000';
    var et = ET[ev.type] || ET.mariage;
    lines.push('BEGIN:VEVENT');
    lines.push('UID:gp-'+ev.id+'@gigplanner');
    lines.push('DTSTART:'+d+'T'+ts);
    lines.push('DTEND:'+d+'T'+te);
    lines.push('SUMMARY:'+et.e+' '+ev.name+(ev.client?' — '+ev.client:''));
    lines.push('LOCATION:'+(ev.address||ev.venue||''));
    lines.push('DESCRIPTION:Client: '+(ev.client||'')+'\\nMontant: '+(ev.amount||0)+'€\\nStatut: '+(ev.status||''));
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  var a = document.createElement('a');
  a.href = 'data:text/calendar;charset=utf-8,'+encodeURIComponent(lines.join('\r\n'));
  a.download = 'gigplanner-events.ics';
  a.click();
}

function importICSFile(input){
  var file = input.files[0];
  if(!file) return;
  var statusEl = document.getElementById('ics-import-status');
  var reader = new FileReader();
  reader.onload = function(e){
    var text = e.target.result;
    var events = parseICS(text);
    if(!events.length){
      if(statusEl) statusEl.innerHTML = '<span style="color:var(--er)">⚠️ Aucun événement trouvé dans ce fichier.</span>';
      return;
    }
    var added = 0;
    events.forEach(function(ev){
      // Check for duplicate by date+name
      var exists = S.events.find(function(e){ return e.date===ev.date && e.name===ev.name; });
      if(!exists){ S.events.push(ev); added++; }
    });
    save(); render();
    if(statusEl) statusEl.innerHTML = '<span style="color:var(--ok)">✅ '+added+' événement(s) importé(s) sur '+events.length+' trouvé(s).</span>';
  };
  reader.readAsText(file);
}

function parseICS(text){
  var events = [];
  var blocks = text.split('BEGIN:VEVENT');
  blocks.shift(); // remove header
  blocks.forEach(function(block){
    var get = function(key){
      var m = block.match(new RegExp(key+'[^:]*:([^\\r\\n]+)'));
      return m ? m[1].trim() : '';
    };
    var dtstart = get('DTSTART');
    var summary = get('SUMMARY');
    if(!dtstart || !summary) return;
    // Parse date YYYYMMDD or YYYYMMDDTHHmmss
    var dateStr = dtstart.replace(/T.*$/,'');
    var date = dateStr.slice(0,4)+'-'+dateStr.slice(4,6)+'-'+dateStr.slice(6,8);
    var startH = dtstart.includes('T') ? dtstart.slice(9,11)+':'+dtstart.slice(11,13) : '';
    var dtend = get('DTEND');
    var endH = dtend && dtend.includes('T') ? dtend.slice(9,11)+':'+dtend.slice(11,13) : '';
    var location = get('LOCATION');
    events.push({
      id: uid(),
      type: 'private',
      name: summary,
      client: '',
      date: date,
      start: startH,
      end: endH,
      venue: location,
      address: location,
      status: 'pending',
      amount: 0,
      acompteStatus: 'none',
      acomptePct: 0,
      serviceIds: [],
      checklist: [{t:'Contrat signé',d:false},{t:'Matériel vérifié',d:false},{t:'Solde reçu',d:false}],
      notes: 'Importé depuis .ics',
      links: []
    });
  });
  return events;
}

function syncFicheFromSB(evId, btn){
  var ev = S.events.find(function(e){ return e.id==evId; });
  if(!ev || !ev.clientToken){ alert('Pas de token pour cet événement'); return; }
  if(btn){ btn.textContent = '⏳ Syncing...'; btn.disabled = true; }
  sbGetFiche(ev.clientToken).then(function(rows){
    if(!rows || !rows.length){
      if(btn){ btn.textContent = '🔄 Sync fiche'; btn.disabled = false; }
      alert('Aucune fiche reçue pour cet événement.');
      return;
    }
    var cd = rows[0].data;
    ev.clientData = cd;
    if(cd.lieu)       ev.venue   = cd.lieu;
    if(cd.address)    ev.address = cd.address;
    if(cd.maries)     ev.client  = cd.maries;
    save();
    if(btn){ btn.textContent = '✅ Reçu !'; btn.style.background='var(--ok)'; }
    setTimeout(function(){ closeMo(); render(); }, 1000);
  }).catch(function(){
    if(btn){ btn.textContent = '🔄 Sync fiche'; btn.disabled = false; }

  });

function cpTxt(elId,btn){
  const el=document.getElementById(elId);if(!el)return;
  navigator.clipboard.writeText(el.textContent||el.value||'').then(()=>{const o=btn.textContent;btn.textContent='✅ Copié!';setTimeout(()=>btn.textContent=o,2000)}).catch(()=>prompt('Copie ce lien :',el.textContent));
}

// ===== SUPABASE CONFIG =====
function sbUpsertFiche(token, data){
  return fetch(SB_URL + '/rest/v1/fiches_clients', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Prefer': 'resolution=merge-duplicates'
    },
    body: JSON.stringify({ event_token: token, data: data, updated_at: new Date().toISOString() })
  });
}

function sbGetFiche(token){
  return fetch(SB_URL + '/rest/v1/fiches_clients?event_token=eq.' + encodeURIComponent(token) + '&order=updated_at.desc&limit=1', {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  }).then(function(r){ return r.json(); });
}

// ===== CLIENT FORM MODE =====
function checkClientMode(){
  const p=new URLSearchParams(window.location.search);
  const token=p.get('client');if(!token)return false;
  document.querySelector('.sidebar').style.display='none';
  document.getElementById('main').innerHTML='<div style="text-align:center;padding:80px 20px"><div style="font-size:2rem;margin-bottom:12px">⏳</div><div style="font-size:.9rem;color:var(--mu)">Chargement...</div></div>';

  // Cherche d'abord dans les données locales (mode DJ)
  const evLocal=S.events.find(e=>e.clientToken===token);

  // Charge depuis Supabase pour avoir les dernières données
  sbGetFiche(token).then(function(rows){
    var cd = (rows && rows.length) ? rows[0].data : (evLocal ? evLocal.clientData||{} : {});
    // Crée un objet événement minimal pour le rendu
    var ev = evLocal || {
      id: 'client-'+token,
      clientToken: token,
      type: 'mariage',
      name: cd.maries || 'Votre événement',
      date: cd.date || '',
      clientData: cd
    };
    ev.clientData = cd;
    window._clientToken = token; // Stocke le token pour submitCF
    renderClientForm(ev);
  }).catch(function(){
    // Si Supabase échoue, utilise les données locales ou vide
    var ev = evLocal || { id:'client-'+token, clientToken:token, type:'mariage', name:'Votre événement', date:'', clientData:{} };
    window._clientToken = token;
    renderClientForm(ev);
  });
  return true;
}

function addClubLeg(type){
  if(!window._clubLegs) window._clubLegs = [];
  var base = {type:type, from:'', to:'', dep:'', arr:'', ref:'', link:''};
  if(type==='voiture'){
    base.from = S.profile.departureAddress||'';
    // Pre-fill destination with club address from wizard data
    var wd = window._wiz && window._wiz.data;
    base.to = (wd&&(wd.address||wd.venue)) || '';
  }
  window._clubLegs.push(base);
  var idx = window._clubLegs.length - 1;
  _refreshLegsUI();
  // Auto-calculate route for voiture perso if both addresses available
  if(type==='voiture' && base.from && base.to){
    setTimeout(function(){ calcTrajetLegAuto(idx); }, 200);
  }
}

function delClubLeg(idx){
  if(!window._clubLegs) return;
  window._clubLegs.splice(idx, 1);
  _refreshLegsUI();
}

function _readLegsFromDOM(){
  var legs = window._clubLegs||[];
  return legs.map(function(leg, idx){
    var g = function(id){ var el=document.getElementById(id); return el?el.value.trim():''; };
    var isHotel = leg.type==='hotel';
    var isVoiture = leg.type==='voiture';
    var result = { type:leg.type, from:g('leg-'+idx+'-from'), dep:g('leg-'+idx+'-dep'), arr:g('leg-'+idx+'-arr') };
    if(!isHotel) result.to = g('leg-'+idx+'-to');
    if(!isVoiture){ result.ref=g('leg-'+idx+'-ref'); result.link=g('leg-'+idx+'-link'); }
    if(isVoiture && leg.km){ result.km=leg.km; result.driveMin=leg.driveMin; }
    return result;
  });
}

function renderClientFiche(cd){
  var r = '';
  var row = function(label, val, color){ return val ? '<div><span style="color:var(--mu)">'+label+' :</span> <span'+(color?' style="color:'+color+';font-weight:700"':'')+'> '+escH(val)+'</span></div>' : ''; };
  var sep = function(emoji, title){ return '<div style="border-top:1px solid rgba(68,255,136,.15);padding-top:6px;margin-top:4px;font-size:.62rem;font-weight:700;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">'+emoji+' '+title+'</div>'; };

  r += '<div class="st" style="display:flex;align-items:center;justify-content:space-between"><span>📋 Fiche client</span><span style="font-size:.62rem;color:var(--ok)">✅ Reçue</span></div>';
  r += '<div style="background:rgba(68,255,136,.04);border:1px solid rgba(68,255,136,.2);padding:14px;margin-bottom:10px;font-size:.78rem;display:grid;gap:5px">';

  // Identité
  r += row('💍 Mariés', cd.maries||cd.client, 'var(--tx)');
  r += row('📞 Contact principal', cd.contactPrincipal);
  r += row('📍 Contact sur place', cd.contactSurPlace);

  // Horaires
  var hasH = cd.heureMatReady||cd.heureArrivee||cd.heureCeremonie||cd.heureVin||cd.heureEntreeMaries||cd.heureRepas||cd.heureBal||cd.heureGateau||cd.heureFin;
  if(hasH){
    r += sep('⏰','Horaires');
    r += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">';
    r += row('Matériel prêt', cd.heureMatReady);
    r += row('Arrivée site', cd.heureArrivee);
    r += row('Cérémonie', cd.heureCeremonie);
    r += row("Vin d'honneur", cd.heureVin);
    r += row('Entrée des mariés', cd.heureEntreeMaries);
    r += row('Repas', cd.heureRepas);
    r += cd.heureBal ? '<div><span style="color:var(--ac2);font-weight:700">🎵 Ouverture bal : '+cd.heureBal+'</span></div>' : '';
    r += row('🎂 Gâteau', cd.heureGateau);
    r += row('🏁 Fin estimée', cd.heureFin);
    r += '</div>';
  }

  // Points sensibles
  if(cd.limiteSonore||cd.heureLimiteMu||cd.particularites){
    r += sep('⚠️','Points sensibles');
    r += row('Limite sonore', cd.limiteSonore, 'var(--wa)');
    r += row('Heure limite musique', cd.heureLimiteMu, 'var(--wa)');
    r += row('Particularités', cd.particularites);
  }

  // Moments clés
  if(cd.entreeMaries||cd.musiqueCeremonie||cd.sortieCeremonie||cd.premiereDanse||cd.musiqueGateau||cd.musiqueOuverture){
    r += sep('🎵','Moments clés');
    r += row('Entrée mariés', cd.entreeMaries);
    r += row('Musique cérémonie', cd.musiqueCeremonie);
    r += row('Sortie cérémonie', cd.sortieCeremonie);
    r += cd.premiereDanse ? '<div><span style="color:var(--ac2);font-weight:700">💃 1ère danse : '+escH(cd.premiereDanse)+'</span></div>' : '';
    r += row('🎂 Musique gâteau', cd.musiqueGateau);
    r += row('Ouverture bal', cd.musiqueOuverture);
  }

  // Interdits
  if(cd.interdits){
    r += sep('🚫','Morceaux interdits');
    r += '<div style="color:var(--er)">'+escH(cd.interdits)+'</div>';
  }

  // Annonces
  if(cd.annonces){ r += row('📢 Annonces', cd.annonces); }

  // Restrictions
  if(cd.limiteur||cd.coupureBasses||cd.coupureTotale){
    r += sep('🏛️','Restrictions lieu');
    r += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">';
    r += row('Limiteur', cd.limiteur, 'var(--wa)');
    r += row('Couper basses', cd.coupureBasses, 'var(--wa)');
    r += cd.coupureTotale ? '<div style="grid-column:1/-1"><span style="color:var(--er);font-weight:700">🔇 Coupure totale : '+cd.coupureTotale+'</span></div>' : '';
    r += '</div>';
  }

  if(cd.notes){ r += row('📝 Notes', cd.notes); }
  r += '</div>';
  return r;
}



function doSubmitCF(){
  var token = (new URLSearchParams(window.location.search)).get('client') || window._clientToken || '';
  submitCF(token, '');
}

// Helper global pour lire les champs du formulaire client
function g(id){ var el=document.getElementById(id); return el ? (el.value||'').trim() : ''; }

function submitCF(token, evId){
  var clientToken = token || window._clientToken || '';
  var ev = S.events.find(function(e){ return e.id==evId || (clientToken && e.clientToken===clientToken); });
  if(!clientToken){ var p=new URLSearchParams(window.location.search); clientToken=p.get('client')||''; }
  if(!ev && clientToken){ ev={id:evId||('c-'+clientToken),clientToken:clientToken,type:'mariage',name:'',clientData:{}}; }

  var cd = {
    maries:g('cf-ma'), contactPrincipal:g('cf-cp'), contactSurPlace:g('cf-cs'), contactSurPlaceTel:g('cf-cst'),
    lieu:g('cf-li'), address:g('cf-ad'),
    heureMatReady:g('cf-hmat'), heureArrivee:g('cf-harr'),
    heureCeremonie:g('cf-hc'), heureVin:g('cf-hv'),
    heureEntreeMaries:g('cf-hem'), heureRepas:g('cf-hrep'),
    heureBal:g('cf-hb'), heureGateau:g('cf-hg'), heureFin:g('cf-hf'),
    particularites:g('cf-part'),
    entreeMaries:g('cf-em'), musiqueCeremonie:g('cf-mc'), sortieCeremonie:g('cf-sc'),
    premiereDanse:g('cf-1d'), musiqueGateau:g('cf-mg'),
    interdits:g('cf-in'), annonces:g('cf-an'),
    limiteur:g('cf-lm'), coupureBasses:g('cf-bss'), coupureTotale:g('cf-ct'),
    notes:g('cf-no'), submittedAt:new Date().toISOString()
  };

  if(ev){
    ev.clientData = cd;
    if(cd.lieu && !ev.venue)    ev.venue   = cd.lieu;
    if(cd.address && !ev.address) ev.address = cd.address;
    if(cd.maries && !ev.client)  ev.client  = cd.maries;
    if(cd.notes)     ev.notes   = cd.notes;
    save();
    clientToken = ev.clientToken || clientToken;
  }

  var btn = document.querySelector('button[onclick="doSubmitCF()"]');
  if(btn){ btn.textContent = '⏳ Envoi...'; btn.disabled = true; }

  function finish(ok){
    // Reste sur le formulaire — juste une confirmation visuelle
    var b = document.querySelector('button[onclick="doSubmitCF()"]');
    if(b){
      b.textContent = '✅ Fiche envoyée ! Modifier et renvoyer à tout moment';
      b.disabled = false;
      b.style.background = 'var(--ok)';
      b.style.color = '#000';
    }
    // Met à jour le bandeau en haut
    var banner = document.querySelector('#cf-status-banner');
    if(banner){ banner.innerHTML = '✅ Fiche envoyée avec succès — vous pouvez modifier et renvoyer.'; banner.style.color='var(--ok)'; }
  }

  if(clientToken){
    sbUpsertFiche(clientToken, cd).then(function(r){
      finish();
    }).catch(function(){ finish(); });
  } else {
    finish();
  }
}

    } : {

function parseFicheText(evId){
  var txt = (document.getElementById('fiche-import-txt')||{}).value || '';
  if(!txt.trim()){ document.getElementById('fiche-import-msg').textContent = "⚠️ Colle le texte d'abord"; return; }
  var ev = S.events.find(function(e){ return e.id==evId; });
  if(!ev) return;

  var cd = ev.clientData || {};
  var get = function(label){
    var re = new RegExp(label.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*:\\s*(.+)', 'i');
    var m = txt.match(re);
    return m ? m[1].trim() : '';
  };

  var imported = {
    maries:           get('Mariés') || get('Maries'),
    contactPrincipal: get('Contact'),
    contactSurPlace:  get('Sur place'),
    lieu:             get('Lieu'),
    address:          get('Adresse'),
    heureMatReady:    get('Matériel prêt') || get('Materiel pret'),
    heureArrivee:     get('Arrivée site') || get('Arrivee site'),
    heureCeremonie:   get('Cérémonie') || get('Ceremonie'),
    heureVin:         get("Vin d'honneur"),
    heureBal:         get('Ouverture bal'),
    heureGateau:      get('Gâteau') || get('Gateau'),
    heureFin:         get('Fin'),
    particularites:   get('Particularités') || get('Particularites'),
    entreeMaries:     get('Entrée mariés') || get('Entree maries'),
    musiqueCeremonie: get('Cérémonie') || get('Ceremonie'),
    sortieCeremonie:  get('Sortie cérémonie') || get('Sortie ceremonie'),
    premiereDanse:    get('1ère danse') || get('Première danse') || get('1ere danse'),
    musiqueGateau:    get('Gâteau') || get('Gateau'),
    interdits:        get('Interdits'),
    annonces:         get('Annonces'),
    limiteur:         get('Limiteur'),
    coupureBasses:    get('Couper basses'),
    coupureTotale:    get('Coupure totale'),
    notes:            get('Notes'),
    submittedAt:      new Date().toISOString()
  };

  var count = Object.keys(imported).filter(function(k){ return k!=='submittedAt' && imported[k]; }).length;
  ev.clientData = Object.assign({}, cd, imported);
  if(ev.clientData.lieu)      ev.venue   = ev.clientData.lieu;
  if(ev.clientData.address)   ev.address = ev.clientData.address;
  if(ev.clientData.maries)    ev.client  = ev.clientData.maries;
  save();

  var msg = document.getElementById('fiche-import-msg');
  if(msg){ msg.textContent = '✅ ' + count + ' champs importés !'; msg.style.color = 'var(--ok)'; }
  setTimeout(function(){ closeMo(); render(); }, 1200);
}

  clearTimeout(_wizSiretTimer);

async function wizLookupSiret(){
  var inp = document.getElementById('ec-siret');
  var msg = document.getElementById('wiz-siret-msg');
  if(!inp || !msg) return;
  var raw = inp.value.replace(/\s/g,'');
  if(raw.length!==14||!/^\d{14}$/.test(raw)){
    msg.textContent='⚠️ SIRET invalide (14 chiffres)'; msg.style.color='var(--wa)'; return;
  }
  msg.textContent='⏳ Recherche...'; msg.style.color='var(--mu)';
  try{
    var res = await fetch('https://recherche-entreprises.api.gouv.fr/search?q='+raw+'&page=1&per_page=1');
    if(!res.ok) throw new Error('HTTP '+res.status);
    var data = await res.json();
    var r = data.results && data.results[0];
    if(!r){ msg.textContent='❌ SIRET non trouvé'; msg.style.color='var(--er)'; return; }
    var siege = r.siege || {};
    var nom = r.nom_raison_sociale || r.nom_complet || r.nom || '';
    if(!nom || nom==='[NON-DIFFUSIBLE]'){
      msg.innerHTML='⚠️ Entreprise non-diffusible — remplis manuellement'; msg.style.color='var(--wa)'; return;
    }
    // Pré-remplir nom société
    var ecEl = document.getElementById('ec');
    if(ecEl && !ecEl.value) ecEl.value = nom;
    else if(ecEl) ecEl.value = nom; // toujours écraser avec données officielles
    // Pré-remplir adresse
    var addrEl = document.getElementById('ec-addr');
    if(addrEl){
      var rue = [(siege.numero_voie||''),(siege.type_voie||''),(siege.libelle_voie||'')].filter(Boolean).join(' ');
      var cp  = siege.code_postal||'';
      var ville = siege.libelle_commune||'';
      var fullAddr = [rue, [cp,ville].filter(Boolean).join(' ')].filter(Boolean).join(', ');
      if(fullAddr) addrEl.value = fullAddr;
    }
    msg.innerHTML='✅ <strong>'+escH(nom)+'</strong> trouvée'; msg.style.color='var(--ok)';
  } catch(e){
    msg.textContent='❌ Erreur réseau'; msg.style.color='var(--er)';
  }
}

async function lookupSiret(){
  var raw = document.getElementById('pp-siret').value.replace(/\s/g,'');
  var m = document.getElementById('sm');
  if(raw.length!==14||!/^\d+$/.test(raw)){
    m.textContent='⚠️ SIRET invalide (14 chiffres requis)';m.style.color='var(--wa)';return;
  }
  m.textContent='⏳ Recherche en cours...';m.style.color='var(--mu)';
  try{
    var res = await fetch('https://recherche-entreprises.api.gouv.fr/search?q='+raw+'&page=1&per_page=1');
    if(!res.ok) throw new Error('HTTP '+res.status);
    var d = await res.json();
    var r = d.results && d.results[0];

    if(r){
      var siege = r.siege || {};
      var nom = r.nom_raison_sociale || r.nom_complet || r.nom || '';

      // Cas non-diffusible : l'INSEE masque les données sur demande du dirigeant
      if(!nom || nom === '[NON-DIFFUSIBLE]' || (siege && siege.adresse === '[NON-DIFFUSIBLE]')){
        m.innerHTML = '⚠️ Entreprise trouvée mais <strong>non-diffusible</strong> — l\'INSEE masque tes données.<br>'
          + '<span style="font-size:.68rem;color:var(--mu)">Remplis les champs manuellement. '
          + 'Pour activer la diffusion publique : insee.fr → "Demande de diffusion au répertoire SIRENE".</span>';
        m.style.color = 'var(--wa)';
        return;
      }

      var set = function(id, val){ var el=document.getElementById(id); if(el && val && val !== '[NON-DIFFUSIBLE]') el.value=val; };
      set('pp-ln', nom);
      var ppn = document.getElementById('pp-n');

function prefillInvFromEv(evId){
  var ev = evId ? S.events.find(function(e){return e.id==evId;}) : null;
  window._iEvId = evId||null;
  if(!ev) return;
  var cd = ev.clientData||{};
  var cl = document.getElementById('in-cl');
  var ad = document.getElementById('in-ad');
  var no = document.getElementById('in-no');
  var ac = document.getElementById('in-ac');
  if(cl) cl.value = cd.maries||cd.client||ev.client||'';
  if(ad) ad.value = cd.address||ev.address||'';
  if(no) no.value = ev.notes||'';
  // Prefill lines from event services
  var svcs=(ev.serviceIds||[]).map(function(sid){return S.serviceTypes.find(function(s){return s.id===sid;});}).filter(Boolean);
  var lines = svcs.length>0
    ? svcs.map(function(s){return {d:s.emoji+' '+s.name+(s.desc?' — '+s.desc:''),q:1,u:Math.round((ev.amount||0)/svcs.length)};})
    : [{d:'Prestation DJ — '+ev.name,q:1,u:ev.amount||0}];
  window._iLines = lines.length;
  var ilw = document.getElementById('ilw');
  if(ilw) ilw.innerHTML = lines.map(function(l,i){return iLH(i,l.d,l.q,l.u);}).join('');
  // Acompte déjà versé
  if(ac && ev.acompteStatus==='received'){
    var acompteVal = ev.acompteAmount||(ev.amount&&ev.acomptePct?Math.round(ev.amount*(ev.acomptePct/100)):0);
    ac.value = acompteVal||0;
  }
}

function uploadContractForEv(){
  var evId = window._uploadCtrEvId;

  if(!fileInput||!fileInput.files||!fileInput.files[0]){ msg.textContent='⚠️ Sélectionne un fichier PDF'; msg.style.color='var(--wa)'; return; }
  var file = fileInput.files[0];
  if(file.size > 5*1024*1024){ msg.textContent='⚠️ Fichier trop lourd (max 5MB)'; msg.style.color='var(--wa)'; return; }
  msg.textContent='⏳ Upload en cours...'; msg.style.color='var(--mu)';
  var btn = document.querySelector('[onclick="uploadContractForEv()"]');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Upload...'; }
  var fileName = evId + '_contrat_' + Date.now() + '.pdf';
  fetch(SB_URL + '/storage/v1/object/documents/' + fileName, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/pdf', 'x-upsert': 'true' },
    body: file
  }).then(function(r){
    if(!r.ok) throw new Error('Upload failed: ' + r.status);
    var publicUrl = SB_URL + '/storage/v1/object/public/documents/' + fileName;
    var ev = S.events.find(function(e){ return e.id==evId; });
    if(ev){ if(!ev.docs) ev.docs=[]; ev.docs.push({ type:'contrat', name:file.name, url:publicUrl, uploadedAt:new Date().toISOString() }); }
    save();
    msg.textContent='✅ Contrat importé !'; msg.style.color='var(--ok)';
    setTimeout(function(){ closeMo(); openEv(evId); }, 800);
  }).catch(function(err){
    msg.textContent='❌ Erreur : ' + err.message; msg.style.color='var(--er)';
    if(btn){ btn.disabled=false; btn.textContent='📤 Uploader'; }
  });
}

function iLH(i,d,q,u){
  return `<div id="il-${i}" style="display:grid;grid-template-columns:1fr 50px 90px 26px;gap:5px;margin-bottom:5px;align-items:center">
  <input id="id-${i}" value="${escH(d||'')}" placeholder="Description" style="background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px 9px;font-size:.78rem;outline:none;width:100%">

  <input id="iu-${i}" type="number" value="${u||0}" min="0" style="background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px;font-size:.78rem;outline:none;text-align:right;width:100%">
  <button onclick="document.getElementById('il-${i}').remove()" style="background:none;border:none;color:var(--er);cursor:pointer;font-size:1rem;padding:0">✕</button>

}

function addIL(){
  const n=window._iLines||0;window._iLines=n+1;
  const w=document.getElementById('ilw');if(!w)return;
  const d=document.createElement('div');d.innerHTML=iLH(n,'',1,0);
  w.appendChild(d.firstElementChild);
}

function collectLines(){
  const ls=[];
  for(let i=0;i<50;i++){
    const dd=document.getElementById('id-'+i);
    const qq=document.getElementById('iq-'+i);
    const uu=document.getElementById('iu-'+i);
    if(dd&&dd.closest('#ilw')&&dd.value.trim())ls.push({desc:dd.value.trim(),qty:parseInt(qq&&qq.value)||1,unit:parseFloat(uu&&uu.value)||0});
  }
  return ls;
}

function saveInv(print){
  const lines=collectLines();
  const p=S.profile;
  const ht=lines.reduce((s,l)=>s+l.qty*l.unit,0);
  const tvr=p.tvaActive?0.20:0;
  const tva=ht*tvr;
  const ttc=ht+tva;
  const ac=parseFloat(document.getElementById('in-ac')&&document.getElementById('in-ac').value)||0;
  const ev=window._iEvId?S.events.find(e=>e.id===window._iEvId):null;
  const inv={id:'inv'+uid(),number:document.getElementById('in-num').value||'',date:document.getElementById('in-date').value||new Date().toISOString().split('T')[0],clientName:document.getElementById('in-cl').value||'',clientAddress:document.getElementById('in-ad').value||'',eventName:ev&&ev.name||'',evId:window._iEvId,lines,ht,tva,tvaRate:tvr,ttc,acompte:ac,solde:ttc-ac,totalTTC:ttc,notes:document.getElementById('in-no')&&document.getElementById('in-no').value||'',paid:document.getElementById('in-pa')&&document.getElementById('in-pa').value==='1'};
  S.invoices.push(inv);
  S.profile.invoiceCounter=(S.profile.invoiceCounter||1)+1;
  save();closeMo();
  if(print)printInv(inv.id);
  else{go('billing')}
}

function recopyRev(){

}

  const el=S.externalLinks;
  const defPlatforms=[{label:'Google',emoji:'⭐',url:''},{label:'Mariages.net',emoji:'💍',url:''},{label:'Facebook',emoji:'📘',url:''}];
  document.getElementById('mtitle').textContent='🔗 Liens plateformes';
  document.getElementById('mbody').innerHTML=`
  <div style="font-size:.8rem;color:var(--mu);margin-bottom:14px">Configure tes liens d'avis pour les partager à tes clients.</div>
  <div id="elw">${(el.length?el:defPlatforms).map((l,i)=>elRow(i,l.label,l.emoji,l.url)).join('')}</div>
  <button class="btn bg" style="font-size:.74rem;margin-top:6px" onclick="addElRow()">+ Ajouter une plateforme</button>`;
  window._elCount=el.length||defPlatforms.length;

function elRow(i,label,emoji,url){
  return `<div id="elr-${i}" style="display:grid;grid-template-columns:36px 120px 1fr 28px;gap:6px;margin-bottom:6px;align-items:center">
  <input id="ele-${i}" value="${escH(emoji||'🔗')}" maxlength="2" style="background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px;font-size:1rem;outline:none;text-align:center;width:100%">
  <input id="ell-${i}" value="${escH(label||'')}" placeholder="Nom" style="background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px 9px;font-size:.8rem;outline:none;width:100%">
  <input id="elu-${i}" value="${escH(url||'')}" placeholder="https://..." style="background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px 9px;font-size:.8rem;outline:none;width:100%">
  <button onclick="document.getElementById('elr-${i}').remove()" style="background:none;border:none;color:var(--er);cursor:pointer;font-size:1rem;padding:0">✕</button>
  </div>`;
}

function addElRow(){const n=window._elCount||0;window._elCount=n+1;const w=document.getElementById('elw');if(!w)return;const d=document.createElement('div');d.innerHTML=elRow(n,'','🔗','');w.appendChild(d.firstElementChild)}

function saveExtLinks(){
  const links=[];
  for(let i=0;i<50;i++){
    const le=document.getElementById('ele-'+i);
    const ll=document.getElementById('ell-'+i);
    const lu=document.getElementById('elu-'+i);
    if(le&&le.closest('#elw')&&ll&&ll.value.trim()&&lu&&lu.value.trim())links.push({id:'el'+i,label:ll.value.trim(),emoji:le.value.trim()||'🔗',url:lu.value.trim()});
  }
  S.externalLinks=links;save();closeMo();render();
}

.hn{font-family:'Syne',sans-serif;font-size:3rem;font-weight:800;letter-spacing:-2px;line-height:1}
.cnt{max-width:900px;margin:0 auto;padding:60px 40px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:48px}
@media(max-width:600px){.hero{padding:50px 20px}.cnt{padding:40px 20px}.hn{font-size:2rem}}</style></head>

  ${p.status?`<div style="font-size:.68rem;color:#6b6b8a;letter-spacing:3px;text-transform:uppercase;margin-top:8px">${p.status}</div>`:''}
  ${p.city?`<div style="font-size:.82rem;color:#888;margin-top:6px">📍 ${p.city}</div>`:''}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('active');});
  var tabEl = document.getElementById('tab-'+t);
  if(tabEl) tabEl.classList.add('active');
  var fns = {profile:renderProfile, gear:renderGear, svc:renderSvc, options:renderOptions, goals:renderGoals, data:renderData, compte:renderCompte};
  var fn = fns[t] || renderProfile;
  document.getElementById('tab-content').innerHTML = fn();
}

async function sendPasswordReset(){
  var email = currentUser ? currentUser.email : '';
  if(!email) return;
  var btn = document.querySelector('#tab-content .bp');
  if(btn){btn.disabled=true;btn.textContent='⏳ Envoi...';}
  try{
    var r = await fetch(SB_URL+'/auth/v1/recover',{
      method:'POST',
      headers:{'apikey':SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email:email})
    });
    var msg = document.getElementById('pwd-msg');
    if(r.ok){
      if(msg){msg.style.color='var(--ok)';msg.textContent='✅ Email envoyé à '+email;}
    } else {
      if(msg){msg.style.color='var(--er)';msg.textContent='Erreur lors de l\'envoi';}
    }
  }catch(e){
    var msg=document.getElementById('pwd-msg');
    if(msg){msg.style.color='var(--er)';msg.textContent='Erreur réseau';}
  }
  if(btn){btn.disabled=false;btn.textContent='📧 Envoyer le lien de réinitialisation';}
}

function exportData(){
  var data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    events:       S.events,
    gear:         S.gear,
    serviceTypes: S.serviceTypes,
    invoices:     S.invoices,
    contracts:    S.contracts,
    reviews:      S.reviews,
    globalLinks:  S.globalLinks,
    externalLinks:S.externalLinks,
    profile:      S.profile
  };
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], {type:'application/json'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  var date = new Date().toISOString().slice(0,10);
  a.href     = url;
  a.download = 'gigplanner-sauvegarde-' + date + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(input){
  var file = input.files[0];
  if(!file) return;
  var status = document.getElementById('import-status');
  if(status) status.innerHTML = '<span style="color:var(--mu)">Lecture en cours...</span>';

  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var data = JSON.parse(e.target.result);
      // Validate it's a GigPlanner file
      if(!data.events && !data.gear){
        throw new Error('Fichier non reconnu');
      }
      if(!confirm('Importer ces données ?\n\n'
        + (data.events||[]).length + ' événement(s)\n'
        + (data.gear||[]).length + ' matériel(s)\n'
        + (data.serviceTypes||[]).length + ' prestation(s)\n'
        + (data.invoices||[]).length + ' facture(s)\n\n'
        + '⚠️ Tes données actuelles seront remplacées.'
      )) return;

      // Restore all fields
      if(data.events)        S.events        = data.events;
      if(data.gear)          S.gear          = data.gear;
      if(data.serviceTypes)  S.serviceTypes  = data.serviceTypes;
      if(data.invoices)      S.invoices      = data.invoices;
      if(data.contracts)     S.contracts     = data.contracts;
      if(data.reviews)       S.reviews       = data.reviews;
      if(data.globalLinks)   S.globalLinks   = data.globalLinks;
      if(data.externalLinks) S.externalLinks = data.externalLinks;
      if(data.profile)       S.profile       = Object.assign({}, S.profile, data.profile);

      save();
      render();
      // Go back to settings > data tab
      setTimeout(function(){
        switchTab('data');
        var el = document.getElementById('import-status');
        if(el) el.innerHTML = '<span style="color:var(--ok)">✅ Importé avec succès !</span>';
      }, 100);

    } catch(err) {
      if(status) status.innerHTML = '<span style="color:var(--er)">❌ Erreur : ' + escH(err.message) + '</span>';
    }
  };
  reader.readAsText(file);
}

function pgFinances(){
  const finTab=S._finTab||'all';
  const p=S.profile;
  const currentYear = S._finYear || new Date().getFullYear();

  // All items merged and sorted by date
  var allItems = [];
  S.invoices.forEach(function(inv){
    allItems.push({type:'invoice', date:inv.date, item:inv});
  });
  S.contracts.forEach(function(c){
    allItems.push({type:'contract', date:c.date||c.createdAt||'', item:c});
  });
  allItems.sort(function(a,b){ return new Date(b.date)-new Date(a.date); });

  // Filter by year
  var years = [...new Set(allItems.map(function(i){ return i.date?new Date(i.date).getFullYear():null; }).filter(Boolean))].sort(function(a,b){return b-a;});
  var filtered = S._finYear ? allItems.filter(function(i){ return i.date && new Date(i.date).getFullYear()===currentYear; }) : allItems;
  
  // Stats for filtered period
  var invFiltered = filtered.filter(function(i){return i.type==='invoice';}).map(function(i){return i.item;});
  var ctFiltered = filtered.filter(function(i){return i.type==='contract';}).map(function(i){return i.item;});
  var ca = invFiltered.reduce(function(s,i){return s+i.totalTTC;},0);
  var paid = invFiltered.filter(function(i){return i.paid;}).reduce(function(s,i){return s+i.totalTTC;},0);
  var pending = ca-paid;

  // Year filter - only show if there are items with dates
  var yearBtns = years.length > 0 ?
    '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:14px">'+

    }).join('')+
    '</div>' : '';

  var tabs='<div class="tabs">'+
    '<div class="tab '+(finTab==='all'?'active':'')+'" onclick="S._finTab=\'all\';render()">📊 Tout</div>'+
    '<div class="tab '+(finTab==='invoices'?'active':'')+'" onclick="S._finTab=\'invoices\';render()">🧾 Factures'+(pending>0?' <span style="background:var(--er);color:#fff;font-size:.58rem;padding:1px 5px;border-radius:9px">'+invFiltered.filter(function(i){return !i.paid;}).length+'</span>':'')+'</div>'+
    '<div class="tab '+(finTab==='contracts'?'active':'')+'" onclick="S._finTab=\'contracts\';render()">📝 Contrats</div>'+

    '<div class="tab '+(finTab==='relances'?'active':'')+'" onclick="S._finTab=\'relances\';render()">💰 Relances'+(getRelancesAlerts().length>0?' <span style="background:var(--er);color:#fff;font-size:.58rem;padding:1px 5px;border-radius:9px">'+getRelancesAlerts().length+'</span>':'')+'</div>'+
  '</div>';

  var statsBar = '<div class="sg" style="margin-bottom:14px">'+

function newContractFromType(type, evId) {
  closeMo();
  window._ctEditorType = type;
  window._ctEditorEvId = evId || null;
  window._ctEditorId = null;
  go('contract-editor');
}

function updateContractFromEv(evId, type) {
  const ev = evId ? S.events.find(e => e.id == evId) : null;
  const cd = ev ? (ev.clientData || {}) : {};
  const t = CT[type];
  if (ev) {
    document.getElementById('ct-title').value = 'Contrat ' + t.label + ' — ' + ev.name;
    document.getElementById('ct-client').value = ev.client;
  }
  const prev = document.getElementById('ct-preview');
  if (prev) prev.innerHTML = t.clauses(S.profile, ev || {}, cd);
}

function createContract(type) {
  const evId = document.getElementById('ct-ev').value;
  const ev = evId ? S.events.find(e => e.id == evId) : null;
  const cd = ev ? (ev.clientData || {}) : {};
  const t = CT[type];
  const contract = {
    id: 'ct' + uid(),
    type,
    title: document.getElementById('ct-title').value || ('Contrat ' + t.label),
    clientName: document.getElementById('ct-client').value || '',
    eventName: ev ? ev.name : '',
    evId: evId || null,
    date: document.getElementById('ct-date').value,
    createdAt: new Date().toISOString(),
    htmlContent: t.clauses(S.profile, ev || {}, cd),
    djSig: null,
    clientSig: null,
    djSigDate: null,
    clientSigDate: null,
    clientToken: btoa('ct:' + uid()).replace(/=/g, ''),
    imported: false,
  };
  S.contracts.push(contract);
  save();
  closeMo();
  openContract(contract.id);
}

function loadImportedFile(input, mode) {
  const file = input.files[0];
  if (!file) return;
  const el = document.getElementById('imp-file-name');
  const reader = new FileReader();
  reader.onload = e => {
    if (mode === 'pdf') window._importedPDFData = e.target.result;
    else window._importedDocxData = e.target.result;
    if (el) el.innerHTML = '✅ <strong>' + file.name + '</strong> — ' + Math.round(file.size/1024) + 'Ko';
    // Auto-fill title from filename
    const titleEl = document.getElementById('imp-title');
    if (titleEl && !titleEl.value) titleEl.value = file.name.replace(/\.(docx?|pdf)$/i,'').replace(/[-_]/g,' ');

function initSigCanvas(canvas) {
  const ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  let drawing = false, lx = 0, ly = 0;

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) * (canvas.width / r.width), y: (src.clientY - r.top) * (canvas.height / r.height) };
  }

  function start(e) { e.preventDefault(); drawing = true; const p = getPos(e); lx = p.x; ly = p.y; }
  function move(e) {
    e.preventDefault();
    if (!drawing) return;
    const p = getPos(e);
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(p.x, p.y); ctx.stroke();
    lx = p.x; ly = p.y;
  }
  function stop(e) { e.preventDefault(); drawing = false; }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', stop);
  canvas.addEventListener('mouseleave', stop);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', stop, { passive: false });
}

function clearSig(cid) {
  const canvas = document.getElementById(cid);
  if (!canvas) return;
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

function isCanvasBlank(canvas) {
  return !canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data.some(ch => ch !== 0);
}

function saveSig(contractId, party) {
  const cid = party === 'dj' ? 'sig-dj' : 'sig-cl';
  const canvas = document.getElementById(cid);
  if (!canvas || isCanvasBlank(canvas)) { alert('Merci de signer avant de valider'); return; }
  const c = S.contracts.find(x => x.id === contractId);
  if (!c) return;
  const dataUrl = canvas.toDataURL('image/png');
  if (party === 'dj') { c.djSig = dataUrl; c.djSigDate = new Date().toISOString(); }
  else { c.clientSig = dataUrl; c.clientSigDate = new Date().toISOString(); }
  save();
  openContract(contractId);
}

function genOTP(contractId) {
  const c = S.contracts.find(x => x.id === contractId);
  if (!c) return;
  c.otpCode = String(Math.floor(100000 + Math.random() * 900000));
  c.otpCreated = new Date().toISOString();
  c.otpUsed = false;
  save();
  sendContractLink(contractId);
}

function cpOTP(contractId) {
  const c = S.contracts.find(x => x.id === contractId);
  if (!c || !c.otpCode) return;
  navigator.clipboard.writeText(c.otpCode)
    .then(() => { const b = event.target; b.textContent = '✅'; setTimeout(() => { b.textContent = '📲 Copier le code seul'; }, 1500); })
    .catch(() => prompt('Code OTP :', c.otpCode));
}

function sendByMailto(contractId, method) {
  const c = S.contracts.find(x => x.id === contractId);
  if (!c) return;
  const p = S.profile;
  const baseUrl = window.location.href.split('?')[0];
  const url = baseUrl + '?contract=' + c.clientToken + (method === 'otp' ? '&otp=1' : '');
  let body = 'Bonjour ' + (c.clientName || '') + ',\n\n';
  body += 'Merci de lire attentivement le contrat suivant, puis de le signer :\n' + url + '\n\n';
  if (method === 'otp' && c.otpCode) {
    body += '─────────────────────────\n';
    body += 'Votre code de vérification : ' + c.otpCode + '\n';
    body += '(à saisir sur la page avant de pouvoir signer)\n';
    body += '─────────────────────────\n\n';
  }
  body += 'Cordialement,\n' + (p.name || 'Votre DJ');
  const subject = encodeURIComponent('Contrat à signer — ' + c.title + (p.name ? ' · ' + p.name : ''));
  window.open('mailto:?subject=' + subject + '&body=' + encodeURIComponent(body));
}

function sendBySMS(contractId, method) {
  const c = S.contracts.find(x => x.id === contractId);
  if (!c) return;
  const baseUrl = window.location.href.split('?')[0];
  const url = baseUrl + '?contract=' + c.clientToken;
  let txt = 'Bonjour, voici votre contrat à signer : ' + url;
  if (method === 'otp' && c.otpCode) txt += ' — Code : ' + c.otpCode;
  navigator.clipboard.writeText(txt)
    .then(() => alert('Texte SMS copié !\n\nColle-le dans ton appli SMS.'))
    .catch(() => prompt('Texte SMS :', txt));
}

function launchYouSign(contractId) {
  const c = S.contracts.find(x => x.id === contractId);
  const p = S.profile;
  if (!p.yousignApiKey) { alert('Clé API YouSign manquante'); return; }
  if (!c.htmlContent && !c.pdfData) { alert('Contrat sans contenu'); return; }
  const env = p.yousignSandbox !== false ? 'sandbox' : 'production';
  alert(
    'YouSign — ' + env + '\n\n'
    + 'Dans une version avec serveur, le contrat serait envoyé à l\'API YouSign pour signature certifiée eIDAS.\n\n'
    + 'Clé : ' + p.yousignApiKey.slice(0, 8) + '...\n'
    + 'Destinataire : ' + (c.clientName || '(non renseigné)') + '\n\n'
    + 'Intégration complète disponible avec un backend Node.js/PHP.'

}

function verifyOTP(contractId) {
  const c = S.contracts.find(x => x.id === contractId);
  const inp = document.getElementById('otp-input');
  const errEl = document.getElementById('otp-error');
  if (!c || !inp) return;
  const entered = inp.value.trim();
  if (!c.otpCode) { if (errEl) errEl.textContent = 'Erreur : aucun code configuré par le DJ'; return; }
  if (entered !== c.otpCode) {
    if (errEl) errEl.textContent = '❌ Code incorrect — vérifiez le SMS ou email reçu';
    inp.style.borderColor = 'var(--er)';
    setTimeout(function() { inp.style.borderColor = 'var(--bd)'; }, 2000);
    return;
  }
  window._otpPassed = true;
  renderContractClientView(c);
}

    ? '<div style="background:rgba(68,255,136,.06);border:1px solid rgba(68,255,136,.3);padding:20px;text-align:center">'
      + '<div style="font-size:2.5rem;margin-bottom:10px">✅</div>'
      + '<div style="font-family:\'Syne\',sans-serif;font-size:1rem;font-weight:800;color:var(--ok);margin-bottom:4px">Contrat signé avec succès</div>'
      + '<div style="font-size:.78rem;color:var(--mu)">Signé le ' + new Date(c.clientSigDate).toLocaleDateString('fr-FR') + ' à ' + new Date(c.clientSigDate).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}) + '</div>'
      + (c.sigMethod === 'otp' ? '<div style="margin-top:8px"><span style="background:rgba(232,255,60,.15);color:var(--ac);font-size:.7rem;padding:2px 10px;border:1px solid var(--ac)">🔐 Vérifié OTP</span></div>' : '')
      + '</div>'
    : '<div style="background:var(--s);border:2px solid var(--ac);padding:20px">'
      + '<div style="font-size:.68rem;font-weight:700;color:var(--ac);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">✏️ Votre signature</div>'
      + '<div style="font-size:.78rem;color:var(--mu);margin-bottom:12px">Tracez votre signature avec le doigt ou la souris :</div>'
      + '<canvas id="ct-sig-canvas" width="640" height="130" style="background:#fff;border:1px solid #ddd;cursor:crosshair;touch-action:none;display:block;width:100%"></canvas>'

      + '<button class="btn bp" style="padding:10px 18px;font-size:.84rem" onclick="submitClientContractSig(\'' + c.id + '\',\'' + sigMethod + '\')">✅ Valider ma signature</button>'
      + '</div></div>';

  document.getElementById('main').innerHTML =
    '<div style="max-width:720px;margin:0 auto;padding:30px 20px 60px">'
    + '<div style="text-align:center;margin-bottom:22px">' + logo

    + '<div style="font-size:.6rem;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-top:2px">Contrat à signer</div>'
    + '</div>'
    + '<div style="background:var(--s);border:1px solid ' + t.color + '44;padding:14px;margin-bottom:18px">'
    + '<div style="font-family:\'Syne\',sans-serif;font-weight:800">' + t.emoji + ' ' + c.title + '</div>'
    + '<div style="font-size:.76rem;color:var(--mu);margin-top:3px">' + (c.clientName ? 'Pour : ' + c.clientName + ' · ' : '') + (c.date ? new Date(c.date).toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric'}) : '') + '</div>'

    + (c.htmlContent || (c.imported ? '<p style="color:#888;font-style:italic">Contrat fourni par votre DJ. Téléchargez et lisez le document ci-dessous avant de signer.</p>' : ''))
    + downloads
    + '</div>'
    + sigZone
    + '<div style="text-align:center;margin-top:20px;font-size:.62rem;color:var(--mu)">GigPlanner · Signature électronique</div>'
    + '</div>';

  if (!c.clientSig) {
    var canvas = document.getElementById('ct-sig-canvas');
    if (canvas) initSigCanvas(canvas);
  }
}

function submitClientContractSig(contractId, method) {
  var canvas = document.getElementById('ct-sig-canvas');
  if (!canvas || isCanvasBlank(canvas)) { alert('Merci de tracer votre signature avant de valider'); return; }
  var c = S.contracts.find(x => x.id === contractId);
  if (!c) return;
  c.clientSig = canvas.toDataURL('image/png');
  c.clientSigDate = new Date().toISOString();
  c.sigMethod = method || 'draw';
  c.sigUserAgent = navigator.userAgent.substring(0, 120);
  c.sigTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
  if (method === 'otp') c.otpUsed = true;
  save();
  document.getElementById('main').innerHTML =
    '<div style="text-align:center;padding:80px 20px">'
    + '<div style="font-size:4rem;margin-bottom:14px">🎉</div>'
    + '<div style="font-family:\'Syne\',sans-serif;font-size:1.3rem;font-weight:800;color:var(--ok)">Contrat signé !</div>'
    + '<div style="font-size:.84rem;color:var(--mu);margin-top:8px;line-height:1.7">Votre signature a bien été enregistrée.</div>'
    + '<div style="font-size:.7rem;color:var(--mu);margin-top:5px">' + new Date().toLocaleDateString('fr-FR') + ' à ' + new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}) + '</div>'
    + (method === 'otp' ? '<div style="margin-top:12px"><span style="background:rgba(232,255,60,.15);color:var(--ac);font-size:.72rem;padding:3px 10px;border:1px solid var(--ac)">🔐 Signature vérifiée par OTP</span></div>' : '')
    + '<div style="font-size:.68rem;color:var(--mu);margin-top:18px">Vous pouvez fermer cette page.</div>'
    + '</div>';
}

function previewContractFull(type) {
  const ev = (() => { const sel = document.getElementById('ct-ev'); return sel && sel.value ? S.events.find(e => e.id == sel.value) : null; })();
  const cd = ev ? (ev.clientData || {}) : {};
  const t = CT[type];
  const html = buildContractPrintHTML(t.clauses(S.profile, ev || {}, cd), S.profile.name || 'DJ', t.label, null, null);
  const w = window.open('', '_blank');
  if (w) { w.document.write(html); w.document.close(); }
}

function printContract(id) {
  const c = S.contracts.find(x => x.id === id);
  if (!c) return;
  if (c.imported && c.pdfData) { window.open(c.pdfData); return; }
  const t = CT[c.type] || CT.mariage;
  const html = buildContractPrintHTML(c.htmlContent, S.profile.name || 'DJ', t.label, c.djSig, c.clientSig, c.djSigDate, c.clientSigDate, c.clientName);
  const w = window.open('', '_blank');
  if (w) { w.document.write(html); w.document.close(); }
}

function dlDocx(type) {
  // Generate a minimal .docx template as plain text download
  // Builds a simple text-based template with [CHAMPS] placeholders
  const t = CT[type];
  if(!t) return;
  const p = S.profile || {};
  const fields = {
    '[NOM_DJ]': p.name || 'Votre Nom',
    '[SIRET]': p.siret || 'XX XXX XXX XXXXX',
    '[ADRESSE_DJ]': p.address || 'Votre adresse',
    '[TEL_DJ]': p.phone || 'XX XX XX XX XX',
    '[EMAIL_DJ]': p.email || 'votre@email.com',
    '[NOM_CLIENT]': '[NOM CLIENT]',
    '[ADRESSE_CLIENT]': '[ADRESSE CLIENT]',
    '[DATE_PRESTATION]': '[DATE]',
    '[LIEU_PRESTATION]': '[LIEU]',
    '[MONTANT_HT]': '[MONTANT HT]',
    '[MONTANT_TTC]': '[MONTANT TTC]',
    '[ACOMPTE]': '[ACOMPTE]',
    '[DATE_SIGNATURE]': new Date().toLocaleDateString('fr-FR'),
  };
  // CT clauses expect (profile, ev, cd) — pass profile + empty objects for template
  var clauseLines = t.clauses ? t.clauses(S.profile||{}, {
    client:'[NOM CLIENT]', date:'[DATE]', venue:'[LIEU]',
    start:'[HEURE DÉBUT]', end:'[HEURE FIN]', amount:'[MONTANT]',
    acompteAmount:'[ACOMPTE]'
  }, {name:'[NOM CLIENT]'}) : [];
  var content = Array.isArray(clauseLines) ? clauseLines.join('\n\n') : String(clauseLines);
  var header = t.label.toUpperCase() + '\n' + '═'.repeat(50) + '\n\n';
  var footer = '\n\n' + '─'.repeat(50) + '\nFait le ' + fields['[DATE_SIGNATURE]'] + '\n\nSignature DJ :\n\nSignature Client :\n';
  var full = header + content + footer;
  var blob = new Blob([full], {type:'text/plain;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'template-' + type + '.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

function getRelancesAlerts() {
  const now = new Date(); now.setHours(0,0,0,0);
  const alerts = [];

  S.events.forEach(ev => {
    if (ev.status === 'cancelled') return;
    const evDate = new Date(ev.date + 'T00:00:00');
    const daysToEvent = Math.ceil((evDate - now) / 86400000);
    const total  = ev.amount || 0;
    const noAcompte = ev.acompteStatus === 'none' || (ev.acomptePct === 0 && !ev.acompteAmount);
    const pct    = noAcompte ? 0 : (ev.acomptePct || 30);
    const ac     = noAcompte ? 0 : (ev.acompteAmount || Math.round(total * pct / 100));
    const solde  = noAcompte ? total : (total - ac);
    const as     = noAcompte ? 'none' : (ev.acompteStatus || 'pending');
    const ss     = ev.soldeStatus || 'pending';

    // Acompte en attente après signature
    if (!noAcompte && as !== 'received' && ev.signDate) {
      const signed = new Date(ev.signDate + 'T00:00:00');
      const daysSigned = Math.ceil((now - signed) / 86400000);
      if (daysSigned >= 3) {
        const urgent = daysSigned >= 7;
        alerts.push({
          evId: ev.id, evName: ev.name, evDate: ev.date,
          type: 'acompte', amount: ac,
          msg: 'Acompte ' + ac.toLocaleString('fr-FR') + '€ — ' + (urgent ? '🔴 ' + daysSigned + 'j sans paiement' : '⚠️ J+' + daysSigned + ' depuis signature'),
          urgent, daysToEvent,
          mailSubject: 'Acompte contrat ' + ev.name,
          mailBody: 'Bonjour,\n\nJe vous contacte concernant le contrat pour ' + ev.name + ' prévu le ' + new Date(ev.date+'T00:00:00').toLocaleDateString('fr-FR') + '.\n\nSauf erreur de ma part, l\'acompte de ' + ac.toLocaleString('fr-FR') + '€ (' + pct + '% du montant total) reste en attente.\n\nMerci de régulariser dès que possible.\n\nCordialement,\n' + (S.profile.name||'Votre DJ')
        });
      }
    }

    // Solde en attente — seuil d'alerte adapté au délai de paiement
    if (ss !== 'received' && (noAcompte || as === 'received') && daysToEvent > 0 && daysToEvent <= 7) {
      // Si paiement sous 30j après prestation : pas d'alerte avant la prestation
      const payTerms = ev.paymentTerms || S.profile.defaultPaymentTerms || '';
      const isPostEvent = payTerms === 'j30' || payTerms === 'j15';
      if (!isPostEvent) {
        const urgent = daysToEvent <= 3;
        alerts.push({
          evId: ev.id, evName: ev.name, evDate: ev.date,
          type: 'solde', amount: solde,
          msg: (noAcompte ? 'Paiement ' : 'Solde ') + solde.toLocaleString('fr-FR') + '€ — ' + (urgent ? '🔴 J-' + daysToEvent + ' !' : '⚠️ J-' + daysToEvent),
          urgent, daysToEvent,
          mailSubject: 'Règlement ' + ev.name,
          mailBody: 'Bonjour,\n\nLa prestation pour ' + ev.name + ' approche (le ' + new Date(ev.date+'T00:00:00').toLocaleDateString('fr-FR') + ').\n\nJe vous rappelle que le ' + (noAcompte ? 'paiement' : 'solde') + ' de ' + solde.toLocaleString('fr-FR') + '€ est à régler avant la prestation.\n\nMerci,\n' + (S.profile.name||'Votre DJ')
        });
      }
    }

    // Paiement impayé après la prestation
    if (ss !== 'received' && daysToEvent < 0 && total > 0) {
      const daysLate = Math.abs(daysToEvent);
      const payTerms = ev.paymentTerms || S.profile.defaultPaymentTerms || '';
      const graceDays = payTerms === 'j30' ? 30 : payTerms === 'j15' ? 15 : 0;
      // Ne pas alerter avant la fin du délai de grâce
      if (daysLate > graceDays) {
        const daysOverdue = daysLate - graceDays;
        alerts.push({
          evId: ev.id, evName: ev.name, evDate: ev.date,
          type: 'solde_late', amount: solde,
          msg: '🔴 ' + (noAcompte ? 'Paiement' : 'Solde') + ' ' + solde.toLocaleString('fr-FR') + '€ — ' + (graceDays > 0 ? daysOverdue + 'j de retard (délai '+graceDays+'j dépassé)' : daysLate + 'j après la prestation'),
          urgent: true, daysToEvent,
          mailSubject: 'Règlement en attente — ' + ev.name,
          mailBody: 'Bonjour,\n\nMalgré la prestation réalisée pour ' + ev.name + ' le ' + new Date(ev.date+'T00:00:00').toLocaleDateString('fr-FR') + ', le ' + (noAcompte ? 'paiement' : 'solde') + ' de ' + solde.toLocaleString('fr-FR') + '€ n\'a pas été reçu.\n\nMerci de procéder au règlement dans les meilleurs délais.\n\nCordialement,\n' + (S.profile.name||'Votre DJ')
        });
      }
    }
  });

  alerts.sort((a,b) => (b.urgent?1:0)-(a.urgent?1:0) || a.daysToEvent-b.daysToEvent);
  return alerts;
}

function buildRelancesBlock() {
  const alerts = getRelancesAlerts();
  if (!alerts.length) return '';
  window._relanceAlerts = alerts;

  const rows = alerts.map((a,i) => {

    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd);flex-wrap:wrap">'
      + '<div style="flex:1;min-width:180px">'

  const noAcompte = ev.acompteStatus==='none' || (ev.acomptePct===0 && !ev.acompteAmount);

  const pct = parseInt(ev.acomptePct) || 30;

  const solde = total - ac;
  return '<div><span style="color:var(--mu);font-size:.68rem">ACOMPTE</span><br><strong style="color:var(--ac2)">' + ac.toLocaleString('fr-FR') + '€</strong> <span style="font-size:.68rem;color:var(--mu)">(' + Math.round(ac/total*100) + '%)</span></div>'
    + '<div><span style="color:var(--mu);font-size:.68rem">SOLDE</span><br><strong style="color:var(--ac)">' + solde.toLocaleString('fr-FR') + '€</strong></div>'
    + '<div><span style="color:var(--mu);font-size:.68rem">TOTAL</span><br><strong>' + total.toLocaleString('fr-FR') + '€</strong></div>';

// ===== TRAVEL CALCULATION (HERE Routing v8 + Nominatim geocoding) =====
// HERE Routing v8 : trajet réel, trafic temps réel, péages EUR
// Nominatim : géocodage gratuit sans clé
// Fallback : haversine ×1.35 si pas de clé HERE

async function calcTrajet() {
  const btn = document.querySelector('[onclick="calcTrajet()"]');
  const resEl = document.getElementById('trajet-result');
  if (!resEl) return;

  const depInp = document.getElementById('edep');
  const departureAddr = (depInp && depInp.value.trim()) || S.profile.departureAddress || '';
  if (!departureAddr) {
    resEl.innerHTML = '<span style="color:var(--er)">⚠️ Configure ton adresse Domicile / Dépôt dans le Profil</span>';
    return;
  }
  const venue = document.getElementById('ev2') ? document.getElementById('ev2').value.trim() : '';
  const addr  = document.getElementById('ea')  ? document.getElementById('ea').value.trim()  : '';
  const arrivalAddr = [venue, addr].filter(Boolean).join(', ');
  if (!arrivalAddr) {
    resEl.innerHTML = '<span style="color:var(--er)">⚠️ Remplis le lieu et l\'adresse de la prestation d\'abord</span>';
    return;
  }

  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
  resEl.innerHTML = '⏳ Géolocalisation…';

  try {
    // Geocode both addresses via Nominatim (no key needed)
    const [dep, arr] = await Promise.all([
      geocodeNominatim(departureAddr),
      geocodeNominatim(arrivalAddr)
    ]);
    if (!dep) throw new Error('Adresse de départ introuvable. Essaie une adresse plus précise (ex: "12 rue de la Paix, Lyon")');
    if (!arr) throw new Error('Adresse d\'arrivée introuvable. Essaie "Lieu, Ville" ou l\'adresse complète');

    const hereKey = S.profile.hereApiKey || '';
    const rate    = S.profile.kmRate !== undefined ? parseFloat(S.profile.kmRate) : 0.40;

    let km, mins, tollCost = null, source;

    if (hereKey) {
      // ── HERE Routing v8 : route réelle + trafic + péages ──────────────────
      resEl.innerHTML = '⏳ Calcul HERE (trajet réel + péages)…';
      const hereUrl =
        'https://router.hereapi.com/v8/routes'
        + '?transportMode=car'
        + '&origin='      + dep.lat + ',' + dep.lon
        + '&destination=' + arr.lat + ',' + arr.lon
        + '&return=travelSummary,tolls'
        + '&currency=EUR'
        + '&tolls[summaries]=total'
        + '&departureTime=now'
        + '&apikey=' + encodeURIComponent(hereKey);

      const hRes = await fetch(hereUrl);
      if (!hRes.ok) {
        const errTxt = await hRes.text();
        throw new Error('HERE API erreur ' + hRes.status + ' — vérifiez la clé dans Profil');
      }
      const hData = await hRes.json();
      if (!hData.routes || !hData.routes.length) throw new Error('HERE : aucun itinéraire trouvé');

      const summary = hData.routes[0].sections[0].travelSummary;
      km      = Math.round(summary.length / 1000 * 10) / 10;
      mins    = Math.round(summary.duration / 60);

      // Péages HERE
      if (summary.tolls && summary.tolls.total && summary.tolls.total.value > 0) {
        tollCost = Math.round(summary.tolls.total.value * 100) / 100;
      } else {
        tollCost = 0;
      }
      source = 'HERE (trajet réel · trafic temps réel)';

    } else {
      // ── Fallback haversine ×1.35 ───────────────────────────────────────────
      resEl.innerHTML = '⏳ Estimation…';
      const crow = haversineKm(dep.lat, dep.lon, arr.lat, arr.lon);
      km   = Math.round(crow * 1.35 * 10) / 10;
      mins = Math.round(km / 55 * 60);
      source = 'estimation (configurez une clé HERE pour trajet réel + péages)';
    }

    const kmCost   = Math.round(km * rate * 100) / 100;
    const totalCost = tollCost !== null ? Math.round((kmCost + tollCost) * 100) / 100 : kmCost;

    // Update driveMin field
    const drInp = document.getElementById('edr');
    if (drInp) drInp.value = mins;

    // Store for saveEv
    window._calcDriveKm   = km;
    window._calcTollCost  = tollCost;
    window._calcTotalCost = totalCost;

    // Build result HTML
    let html = '<span style="color:var(--ok)">✅ </span>'
      + '<strong>' + km + ' km</strong>'
      + ' · <strong>' + mins + ' min</strong>';

    if (tollCost !== null) {
      html += ' · km : <strong style="color:var(--ac2)">' + kmCost.toFixed(2) + '€</strong>';
      if (tollCost > 0) {
        html += ' · péages : <strong style="color:var(--er)">' + tollCost.toFixed(2) + '€</strong>';
        html += ' · total : <strong style="color:var(--ac)">' + totalCost.toFixed(2) + '€</strong>';
      } else {
        html += ' · <span style="color:var(--ok)">sans péages</span>';
        html += ' · total : <strong style="color:var(--ac2)">' + kmCost.toFixed(2) + '€</strong>';
      }
    } else {
      html += ' · <strong style="color:var(--ac2)">' + kmCost.toFixed(2) + '€</strong>';
    }
    html += ' <span style="font-size:.62rem;color:var(--mu)"> · ' + source + ' · Trajet mis à jour</span>';
    resEl.innerHTML = html;

  } catch(e) {
    resEl.innerHTML = '<span style="color:var(--er)">❌ ' + e.message + '</span>';
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '📍 Calculer'; }
  }
}

async function geocodeNominatim(address) {
  try {
    // Try Nominatim first
    const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=3&countrycodes=fr&q='
      + encodeURIComponent(address);
    const res = await fetch(url, { headers: { 'Accept-Language': 'fr', 'User-Agent': 'GigPlanner/1.0' } });
    if (!res.ok) return null;
    const data = await res.json();
    if (!data.length) return null;
    return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), display: data[0].display_name };
  } catch(e) {
    // Network blocked or unavailable — try Photon API as fallback
    try {
      const url2 = 'https://photon.komoot.io/api/?q=' + encodeURIComponent(address) + '&lang=fr&limit=1';
      const res2 = await fetch(url2);
      if (!res2.ok) return null;
      const d2 = await res2.json();
      if (!d2.features||!d2.features.length) return null;
      const [lon,lat] = d2.features[0].geometry.coordinates;
      return { lat, lon, display: d2.features[0].properties.name||address };
    } catch(e2) { return null; }
  }
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2
    + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ===== MODE JOUR J / MISSION =====
function pgJourJ() {
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const tomorrowStr = new Date(now.getTime()+86400000).toISOString().split('T')[0];
  const in7dStr = new Date(now.getTime()+604800000).toISOString().split('T')[0];

  const upcoming = S.events
    .filter(e => e.status !== 'cancelled' && e.date >= todayStr)
    .sort((a,b) => a.date.localeCompare(b.date) || (a.start||'').localeCompare(b.start||''));

  const ev = upcoming[0] || null;

  if (!ev) {
    return '<div style="max-width:480px;margin:60px auto;text-align:center;padding:20px">'
      + '<div style="font-size:4rem;margin-bottom:16px">😴</div>'
      + '<div style="font-family:\'Syne\',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:8px">Pas de mission imminente</div>'
      + '<div style="font-size:.86rem;color:var(--mu);margin-bottom:24px">Profite du calme !</div>'
      + '<button class="btn bp" onclick="openNewEv()">+ Créer une date</button>'
      + '</div>';
  }

  // ── Dispatch by event type ──
  if(ev.type === 'club')   return pgJourJClub(ev, upcoming, now, todayStr, tomorrowStr);
  if(ev.type === 'corpo')   return pgJourJCorpo(ev, upcoming, now, todayStr, tomorrowStr);
  if(ev.type === 'private') return pgJourJPrivate(ev, upcoming, now, todayStr, tomorrowStr);

  const t = ET[ev.type] || ET.mariage;
  const tl = getTL(ev);
  const isToday = ev.date === todayStr;
  const isTomorrow = ev.date === tomorrowStr;
  const days = Math.ceil((new Date(ev.date+'T00:00:00') - new Date(now.toISOString().split('T')[0]+'T00:00:00')) / 86400000);
  const dayLabel = isToday ? 'AUJOURD\'HUI' : isTomorrow ? 'DEMAIN' : fd(ev.date).toUpperCase();

  // Mission status indicator
  const checks = ev.checklist || [];
  const checksDone = checks.filter(c => c.d).length;
  const noAcompteJJ = ev.acompteStatus==='none' || (ev.acomptePct===0 && !ev.acompteAmount);
  const acompteOk = noAcompteJJ || ev.acompteStatus === 'received';
  const soldeOk = ev.soldeStatus === 'received';
  const payOk = acompteOk && soldeOk;
  const addrOk = !!(ev.address || ev.venue);
  const issueCount = (checks.length - checksDone) + (!payOk ? 1 : 0);
  let missionStatus, missionStatusColor, missionStatusBg;
  if (issueCount === 0) {
    missionStatus = '🟢 Mission prête'; missionStatusColor = 'var(--ok)'; missionStatusBg = 'rgba(68,255,136,.08)';
  } else if (issueCount <= 2) {
    missionStatus = '🟠 ' + issueCount + ' élément'+(issueCount>1?'s':'')+' à vérifier'; missionStatusColor = '#ffaa00'; missionStatusBg = 'rgba(255,170,0,.08)';
  } else {
    missionStatus = '🔴 ' + issueCount + ' points en attente'; missionStatusColor = 'var(--er)'; missionStatusBg = 'rgba(255,68,68,.08)';
  }

  // Countdown to departure
  let countdownHTML = '';
  if (isToday && tl.depart !== '—') {
    const [dh, dm] = tl.depart.split(':').map(Number);
    const nowMins = now.getHours() * 60 + now.getMinutes();
    const departMins = dh * 60 + dm;
    const diff = departMins - nowMins;
    if (diff > 0) {
      const h = Math.floor(diff / 60), m = diff % 60;
      const urgent = diff < 60, warning = diff < 120;
      const color = urgent ? 'var(--er)' : warning ? '#ffaa00' : 'var(--ok)';
      countdownHTML = '<div style="text-align:center;padding:20px 0;border-bottom:1px solid var(--bd)">'
        + '<div style="font-size:.66rem;font-weight:700;letter-spacing:3px;color:var(--mu);text-transform:uppercase;margin-bottom:8px">Départ dans</div>'
        + '<div style="font-family:\'Syne\',sans-serif;font-size:3.2rem;font-weight:800;color:' + color + ';line-height:1" id="jourj-countdown">'
