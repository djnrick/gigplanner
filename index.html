          + '<div style="font-weight:700;margin-bottom:2px">' + escH(s.emoji||'') + ' ' + escH(s.name) + '</div>'
          + '<div style="font-size:.7rem;color:var(--mu)">' + escH(s.desc||'') + '</div>'
          + gearTag
          + '<div style="font-size:.66rem;color:var(--ac3);margin-top:3px">⏱ Charg. ' + (s.loadMin||0) + 'min · Install. ' + (s.installMin||0) + 'min</div>'
        + '</div>'
        + '<div style="display:flex;gap:5px;flex-shrink:0">'
          + '<button class="btn bg" style="font-size:.7rem;padding:4px 9px" onclick="editSvc(\'' + s.id + '\',\'prestation\')">✏️</button>'
          + '<button class="btn bd2" style="font-size:.7rem;padding:4px 9px" onclick="delSvc(\'' + s.id + '\')">✕</button>'
        + '</div>'
      + '</div>'
    + '</div>';
  }

  return '<button class="btn bp" style="margin-bottom:14px" onclick="editSvc(null,\'prestation\')">+ Ajouter prestation</button>'
    + (prests.length
      ? '<div style="display:grid;gap:7px">' + prests.map(mkCard).join('') + '</div>'
      : '<div class="empty"><div class="ei">🎵</div><div class="et">Aucune prestation — ex : Cérémonie, VH, Soirée</div></div>');
}

// ===== OPTIONS TAB =====

function renderOptions(){
  var opts = S.serviceTypes.filter(function(s){return s.svcType==='option';});

  function mkCard(s){
    var gearNames = (s.gearIds||[]).map(function(gid){
      var gi = S.gear.find(function(x){return x.id===gid;});
      return gi ? gi.name : null;
    }).filter(Boolean);
    var gearTag = gearNames.length ? '<div style="font-size:.66rem;color:var(--mu);margin-top:3px">🎛️ ' + gearNames.join(' · ') + '</div>' : '';
    return '<div class="card" style="border-left:3px solid ' + s.color + '">'
      + '<div style="display:flex;align-items:center;gap:12px">'
        + '<div style="flex:1">'
          + '<div style="font-weight:700">' + escH(s.emoji||'') + ' ' + escH(s.name) + (s.price ? ' <span style="font-size:.72rem;color:var(--ac2)">+' + s.price + '€</span>' : '') + '</div>'
          + '<div style="font-size:.7rem;color:var(--mu)">' + escH(s.desc||'') + '</div>'
          + gearTag
          + '<div style="font-size:.66rem;color:var(--ac3);margin-top:3px">⏱ Charg. ' + (s.loadMin||0) + 'min · Install. ' + (s.installMin||0) + 'min</div>'
        + '</div>'
        + '<div style="display:flex;gap:5px;flex-shrink:0">'
          + '<button class="btn bg" style="font-size:.7rem;padding:4px 9px" onclick="editOption(\'' + s.id + '\')">✏️</button>'
          + '<button class="btn bd2" style="font-size:.7rem;padding:4px 9px" onclick="delOption(\'' + s.id + '\')">✕</button>'
        + '</div>'
      + '</div>'
    + '</div>';
  }

  return '<button class="btn bp" style="margin-bottom:14px;border-color:#ffaa00;color:#ffaa00" onclick="editOption(null)">✨ Ajouter option</button>'
    + (opts.length
      ? '<div style="display:grid;gap:7px">' + opts.map(mkCard).join('') + '</div>'
      : '<div class="empty"><div class="ei">✨</div><div class="et">Aucune option — ex : Arche LED, Photobooth, Étincelles</div></div>');
}

function editOption(id){
  var item = id && id !== 'null' ? S.serviceTypes.find(function(s){return s.id===id;}) : null;
  var checkedGear = item && item.gearIds ? item.gearIds : [];

  var gearRows = S.gear.length === 0
    ? '<div style="font-size:.78rem;color:var(--mu);padding:8px">Aucun matériel — <button class="btn bg" style="font-size:.72rem;padding:3px 8px" onclick="closeMo();switchTab(\'gear\')">Ajouter dans Matériel →</button></div>'
    : S.gear.map(function(gi){
        var checked = checkedGear.indexOf(gi.id) !== -1;
        return '<div id="ogr-' + gi.id + '" style="display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--s2);margin-bottom:3px;cursor:pointer;border:1px solid ' + (checked ? 'var(--ac)' : 'var(--bd)') + '"'
          + ' onclick="opGearToggle(\'' + gi.id + '\')">'
          + '<input type="checkbox" id="og-' + gi.id + '"' + (checked ? ' checked' : '') + ' onclick="event.stopPropagation();opGearToggle(\'' + gi.id + '\')" style="cursor:pointer;accent-color:var(--ac)">'
          + '<div style="flex:1"><span style="font-size:.84rem;font-weight:600">' + escH(gi.name) + '</span>'
            + (gi.cat ? '<span style="font-size:.68rem;color:var(--mu);margin-left:6px">' + escH(gi.cat) + '</span>' : '')
          + '</div>'
          + '<span style="font-size:.7rem;color:var(--mu)">⏱ ' + (gi.loadMin||0) + 'min</span>'
          + '</div>';
      }).join('');

  document.getElementById('mtitle').textContent = item ? 'Modifier option' : '✨ Nouvelle option';
  document.getElementById('mbody').innerHTML =
    '<div class="fg">'
    + '<div class="fgi"><label>Nom *</label><input id="op-n" value="' + escH(item&&item.name||'') + '" placeholder="ex: Bar à vinyle, Arche LED..."></div>'
    + '<div class="fgi"><label>Emoji</label><input id="op-e" maxlength="2" value="' + escH(item&&item.emoji||'✨') + '"></div>'
    + '<div class="fgi"><label>Couleur</label><input id="op-c" type="color" value="' + (item&&item.color||'#ffaa00') + '" style="height:38px;padding:3px;cursor:pointer;width:100%"></div>'
    + '<div class="fgi"><label>Description</label><input id="op-d" value="' + escH(item&&item.desc||'') + '" placeholder="Description courte"></div>'
    + '<div class="fgi"><label>Prix (€) — 0 = inclus</label><input id="op-price" type="number" min="0" value="' + (item&&item.price||0) + '"></div>'
    + '</div>'
    + '<div class="st">🎛️ Matériel inclus <small style="font-weight:400;color:var(--mu)">(coche = auto-calcul du temps de chargement)</small></div>'
    + '<div id="op-gear-list">' + gearRows + '</div>'
    + '<div class="fg3" style="margin-top:10px">'
    +   '<div class="fgi"><label>⏱ Chargement (min)</label><input id="op-lo" type="number" min="0" value="' + (item&&item.loadMin||0) + '" style="background:rgba(232,255,60,.06)"><div style="font-size:.6rem;color:var(--mu);margin-top:2px">Auto depuis matos coché</div></div>'
    +   '<div class="fgi"><label>🔧 Installation (min)</label><input id="op-in" type="number" min="0" value="' + (item&&item.installMin||0) + '"></div>'
    + '</div>';
  document.getElementById('mfoot').innerHTML =
    '<button class="btn bg" onclick="closeMo()">Annuler</button>'
    + '<button class="btn bp" onclick="saveOption(\'' + (id||'null') + '\')">💾 Enregistrer</button>';
  showMo();
}

function opGearToggle(gid){
  var cb  = document.getElementById('og-' + gid);
  var row = document.getElementById('ogr-' + gid);
  if(!cb) return;
  cb.checked = !cb.checked;
  if(row) row.style.borderColor = cb.checked ? 'var(--ac)' : 'var(--bd)';
  // Recalc total load from checked gear
  var total = S.gear.filter(function(gi){
    var el = document.getElementById('og-' + gi.id);
    return el && el.checked;
  }).reduce(function(s,gi){return s+(gi.loadMin||0);}, 0);
  var inp = document.getElementById('op-lo');
  if(inp) inp.value = total;
}

function saveOption(id){
  var n = document.getElementById('op-n').value.trim();
  if(!n){alert('Nom requis');return;}
  var gearIds = S.gear.filter(function(gi){
    var el = document.getElementById('og-' + gi.id);
    return el && el.checked;
  }).map(function(gi){return gi.id;});
  var data = {
    name:       n,
    emoji:      document.getElementById('op-e').value || '✨',
    color:      document.getElementById('op-c').value || '#ffaa00',
    desc:       document.getElementById('op-d').value.trim(),
    svcType:    'option',
    price:      parseInt(document.getElementById('op-price').value)||0,
    loadMin:    parseInt(document.getElementById('op-lo').value)||0,
    installMin: parseInt(document.getElementById('op-in').value)||0,
    gearIds:    gearIds
  };
  if(id && id !== 'null'){
    var item = S.serviceTypes.find(function(s){return s.id===id;});
    if(item) Object.assign(item, data);
  } else {
    S.serviceTypes.push(Object.assign(data, {id:'s'+uid()}));
  }
  save();
  closeMo();
  document.getElementById('tab-content').innerHTML = renderOptions();
}

function delOption(id){
  if(!confirm('Supprimer cette option ?')) return;
  S.serviceTypes = S.serviceTypes.filter(function(s){return s.id!==id;});
  save();
  document.getElementById('tab-content').innerHTML = renderOptions();
}

function dlDocx(type) {

  if (!data) return;
  const a = document.createElement("a");

// ===== CONTRACT TEMPLATES =====
const CT = {
  mariage: {
    label: 'Mariage', emoji: '💍', color: '#ff6b35',
    clauses: (p, ev, cd) => {
      const dj = p.name || 'Le Prestataire';
      const client = cd.maries || ev.client || 'Le Client';
      const date = ev.date ? new Date(ev.date).toLocaleDateString('fr-FR', {day:'numeric',month:'long',year:'numeric'}) : '___________';
      const lieu = ev.venue || '___________';
      const addr = ev.address || '___________';
      const debut = cd.heureBal || ev.start || '___h___';
      const fin = cd.heureFin || ev.end || '___h___';
      const montant = ev.amount ? ev.amount.toLocaleString('fr-FR') + '€' : '___________€';
      const acompte = ev.amount ? Math.round(ev.amount * 0.3).toLocaleString('fr-FR') + '€' : '___________€';
      const solde = ev.amount ? Math.round(ev.amount * 0.7).toLocaleString('fr-FR') + '€' : '___________€';
      return `
<h2 style="text-align:center;font-size:1.1rem;font-weight:900;margin-bottom:4px;letter-spacing:-0.5px">CONTRAT DE PRESTATION DJ</h2>
<h3 style="text-align:center;font-size:.82rem;color:#888;font-weight:400;margin-bottom:28px;letter-spacing:2px;text-transform:uppercase">Mariage · Animation musicale</h3>

<p><strong>Entre les soussignés :</strong></p>
<p style="margin:10px 0 4px"><strong>Le Prestataire :</strong> ${dj}${p.legalName && p.legalName !== p.name ? ', ' + p.legalName : ''}${p.siret ? ', SIRET ' + p.siret : ''}${p.address ? ', dont le siège est situé ' + p.address + (p.zip ? ', ' + p.zip : '') + (p.city ? ' ' + p.city : '') : ''}.</p>
<p style="margin:4px 0 16px"><strong>Le Client :</strong> ${client}${ev.address ? ', domicilié(s) ' + ev.address : ''}, ci-après dénommé « le Client ».</p>
<p>Il a été convenu et arrêté ce qui suit :</p>

<h4 style="margin:20px 0 8px;font-size:.82rem;letter-spacing:2px;text-transform:uppercase;color:#ff6b35;border-bottom:1px solid #eee;padding-bottom:5px">Article 1 — Objet du contrat</h4>
<p>${dj} s'engage à assurer l'animation musicale du mariage de ${client}, le <strong>${date}</strong>, au lieu suivant : <strong>${lieu}</strong>, ${addr}.</p>

<h4 style="margin:20px 0 8px;font-size:.82rem;letter-spacing:2px;text-transform:uppercase;color:#ff6b35;border-bottom:1px solid #eee;padding-bottom:5px">Article 2 — Prestations incluses</h4>
<p>La prestation comprend :</p>
<ul style="margin:8px 0 8px 20px;line-height:1.8">
  ${cd.heureCeremonie ? '<li>Animation musicale de la cérémonie ('+cd.heureCeremonie+')</li>' : ''}
  ${cd.heureVin ? '<li>Animation du vin d\'honneur ('+cd.heureVin+')</li>' : ''}
  <li>Animation du bal à partir de <strong>${debut}</strong> jusqu\'à <strong>${fin}</strong></li>
  <li>Fourniture du matériel son et lumières nécessaire</li>
  <li>Installation et désinstallation du matériel</li>
  <li>Coordination musicale selon les souhaits du Client (fiche client complétée)</li>
</ul>
${cd.premiereDanse ? '<p>La première danse prévue est : <strong>' + cd.premiereDanse + '</strong>.</p>' : ''}
${cd.interdits ? '<p>Morceaux / artistes à ne pas diffuser : <strong>' + cd.interdits + '</strong>.</p>' : ''}

<h4 style="margin:20px 0 8px;font-size:.82rem;letter-spacing:2px;text-transform:uppercase;color:#ff6b35;border-bottom:1px solid #eee;padding-bottom:5px">Article 3 — Rémunération et modalités de paiement</h4>
<p>La prestation est fixée à la somme de <strong>${montant} TTC</strong>, payable comme suit :</p>
<ul style="margin:8px 0 8px 20px;line-height:1.8">
  <li>Acompte de <strong>${acompte}</strong> (30%) à la signature du présent contrat, constituant une réservation ferme et définitive.</li>
  <li>Solde de <strong>${solde}</strong> (70%) au plus tard le jour de la prestation, avant le début du set.</li>
</ul>

<h4 style="margin:20px 0 8px;font-size:.82rem;letter-spacing:2px;text-transform:uppercase;color:#ff6b35;border-bottom:1px solid #eee;padding-bottom:5px">Article 4 — Annulation et défaillance</h4>
<p><strong>Annulation par le Client :</strong></p>
<ul style="margin:8px 0 8px 20px;line-height:1.8">
  <li>Plus de 90 jours avant : restitution de l'acompte à 50%</li>

</ul>

<h4 style="margin:20px 0 8px;font-size:.82rem;letter-spacing:2px;text-transform:uppercase;color:#ff6b35;border-bottom:1px solid #eee;padding-bottom:5px">Article 5 — Conditions techniques et lieu</h4>
<p>Le Client s'engage à :</p>
<ul style="margin:8px 0 8px 20px;line-height:1.8">
  <li>Fournir un espace de 4m² minimum pour l'installation du matériel, avec accès à l'électricité (2 prises 16A minimum)</li>
  <li>Informer le Prestataire de toute contrainte sonore du lieu (limiteur, couvre-feu musical)</li>

    else window._importedDocxData = e.target.result;
    if (el) el.innerHTML = '✅ <strong>' + file.name + '</strong> — ' + Math.round(file.size/1024) + 'Ko';

    const titleEl = document.getElementById('imp-title');
    if (titleEl && !titleEl.value) titleEl.value = file.name.replace(/\.(docx?|pdf)$/i,'').replace(/[-_]/g,' ');

function initSigCanvas(canvas) {
  const ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  let drawing = false, lx = 0, ly = 0;

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) * (canvas.width / r.width), y: (src.clientY - r.top) * (canvas.height / r.height) };
  }

  function start(e) { e.preventDefault(); drawing = true; const p = getPos(e); lx = p.x; ly = p.y; }
  function move(e) {
    e.preventDefault();
    if (!drawing) return;
    const p = getPos(e);
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(p.x, p.y); ctx.stroke();
    lx = p.x; ly = p.y;
  }
  function stop(e) { e.preventDefault(); drawing = false; }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', stop);
  canvas.addEventListener('mouseleave', stop);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', stop, { passive: false });
}

function clearSig(cid) {
  const canvas = document.getElementById(cid);
  if (!canvas) return;
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

function isCanvasBlank(canvas) {
  return !canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data.some(ch => ch !== 0);
}

function saveSig(contractId, party) {
  const cid = party === 'dj' ? 'sig-dj' : 'sig-cl';
  const canvas = document.getElementById(cid);
  if (!canvas || isCanvasBlank(canvas)) { alert('Merci de signer avant de valider'); return; }
  const c = S.contracts.find(x => x.id === contractId);
  if (!c) return;
  const dataUrl = canvas.toDataURL('image/png');
  if (party === 'dj') { c.djSig = dataUrl; c.djSigDate = new Date().toISOString(); }
  else { c.clientSig = dataUrl; c.clientSigDate = new Date().toISOString(); }
  save();
  openContract(contractId);
}

  if (!confirm('Supprimer ce contrat ?')) return;
  S.contracts = S.contracts.filter(c => c.id !== id);

function genOTP(contractId) {
  const c = S.contracts.find(x => x.id === contractId);
  if (!c) return;
  c.otpCode = String(Math.floor(100000 + Math.random() * 900000));
  c.otpCreated = new Date().toISOString();
  c.otpUsed = false;
  save();
  sendContractLink(contractId);
}

function cpOTP(contractId) {
  const c = S.contracts.find(x => x.id === contractId);
  if (!c || !c.otpCode) return;
  navigator.clipboard.writeText(c.otpCode)
    .then(() => { const b = event.target; b.textContent = '✅'; setTimeout(() => { b.textContent = '📲 Copier le code seul'; }, 1500); })
    .catch(() => prompt('Code OTP :', c.otpCode));
}

function sendByMailto(contractId, method) {
  const c = S.contracts.find(x => x.id === contractId);
  if (!c) return;
  const p = S.profile;
  const baseUrl = window.location.href.split('?')[0];
  const url = baseUrl + '?contract=' + c.clientToken + (method === 'otp' ? '&otp=1' : '');
  let body = 'Bonjour ' + (c.clientName || '') + ',\n\n';
  body += 'Merci de lire attentivement le contrat suivant, puis de le signer :\n' + url + '\n\n';
  if (method === 'otp' && c.otpCode) {
    body += '─────────────────────────\n';
    body += 'Votre code de vérification : ' + c.otpCode + '\n';
    body += '(à saisir sur la page avant de pouvoir signer)\n';
    body += '─────────────────────────\n\n';
  }
  body += 'Cordialement,\n' + (p.name || 'Votre DJ');
  const subject = encodeURIComponent('Contrat à signer — ' + c.title + (p.name ? ' · ' + p.name : ''));
  window.open('mailto:?subject=' + subject + '&body=' + encodeURIComponent(body));
}

function sendBySMS(contractId, method) {
  const c = S.contracts.find(x => x.id === contractId);
  if (!c) return;
  const baseUrl = window.location.href.split('?')[0];
  const url = baseUrl + '?contract=' + c.clientToken;
  let txt = 'Bonjour, voici votre contrat à signer : ' + url;
  if (method === 'otp' && c.otpCode) txt += ' — Code : ' + c.otpCode;
  navigator.clipboard.writeText(txt)
    .then(() => alert('Texte SMS copié !\n\nColle-le dans ton appli SMS.'))
    .catch(() => prompt('Texte SMS :', txt));
}

function launchYouSign(contractId) {
  const c = S.contracts.find(x => x.id === contractId);
  const p = S.profile;
  if (!p.yousignApiKey) { alert('Clé API YouSign manquante'); return; }
  if (!c.htmlContent && !c.pdfData) { alert('Contrat sans contenu'); return; }
  const env = p.yousignSandbox !== false ? 'sandbox' : 'production';
  alert(
    'YouSign — ' + env + '\n\n'
    + 'Dans une version avec serveur, le contrat serait envoyé à l\'API YouSign pour signature certifiée eIDAS.\n\n'
    + 'Clé : ' + p.yousignApiKey.slice(0, 8) + '...\n'
    + 'Destinataire : ' + (c.clientName || '(non renseigné)') + '\n\n'
    + 'Intégration complète disponible avec un backend Node.js/PHP.'
  );
}

function checkContractMode() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('contract');
  if (!token) return false;
  const c = S.contracts.find(x => x.clientToken === token);
  document.querySelector('.sidebar').style.display = 'none';
  if (!c) {
    document.getElementById('main').innerHTML =
      '<div style="text-align:center;padding:80px 20px">'
      + '<div style="font-size:3rem;margin-bottom:12px">😕</div>'
      + '<div style="font-family:Syne,sans-serif;font-size:1.1rem;font-weight:800">Lien invalide ou expiré</div>'

function verifyOTP(contractId) {
  const c = S.contracts.find(x => x.id === contractId);
  const inp = document.getElementById('otp-input');
  const errEl = document.getElementById('otp-error');
  if (!c || !inp) return;
  const entered = inp.value.trim();
  if (!c.otpCode) { if (errEl) errEl.textContent = 'Erreur : aucun code configuré par le DJ'; return; }
  if (entered !== c.otpCode) {
    if (errEl) errEl.textContent = '❌ Code incorrect — vérifiez le SMS ou email reçu';
    inp.style.borderColor = 'var(--er)';
    setTimeout(function() { inp.style.borderColor = 'var(--bd)'; }, 2000);
    return;
  }
  window._otpPassed = true;
  renderContractClientView(c);
}

function submitClientContractSig(contractId, method) {
  var canvas = document.getElementById('ct-sig-canvas');
  if (!canvas || isCanvasBlank(canvas)) { alert('Merci de tracer votre signature avant de valider'); return; }
  var c = S.contracts.find(x => x.id === contractId);
  if (!c) return;
  c.clientSig = canvas.toDataURL('image/png');
  c.clientSigDate = new Date().toISOString();
  c.sigMethod = method || 'draw';
  c.sigUserAgent = navigator.userAgent.substring(0, 120);
  c.sigTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
  if (method === 'otp') c.otpUsed = true;
  save();
  document.getElementById('main').innerHTML =
    '<div style="text-align:center;padding:80px 20px">'
    + '<div style="font-size:4rem;margin-bottom:14px">🎉</div>'
    + '<div style="font-family:\'Syne\',sans-serif;font-size:1.3rem;font-weight:800;color:var(--ok)">Contrat signé !</div>'
    + '<div style="font-size:.84rem;color:var(--mu);margin-top:8px;line-height:1.7">Votre signature a bien été enregistrée.</div>'
    + '<div style="font-size:.7rem;color:var(--mu);margin-top:5px">' + new Date().toLocaleDateString('fr-FR') + ' à ' + new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}) + '</div>'
    + (method === 'otp' ? '<div style="margin-top:12px"><span style="background:rgba(232,255,60,.15);color:var(--ac);font-size:.72rem;padding:3px 10px;border:1px solid var(--ac)">🔐 Signature vérifiée par OTP</span></div>' : '')

// ===== PAYMENT / RELANCES HELPERS =====

function getRelancesAlerts() {
  const now = new Date(); now.setHours(0,0,0,0);
  const alerts = [];

  S.events.forEach(ev => {
    if (ev.status === 'cancelled') return;
    const evDate = new Date(ev.date + 'T00:00:00');
    const daysToEvent = Math.ceil((evDate - now) / 86400000);
    const total  = ev.amount || 0;
    const pct    = ev.acomptePct || 30;
    const ac     = ev.acompteAmount || Math.round(total * pct / 100);
    const solde  = total - ac;
    const as     = ev.acompteStatus || 'pending';
    const ss     = ev.soldeStatus   || 'pending';

    if (as !== 'received' && ev.signDate) {
      const signed = new Date(ev.signDate + 'T00:00:00');
      const daysSigned = Math.ceil((now - signed) / 86400000);
      if (daysSigned >= 3) {
        const urgent = daysSigned >= 7;
        alerts.push({
          evId: ev.id, evName: ev.name, evDate: ev.date,
          type: 'acompte', amount: ac,
          msg: 'Acompte ' + ac.toLocaleString('fr-FR') + '€ — ' + (urgent ? '🔴 ' + daysSigned + 'j sans paiement' : '⚠️ J+' + daysSigned + ' depuis signature'),
          urgent, daysToEvent,
          mailSubject: 'Acompte contrat ' + ev.name,
          mailBody: 'Bonjour,\n\nJe vous contacte concernant le contrat pour ' + ev.name + ' prévu le ' + new Date(ev.date+'T00:00:00').toLocaleDateString('fr-FR') + '.\n\nSauf erreur de ma part, l\'acompte de ' + ac.toLocaleString('fr-FR') + '€ (' + pct + '% du montant total) reste en attente.\n\nMerci de régulariser dès que possible.\n\nCordialement,\n' + (S.profile.name||'Votre DJ')
        });
      }
    }

    if (ss !== 'received' && as === 'received' && daysToEvent > 0 && daysToEvent <= 7) {
      const urgent = daysToEvent <= 3;
      alerts.push({
        evId: ev.id, evName: ev.name, evDate: ev.date,
        type: 'solde', amount: solde,
        msg: 'Solde ' + solde.toLocaleString('fr-FR') + '€ — ' + (urgent ? '🔴 J-' + daysToEvent + ' !' : '⚠️ J-' + daysToEvent),
        urgent, daysToEvent,
        mailSubject: 'Solde contrat ' + ev.name,
        mailBody: 'Bonjour,\n\nLa prestation pour ' + ev.name + ' approche (le ' + new Date(ev.date+'T00:00:00').toLocaleDateString('fr-FR') + ').\n\nJe vous rappelle que le solde de ' + solde.toLocaleString('fr-FR') + '€ est à régler avant la prestation.\n\nMerci,\n' + (S.profile.name||'Votre DJ')
      });
    }

    if (ss !== 'received' && daysToEvent < 0) {
      alerts.push({
        evId: ev.id, evName: ev.name, evDate: ev.date,
        type: 'solde_late', amount: solde,
        msg: '🔴 Solde ' + solde.toLocaleString('fr-FR') + '€ — prestation passée, impayé !',
        urgent: true, daysToEvent,
        mailSubject: 'Règlement en attente — ' + ev.name,
        mailBody: 'Bonjour,\n\nMalgré la prestation réalisée pour ' + ev.name + ' le ' + new Date(ev.date+'T00:00:00').toLocaleDateString('fr-FR') + ', le solde de ' + solde.toLocaleString('fr-FR') + '€ n\'a pas été reçu.\n\nMerci de procéder au règlement dans les meilleurs délais.\n\nCordialement,\n' + (S.profile.name||'Votre DJ')
      });
    }
  });

  alerts.sort((a,b) => (b.urgent?1:0)-(a.urgent?1:0) || a.daysToEvent-b.daysToEvent);
  return alerts;
}

// ===== TRAVEL CALCULATION (HERE Routing v8 + Nominatim geocoding) =====
// HERE Routing v8 : trajet réel, trafic temps réel, péages EUR
// Nominatim : géocodage gratuit sans clé
// Fallback : haversine ×1.35 si pas de clé HERE

async function calcTrajet() {
  const btn = document.querySelector('[onclick="calcTrajet()"]');
  const resEl = document.getElementById('trajet-result');
  if (!resEl) return;

  const depInp = document.getElementById('edep');
  const departureAddr = (depInp && depInp.value.trim()) || S.profile.departureAddress || '';
  if (!departureAddr) {
    resEl.innerHTML = '<span style="color:var(--er)">⚠️ Configure ton adresse Domicile / Dépôt dans le Profil</span>';
    return;
  }
  const venue = document.getElementById('ev2') ? document.getElementById('ev2').value.trim() : '';
  const addr  = document.getElementById('ea')  ? document.getElementById('ea').value.trim()  : '';
  const arrivalAddr = [venue, addr].filter(Boolean).join(', ');
  if (!arrivalAddr) {
    resEl.innerHTML = '<span style="color:var(--er)">⚠️ Remplis le lieu et l\'adresse de la prestation d\'abord</span>';
    return;
  }

  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
  resEl.innerHTML = '⏳ Géolocalisation…';

  try {
    // Geocode both addresses via Nominatim (no key needed)
    const [dep, arr] = await Promise.all([
      geocodeNominatim(departureAddr),
      geocodeNominatim(arrivalAddr)
    ]);
    if (!dep) throw new Error('Adresse de départ introuvable. Essaie une adresse plus précise (ex: "12 rue de la Paix, Lyon")');
    if (!arr) throw new Error('Adresse d\'arrivée introuvable. Essaie "Lieu, Ville" ou l\'adresse complète');

    const hereKey = S.profile.hereApiKey || '';
    const rate    = S.profile.kmRate !== undefined ? parseFloat(S.profile.kmRate) : 0.40;

    let km, mins, tollCost = null, source;

    if (hereKey) {
      // ── HERE Routing v8 : route réelle + trafic + péages ──────────────────
      resEl.innerHTML = '⏳ Calcul HERE (trajet réel + péages)…';
      const hereUrl =
        'https://router.hereapi.com/v8/routes'
        + '?transportMode=car'
        + '&origin='      + dep.lat + ',' + dep.lon
        + '&destination=' + arr.lat + ',' + arr.lon
        + '&return=travelSummary,tolls'
        + '&currency=EUR'
        + '&tolls[summaries]=total'
        + '&departureTime=now'
        + '&apikey=' + encodeURIComponent(hereKey);

      const hRes = await fetch(hereUrl);
      if (!hRes.ok) {
        const errTxt = await hRes.text();
        throw new Error('HERE API erreur ' + hRes.status + ' — vérifiez la clé dans Profil');
      }
      const hData = await hRes.json();
      if (!hData.routes || !hData.routes.length) throw new Error('HERE : aucun itinéraire trouvé');

      const summary = hData.routes[0].sections[0].travelSummary;
      km      = Math.round(summary.length / 1000 * 10) / 10;
      mins    = Math.round(summary.duration / 60);

      // Péages HERE
      if (summary.tolls && summary.tolls.total && summary.tolls.total.value > 0) {
        tollCost = Math.round(summary.tolls.total.value * 100) / 100;
      } else {
        tollCost = 0;
      }
      source = 'HERE (trajet réel · trafic temps réel)';

    } else {
      // ── Fallback haversine ×1.35 ───────────────────────────────────────────
      resEl.innerHTML = '⏳ Estimation…';
      const crow = haversineKm(dep.lat, dep.lon, arr.lat, arr.lon);
      km   = Math.round(crow * 1.35 * 10) / 10;
      mins = Math.round(km / 55 * 60);
      source = 'estimation (configurez une clé HERE pour trajet réel + péages)';
    }

    const kmCost   = Math.round(km * rate * 100) / 100;
    const totalCost = tollCost !== null ? Math.round((kmCost + tollCost) * 100) / 100 : kmCost;

    // Update driveMin field
    const drInp = document.getElementById('edr');
    if (drInp) drInp.value = mins;

    // Store for saveEv
    window._calcDriveKm   = km;
    window._calcTollCost  = tollCost;
    window._calcTotalCost = totalCost;

    // Build result HTML
    let html = '<span style="color:var(--ok)">✅ </span>'
      + '<strong>' + km + ' km</strong>'
      + ' · <strong>' + mins + ' min</strong>';

    if (tollCost !== null) {
      html += ' · km : <strong style="color:var(--ac2)">' + kmCost.toFixed(2) + '€</strong>';
      if (tollCost > 0) {
        html += ' · péages : <strong style="color:var(--er)">' + tollCost.toFixed(2) + '€</strong>';
        html += ' · total : <strong style="color:var(--ac)">' + totalCost.toFixed(2) + '€</strong>';
      } else {
        html += ' · <span style="color:var(--ok)">sans péages</span>';
        html += ' · total : <strong style="color:var(--ac2)">' + kmCost.toFixed(2) + '€</strong>';
      }
    } else {
      html += ' · <strong style="color:var(--ac2)">' + kmCost.toFixed(2) + '€</strong>';
    }
    html += ' <span style="font-size:.62rem;color:var(--mu)"> · ' + source + ' · Trajet mis à jour</span>';
    resEl.innerHTML = html;

  } catch(e) {
    resEl.innerHTML = '<span style="color:var(--er)">❌ ' + e.message + '</span>';
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '📍 Calculer'; }
  }
}

async function geocodeNominatim(address) {
  try {
    // Try Nominatim first
    const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=3&countrycodes=fr&q='
      + encodeURIComponent(address);
    const res = await fetch(url, { headers: { 'Accept-Language': 'fr', 'User-Agent': 'GigPlanner/1.0' } });
    if (!res.ok) return null;
    const data = await res.json();
    if (!data.length) return null;
    return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), display: data[0].display_name };
  } catch(e) {
    // Network blocked or unavailable — try Photon API as fallback
    try {
      const url2 = 'https://photon.komoot.io/api/?q=' + encodeURIComponent(address) + '&lang=fr&limit=1';
      const res2 = await fetch(url2);
      if (!res2.ok) return null;
      const d2 = await res2.json();
      if (!d2.features||!d2.features.length) return null;
      const [lon,lat] = d2.features[0].geometry.coordinates;
      return { lat, lon, display: d2.features[0].properties.name||address };
    } catch(e2) { return null; }
  }
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2
    + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ===== MODE JOUR J / MISSION =====
function pgJourJ() {
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const tomorrowStr = new Date(now.getTime()+86400000).toISOString().split('T')[0];
  const in7dStr = new Date(now.getTime()+604800000).toISOString().split('T')[0];

  const upcoming = S.events
    .filter(e => e.status !== 'cancelled' && e.date >= todayStr)
    .sort((a,b) => a.date.localeCompare(b.date) || (a.start||'').localeCompare(b.start||''));

  const ev = upcoming[0] || null;

  if (!ev) {
    return '<div style="max-width:480px;margin:60px auto;text-align:center;padding:20px">'
      + '<div style="font-size:4rem;margin-bottom:16px">😴</div>'
      + '<div style="font-family:\'Syne\',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:8px">Pas de mission imminente</div>'
      + '<div style="font-size:.86rem;color:var(--mu);margin-bottom:24px">Profite du calme !</div>'
      + '<button class="btn bp" onclick="openNewEv()">+ Créer une date</button>'
      + '</div>';
  }

  const t = ET[ev.type] || ET.mariage;
  const tl = getTL(ev);
  const isToday = ev.date === todayStr;
  const isTomorrow = ev.date === tomorrowStr;
  const days = Math.ceil((new Date(ev.date+'T00:00:00') - new Date(now.toISOString().split('T')[0]+'T00:00:00')) / 86400000);
  const dayLabel = isToday ? 'AUJOURD\'HUI' : isTomorrow ? 'DEMAIN' : fd(ev.date).toUpperCase();

  // Mission status indicator
  const checks = ev.checklist || [];
  const checksDone = checks.filter(c => c.d).length;
  const acompteOk = ev.acompteStatus === 'received';
  const soldeOk = ev.soldeStatus === 'received';
  const payOk = acompteOk && soldeOk;
  const addrOk = !!(ev.address || ev.venue);
  const issueCount = (checks.length - checksDone) + (!payOk ? 1 : 0);
  let missionStatus, missionStatusColor, missionStatusBg;
  if (issueCount === 0) {
    missionStatus = '🟢 Mission prête'; missionStatusColor = 'var(--ok)'; missionStatusBg = 'rgba(68,255,136,.08)';
  } else if (issueCount <= 2) {
    missionStatus = '🟠 ' + issueCount + ' élément'+(issueCount>1?'s':'')+' à vérifier'; missionStatusColor = '#ffaa00'; missionStatusBg = 'rgba(255,170,0,.08)';
  } else {
    missionStatus = '🔴 ' + issueCount + ' points en attente'; missionStatusColor = 'var(--er)'; missionStatusBg = 'rgba(255,68,68,.08)';
  }

  // Countdown to departure
  let countdownHTML = '';
  if (isToday && tl.depart !== '—') {
    const [dh, dm] = tl.depart.split(':').map(Number);
    const nowMins = now.getHours() * 60 + now.getMinutes();
    const departMins = dh * 60 + dm;
    const diff = departMins - nowMins;
    if (diff > 0) {
      const h = Math.floor(diff / 60), m = diff % 60;
      const urgent = diff < 60, warning = diff < 120;
      const color = urgent ? 'var(--er)' : warning ? '#ffaa00' : 'var(--ok)';
      countdownHTML = '<div style="text-align:center;padding:20px 0;border-bottom:1px solid var(--bd)">'
        + '<div style="font-size:.66rem;font-weight:700;letter-spacing:3px;color:var(--mu);text-transform:uppercase;margin-bottom:8px">Départ dans</div>'
        + '<div style="font-family:\'Syne\',sans-serif;font-size:3.2rem;font-weight:800;color:' + color + ';line-height:1" id="jourj-countdown">'
        + (h > 0 ? h + '<span style="font-size:1.4rem">h</span>' : '') + String(m).padStart(2,'0') + '<span style="font-size:1.4rem">min</span>'
        + '</div>'
        + (urgent ? '<div style="font-size:.78rem;color:var(--er);margin-top:6px;font-weight:700">⚠️ Pars maintenant !</div>' : '')
        + '</div>';
    } else if (diff > -60) {
      countdownHTML = '<div style="text-align:center;padding:16px 0;border-bottom:1px solid var(--bd)">'
        + '<div style="font-family:\'Syne\',sans-serif;font-size:1.2rem;font-weight:800;color:var(--er)">🚗 C\'est l\'heure de partir !</div>'
        + '</div>';
    }
  }

  // Timeline steps
  const cd = ev.clientData || {};

  // Helper to normalize time format: "17h00" or "17:00" → "17:00"
  function normTime(t){ if(!t)return ''; return t.replace(/h/i,':').replace(/[^0-9:]/g,''); }

  const steps = [];
  if (tl.chargement !== '—') steps.push({ time: tl.chargement, label: 'Chargement', icon: '📦' });
  if (tl.depart !== '—')     steps.push({ time: tl.depart,     label: 'Départ',     icon: '🚗' });
  // Arrival at site
  const arrSite = normTime(cd.heureArrivee);
  if (arrSite) steps.push({ time: arrSite, label: 'Arrivée site', icon: '📍' });
  // Matériel prêt = début prestation
  const matPret = normTime(cd.heureMatReady);
  if (matPret) steps.push({ time: matPret, label: 'Matériel prêt', icon: '🎛️' });
  // Client data steps
  if (normTime(cd.heureCeremonie))      steps.push({ time: normTime(cd.heureCeremonie),      label: 'Cérémonie',              icon: '💒' });
  if (normTime(cd.heureVin))            steps.push({ time: normTime(cd.heureVin),             label: "Vin d'honneur",          icon: '🥂' });
  if (normTime(cd.heureEntreeMaries))   steps.push({ time: normTime(cd.heureEntreeMaries),    label: 'Entrée des mariés',      icon: '💍' });
  if (normTime(cd.heureRepas))          steps.push({ time: normTime(cd.heureRepas),           label: 'Repas',                  icon: '🍽️' });
  if (normTime(cd.heureGateau))         steps.push({ time: normTime(cd.heureGateau),          label: 'Gâteau',                 icon: '🎂' });
  if (normTime(cd.heureBal))            steps.push({ time: normTime(cd.heureBal),             label: 'Ouverture du bal',       icon: '🎵' });
  // Fin from client data or ev.end
  const hFin = normTime(cd.heureFin) || ev.end;

function jourjToggleCk(evId, idx) {
  const ev = S.events.find(e => e.id === evId);
  if (!ev || !ev.checklist) return;
  ev.checklist[idx].d = !ev.checklist[idx].d;
  save();
  go('jourj');
}

function jourjSwitch(evId) {
  // Temporarily reorder so this event shows first — just open its detail
  openEv(parseInt(evId) || evId);
}

let _jourjTimer = null;
function startJourJTicker(ev, tl) {
  if (_jourjTimer) clearInterval(_jourjTimer);
  if (S.page !== 'jourj') return;
  const el = document.getElementById('jourj-countdown');
  if (!el) return;
  const todayStr = new Date().toISOString().split('T')[0];
  if (ev.date !== todayStr || tl.depart === '—') return;

  _jourjTimer = setInterval(() => {
    if (S.page !== 'jourj') { clearInterval(_jourjTimer); return; }
    const now = new Date();
    const [dh, dm] = tl.depart.split(':').map(Number);
    const diff = (dh * 60 + dm) - (now.getHours() * 60 + now.getMinutes());
    if (diff <= 0) { clearInterval(_jourjTimer); go('jourj'); return; }
    const h = Math.floor(diff / 60), m = diff % 60;
    const urgent = diff < 60;
    el.style.color = urgent ? 'var(--er)' : diff < 120 ? '#ffaa00' : 'var(--ok)';
    el.innerHTML = (h > 0 ? h + '<span style="font-size:1.4rem">h</span>' : '')
      + String(m).padStart(2,'0') + '<span style="font-size:1.4rem">min</span>';
  }, 30000); // update every 30s
}

        <div class="fgi"><label>Email</label><input id="ob-email" type="email" value="${escH(p.email||'')}" placeholder="dj@exemple.fr"></div>

        <div class="fgi"><label>Barème km (€/km)</label><input id="ob-km" type="number" step="0.01" value="${p.kmRate||0.40}"></div>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end">
      <button class="btn bp" style="padding:12px 28px" onclick="obSaveStep1()">Suivant → Matériel</button>
    </div>`;
  } else if (n === 2) {
    // Step 2: Matériel
    const gearList = S.gear.map((g,i) => `
      <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--s2);border:1px solid var(--bd);margin-bottom:5px">
        <div style="flex:1;font-size:.84rem;font-weight:600">${g.name}</div>
        <div style="font-size:.7rem;color:var(--mu)">${g.cat||''}</div>
        <button onclick="S.gear=S.gear.filter(x=>x.id!=='${g.id}');obShowStep(2)" style="background:none;border:none;color:var(--er);cursor:pointer;font-size:.9rem">✕</button>
      </div>`).join('');
    content.innerHTML = `
    <div style="background:var(--s);border:2px solid var(--s3);padding:22px;margin-bottom:16px">
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;margin-bottom:4px">🎛️ Étape 2 — Ton matériel</div>
      <div style="font-size:.76rem;color:var(--mu);margin-bottom:16px;line-height:1.5">Rentre ton matos pour que GigPlanner calcule tes temps de chargement automatiquement.</div>
      
      <div id="ob-gear-list">${gearList||'<div style="font-size:.8rem;color:var(--mu);padding:10px 0">Aucun matériel — ajoute au moins un élément</div>'}</div>
      
      <div style="display:grid;grid-template-columns:1fr 120px 90px 28px;gap:6px;margin-top:10px;align-items:center">
        <input id="ob-g-name" placeholder="Pioneer CDJ-3000" style="background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px 9px;font-size:.8rem;outline:none">
        <input id="ob-g-cat" placeholder="Platines" style="background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px 9px;font-size:.8rem;outline:none">
        <input id="ob-g-min" type="number" placeholder="10" min="0" style="background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px 9px;font-size:.8rem;outline:none;text-align:right">
        <button class="btn bp" style="padding:7px 10px;font-size:.8rem" onclick="obAddGear()">+</button>
      </div>
      <div style="font-size:.62rem;color:var(--mu);margin-top:4px">Nom · Catégorie · Minutes de chargement</div>
      
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--bd)">
        <div style="font-size:.68rem;font-weight:700;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Ajout rapide (cliquer pour ajouter)</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${['Pioneer CDJ-3000|Platines|10','DJM-900NXS2|Mixage|8','Enceintes RCF|Sono|15','Lumières LED|Lumières|20','Câblage|Câbles|10','Micro HF|Micro|5','Subwoofer|Sono|12'].map(item=>{const[name,cat,min]=item.split('|');return `<button class="btn bg" style="font-size:.7rem;padding:4px 10px" onclick="S.gear.push({id:'g'+Date.now().toString(36),name:'${name}',cat:'${cat}',loadMin:${min}});obShowStep(2)">${name}</button>`}).join('')}
        </div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between">
      <button class="btn bg" onclick="obShowStep(1)">← Retour</button>
      <button class="btn bp" style="padding:12px 28px" onclick="obSaveStep2()">Suivant → Prestations</button>
    </div>`;
  } else if (n === 3) {
    // Step 3: Prestations
    const svcList = S.serviceTypes.map(s => `
      <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--s2);border:1px solid var(--bd);border-left:3px solid ${s.color};margin-bottom:5px">
        <div style="flex:1;font-size:.84rem;font-weight:600">${s.emoji} ${s.name}</div>
        <div style="font-size:.7rem;color:var(--mu)">${s.desc||''}</div>
        <button onclick="S.serviceTypes=S.serviceTypes.filter(x=>x.id!=='${s.id}');obShowStep(3)" style="background:none;border:none;color:var(--er);cursor:pointer;font-size:.9rem">✕</button>
      </div>`).join('');
    content.innerHTML = `
    <div style="background:var(--s);border:2px solid var(--s3);padding:22px;margin-bottom:16px">
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;margin-bottom:4px">🎵 Étape 3 — Tes prestations types</div>
      <div style="font-size:.76rem;color:var(--mu);margin-bottom:16px;line-height:1.5">Ces modules seront associés à tes événements pour calculer les temps et générer les lignes de factures.</div>
      
      <div id="ob-svc-list">${svcList||'<div style="font-size:.8rem;color:var(--mu);padding:10px 0">Aucune prestation — ajoute au moins une</div>'}</div>
      
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)">
        <div style="font-size:.68rem;font-weight:700;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Templates rapides</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${[
            {name:'Cérémonie',emoji:'💒',color:'#ff6b35',desc:'Micro + sono légère',loadMin:20,installMin:30},
            {name:"Vin d'honneur",emoji:'🥂',color:'#3ce8ff',desc:'Ambiance cocktail',loadMin:30,installMin:45},
            {name:'Soirée principale',emoji:'🎵',color:'#e8ff3c',desc:'Sono complète',loadMin:60,installMin:90},
            {name:'Sono corpo',emoji:'🏢',color:'#b96bff',desc:'Setup entreprise',loadMin:45,installMin:60},
            {name:'Club / Résidence',emoji:'🎧',color:'#44ff88',desc:'Setup minimaliste',loadMin:20,installMin:30}
          ].map(s=>`<button class="btn bg" style="font-size:.7rem;padding:4px 10px" onclick="S.serviceTypes.push({id:'s'+Date.now().toString(36),...${JSON.stringify(s)},gearIds:[]});obShowStep(3)">${s.emoji} ${s.name}</button>`).join('')}
        </div>
        <div class="fg" style="margin-top:10px">
          <div class="fgi"><label>Nom</label><input id="ob-s-name" placeholder="Ma prestation"></div>
          <div class="fgi"><label>Emoji</label><input id="ob-s-em" value="🎵" maxlength="2"></div>
          <div class="fgi"><label>Description courte</label><input id="ob-s-desc" placeholder="Sono complète..."></div>
          <div class="fgi"><button class="btn bp" style="margin-top:16px" onclick="obAddSvc()">+ Ajouter</button></div>
        </div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between">
      <button class="btn bg" onclick="obShowStep(2)">← Retour</button>
      <button class="btn bp" style="padding:12px 28px;font-size:.95rem" onclick="obFinish()">✅ C'est parti !</button>
    </div>`;
  }
}

async function obLookupSiret() {
  const s = document.getElementById('ob-siret').value.replace(/\s/g,'');
  const m = document.getElementById('ob-siret-msg');
  if (!m) return;
  if (s.length !== 14 || !/^\d+$/.test(s)) { m.textContent='⚠️ SIRET invalide (14 chiffres)'; m.style.color='var(--wa)'; return; }
  m.textContent='⏳ Recherche...'; m.style.color='var(--mu)';
  try {
    const res = await fetch('https://recherche-entreprises.api.gouv.fr/search?q=' + s + '&page=1&per_page=1');
    const d = await res.json();
    const r = d.results && d.results[0];
    if (r) {
      if (!document.getElementById('ob-name').value) document.getElementById('ob-name').value = r.nom_raison_sociale || r.nom_complet || '';
      if (r.siege) {
        document.getElementById('ob-city').value = r.siege.libelle_commune || '';
        if (document.getElementById('ob-dep')) document.getElementById('ob-dep').value = (r.siege.adresse || '') + ', ' + (r.siege.code_postal||'') + ' ' + (r.siege.libelle_commune||'');
      }
      m.textContent = '✅ Auto-rempli !'; m.style.color = 'var(--ok)';
    } else { m.textContent = '❌ Non trouvé — saisis manuellement'; m.style.color = 'var(--er)'; }
  } catch(e) { m.textContent = '❌ Erreur réseau'; m.style.color = 'var(--er)'; }
}

function obSaveStep1() {
  const name = document.getElementById('ob-name') && document.getElementById('ob-name').value.trim();
  if (!name) { alert('Ton nom DJ est requis'); return; }
  S.profile.siret = (document.getElementById('ob-siret') && document.getElementById('ob-siret').value.replace(/\s/g,'')) || '';
  S.profile.name = name;
  S.profile.city = document.getElementById('ob-city') && document.getElementById('ob-city').value.trim() || '';
  S.profile.phone = document.getElementById('ob-phone') && document.getElementById('ob-phone').value.trim() || '';
  S.profile.email = document.getElementById('ob-email') && document.getElementById('ob-email').value.trim() || '';
  S.profile.departureAddress = document.getElementById('ob-dep') && document.getElementById('ob-dep').value.trim() || '';
  S.profile.kmRate = parseFloat(document.getElementById('ob-km') && document.getElementById('ob-km').value) || 0.40;
  save();
  obShowStep(2);
}

function obAddGear() {
  const n = document.getElementById('ob-g-name') && document.getElementById('ob-g-name').value.trim();
  if (!n) return;
  S.gear.push({id:'g'+Date.now().toString(36),name:n,cat:document.getElementById('ob-g-cat').value.trim()||'',loadMin:parseInt(document.getElementById('ob-g-min').value)||10});
  save();
  obShowStep(2);
}

function obSaveStep2() {
  if (S.gear.length === 0) { alert('Ajoute au moins un élément de matériel'); return; }
  obShowStep(3);
}

function obAddSvc() {
  const n = document.getElementById('ob-s-name') && document.getElementById('ob-s-name').value.trim();
  if (!n) return;
  S.serviceTypes.push({id:'s'+Date.now().toString(36),name:n,emoji:document.getElementById('ob-s-em').value||'🎵',color:'#e8ff3c',desc:document.getElementById('ob-s-desc').value.trim()||'',loadMin:30,installMin:45,gearIds:[]});
  save();
  obShowStep(3);
}

function obFinish() {
  if (S.serviceTypes.length === 0) { alert('Ajoute au moins une prestation'); return; }
  S.profile.onboardingDone = true;
  save();
  document.querySelector('.sidebar').style.opacity = '1';
  document.querySelector('.sidebar').style.pointerEvents = 'auto';
  // Show welcome toast
  const toast = document.createElement('div');
  toast.innerHTML = '🎉 GigPlanner configuré ! Bienvenue.';
  toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:var(--ok);color:#000;padding:12px 20px;font-family:Syne,sans-serif;font-weight:800;font-size:.88rem;z-index:9999;border-radius:2px;animation:fadeIn .3s';
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(), 3000);
  go('dash');
}

// ===== INIT =====
function init(){
  if(checkContractMode())return;
  if(checkReviewMode())return;
  if(checkClientMode())return;
  updateMissionSidebar();
  if(checkOnboarding())return;
  render();
}
initApp();
</script>
</body>
</html>
