<style>
:root{--bg:#0a0a0f;--s:#12121a;--s2:#1a1a26;--s3:#22223a;--bd:#2a2a40;--tx:#f0f0ff;--mu:#6b6b8a;--ac:#e8ff3c;--ac2:#ff6b35;--ac3:#3ce8ff;--ok:#44ff88;--er:#ff4444;--wa:#ffbb33}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--tx);display:flex;font-size:14px}
.sidebar{width:220px;flex-shrink:0;background:var(--s);border-right:1px solid var(--bd);display:flex;flex-direction:column;height:100vh}
.sb-logo{padding:22px 20px 14px;border-bottom:1px solid var(--bd)}
.sb-logo .n{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;letter-spacing:-0.5px}
.sb-logo .n span{color:var(--ac)}
.sb-logo .v{font-size:0.58rem;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-top:2px}
nav{flex:1;padding:10px 0;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:0.82rem;color:var(--mu);transition:all .15s;border-left:2px solid transparent}
.ni:hover{color:var(--tx);background:var(--s2)}

.ni .ic{font-size:1rem;width:20px;text-align:center}
.sb-foot{padding:14px 20px;border-top:1px solid var(--bd);font-size:0.62rem;color:var(--mu)}
.main{flex:1;overflow-y:auto;height:100vh}
.ph{display:flex;align-items:center;justify-content:space-between;padding:26px 30px 18px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--bg);z-index:10}
.pt{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;letter-spacing:-0.5px}
.cnt{padding:22px 30px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;font-family:'Instrument Sans',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--s2);color:var(--tx);transition:all .15s;border-radius:2px}
.btn:hover{border-color:var(--ac);color:var(--ac)}
.bp{background:var(--ac);color:#000;border-color:var(--ac)}
.bp:hover{background:#d4eb2a;border-color:#d4eb2a;color:#000}
.bd2{background:transparent;color:var(--er);border-color:var(--er)}
.bd2:hover{background:rgba(255,68,68,.1)}
.bg{background:transparent;border-color:transparent}
.bg:hover{border-color:var(--bd);color:var(--tx)}
.card{background:var(--s);border:1px solid var(--bd);padding:16px;transition:border-color .15s}
.st{font-family:'Syne',sans-serif;font-size:0.6rem;font-weight:700;color:var(--ac);letter-spacing:3px;text-transform:uppercase;margin:18px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--bd)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fgi{display:flex;flex-direction:column;gap:4px}
.fgf{grid-column:1/-1}
label{font-size:0.65rem;font-weight:600;color:var(--mu);letter-spacing:1px;text-transform:uppercase}
input,select,textarea{background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:8px 10px;font-family:'Instrument Sans',sans-serif;font-size:0.82rem;outline:none;border-radius:2px;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--ac)}
select option{background:var(--s2)}
textarea{resize:vertical}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.mw{background:var(--s);border:1px solid var(--bd);width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--bd);flex-shrink:0}
.mt{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800}
.mc2{background:none;border:none;color:var(--mu);cursor:pointer;font-size:1.2rem;padding:2px 8px}
.mc2:hover{color:var(--tx)}
.mb{padding:22px;overflow-y:auto;flex:1}
.mf{padding:14px 22px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;flex-shrink:0}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.chr{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cdn{text-align:center;font-size:0.58rem;font-weight:700;color:var(--mu);letter-spacing:1px;text-transform:uppercase;padding:4px}
.cc{aspect-ratio:1;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;background:var(--s);border:1px solid var(--bd);padding:4px 5px;overflow:hidden;transition:all .15s;cursor:default}
.cc.om{opacity:.2}
.cc.he{cursor:pointer}
.cc.he:hover{filter:brightness(1.2)}
.cdnum{font-size:0.68rem;font-weight:700;line-height:1;margin-bottom:2px}
.cep{font-size:0.5rem;font-weight:700;padding:1px 3px;line-height:1.4;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px}
.empty{text-align:center;padding:50px 20px;color:var(--mu)}
.ei{font-size:3rem;margin-bottom:10px;opacity:.4}
.et{font-size:0.82rem}
.badge{font-size:0.6rem;padding:2px 7px;font-weight:700;letter-spacing:.5px;display:inline-block;border-radius:1px}
.bco{background:rgba(68,255,136,.1);color:var(--ok);border:1px solid rgba(68,255,136,.3)}
.bpe{background:rgba(255,187,51,.1);color:var(--wa);border:1px solid rgba(255,187,51,.3)}
.bca{background:rgba(255,68,68,.1);color:var(--er);border:1px solid rgba(255,68,68,.3)}
.bpa{background:rgba(60,232,255,.1);color:var(--ac3);border:1px solid rgba(60,232,255,.3)}
.bup{background:rgba(255,68,68,.1);color:var(--er);border:1px solid rgba(255,68,68,.3)}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.sc{background:var(--s);border:1px solid var(--bd);padding:14px}
.sl{font-size:0.62rem;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.sv{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800}
.ss{font-size:0.66rem;color:var(--mu);margin-top:2px}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:18px}
.tab{padding:9px 18px;font-size:0.75rem;font-weight:600;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--tx)}
.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.ci{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd);font-size:0.8rem;cursor:pointer}
.ci:hover{color:var(--ac)}
.cb{width:15px;height:15px;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.cb.ok{background:var(--ok);border-color:var(--ok);color:#000;font-size:0.65rem}
.tlr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd);font-size:0.78rem}
.tll{color:var(--mu)}
.tlv{font-family:'Syne',sans-serif;font-weight:700;color:var(--ac)}
.star{font-size:1.6rem;cursor:pointer;color:var(--s3);transition:color .1s,transform .1s;user-select:none;display:inline-block}
.star.on{color:var(--ac)}
.addr-drop{position:absolute;top:100%;left:0;right:0;background:var(--s2);border:1px solid var(--ac);border-top:none;z-index:999;display:none;max-height:220px;overflow-y:auto}
.addr-drop .addr-item{padding:9px 12px;font-size:.8rem;cursor:pointer;border-bottom:1px solid var(--bd);line-height:1.3}
.addr-drop .addr-item:hover{background:var(--s3)}
</style>
</head>
<body>
<div id="app" style="display:none;width:100%;height:100%">
<aside class="sidebar">

<script>
// EVENT TYPES
const ET={
  mariage:{l:'Mariage',e:'💍',c:'#ff6b35'},
  corpo:{l:'Soirée Corpo',e:'🏢',c:'#3ce8ff'},
  private:{l:'Soirée Privée',e:'🎉',c:'#e8ff3c'},
  club:{l:'Club',e:'🎧',c:'#b96bff'}
};

// STATE
let S={
  events:[
    {id:'ev1',type:'mariage',name:'Mariage Dupont',client:'Marie & Pierre Dupont',date:'2026-03-14',start:'20:00',end:'02:00',venue:'Château de la Forêt',address:'Route des Châteaux, 69100 Villeurbanne',status:'confirmed',amount:1200,paid:true,loadMin:60,driveMin:45,installMin:90,serviceIds:['s1','s2','s3'],notes:'Variété française + électro',checklist:[{t:'Contrat signé',d:true},{t:'Acompte reçu',d:true},{t:'Matériel vérifié',d:false},{t:'Solde reçu',d:false}]},
    {id:'ev2',type:'corpo',name:'Soirée TechCorp',client:'Sophie Martin',date:'2026-03-21',start:'19:00',end:'00:00',venue:'Rooftop Confluence',address:'2 Place de la Confluence, 69002 Lyon',status:'confirmed',amount:900,paid:false,loadMin:45,driveMin:30,installMin:60,serviceIds:['s3'],notes:'House et deep house',checklist:[{t:'Contrat signé',d:true},{t:'Acompte reçu',d:false},{t:'Matériel vérifié',d:false},{t:'Solde reçu',d:false}]},
    {id:'ev3',type:'club',name:'Résidence Club Le Rex',client:'Club Le Rex',date:'2026-04-05',start:'23:00',end:'06:00',venue:'Club Le Rex',address:'267 Rue Marcel Mérieux, 69007 Lyon',status:'pending',amount:600,paid:false,loadMin:30,driveMin:20,installMin:45,serviceIds:[],notes:'Techno / électro',checklist:[{t:'Contrat signé',d:false},{t:'Acompte reçu',d:false},{t:'Matériel vérifié',d:false},{t:'Solde reçu',d:false}]}
  ],
  gear:[
    {id:'g1',name:'Pioneer CDJ-3000',cat:'Platines',loadMin:10},
    {id:'g2',name:'DJM-900NXS2',cat:'Mixage',loadMin:8},
    {id:'g3',name:'Enceintes RCF NX 932-A',cat:'Sono',loadMin:15},
    {id:'g4',name:'Lumières LED PAR',cat:'Lumières',loadMin:20},
    {id:'g5',name:'Câblage complet',cat:'Câbles',loadMin:10}
  ],
  serviceTypes:[
    {id:'s1',name:'Cérémonie',emoji:'💒',color:'#ff6b35',desc:'Micro + sono légère',svcType:'prestation',gearIds:['g2','g5'],loadMin:20,installMin:30},
    {id:'s2',name:"Vin d'honneur",emoji:'🥂',color:'#3ce8ff',desc:'Cocktail ambiance',svcType:'prestation',gearIds:['g1','g2','g3'],loadMin:30,installMin:45},
    {id:'s3',name:'Soirée principale',emoji:'🎵',color:'#e8ff3c',desc:'Sono complète',svcType:'prestation',gearIds:['g1','g2','g3','g4','g5'],loadMin:60,installMin:90},
    {id:'s4',name:'Arche LED',emoji:'✨',color:'#ff3caa',desc:'Structure lumineuse entrée de piste',svcType:'option',price:200,gearIds:[],loadMin:15,installMin:20},
    {id:'s5',name:'Machine à étincelles',emoji:'🎇',color:'#ffaa00',desc:'Cold sparks x2',svcType:'option',price:150,gearIds:[],loadMin:10,installMin:10},
    {id:'s6',name:'Photobooth',emoji:'📸',color:'#a855f7',desc:'Borne photo avec accessoires',svcType:'option',price:300,gearIds:[],loadMin:20,installMin:30}
  ],
  globalLinks:[
    {id:'l1',label:'Deep House Mix',url:'https://soundcloud.com',cat:'SoundCloud'},
    {id:'l2',label:'Playlist Mariage',url:'https://open.spotify.com',cat:'Spotify'}
  ],
  invoices:[],reviews:[],externalLinks:[],contracts:[],
  profile:{name:'',legalName:'',siret:'',address:'',zip:'',city:'',status:'',phone:'',email:'',website:'',tvaActive:false,tvaNumber:'',bankName:'',iban:'',bic:'',logo:'',invoicePrefix:'FAC',invoiceCounter:1,paymentConditions:'Paiement sous 30 jours. Acompte 30% à la signature.',legalMention:"TVA non applicable, art. 293B du CGI."},
  calYear:2026,calMonth:2,page:'dash'
};

// ===== AUTH & CLOUD SAVE =====
var SB_URL = 'https://glfdivdxmwxvgcqxzvjx.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsZmRpdmR4bXd4dmdjcXh6dmp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTMyODUsImV4cCI6MjA4ODEyOTI4NX0.bksb_PA6zupehXArH2D5ob_v09SrUUMHqVdc7IpmCSs';
var currentUser = null;
var _saveTimer = null;

function sbHeaders(token){
  var h = {'apikey':SB_KEY,'Content-Type':'application/json'};
  if(token) h['Authorization']='Bearer '+token;
  return h;
}

async function sbSignIn(email,pwd){
  var r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'apikey':SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({email:email,password:pwd})});
  return r.json();
}

async function sbSignUp(email,pwd){
  var r=await fetch(SB_URL+'/auth/v1/signup',{method:'POST',headers:{'apikey':SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({email:email,password:pwd})});
  return r.json();
}

async function sbSignOut(){
  if(currentUser){
    await fetch(SB_URL+'/auth/v1/logout',{method:'POST',headers:sbHeaders(currentUser.token)}).catch(function(){});
  }
  currentUser=null;
  localStorage.removeItem('gp7_sess');
  showAuthScreen();
}

function saveSession(id,token,email,expiresIn){
  localStorage.setItem('gp7_sess',JSON.stringify({id:id,token:token,email:email,exp:Date.now()+(expiresIn||3600)*1000}));
}

function loadSession(){
  try{
    var s=JSON.parse(localStorage.getItem('gp7_sess')||'null');
    if(s&&s.exp>Date.now()) return s;
  }catch(e){}
  return null;
}

function save(){
  try{localStorage.setItem('gp7',JSON.stringify(getDataPayload()));localStorage.setItem('gp7_lastsave',new Date().toISOString());}catch(e){}
  if(currentUser){if(_saveTimer)clearTimeout(_saveTimer);_saveTimer=setTimeout(cloudSave,2000);}
}

function load(){
  try{var r=localStorage.getItem('gp7');if(r)applyData(JSON.parse(r));}catch(e){}
}

function getDataPayload(){
  return {events:S.events,gear:S.gear,serviceTypes:S.serviceTypes,globalLinks:S.globalLinks,invoices:S.invoices,reviews:S.reviews,externalLinks:S.externalLinks,contracts:S.contracts,profile:S.profile,calYear:S.calYear,calMonth:S.calMonth};
}

function applyData(d){
  ['events','gear','serviceTypes','globalLinks','invoices','reviews','externalLinks','contracts'].forEach(function(k){if(d[k])S[k]=d[k];});
  if(d.profile)S.profile=Object.assign({},S.profile,d.profile);
  if(d.calYear)S.calYear=d.calYear;
  if(d.calMonth!==undefined)S.calMonth=d.calMonth;
}

function updateCloudStatus(msg){
  var el=document.getElementById('cloud-status');
  if(el)el.textContent=msg;
}

async function cloudSave(){
  if(!currentUser)return;
  updateCloudStatus('🔄 Sync...');
  try{
    var r=await fetch(SB_URL+'/rest/v1/dj_data',{
      method:'POST',
      headers:Object.assign(sbHeaders(currentUser.token),{'Prefer':'resolution=merge-duplicates'}),
      body:JSON.stringify({user_id:currentUser.id,data:getDataPayload(),updated_at:new Date().toISOString()})
    });
    if(r.ok){updateCloudStatus('✅ Sauvegardé');}
    else{var e=await r.json();updateCloudStatus('⚠️ '+(e.message||r.status));}
  }catch(e){updateCloudStatus('⚠️ '+e.message);}
}

async function cloudLoad(){
  if(!currentUser)return false;
  try{
    var r=await fetch(SB_URL+'/rest/v1/dj_data?user_id=eq.'+currentUser.id+'&select=data&limit=1',{headers:sbHeaders(currentUser.token)});
    var rows=await r.json();
    if(rows&&rows.length&&rows[0].data){applyData(rows[0].data);localStorage.setItem('gp7',JSON.stringify(rows[0].data));return true;}
  }catch(e){}
  return false;
}

// ===== AUTH SCREEN =====
function showAuthScreen(){
  document.getElementById('app').style.display='none';
  var auth=document.getElementById('auth-screen');
  if(!auth){auth=document.createElement('div');auth.id='auth-screen';document.body.appendChild(auth);}
  auth.style.display='flex';
  auth.innerHTML=`<div style="min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px">
    <div style="width:100%;max-width:400px">
      <div style="text-align:center;margin-bottom:40px">
        <div style="font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;letter-spacing:-1px">Gig<span style="color:var(--ac)">Planner</span></div>
        <div style="font-size:.68rem;color:var(--mu);letter-spacing:3px;text-transform:uppercase;margin-top:4px">DJ Management</div>
      </div>
      <div style="background:var(--s);border:1px solid var(--bd);padding:30px">
        <div style="display:flex;margin-bottom:24px;border-bottom:1px solid var(--bd)">
          <div id="tab-login" onclick="switchAuthTab('login')" style="flex:1;text-align:center;padding:10px;cursor:pointer;font-size:.82rem;font-weight:600;color:var(--ac);border-bottom:2px solid var(--ac)">Connexion</div>
          <div id="tab-signup" onclick="switchAuthTab('signup')" style="flex:1;text-align:center;padding:10px;cursor:pointer;font-size:.82rem;font-weight:600;color:var(--mu);border-bottom:2px solid transparent">Inscription</div>
        </div>
        <div id="auth-body">
          <div class="fgi" style="margin-bottom:12px"><label>Email</label><input id="auth-email" type="email" placeholder="dj@example.com" autocomplete="email"></div>
          <div class="fgi" style="margin-bottom:20px"><label>Mot de passe</label><input id="auth-pwd" type="password" placeholder="••••••••" autocomplete="current-password"></div>
          <div id="auth-msg" style="font-size:.75rem;min-height:18px;margin-bottom:12px;color:var(--er)"></div>
          <button class="btn bp" style="width:100%;justify-content:center;padding:12px" onclick="doLogin()">→ Se connecter</button>
        </div>
      </div>
      <div style="text-align:center;margin-top:16px;font-size:.72rem;color:var(--mu)">Données sauvegardées automatiquement dans le cloud</div>
    </div>
  </div>`;
  setTimeout(function(){
    var pwd=document.getElementById('auth-pwd');
    if(pwd)pwd.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});

async function doLogin(){
  var email=(document.getElementById('auth-email')||{}).value||'';
  var pwd=(document.getElementById('auth-pwd')||{}).value||'';
  var msg=document.getElementById('auth-msg');
  if(!email||!pwd){if(msg)msg.textContent='Remplis tous les champs';return;}
  var btn=document.querySelector('#auth-screen .bp');
  if(btn){btn.disabled=true;btn.textContent='⏳ Connexion...';}
  if(msg)msg.textContent='';
  try{
    var data=await sbSignIn(email,pwd);
    if(data.error||data.error_description){
      if(msg)msg.textContent=data.error_description||data.error||'Erreur';
      if(btn){btn.disabled=false;btn.textContent='→ Se connecter';}
      return;
    }
    var uid=data.user&&data.user.id;
    var uemail=data.user&&data.user.email;
    if(!uid){if(msg)msg.textContent='Erreur: user id manquant';if(btn){btn.disabled=false;btn.textContent='→ Se connecter';}return;}
    currentUser={id:uid,token:data.access_token,email:uemail};
    saveSession(uid,data.access_token,uemail,data.expires_in);
    var hasCloud=await cloudLoad();
    if(!hasCloud){var local=localStorage.getItem('gp7');if(local){try{applyData(JSON.parse(local));}catch(e){}}await cloudSave();}
    enterApp();
  }catch(e){if(msg)msg.textContent='Erreur réseau';if(btn){btn.disabled=false;btn.textContent='→ Se connecter';}}
}

async function doSignup(){
  var email=(document.getElementById('auth-email')||{}).value||'';
  var pwd=(document.getElementById('auth-pwd')||{}).value||'';
  var pwd2=(document.getElementById('auth-pwd2')||{}).value||'';
  var msg=document.getElementById('auth-msg');
  if(!email||!pwd||!pwd2){if(msg)msg.textContent='Remplis tous les champs';return;}
  if(pwd!==pwd2){if(msg)msg.textContent='Mots de passe différents';return;}
  if(pwd.length<6){if(msg)msg.textContent='6 caractères minimum';return;}
  var btn=document.querySelector('#auth-screen .bp');
  if(btn){btn.disabled=true;btn.textContent='⏳ Création...';}
  try{
    var data=await sbSignUp(email,pwd);
    if(data.error){if(msg)msg.textContent=data.error_description||data.error;if(btn){btn.disabled=false;btn.textContent='→ Créer mon compte';}return;}
    var data2=await sbSignIn(email,pwd);
    if(data2.access_token&&data2.user){
      currentUser={id:data2.user.id,token:data2.access_token,email:data2.user.email};
      saveSession(data2.user.id,data2.access_token,data2.user.email,data2.expires_in);
      var local=localStorage.getItem('gp7');if(local){try{applyData(JSON.parse(local));}catch(e){}}
      await cloudSave();
      enterApp();
    } else {
      if(msg){msg.style.color='var(--ok)';msg.textContent='✅ Compte créé ! Connecte-toi.';}
      if(btn){btn.disabled=false;btn.textContent='→ Créer mon compte';}
      switchAuthTab('login');
    }
  }catch(e){if(msg)msg.textContent='Erreur réseau';if(btn){btn.disabled=false;btn.textContent='→ Créer mon compte';}}
}

function enterApp(){

}

// UTILS
function fd(d){if(!d)return'—';return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})}
function subMin(time,mins){if(!time)return'—';const[h,m]=time.split(':').map(Number);const t=h*60+m-mins;const hh=Math.floor(((t%1440)+1440)%1440/60);const mm=((t%60)+60)%60;return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0')}
function getTL(ev){
  var ids = ev.serviceIds||[];
  var r = calcDeduped(ids);
  var l = ids.length > 0 ? r.load    : (ev.loadMin||0);
  var i = ids.length > 0 ? r.install : (ev.installMin||0);
  var margin = S.profile.safetyMargin !== undefined ? S.profile.safetyMargin : 30;
  return{load:l,install:i,margin:margin,depart:subMin(ev.start,(ev.driveMin||0)+i+margin),chargement:subMin(ev.start,(ev.driveMin||0)+i+l+margin)};
}
function etBadge(type){const t=ET[type]||ET.mariage;return `<span style="font-size:.6rem;background:${t.c}18;border:1px solid ${t.c}44;color:${t.c};padding:2px 7px">${t.e} ${t.l}</span>`}
function stBadge(s){const m={confirmed:'bco',pending:'bpe',cancelled:'bca'};const l={confirmed:'Confirmé',pending:'En attente',cancelled:'Annulé'};return `<span class="badge ${m[s]||'bpe'}">${l[s]||s}</span>`}
function uid(){return Date.now()+''+Math.random().toString(36).slice(2,6)}
function escH(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

var _addrTimer = null;
function addrAuto(input, dropId, onSelect){
  clearTimeout(_addrTimer);
  var q = input.value.trim();
  var drop = document.getElementById(dropId);
  if(!drop) return;
  if(q.length < 3){ drop.style.display='none'; return; }
  _addrTimer = setTimeout(function(){
    fetch('https://api-adresse.data.gouv.fr/search/?q=' + encodeURIComponent(q) + '&limit=5&autocomplete=1')
      .then(function(r){ return r.json(); })
      .then(function(d){
        var features = d.features || [];
        if(!features.length){ drop.style.display='none'; return; }
        drop.innerHTML = features.map(function(f){
          return '<div class="addr-item" data-label="' + escH(f.properties.label) + '">'
            + escH(f.properties.label)
            + '</div>';
        }).join('');
        drop.style.display = 'block';
        // Bind click on each item
        drop.querySelectorAll('.addr-item').forEach(function(el, i){
          el.addEventListener('mousedown', function(e){
            e.preventDefault(); // empêche le blur de l'input avant la sélection
            onSelect(features[i]);
            drop.style.display = 'none';
          });
        });
      })
      .catch(function(){ drop.style.display='none'; });
  }, 220);
}

function venueAutoPhoton(q, drop){
  var url = 'https://photon.komoot.io/api/?q=' + encodeURIComponent(q) + '&limit=6&lang=fr&bbox=-5.2,41.3,9.6,51.1';
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(d){
      var features = (d.features || []).filter(function(f){
        var c = f.properties.country;
        return !c || c === 'France' || c === 'FR';
      });
      if(!features.length){ drop.style.display='none'; return; }
      drop.innerHTML = features.map(function(f, i){
        var p    = f.properties;
        var name = p.name || p.street || '';
        var city = [p.city || p.town || p.village || '', p.postcode || ''].filter(Boolean).join(' ');
        var type = p.osm_value || p.type || '';
        var typeLabel = {'hotel':'🏨','castle':'🏰','event_venue':'🎪','restaurant':'🍽️','hall':'🎪','farm':'🌾','manor':'🏰','chalet':'🏠','winery':'🍷'}[type] || '📍';
        return '<div class="addr-item" data-idx="' + i + '">'
          + typeLabel + ' <strong>' + escH(name) + '</strong>'
          + (city ? ' <span style="font-size:.68rem;color:var(--mu)">— ' + escH(city) + '</span>' : '')
          + '</div>';
      }).join('');
      drop.style.display = 'block';
      drop.querySelectorAll('.addr-item').forEach(function(el){
        el.addEventListener('mousedown', function(e){
          e.preventDefault();
          var f = features[parseInt(el.dataset.idx)];
          var p = f.properties;
          var name = p.name || p.street || '';
          var num  = p.housenumber || '';
          var road = p.street || '';
          var post = p.postcode || '';
          var city = p.city || p.town || p.village || '';
          var addrParts = [];
          if(num && road) addrParts.push(num + ' ' + road);
          else if(road)   addrParts.push(road);
          if(post && city) addrParts.push(post + ' ' + city);
          else if(city)    addrParts.push(city);
          var fullAddr = addrParts.join(', ');
          var ev2 = document.getElementById('ev2');
          var ea  = document.getElementById('ea');
          if(ev2) ev2.value = name;
          if(ea && fullAddr) ea.value = fullAddr;
          drop.style.display = 'none';
        });
      });
    })
    .catch(function(){ drop.style.display='none'; });
}

// ===== DASHBOARD COCKPIT =====
function pgDash(){
  const now=new Date();now.setHours(0,0,0,0);
  const todayStr=new Date().toISOString().split('T')[0];
  const in48=new Date(now.getTime()+172800000).toISOString().split('T')[0];
  const thisMonth=now.getMonth(),thisYear=now.getFullYear();

  const upcoming=S.events.filter(e=>new Date(e.date)>=now&&e.status!=='cancelled').sort((a,b)=>new Date(a.date)-new Date(b.date));
  const moEvs=S.events.filter(e=>{const d=new Date(e.date);return d.getMonth()===thisMonth&&d.getFullYear()===thisYear&&e.status!=='cancelled'});
  const caM=moEvs.reduce((s,e)=>s+(e.amount||0),0);
  const caEncaissedM=moEvs.reduce((s,e)=>{
    if(e.soldeStatus==='received')return s+(e.amount||0);
    if(e.acompteStatus==='received')return s+(e.acompteAmount||Math.round((e.amount||0)*(e.acomptePct||30)/100));
    return s;
  },0);

  // Pending payments
  const pendEvs=S.events.filter(e=>e.status==='confirmed'&&(e.acompteStatus!=='received'||e.soldeStatus!=='received'));
  const caP=pendEvs.reduce((s,e)=>{
    let due=0;
    if(e.acompteStatus!=='received')due+=(e.acompteAmount||Math.round((e.amount||0)*(e.acomptePct||30)/100));
    if(e.soldeStatus!=='received')due+=((e.amount||0)-(e.acompteAmount||Math.round((e.amount||0)*(e.acomptePct||30)/100)));
    return s+due;
  },0);

  // Monthly objective
  const obj=S.profile.monthlyGoal||0;
  const objPct=obj>0?Math.min(100,Math.round(caEncaissedM/obj*100)):0;

  // Alerts
  const relAlerts=getRelancesAlerts();
  const urgentAlerts=relAlerts.filter(a=>a.urgent);
  const warnAlerts=relAlerts.filter(a=>!a.urgent);

  // Global status indicator
  let statusColor,statusIcon,statusText;
  if(urgentAlerts.length>0){statusColor='var(--er)';statusIcon='🔴';statusText=urgentAlerts.length+' action'+(urgentAlerts.length>1?'s urgentes':' urgente')+' requise'+(urgentAlerts.length>1?'s':'')}
  else if(warnAlerts.length>0||caP>0){statusColor='#ffaa00';statusIcon='🟠';statusText='Quelques éléments à suivre'}
  else if(upcoming.length===0){statusColor='var(--mu)';statusIcon='😴';statusText='Aucune prestation à venir'}
  else{statusColor='var(--ok)';statusIcon='🟢';statusText='Tout est sous contrôle'}

  // Next mission block
  const nextMission=upcoming[0];
  const nextIn48=nextMission&&nextMission.date<=in48;
  let missionBlock='';
  if(nextMission){
    const t=ET[nextMission.type]||ET.mariage;
    const tl=getTL(nextMission);
    const days=Math.ceil((new Date(nextMission.date)-now)/86400000);
    const isToday=nextMission.date===todayStr;
    const isTomorrow=days===1;
    const urgLabel=isToday?'AUJOURD\'HUI':isTomorrow?'DEMAIN':'Dans '+days+'j';
    missionBlock=`<div class="card" style="border:2px solid ${nextIn48?t.c:'var(--bd)'};cursor:pointer;margin-bottom:10px" onclick="go('events')">
      <div style="display:flex;align-items:flex-start;gap:12px">
        <div style="background:${t.c}22;border:1px solid ${t.c}44;padding:8px 10px;text-align:center;flex-shrink:0">
          <div style="font-size:1.4rem">${t.e}</div>
          <div style="font-size:.58rem;font-weight:700;color:${t.c};letter-spacing:1px;margin-top:2px">${urgLabel}</div>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;margin-bottom:3px">${nextMission.name}</div>
          <div style="font-size:.72rem;color:var(--mu);margin-bottom:6px">${nextMission.venue||'—'} · ${nextMission.start||'—'} → ${nextMission.end||'—'}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;font-size:.7rem">
            ${tl.chargement!=='—'?`<span style="color:var(--mu)">📦 ${tl.chargement}</span>`:''}
            ${tl.depart!=='—'?`<span style="color:var(--mu)">🚗 ${tl.depart}</span>`:''}
            ${payBadge(nextMission)}
          </div>
        </div>
        ${nextIn48?`<div style="flex-shrink:0"><span style="background:${t.c};color:#000;font-size:.62rem;font-weight:800;padding:3px 8px">MISSION →</span></div>`:''}
      </div>
    </div>`;
  }

  // Relances block (compact)
  let relancesBlock='';
  if(relAlerts.length>0){
    window._relanceAlerts=relAlerts;
    const rows=relAlerts.slice(0,3).map((a,i)=>{
      const col=a.urgent?'var(--er)':'#ffaa00';
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--bd);flex-wrap:wrap">
        <div style="flex:1;min-width:160px">
          <div style="font-size:.75rem;font-weight:600;color:${col}">${a.msg}</div>
          <div style="font-size:.68rem;color:var(--mu);cursor:pointer" onclick="openEv('${a.evId}')">${a.evName} →</div>
        </div>
        <div style="display:flex;gap:5px">
          <button class="btn bg" style="font-size:.65rem;padding:3px 8px" onclick="relanceByMail(${i})">✉️</button>
          <button class="btn bg" style="font-size:.65rem;padding:3px 8px" onclick="markPayment('${a.evId}','${a.type==='acompte'?'acompte':'solde'}','received');render()">✅</button>
        </div>
      </div>`;
    }).join('');
    relancesBlock=`<div class="st" style="display:flex;align-items:center;gap:8px">💰 Paiements à suivre <span style="background:${urgentAlerts.length>0?'var(--er)':'#ffaa00'};color:#000;font-size:.6rem;padding:1px 7px;border-radius:99px">${relAlerts.length}</span></div>
    <div style="background:var(--s);border:1px solid rgba(255,100,100,.25)">${rows}</div>
    ${relAlerts.length>3?`<div style="text-align:right;margin-top:6px"><button class="btn bg" style="font-size:.7rem" onclick="go('finances')">Voir tout (${relAlerts.length}) →</button></div>`:''}`;
  }

  return `<div class="ph">
    <div>
      <div class="pt">Dashboard ⚡</div>
      <div style="font-size:.72rem;margin-top:3px"><span style="color:${statusColor}">${statusIcon}</span> <span style="color:var(--mu)">${statusText}</span></div>
    </div>

// ===== EVENTS =====
function pgEvents(){
  const now=new Date();now.setHours(0,0,0,0);
  const todayStr=new Date().toISOString().split('T')[0];
  const in48=new Date(now.getTime()+172800000).toISOString().split('T')[0];

  // Check if upcoming event < 48h → auto show mission
  const nextMission=S.events.filter(e=>e.status!=='cancelled'&&e.date>=todayStr&&e.date<=in48).sort((a,b)=>a.date.localeCompare(b.date))[0];

  const evs=[...S.events].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const upcoming=evs.filter(e=>new Date(e.date+'T00:00:00')>=now&&e.status!=='cancelled');
  const past=evs.filter(e=>new Date(e.date+'T00:00:00')<now||e.status==='cancelled');

  const evCard=(ev,highlight)=>{
    const t=ET[ev.type]||ET.mariage;
    const tl=getTL(ev);
    const days=Math.ceil((new Date(ev.date+'T00:00:00')-now)/86400000);
    const svcs=(ev.serviceIds||[]).map(sid=>S.serviceTypes.find(s=>s.id===sid)).filter(Boolean);
    const prests=svcs.filter(s=>s.svcType!=='option');
    const opts=svcs.filter(s=>s.svcType==='option');
    const svcPills=prests.map(s=>`<span style="font-size:.62rem;font-weight:700;background:${s.color}18;border:1px solid ${s.color}66;color:${s.color};padding:1px 7px">${s.emoji} ${s.name}</span>`).join('');
    const optPills=opts.map(s=>`<span style="font-size:.62rem;font-weight:700;background:rgba(255,170,0,.1);border:1px solid rgba(255,170,0,.4);color:#ffaa00;padding:1px 7px">${s.emoji} ${s.name}</span>`).join('');
    return `<div class="card" style="cursor:pointer;border-left:3px solid ${t.c};margin-bottom:8px${highlight?';border:2px solid '+t.c:''};" onclick="openEv('${ev.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:3px">${ev.name}</div>
          <div style="font-size:.7rem;color:var(--mu);margin-bottom:7px">${fd(ev.date)} · ${ev.client}</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:${(svcPills||optPills)?'5px':'0'}">${etBadge(ev.type)}${stBadge(ev.status)}${payBadge(ev)}${ev.clientData?'<span class="badge bco">✅ Fiche</span>':''}</div>
          ${svcPills||optPills?`<div style="display:flex;gap:4px;flex-wrap:wrap">${svcPills}${optPills}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:14px">
          <div style="font-family:'Syne',sans-serif;font-weight:800;color:var(--ac2)">${(ev.amount||0).toLocaleString('fr-FR')}€</div>
          <div style="font-size:.68rem;color:var(--mu)">${ev.start||'—'} → ${ev.end||'—'}</div>
          ${days>0&&days<=7?`<div style="font-size:.65rem;color:${t.c};font-weight:700;margin-top:2px">J-${days}</div>`:''}
          ${tl.depart!=='—'&&days>=0&&days<=1?`<div style="font-size:.65rem;color:var(--mu)">🚗 ${tl.depart}</div>`:''}
        </div>
      </div>
    </div>`;
  };

  // If event within 48h, show Mission prominently at top
  const missionSection=nextMission?`
  <div style="margin-bottom:20px">
    <div class="st" style="display:flex;align-items:center;gap:8px;color:var(--er)">🎯 Mission en cours <span style="background:var(--er);color:#fff;font-size:.6rem;padding:1px 7px;border-radius:99px">MAINTENANT</span></div>
    ${pgJourJ()}
  </div>`:'';

  const tabs=`<div class="tabs">
    <div class="tab ${S._evTab!=='past'?'active':''}" onclick="S._evTab='upcoming';render()">À venir (${upcoming.length})</div>
    <div class="tab ${S._evTab==='past'?'active':''}" onclick="S._evTab='past';render()">Passés (${past.length})</div>
    <div class="tab" onclick="go('cal')">📅 Calendrier</div>
    <div class="tab" onclick="go('clients')">👤 Clients</div>
  </div>`;

  const list=(S._evTab==='past'?past:upcoming);

  return `<div class="ph"><div class="pt">Événements 🎵</div><button class="btn bp" onclick="openNewEv()">+ Nouvelle date</button></div>
  <div class="cnt">
  ${missionSection}
  ${!nextMission?tabs:''}
  ${!nextMission?(list.length===0?'<div class="empty"><div class="ei">🎵</div><div class="et">Aucun événement</div></div>':list.map(ev=>evCard(ev,false)).join('')):''}
  </div>`;
}

function togCk(evId,idx){
  const ev=S.events.find(e=>e.id==evId);
  if(ev&&ev.checklist&&ev.checklist[idx]){
    ev.checklist[idx].d=!ev.checklist[idx].d;save();
    const el=document.getElementById('ecl');
    if(el)el.innerHTML=(ev.checklist||[]).map((c,i)=>`<div class="ci" onclick="togCk('${evId}',${i})"><div class="cb ${c.d?'ok':''}">${c.d?'✓':''}</div><span style="text-decoration:${c.d?'line-through':''};color:${c.d?'var(--mu)':'var(--tx)'}">${c.t}</span></div>`).join('');
  }
}

function recalcEvLogistique(evId){
  var ev = S.events.find(function(e){return e.id==evId;});
  if(!ev) return;

  var svcs = (ev.serviceIds||[]).map(function(sid){return S.serviceTypes.find(function(s){return s.id===sid;});}).filter(Boolean);
  if(!svcs.length){
    alert('Aucune prestation cochée sur cet événement.\nModifie l\'événement pour cocher tes prestations d\'abord.');
    return;
  }

  var result = calcDeduped(ev.serviceIds||[]);
  var newLoad    = result.load;
  var newInstall = result.install;
  var oldLoad    = ev.loadMin;
  var oldInstall = ev.installMin;

  // Find shared gear for info message
  var allGear = []; var dupes = [];
  svcs.forEach(function(s){
    (s.gearIds||[]).forEach(function(gid){
      if(allGear.indexOf(gid)!==-1 && dupes.indexOf(gid)===-1) dupes.push(gid);
      else allGear.push(gid);
    });
  });
  var dupeMsg = '';
  if(dupes.length){
    var names = dupes.map(function(gid){ var g=S.gear.find(function(x){return x.id===gid;}); return g?g.name:gid; }).join(', ');
    dupeMsg = '\n♻️ Matos partagé dédupliqué : ' + names;
  }

  var detail = svcs.map(function(s){
    var gearNames = (s.gearIds||[]).map(function(gid){ var g=S.gear.find(function(x){return x.id===gid;}); return g?g.name:null; }).filter(Boolean);
    return (s.emoji||'') + ' ' + s.name + ' : charg. ' + (s.loadMin||0) + 'min · install. ' + (s.installMin||0) + 'min' + (gearNames.length?' ('+gearNames.join(', ')+')':'');
  }).join('\n');

  var msg = '♻️ Recalculer depuis ton matos actuel ?\n\n'
    + detail + dupeMsg
    + '\n\nTotal chargement : ' + oldLoad + 'min → ' + newLoad + 'min'
    + '\nTotal installation : ' + oldInstall + 'min → ' + newInstall + 'min'
    + '\n\n⚠️ L\'heure du set (' + (ev.start||'—') + ') ne change pas.';

  if(!confirm(msg)) return;

  ev.loadMin    = newLoad;
  ev.installMin = newInstall;
  save();

  var tl   = getTL(ev);
  var tlEl = document.getElementById('ev-tl-'+evId);
  if(tlEl){
    tlEl.innerHTML =
      '<div class="tlr"><span class="tll">⏰ Chargement</span><span class="tlv">' + tl.chargement + '</span></div>'
      + '<div class="tlr"><span class="tll">🚗 Départ</span><span class="tlv">' + tl.depart + '</span></div>'
      + '<div class="tlr"><span class="tll">📍 Arrivée site</span><span class="tlv">' + subMin(ev.start,tl.install) + '</span></div>'
      + '<div class="tlr"><span class="tll">🎵 Début set</span><span class="tlv" style="color:var(--ac2);font-weight:700">' + (ev.start||'—') + '</span></div>'
      + '<div class="tlr"><span class="tll">🏁 Fin</span><span class="tlv">' + (ev.end||'—') + '</span></div>'
      + '<div style="font-size:.68rem;color:var(--ok);margin-top:6px;font-weight:600">✅ Mis à jour' + (dupeMsg ? ' · ' + dupes.length + ' matos dédupliqué(s)' : '') + '</div>';
  }
  var btn = document.querySelector('[onclick="recalcEvLogistique(\'' + evId + '\')"]');
  if(btn){
    btn.textContent='✅ Mis à jour !';
    btn.style.borderColor='var(--ok)';btn.style.color='var(--ok)';
    setTimeout(function(){btn.textContent='♻️ Recalculer chargement & départ';btn.style.borderColor='';btn.style.color='';},3000);
  }
}

function selectDocType(type){

    else { btn.style.border='1px solid var(--bd)'; btn.style.background='var(--s2)'; btn.style.color='var(--mu)'; btn.style.fontWeight='normal'; }
  });

function uploadDoc(){
  var evId = window._uploadDocEvId;
  var type = window._uploadDocType || 'contrat';
  var fileInput = document.getElementById('doc-file');
  var msg = document.getElementById('doc-upload-msg');
  if(!fileInput||!fileInput.files||!fileInput.files[0]){ msg.textContent='⚠️ Sélectionne un fichier'; msg.style.color='var(--wa)'; return; }
  var file = fileInput.files[0];
  if(file.size > 5*1024*1024){ msg.textContent='⚠️ Fichier trop lourd (max 5MB)'; msg.style.color='var(--wa)'; return; }
  msg.textContent='⏳ Upload en cours...'; msg.style.color='var(--mu)';
  var btn = document.querySelector('[onclick="uploadDoc()"]');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Upload...'; }
  var fileName = evId + '_' + type + '_' + Date.now() + '.pdf';
  fetch(SB_URL + '/storage/v1/object/documents/' + fileName, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/pdf', 'x-upsert': 'true' },
    body: file
  }).then(function(r){
    if(!r.ok) throw new Error('Upload failed: ' + r.status);
    var publicUrl = SB_URL + '/storage/v1/object/public/documents/' + fileName;
    var ev = S.events.find(function(e){ return e.id==evId; });
    if(!ev) throw new Error('Événement introuvable');
    if(!ev.docs) ev.docs = [];
    ev.docs.push({ type:type, name:file.name, url:publicUrl, uploadedAt:new Date().toISOString() });
    save();
    msg.textContent='✅ Document uploadé !'; msg.style.color='var(--ok)';
    setTimeout(function(){ closeMo(); openEv(evId); }, 800);
  }).catch(function(err){
    msg.textContent='❌ Erreur : ' + err.message; msg.style.color='var(--er)';
    if(btn){ btn.disabled=false; btn.textContent='📤 Uploader'; }
  });
}

function delEvDoc(evId, idx){
  var ev = S.events.find(function(e){ return e.id==evId; });
  if(!ev||!ev.docs) return;
  var doc = ev.docs[idx];
  if(!doc||!confirm('Supprimer "' + doc.name + '" ?')) return;
  var fileName = doc.url.split('/documents/')[1];
  if(fileName){ fetch(SB_URL+'/storage/v1/object/documents/'+fileName,{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}); }
  ev.docs.splice(idx,1);
  save();
  openEv(evId);
}

function buildSvcCheckboxes(ev){
  var checkedIds = ev && ev.serviceIds ? ev.serviceIds : [];
  var prests = S.serviceTypes.filter(function(s){return s.svcType!=='option';});
  var opts   = S.serviceTypes.filter(function(s){return s.svcType==='option';});

    return '<div style="font-size:.78rem;color:var(--mu);padding:8px">Aucune prestation configurée — '
      + '<button class="btn bg" style="font-size:.72rem;padding:3px 8px" onclick="closeMo();go(\'settings\')">Configurer →</button></div>';
  }

  function mkRow(s){
    var isChecked = checkedIds.indexOf(s.id) !== -1;
    var priceTag = s.price ? '<span style="font-size:.7rem;color:var(--ac2);font-weight:700">+' + s.price + '€</span>' : '';
    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--s2);margin-bottom:4px;cursor:pointer;border:1px solid var(--bd);border-left:3px solid ' + s.color + '"'
      + ' onclick="document.getElementById(\'svc-' + s.id + '\').click()">'
      + '<input type="checkbox" id="svc-' + s.id + '"' + (isChecked ? ' checked' : '') + ''
      + ' onclick="event.stopPropagation();evRecalcTimes()" style="cursor:pointer;accent-color:var(--ac)">'
      + '<span style="flex:1;font-size:.82rem;font-weight:600">' + escH(s.emoji||'') + ' ' + escH(s.name) + '</span>'
      + priceTag
      + '<span style="font-size:.68rem;color:var(--mu)">⏱' + (s.loadMin||0) + '+' + (s.installMin||0) + 'min</span>'
      + '</div>';
  }

  var html = '';
  if(prests.length){
    html += '<div style="font-size:.62rem;font-weight:700;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px">🎵 PRESTATIONS</div>';
    html += prests.map(mkRow).join('');
  }
  if(opts.length){
    html += '<div style="font-size:.62rem;font-weight:700;color:#ffaa00;letter-spacing:2px;text-transform:uppercase;margin:10px 0 5px">✨ OPTIONS</div>';
    html += opts.map(mkRow).join('');
  }
  return html;
}

function calcDeduped(serviceIds){
  // Collect all unique gearIds across all checked/selected services
  // A gear item is counted only ONCE even if present in multiple services
  var seenGear = {};
  var totalLoad = 0;
  var totalInstall = 0;

  serviceIds.forEach(function(sid){
    var s = S.serviceTypes.find(function(x){return x.id===sid;});
    if(!s) return;

    // For load: sum only gear not yet seen
    var svcGearLoad = 0;
    (s.gearIds||[]).forEach(function(gid){
      if(!seenGear[gid]){
        seenGear[gid] = true;
        var gi = S.gear.find(function(x){return x.id===gid;});
        if(gi) svcGearLoad += (gi.loadMin||0);
      }
    });
    // If service has no gear linked, use its own loadMin directly
    if(!(s.gearIds&&s.gearIds.length)){
      totalLoad += (s.loadMin||0);
    } else {
      totalLoad += svcGearLoad;
    }
    // Install always summed (physical install of each presta is independent)
    totalInstall += (s.installMin||0);
  });

  return {load: totalLoad, install: totalInstall};
}

function evRecalcTimes(){
  var checkedIds = S.serviceTypes
    .filter(function(s){ return document.getElementById('svc-'+s.id) && document.getElementById('svc-'+s.id).checked; })
    .map(function(s){ return s.id; });

  var result = calcDeduped(checkedIds);
  var loEl = document.getElementById('elo');
  var inEl = document.getElementById('ein');
  if(loEl && result.load > 0)    loEl.value = result.load;
  if(inEl && result.install > 0) inEl.value = result.install;

  // Show a small dedupe hint if gear was shared
  var allGear = [];
  var dupes = [];
  checkedIds.forEach(function(sid){
    var s = S.serviceTypes.find(function(x){return x.id===sid;});
    if(s)(s.gearIds||[]).forEach(function(gid){
      if(allGear.indexOf(gid)!==-1 && dupes.indexOf(gid)===-1) dupes.push(gid);
      else allGear.push(gid);
    });
  });
  var hint = document.getElementById('svc-dedupe-hint');
  if(hint){
    if(dupes.length){
      var names = dupes.map(function(gid){ var g=S.gear.find(function(x){return x.id===gid;}); return g?g.name:gid; }).join(', ');
      hint.innerHTML = '♻️ Matos partagé dédupliqué : <strong>' + escH(names) + '</strong>';
      hint.style.display = 'block';
    } else {
      hint.style.display = 'none';
    }
  }
}

  const depInp=document.getElementById('edep');
  const existEv=id&&id!=='null'?S.events.find(e=>e.id==id):null;
  const data={type,name:n,client:c,date:d,start:document.getElementById('estart').value,end:document.getElementById('eend').value,venue:document.getElementById('ev2').value,address:document.getElementById('ea').value,status:document.getElementById('es').value,amount:parseInt(document.getElementById('eam').value)||0,acomptePct:parseInt(document.getElementById('eacp').value)||30,acompteAmount:parseInt(document.getElementById('eacm').value)||0,acompteStatus:document.getElementById('eaps').value||'pending',soldeStatus:document.getElementById('esds').value||'pending',signDate:document.getElementById('esign').value||'',paid:document.getElementById('esds').value==='received',loadMin:parseInt(document.getElementById('elo').value)||45,driveMin:parseInt(document.getElementById('edr').value)||30,installMin:parseInt(document.getElementById('ein').value)||60,serviceIds:sids,notes:document.getElementById('eno').value,departureOverride:depInp?depInp.value.trim():'',driveKm:window._calcDriveKm!==undefined?window._calcDriveKm:(existEv?existEv.driveKm:null),tollCost:window._calcTollCost!==undefined?window._calcTollCost:(existEv?existEv.tollCost:null),travelTotalCost:window._calcTotalCost!==undefined?window._calcTotalCost:(existEv?existEv.travelTotalCost:null)};
  if(id&&id!=='null'){const ev=S.events.find(e=>e.id==id);Object.assign(ev,data)}

}

function pgCal(){
  const y=S.calYear,m=S.calMonth;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const off=first===0?6:first-1;
  const today=new Date();today.setHours(0,0,0,0);
  const evByDay={};
  S.events.forEach(ev=>{const d=new Date(ev.date);if(d.getMonth()===m&&d.getFullYear()===y){const dd=d.getDate();if(!evByDay[dd])evByDay[dd]=[];evByDay[dd].push(ev)}});
  let cells='';
  for(let i=0;i<off;i++)cells+='<div class="cc om"></div>';
  for(let d=1;d<=days;d++){
    const isT=new Date(y,m,d).getTime()===today.getTime();
    const evs=evByDay[d]||[];
    const ev=evs[0];
    const t=ev?(ET[ev.type]||ET.mariage):null;
    const bg=ev?t.c+'22':'var(--s)';
    const bc=ev?t.c:isT?'var(--ac)':'var(--bd)';
    const oc=ev?`onclick="openEv('${ev.id}')"`:''
    cells+=`<div class="cc ${ev?'he':''}" ${oc} style="background:${bg};border-color:${bc}">
      <div class="cdnum" style="${isT?'color:var(--ac)':''}">${d}</div>
      ${evs.map(e=>{const et=ET[e.type]||ET.mariage;return `<div class="cep" style="background:${et.c}33;color:${et.c}">${et.e} ${e.name}</div>`}).join('')}
    </div>`;
  }
  const mn=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const mEvs=Object.values(evByDay).flat().sort((a,b)=>new Date(a.date)-new Date(b.date));
  return `<div class="ph"><div class="pt">Calendrier 📅</div><button class="btn bp" onclick="openNewEv()">+ Ajouter</button></div>
  <div class="cnt">
  <div class="card" style="margin-bottom:18px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <button class="btn bg" onclick="chgMo(-1)">← Préc.</button>
      <div style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800">${mn[m]} ${y}</div>
      <button class="btn bg" onclick="chgMo(1)">Suiv. →</button>
    </div>
    <div class="chr">${['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].map(d=>`<div class="cdn">${d}</div>`).join('')}</div>
    <div class="cg">${cells}</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px">${Object.values(ET).map(t=>`<span style="font-size:.68rem;color:${t.c}">${t.e} ${t.l}</span>`).join('')}</div>
  </div>
  ${mEvs.length?`<div class="st">Ce mois</div><div style="display:grid;gap:7px">${mEvs.map(ev=>{const t=ET[ev.type]||ET.mariage;return `<div class="card" style="cursor:pointer;border-left:3px solid ${t.c};padding:10px 14px;display:flex;justify-content:space-between;align-items:center" onclick="openEv('${ev.id}')"><div><div style="font-weight:600;font-size:.86rem">${ev.name}</div><div style="font-size:.7rem;color:var(--mu)">${ev.start||'—'} → ${ev.end||'—'} · ${ev.venue||'—'}</div></div><div style="font-family:'Syne',sans-serif;font-weight:800;color:var(--ac2)">${(ev.amount||0).toLocaleString('fr-FR')}€</div></div>`}).join('')}</div>`:''}
  </div>`;
}
function chgMo(d){S.calMonth+=d;if(S.calMonth>11){S.calMonth=0;S.calYear++}if(S.calMonth<0){S.calMonth=11;S.calYear--}render()}

// ===== CLIENTS =====
function pgClients(){
  const cm={};S.events.forEach(ev=>{if(!cm[ev.client])cm[ev.client]=[];cm[ev.client].push(ev)});
  return `<div class="ph"><div class="pt">Clients 👤</div></div><div class="cnt">
  ${Object.keys(cm).length===0?'<div class="empty"><div class="ei">👤</div><div class="et">Aucun client</div></div>':

// ===== ICS =====
function exportICS(id){
  const ev=S.events.find(e=>e.id==id);if(!ev)return;
  const d=ev.date.replace(/-/g,'');
  const ts=ev.start?ev.start.replace(':','')+'00':'000000';
  const te=ev.end?ev.end.replace(':','')+'00':'000000';
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','CALSCALE:GREGORIAN','BEGIN:VEVENT','UID:gp-'+ev.id+'@gigplanner','DTSTART:'+d+'T'+ts,'DTEND:'+d+'T'+te,'SUMMARY:'+ev.name,'LOCATION:'+(ev.address||ev.venue||''),'DESCRIPTION:Client : '+ev.client,'END:VEVENT','END:VCALENDAR'];
  const a=document.createElement('a');a.href='data:text/calendar;charset=utf-8,'+encodeURIComponent(lines.join('\r\n'));a.download='event.ics';a.click();
}

function genToken(evId){const ev=S.events.find(e=>e.id==evId);if(!ev.clientToken){ev.clientToken=btoa(evId+':'+Date.now()).replace(/=/g,'');save()}return ev.clientToken}

function openClientLink(evId){

      ${cd.contactPrincipal?`<div><span style="color:var(--mu)">Contact :</span> ${cd.contactPrincipal}</div>`:''}
      ${cd.heureCeremonie?`<div><span style="color:var(--mu)">Cérémonie :</span> ${cd.heureCeremonie}</div>`:''}
      ${cd.heureBal||cd.heureDebut?`<div><span style="color:var(--mu)">Bal :</span> ${cd.heureBal||cd.heureDebut}</div>`:''}
      ${cd.premiereDanse?`<div style="grid-column:1/-1"><span style="color:var(--mu)">1ère danse :</span> ${cd.premiereDanse}</div>`:''}
      ${cd.interdits?`<div style="grid-column:1/-1"><span style="color:var(--er)">🚫 Interdits :</span> ${cd.interdits}</div>`:''}
      ${cd.limiteur||cd.limiteSonore?`<div><span style="color:var(--wa)">⚡ Limiteur :</span> ${cd.limiteur||cd.limiteSonore}</div>`:''}
      ${cd.coupureTotale?`<div><span style="color:var(--wa)">🔇 Coupure :</span> ${cd.coupureTotale}</div>`:''}
    </div>
  </div>`:''}`;
  document.getElementById('mfoot').innerHTML=`<button class="btn bg" onclick="closeMo()">Fermer</button><button class="btn bp" onclick="cpTxt('cl-url',this)">📨 Copier lien</button><button class="btn bp" onclick="syncFicheFromSB('${evId}',this)">🔄 Sync fiche</button>`;
  showMo();
}

function syncFicheFromSB(evId, btn){
  var ev = S.events.find(function(e){ return e.id==evId; });
  if(!ev || !ev.clientToken){ alert('Pas de token pour cet événement'); return; }
  if(btn){ btn.textContent = '⏳ Syncing...'; btn.disabled = true; }
  sbGetFiche(ev.clientToken).then(function(rows){
    if(!rows || !rows.length){
      if(btn){ btn.textContent = '🔄 Sync fiche'; btn.disabled = false; }
      alert('Aucune fiche reçue pour cet événement.');
      return;
    }
    var cd = rows[0].data;
    ev.clientData = cd;
    if(cd.lieu)       ev.venue   = cd.lieu;
    if(cd.address)    ev.address = cd.address;
    if(cd.maries)     ev.client  = cd.maries;
    save();
    if(btn){ btn.textContent = '✅ Reçu !'; btn.style.background='var(--ok)'; }
    setTimeout(function(){ closeMo(); render(); }, 1000);
  }).catch(function(){
    if(btn){ btn.textContent = '🔄 Sync fiche'; btn.disabled = false; }
    alert('Erreur de connexion Supabase.');
  });
}

function cpTxt(elId,btn){
  const el=document.getElementById(elId);if(!el)return;
  navigator.clipboard.writeText(el.textContent||el.value||'').then(()=>{const o=btn.textContent;btn.textContent='✅ Copié!';setTimeout(()=>btn.textContent=o,2000)}).catch(()=>prompt('Copie ce lien :',el.textContent));
}

// ===== SUPABASE CONFIG =====
function sbUpsertFiche(token, data){
  return fetch(SB_URL + '/rest/v1/fiches_clients', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Prefer': 'resolution=merge-duplicates'
    },
    body: JSON.stringify({ event_token: token, data: data, updated_at: new Date().toISOString() })
  });
}

function sbGetFiche(token){
  return fetch(SB_URL + '/rest/v1/fiches_clients?event_token=eq.' + encodeURIComponent(token) + '&order=updated_at.desc&limit=1', {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  }).then(function(r){ return r.json(); });
}

// ===== CLIENT FORM MODE =====
function checkClientMode(){
  const p=new URLSearchParams(window.location.search);
  const token=p.get('client');if(!token)return false;
  document.querySelector('.sidebar').style.display='none';
  document.getElementById('main').innerHTML='<div style="text-align:center;padding:80px 20px"><div style="font-size:2rem;margin-bottom:12px">⏳</div><div style="font-size:.9rem;color:var(--mu)">Chargement...</div></div>';

  // Cherche d'abord dans les données locales (mode DJ)
  const evLocal=S.events.find(e=>e.clientToken===token);

  // Charge depuis Supabase pour avoir les dernières données
  sbGetFiche(token).then(function(rows){
    var cd = (rows && rows.length) ? rows[0].data : (evLocal ? evLocal.clientData||{} : {});
    // Crée un objet événement minimal pour le rendu
    var ev = evLocal || {
      id: 'client-'+token,
      clientToken: token,
      type: 'mariage',
      name: cd.maries || 'Votre événement',
      date: cd.date || '',
      clientData: cd
    };
    ev.clientData = cd;
    window._clientToken = token; // Stocke le token pour submitCF
    renderClientForm(ev);
  }).catch(function(){
    // Si Supabase échoue, utilise les données locales ou vide
    var ev = evLocal || { id:'client-'+token, clientToken:token, type:'mariage', name:'Votre événement', date:'', clientData:{} };
    window._clientToken = token;
    renderClientForm(ev);
  });
  return true;
}

function renderClientFiche(cd){
  var r = '';

  r += '<div class="st" style="display:flex;align-items:center;justify-content:space-between"><span>📋 Fiche client</span><span style="font-size:.62rem;color:var(--ok)">✅ Reçue</span></div>';
  r += '<div style="background:rgba(68,255,136,.04);border:1px solid rgba(68,255,136,.2);padding:14px;margin-bottom:10px;font-size:.78rem;display:grid;gap:5px">';

  // Identité
  r += row('💍 Mariés', cd.maries||cd.client, 'var(--tx)');
  r += row('📞 Contact principal', cd.contactPrincipal);
  r += row('📍 Contact sur place', cd.contactSurPlace);

  // Horaires
  var hasH = cd.heureMatReady||cd.heureArrivee||cd.heureCeremonie||cd.heureVin||cd.heureEntreeMaries||cd.heureRepas||cd.heureBal||cd.heureGateau||cd.heureFin;

    r += sep('⏰','Horaires');
    r += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">';
    r += row('Matériel prêt', cd.heureMatReady);
    r += row('Arrivée site', cd.heureArrivee);
    r += row('Cérémonie', cd.heureCeremonie);
    r += row("Vin d'honneur", cd.heureVin);
    r += row('Entrée des mariés', cd.heureEntreeMaries);
    r += row('Repas', cd.heureRepas);
    r += cd.heureBal ? '<div><span style="color:var(--ac2);font-weight:700">🎵 Ouverture bal : '+cd.heureBal+'</span></div>' : '';
    r += row('🎂 Gâteau', cd.heureGateau);
    r += row('🏁 Fin estimée', cd.heureFin);
    r += '</div>';
  }

  // Points sensibles
  if(cd.limiteSonore||cd.heureLimiteMu||cd.particularites){
    r += sep('⚠️','Points sensibles');
    r += row('Limite sonore', cd.limiteSonore, 'var(--wa)');
    r += row('Heure limite musique', cd.heureLimiteMu, 'var(--wa)');
    r += row('Particularités', cd.particularites);
  }

  // Moments clés
  if(cd.entreeMaries||cd.musiqueCeremonie||cd.sortieCeremonie||cd.premiereDanse||cd.musiqueGateau||cd.musiqueOuverture){
    r += sep('🎵','Moments clés');
    r += row('Entrée mariés', cd.entreeMaries);
    r += row('Musique cérémonie', cd.musiqueCeremonie);
    r += row('Sortie cérémonie', cd.sortieCeremonie);
    r += cd.premiereDanse ? '<div><span style="color:var(--ac2);font-weight:700">💃 1ère danse : '+escH(cd.premiereDanse)+'</span></div>' : '';
    r += row('🎂 Musique gâteau', cd.musiqueGateau);
    r += row('Ouverture bal', cd.musiqueOuverture);
  }

  // Interdits
  if(cd.interdits){
    r += sep('🚫','Morceaux interdits');
    r += '<div style="color:var(--er)">'+escH(cd.interdits)+'</div>';
  }

  // Annonces
  if(cd.annonces){ r += row('📢 Annonces', cd.annonces); }

  // Restrictions
  if(cd.limiteur||cd.coupureBasses||cd.coupureTotale){
    r += sep('🏛️','Restrictions lieu');
    r += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">';
    r += row('Limiteur', cd.limiteur, 'var(--wa)');
    r += row('Couper basses', cd.coupureBasses, 'var(--wa)');
    r += cd.coupureTotale ? '<div style="grid-column:1/-1"><span style="color:var(--er);font-weight:700">🔇 Coupure totale : '+cd.coupureTotale+'</span></div>' : '';
    r += '</div>';
  }

  if(cd.notes){ r += row('📝 Notes', cd.notes); }
  r += '</div>';
  return r;
}



function doSubmitCF(){

// Helper global pour lire les champs du formulaire client
function g(id){ var el=document.getElementById(id); return el ? (el.value||'').trim() : ''; }

function submitCF(token, evId){
  var clientToken = token || window._clientToken || '';
  var ev = S.events.find(function(e){ return e.id==evId || (clientToken && e.clientToken===clientToken); });
  if(!clientToken){ var p=new URLSearchParams(window.location.search); clientToken=p.get('client')||''; }
  if(!ev && clientToken){ ev={id:evId||('c-'+clientToken),clientToken:clientToken,type:'mariage',name:'',clientData:{}}; }

  var cd = {
    maries:g('cf-ma'), contactPrincipal:g('cf-cp'), contactSurPlace:g('cf-cs'), contactSurPlaceTel:g('cf-cst'),
    lieu:g('cf-li'), address:g('cf-ad'),
    heureMatReady:g('cf-hmat'), heureArrivee:g('cf-harr'),
    heureCeremonie:g('cf-hc'), heureVin:g('cf-hv'),
    heureEntreeMaries:g('cf-hem'), heureRepas:g('cf-hrep'),
    heureBal:g('cf-hb'), heureGateau:g('cf-hg'), heureFin:g('cf-hf'),
    particularites:g('cf-part'),
    entreeMaries:g('cf-em'), musiqueCeremonie:g('cf-mc'), sortieCeremonie:g('cf-sc'),
    premiereDanse:g('cf-1d'), musiqueGateau:g('cf-mg'),
    interdits:g('cf-in'), annonces:g('cf-an'),
    limiteur:g('cf-lm'), coupureBasses:g('cf-bss'), coupureTotale:g('cf-ct'),
    notes:g('cf-no'), submittedAt:new Date().toISOString()
  };

  if(ev){
    ev.clientData = cd;
    if(cd.lieu && !ev.venue)    ev.venue   = cd.lieu;
    if(cd.address && !ev.address) ev.address = cd.address;
    if(cd.maries && !ev.client)  ev.client  = cd.maries;
    if(cd.notes)     ev.notes   = cd.notes;
    save();
    clientToken = ev.clientToken || clientToken;
  }

  var btn = document.querySelector('button[onclick="doSubmitCF()"]');
  if(btn){ btn.textContent = '⏳ Envoi...'; btn.disabled = true; }

  function finish(ok){
    // Reste sur le formulaire — juste une confirmation visuelle
    var b = document.querySelector('button[onclick="doSubmitCF()"]');
    if(b){
      b.textContent = '✅ Fiche envoyée ! Modifier et renvoyer à tout moment';
      b.disabled = false;
      b.style.background = 'var(--ok)';
      b.style.color = '#000';
    }
    // Met à jour le bandeau en haut
    var banner = document.querySelector('#cf-status-banner');
    if(banner){ banner.innerHTML = '✅ Fiche envoyée avec succès — vous pouvez modifier et renvoyer.'; banner.style.color='var(--ok)'; }
  }

  if(clientToken){
    sbUpsertFiche(clientToken, cd).then(function(r){
      finish();
    }).catch(function(){ finish(); });
  } else {
    finish();
  }
}

function parseFicheText(evId){
  var txt = (document.getElementById('fiche-import-txt')||{}).value || '';
  if(!txt.trim()){ document.getElementById('fiche-import-msg').textContent = "⚠️ Colle le texte d'abord"; return; }
  var ev = S.events.find(function(e){ return e.id==evId; });
  if(!ev) return;

  var cd = ev.clientData || {};
  var get = function(label){
    var re = new RegExp(label.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*:\\s*(.+)', 'i');
    var m = txt.match(re);
    return m ? m[1].trim() : '';
  };

  var imported = {
    maries:           get('Mariés') || get('Maries'),
    contactPrincipal: get('Contact'),
    contactSurPlace:  get('Sur place'),
    lieu:             get('Lieu'),
    address:          get('Adresse'),
    heureMatReady:    get('Matériel prêt') || get('Materiel pret'),
    heureArrivee:     get('Arrivée site') || get('Arrivee site'),
    heureCeremonie:   get('Cérémonie') || get('Ceremonie'),
    heureVin:         get("Vin d'honneur"),
    heureBal:         get('Ouverture bal'),
    heureGateau:      get('Gâteau') || get('Gateau'),
    heureFin:         get('Fin'),
    particularites:   get('Particularités') || get('Particularites'),
    entreeMaries:     get('Entrée mariés') || get('Entree maries'),
    musiqueCeremonie: get('Cérémonie') || get('Ceremonie'),
    sortieCeremonie:  get('Sortie cérémonie') || get('Sortie ceremonie'),
    premiereDanse:    get('1ère danse') || get('Première danse') || get('1ere danse'),
    musiqueGateau:    get('Gâteau') || get('Gateau'),
    interdits:        get('Interdits'),
    annonces:         get('Annonces'),
    limiteur:         get('Limiteur'),
    coupureBasses:    get('Couper basses'),
    coupureTotale:    get('Coupure totale'),
    notes:            get('Notes'),
    submittedAt:      new Date().toISOString()
  };

  var count = Object.keys(imported).filter(function(k){ return k!=='submittedAt' && imported[k]; }).length;
  ev.clientData = Object.assign({}, cd, imported);
  if(ev.clientData.lieu)      ev.venue   = ev.clientData.lieu;
  if(ev.clientData.address)   ev.address = ev.clientData.address;
  if(ev.clientData.maries)    ev.client  = ev.clientData.maries;
  save();

  var msg = document.getElementById('fiche-import-msg');
  if(msg){ msg.textContent = '✅ ' + count + ' champs importés !'; msg.style.color = 'var(--ok)'; }
  setTimeout(function(){ closeMo(); render(); }, 1200);
}

async function lookupSiret(){
  var raw = document.getElementById('pp-siret').value.replace(/\s/g,'');
  var m = document.getElementById('sm');
  if(raw.length!==14||!/^\d+$/.test(raw)){
    m.textContent='⚠️ SIRET invalide (14 chiffres requis)';m.style.color='var(--wa)';return;
  }
  m.textContent='⏳ Recherche en cours...';m.style.color='var(--mu)';
  try{
    var res = await fetch('https://recherche-entreprises.api.gouv.fr/search?q='+raw+'&page=1&per_page=1');
    if(!res.ok) throw new Error('HTTP '+res.status);
    var d = await res.json();
    var r = d.results && d.results[0];

    if(r){
      var siege = r.siege || {};
      var nom = r.nom_raison_sociale || r.nom_complet || r.nom || '';

      // Cas non-diffusible : l'INSEE masque les données sur demande du dirigeant
      if(!nom || nom === '[NON-DIFFUSIBLE]' || (siege && siege.adresse === '[NON-DIFFUSIBLE]')){
        m.innerHTML = '⚠️ Entreprise trouvée mais <strong>non-diffusible</strong> — l\'INSEE masque tes données.<br>'
          + '<span style="font-size:.68rem;color:var(--mu)">Remplis les champs manuellement. '
          + 'Pour activer la diffusion publique : insee.fr → "Demande de diffusion au répertoire SIRENE".</span>';
        m.style.color = 'var(--wa)';
        return;
      }

      var set = function(id, val){ var el=document.getElementById(id); if(el && val && val !== '[NON-DIFFUSIBLE]') el.value=val; };
      set('pp-ln', nom);
      var ppn = document.getElementById('pp-n');
      if(ppn && !ppn.value) ppn.value = nom;

      var adresse = siege.adresse ||
        [(siege.numero_voie||''), (siege.type_voie||''), (siege.libelle_voie||'')].filter(Boolean).join(' ') || '';
      set('pp-a', adresse);
      set('pp-z', siege.code_postal || '');
      set('pp-ci', siege.libelle_commune || '');

      m.innerHTML = '✅ Trouvé : <strong>' + escH(nom) + '</strong>';
      m.style.color = 'var(--ok)';

    } else {
      m.textContent = '❌ SIRET non trouvé — remplis manuellement';
      m.style.color = 'var(--er)';
    }
  } catch(e){
    m.textContent = '❌ Erreur réseau — remplis manuellement';
    m.style.color = 'var(--er)';
  }
}

function saveProfile(){

function uploadContractForEv(){
  var evId = window._uploadCtrEvId;
  var fileInput = document.getElementById('ctr-file');
  var msg = document.getElementById('ctr-upload-msg');
  if(!fileInput||!fileInput.files||!fileInput.files[0]){ msg.textContent='⚠️ Sélectionne un fichier PDF'; msg.style.color='var(--wa)'; return; }
  var file = fileInput.files[0];
  if(file.size > 5*1024*1024){ msg.textContent='⚠️ Fichier trop lourd (max 5MB)'; msg.style.color='var(--wa)'; return; }
  msg.textContent='⏳ Upload en cours...'; msg.style.color='var(--mu)';
  var btn = document.querySelector('[onclick="uploadContractForEv()"]');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Upload...'; }
  var fileName = evId + '_contrat_' + Date.now() + '.pdf';
  fetch(SB_URL + '/storage/v1/object/documents/' + fileName, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/pdf', 'x-upsert': 'true' },
    body: file
  }).then(function(r){
    if(!r.ok) throw new Error('Upload failed: ' + r.status);
    var publicUrl = SB_URL + '/storage/v1/object/public/documents/' + fileName;
    var ev = S.events.find(function(e){ return e.id==evId; });
    if(ev){ if(!ev.docs) ev.docs=[]; ev.docs.push({ type:'contrat', name:file.name, url:publicUrl, uploadedAt:new Date().toISOString() }); }
    save();
    msg.textContent='✅ Contrat importé !'; msg.style.color='var(--ok)';
    setTimeout(function(){ closeMo(); openEv(evId); }, 800);
  }).catch(function(err){
    msg.textContent='❌ Erreur : ' + err.message; msg.style.color='var(--er)';
    if(btn){ btn.disabled=false; btn.textContent='📤 Uploader'; }
  });
}

function uploadExternalInvoice(){

  var file = fileInput.files[0];
  if(file.size > 5*1024*1024){ msg.textContent='⚠️ Fichier trop lourd (max 5MB)'; msg.style.color='var(--wa)'; return; }
  msg.textContent='⏳ Upload en cours...'; msg.style.color='var(--mu)';
  var btn = document.querySelector('[onclick="uploadExternalInvoice()"]');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Upload...'; }
  var prefix = evId ? evId + '_' : 'global_';
  var fileName = prefix + 'facture_' + Date.now() + '.pdf';
  fetch(SB_URL + '/storage/v1/object/documents/' + fileName, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/pdf', 'x-upsert': 'true' },
    body: file
  }).then(function(r){
    if(!r.ok) throw new Error('Upload failed: ' + r.status);
    var publicUrl = SB_URL + '/storage/v1/object/public/documents/' + fileName;
    var docEntry = { type:'facture', name:file.name, url:publicUrl, uploadedAt:new Date().toISOString() };
    if(evId){
      var ev = S.events.find(function(e){ return e.id==evId; });
      if(ev){ if(!ev.docs) ev.docs=[]; ev.docs.push(docEntry); }
    }
    // Also store in global external invoices list
    if(!S.externalInvoices) S.externalInvoices = [];
    S.externalInvoices.push(Object.assign({id:'einv'+Date.now(), evId:evId||null}, docEntry));
    save();
    msg.textContent='✅ Facture importée !'; msg.style.color='var(--ok)';
    setTimeout(function(){
      closeMo();
      if(evId) openEv(evId); else render();
    }, 800);
  }).catch(function(err){
    msg.textContent='❌ Erreur : ' + err.message; msg.style.color='var(--er)';
    if(btn){ btn.disabled=false; btn.textContent='📤 Uploader'; }
  });
}

  <div class="fgi" style="margin-top:12px"><label>Notes</label><textarea id="in-no" rows="2">${ev&&ev.notes||''}</textarea></div>`;

function iLH(i,d,q,u){
  return `<div id="il-${i}" style="display:grid;grid-template-columns:1fr 50px 90px 26px;gap:5px;margin-bottom:5px;align-items:center">
  <input id="id-${i}" value="${escH(d||'')}" placeholder="Description" style="background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px 9px;font-size:.78rem;outline:none;width:100%">
  <input id="iq-${i}" type="number" value="${q||1}" min="1" style="background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px;font-size:.78rem;outline:none;text-align:center;width:100%">
  <input id="iu-${i}" type="number" value="${u||0}" min="0" style="background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px;font-size:.78rem;outline:none;text-align:right;width:100%">
  <button onclick="document.getElementById('il-${i}').remove()" style="background:none;border:none;color:var(--er);cursor:pointer;font-size:1rem;padding:0">✕</button>
  </div>`;
}

function addIL(){
  const n=window._iLines||0;window._iLines=n+1;
  const w=document.getElementById('ilw');if(!w)return;
  const d=document.createElement('div');d.innerHTML=iLH(n,'',1,0);
  w.appendChild(d.firstElementChild);
}

function collectLines(){
  const ls=[];
  for(let i=0;i<50;i++){
    const dd=document.getElementById('id-'+i);
    const qq=document.getElementById('iq-'+i);
    const uu=document.getElementById('iu-'+i);
    if(dd&&dd.closest('#ilw')&&dd.value.trim())ls.push({desc:dd.value.trim(),qty:parseInt(qq&&qq.value)||1,unit:parseFloat(uu&&uu.value)||0});
  }
  return ls;
}

function saveInv(print){
  const lines=collectLines();
  const p=S.profile;
  const ht=lines.reduce((s,l)=>s+l.qty*l.unit,0);
  const tvr=p.tvaActive?0.20:0;
  const tva=ht*tvr;
  const ttc=ht+tva;
  const ac=parseFloat(document.getElementById('in-ac')&&document.getElementById('in-ac').value)||0;
  const ev=window._iEvId?S.events.find(e=>e.id===window._iEvId):null;
  const inv={id:'inv'+uid(),number:document.getElementById('in-num').value||'',date:document.getElementById('in-date').value||new Date().toISOString().split('T')[0],clientName:document.getElementById('in-cl').value||'',clientAddress:document.getElementById('in-ad').value||'',eventName:ev&&ev.name||'',evId:window._iEvId,lines,ht,tva,tvaRate:tvr,ttc,acompte:ac,solde:ttc-ac,totalTTC:ttc,notes:document.getElementById('in-no')&&document.getElementById('in-no').value||'',paid:document.getElementById('in-pa')&&document.getElementById('in-pa').value==='1'};
  S.invoices.push(inv);

}

function recopyRev(){

function elRow(i,label,emoji,url){
  return `<div id="elr-${i}" style="display:grid;grid-template-columns:36px 120px 1fr 28px;gap:6px;margin-bottom:6px;align-items:center">
  <input id="ele-${i}" value="${escH(emoji||'🔗')}" maxlength="2" style="background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px;font-size:1rem;outline:none;text-align:center;width:100%">

  <input id="elu-${i}" value="${escH(url||'')}" placeholder="https://..." style="background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px 9px;font-size:.8rem;outline:none;width:100%">

function addElRow(){const n=window._elCount||0;window._elCount=n+1;const w=document.getElementById('elw');if(!w)return;const d=document.createElement('div');d.innerHTML=elRow(n,'','🔗','');w.appendChild(d.firstElementChild)}

function saveExtLinks(){
  const links=[];
  for(let i=0;i<50;i++){
    const le=document.getElementById('ele-'+i);
    const ll=document.getElementById('ell-'+i);
    const lu=document.getElementById('elu-'+i);
    if(le&&le.closest('#elw')&&ll&&ll.value.trim()&&lu&&lu.value.trim())links.push({id:'el'+i,label:ll.value.trim(),emoji:le.value.trim()||'🔗',url:lu.value.trim()});
  }
  S.externalLinks=links;save();closeMo();render();
}

function exportData(){
  var data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    events:       S.events,
    gear:         S.gear,
    serviceTypes: S.serviceTypes,
    invoices:     S.invoices,
    contracts:    S.contracts,
    reviews:      S.reviews,
    globalLinks:  S.globalLinks,
    externalLinks:S.externalLinks,
    profile:      S.profile
  };
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], {type:'application/json'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  var date = new Date().toISOString().slice(0,10);
  a.href     = url;
  a.download = 'gigplanner-sauvegarde-' + date + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(input){
  var file = input.files[0];
  if(!file) return;
  var status = document.getElementById('import-status');
  if(status) status.innerHTML = '<span style="color:var(--mu)">Lecture en cours...</span>';

  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var data = JSON.parse(e.target.result);
      // Validate it's a GigPlanner file
      if(!data.events && !data.gear){
        throw new Error('Fichier non reconnu');
      }
      if(!confirm('Importer ces données ?\n\n'
        + (data.events||[]).length + ' événement(s)\n'
        + (data.gear||[]).length + ' matériel(s)\n'
        + (data.serviceTypes||[]).length + ' prestation(s)\n'
        + (data.invoices||[]).length + ' facture(s)\n\n'
        + '⚠️ Tes données actuelles seront remplacées.'
      )) return;

      // Restore all fields
      if(data.events)        S.events        = data.events;
      if(data.gear)          S.gear          = data.gear;
      if(data.serviceTypes)  S.serviceTypes  = data.serviceTypes;
      if(data.invoices)      S.invoices      = data.invoices;
      if(data.contracts)     S.contracts     = data.contracts;
      if(data.reviews)       S.reviews       = data.reviews;
      if(data.globalLinks)   S.globalLinks   = data.globalLinks;
      if(data.externalLinks) S.externalLinks = data.externalLinks;
      if(data.profile)       S.profile       = Object.assign({}, S.profile, data.profile);

      save();
      render();
      // Go back to settings > data tab
      setTimeout(function(){
        switchTab('data');
        var el = document.getElementById('import-status');
        if(el) el.innerHTML = '<span style="color:var(--ok)">✅ Importé avec succès !</span>';
      }, 100);

    } catch(err) {
      if(status) status.innerHTML = '<span style="color:var(--er)">❌ Erreur : ' + escH(err.message) + '</span>';
    }
  };
  reader.readAsText(file);
}

// ===== GEAR DRAG & DROP =====
var _dragGearId = null;
var _dragOverId = null;

function gearDragStart(e){
  _dragGearId = e.currentTarget.dataset.id;
  e.currentTarget.style.opacity = '0.4';
  e.dataTransfer.effectAllowed = 'move';
}

function gearDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  var target = e.currentTarget;
  _dragOverId = target.dataset.id;
  // Visual cue: highlight drop target
  document.querySelectorAll('.gear-drag-item').forEach(function(el){
    el.style.borderTop = '';
  });
  if(_dragOverId !== _dragGearId){
    target.style.borderTop = '2px solid var(--ac)';
  }
}

function gearDrop(e){
  e.preventDefault();
  if(!_dragGearId || _dragGearId === _dragOverId) return;
  var fromIdx = S.gear.findIndex(function(g){return g.id===_dragGearId;});
  var toIdx   = S.gear.findIndex(function(g){return g.id===_dragOverId;});
  if(fromIdx === -1 || toIdx === -1) return;
  // Reorder
  var item = S.gear.splice(fromIdx, 1)[0];
  S.gear.splice(toIdx, 0, item);
  save();
  document.getElementById('tab-content').innerHTML = renderGear();
}

function gearDragEnd(){
  _dragGearId = null;
  _dragOverId = null;
  document.querySelectorAll('.gear-drag-item').forEach(function(el){
    el.style.opacity = '';
    el.style.borderTop = '';
  });
}



function editGear(id){
  var item = id && id !== 'null' ? S.gear.find(function(g){return g.id===id;}) : null;
  document.getElementById('mtitle').textContent = item ? 'Modifier matériel' : '+ Nouveau matériel';
  document.getElementById('mbody').innerHTML =
    '<div class="fg">'
    + '<div class="fgi"><label>Nom *</label><input id="gi-n" value="' + escH(item&&item.name||'') + '"></div>'
    + '<div class="fgi"><label>Catégorie</label><input id="gi-c" placeholder="ex: Platines, Sono, Lumières" value="' + escH(item&&item.cat||'') + '"></div>'
    + '<div class="fgi"><label>Temps chargement (min)</label><input id="gi-l" type="number" min="0" value="' + (item&&item.loadMin||10) + '"></div>'
    + '</div>';
  document.getElementById('mfoot').innerHTML =
    '<button class="btn bg" onclick="closeMo()">Annuler</button>'
    + '<button class="btn bp" onclick="saveGear(\'' + (id||'null') + '\')">💾 Enregistrer</button>';
  showMo();
}

function saveGear(id){
  var n = document.getElementById('gi-n').value.trim();
  if(!n){alert('Nom requis');return;}
  var data = {
    name: n,
    cat: document.getElementById('gi-c').value.trim(),
    loadMin: parseInt(document.getElementById('gi-l').value)||0
  };
  if(id && id !== 'null'){
    var item = S.gear.find(function(x){return x.id===id;});
    if(item) Object.assign(item, data);
  } else {
    S.gear.push(Object.assign(data, {id:'g'+uid()}));
  }
  save();
  closeMo();
  document.getElementById('tab-content').innerHTML = renderGear();
}

function delGear(id){
  if(!confirm('Supprimer ce matériel ?')) return;
  S.gear = S.gear.filter(function(g){return g.id!==id;});
  save();
  document.getElementById('tab-content').innerHTML = renderGear();
}
